<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Form Dirty Guard Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
</style></head>
<body>
<h1>Form Dirty Guard Tests</h1>
<div id="results"></div>
<script>
const fieldDirtyFlags = {};
["title-input", "description-input", "private-check", "readlater-check"].forEach(id => { fieldDirtyFlags[id] = false; });
function shouldUpdateField(fieldId) {
  if (fieldDirtyFlags[fieldId]) return false;
  return true;
}
const cases = [
  { name: "Should update field when not dirty", setup: () => { fieldDirtyFlags["title-input"] = false; }, test: () => shouldUpdateField("title-input"), expected: true },
  { name: "Should skip update when field is dirty", setup: () => { fieldDirtyFlags["title-input"] = true; }, test: () => shouldUpdateField("title-input"), expected: false },
  { name: "Should skip dirty, allow clean", setup: () => { fieldDirtyFlags["title-input"] = true; fieldDirtyFlags["description-input"] = false; }, test: () => !shouldUpdateField("title-input") && shouldUpdateField("description-input"), expected: true },
  { name: "Should allow update after reset", setup: () => { fieldDirtyFlags["title-input"] = true; fieldDirtyFlags["title-input"] = false; }, test: () => shouldUpdateField("title-input"), expected: true },
  { name: "Checkboxes: private-check clean allows update", setup: () => { fieldDirtyFlags["private-check"] = false; }, test: () => shouldUpdateField("private-check"), expected: true },
  { name: "Checkboxes: private-check dirty blocks update", setup: () => { fieldDirtyFlags["private-check"] = true; }, test: () => shouldUpdateField("private-check"), expected: false },
  { name: "Checkboxes: readlater-check clean allows update", setup: () => { fieldDirtyFlags["readlater-check"] = false; }, test: () => shouldUpdateField("readlater-check"), expected: true },
  { name: "Checkboxes: readlater-check dirty blocks update", setup: () => { fieldDirtyFlags["readlater-check"] = true; }, test: () => shouldUpdateField("readlater-check"), expected: false },
  { name: "All fields dirty: none should update", setup: () => { Object.keys(fieldDirtyFlags).forEach(k => { fieldDirtyFlags[k] = true; }); }, test: () => Object.keys(fieldDirtyFlags).every(k => !shouldUpdateField(k)), expected: true },
  { name: "All fields clean: all should update", setup: () => { Object.keys(fieldDirtyFlags).forEach(k => { fieldDirtyFlags[k] = false; }); }, test: () => Object.keys(fieldDirtyFlags).every(k => shouldUpdateField(k)), expected: true }
];
const root = document.getElementById("results");
let passed = 0;
for (const c of cases) {
  c.setup();
  const ok = c.test() === c.expected;
  if (ok) passed++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = (ok ? "PASS" : "FAIL") + "  " + c.name;
  root.appendChild(div);
}
const summary = document.createElement("div");
summary.style.cssText = "margin-top:12px;font-weight:bold;";
summary.textContent = `${passed}/${cases.length} passed`;
summary.style.color = passed === cases.length ? "#0a0" : "#c00";
root.appendChild(summary);
</script>
</body></html>
