<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Model Error Detection Tests</title>
  <style>
    body { font-family: monospace; margin: 20px; background: #fafafa; }
    h2 { margin-bottom: 16px; }
    .pass { color: green; }
    .fail { color: red; }
    .test { margin: 8px 0; padding: 8px 12px; border-left: 3px solid #ccc; background: #fff; }
    .test.pass { border-color: green; }
    .test.fail { border-color: red; }
    #summary { margin-top: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>AI Model Error Detection Tests</h2>
  <div id="results"></div>
  <div id="summary"></div>

  <script>
    // Inline copy of handleAIError from ai.js — do NOT load ai.js (it has
    // top-level chrome.storage.onChanged.addListener that breaks in a plain page).
    async function handleAIError(res, provider) {
      var msg = provider + " failed (HTTP " + res.status + ")";
      var errorType = null;
      try {
        var body = await res.json();
        if (body.error && body.error.message) msg = provider + ": " + body.error.message;
        else if (body.error && body.error.type) msg = provider + ": " + body.error.type;
        var combined = String(msg + (body.error && body.error.type ? body.error.type : "")).toLowerCase();
        if (res.status === 404 || /model|not.*exist|not.*found|unknown.*model/i.test(combined)) {
          errorType = "model_not_found";
        }
      } catch (_) {}
      var err = new Error(msg);
      if (errorType) err.code = errorType;
      throw err;
    }

    var tests = [
      {
        name: "404 with generic message",
        status: 404,
        body: { error: { message: "Not found" } },
        expectCode: "model_not_found"
      },
      {
        name: "API returns 'model does not exist'",
        status: 400,
        body: { error: { message: "The model 'gpt-5.4-nano' does not exist" } },
        expectCode: "model_not_found"
      },
      {
        name: "API returns 'unknown model'",
        status: 400,
        body: { error: { type: "invalid_request_error", message: "Unknown model: deepseek-v4-flash" } },
        expectCode: "model_not_found"
      },
      {
        name: "Generic error (no model reference)",
        status: 400,
        body: { error: { message: "Invalid API key" } },
        expectCode: null
      },
      {
        name: "500 error (server issue, not model)",
        status: 500,
        body: { error: { message: "Internal server error" } },
        expectCode: null
      }
    ];

    var resultsEl = document.getElementById("results");
    var summaryEl = document.getElementById("summary");
    var passed = 0;
    var total = tests.length;
    var pending = total;

    tests.forEach(function(test) {
      var response = new Response(JSON.stringify(test.body), {
        status: test.status,
        headers: { "Content-Type": "application/json" }
      });

      handleAIError(response, "TestProvider").catch(function(err) {
        var pass = err.code === test.expectCode;
        if (pass) passed++;
        var div = document.createElement("div");
        div.className = "test " + (pass ? "pass" : "fail");
        var label = document.createElement("span");
        label.textContent = (pass ? "PASS" : "FAIL") + "  " + test.name;
        var detail = document.createElement("div");
        detail.style.fontSize = "0.9em";
        detail.style.marginTop = "4px";
        detail.textContent = "expected code=" + String(test.expectCode) + "  got code=" + String(err.code);
        div.appendChild(label);
        div.appendChild(detail);
        resultsEl.appendChild(div);
        pending--;
        if (pending === 0) {
          summaryEl.textContent = passed + "/" + total + " passed" + (passed === total ? " — all green" : " — FAILURES above");
          summaryEl.style.color = passed === total ? "green" : "red";
        }
      });
    });
  </script>
</body>
</html>
