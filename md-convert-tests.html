<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>md-convert.js tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="vendor/turndown.js"></script>
<script src="vendor/marked.min.js"></script>
<script src="vendor/purify.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<script src="md-convert.js?v=obs2"></script>
<script src="site-rules.js?v=1"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond;
  ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
// normalize whitespace for resilient HTML substring checks
const norm = (h) => h.replace(/\s+/g, " ").trim();

// ---- P2+ harness helpers (wrap check() so plan code blocks run verbatim) ----
function section(name) {
  const h = document.createElement("h2");
  h.textContent = name;
  root.appendChild(h);
}
function assert(cond, detail) {
  check(detail || String(cond), cond, detail);
}
function assertEq(actual, expected, label) {
  const ok = actual === expected;
  check(label || (String(expected) + " === " + String(actual)), ok,
    ok ? "" : "expected " + JSON.stringify(expected) + " got " + JSON.stringify(actual));
}

// ---- Regression: the FOUR old renderMarkdown defects are now correct ----

// 1. Nested list must NOT be flattened.
(() => {
  const h = norm(renderMarkdown("- a\n  - b\n  - c\n- d"));
  // a <ul> nested inside an <li> proves nesting survived
  check("nested list keeps nesting", /<li>a\s*<ul>/.test(h), h);
})();

// 2. Multi-line blockquote -> one blockquote, both lines, not a literal newline in one <p>.
(() => {
  const h = norm(renderMarkdown("> line one\n> line two"));
  const oneBq = (h.match(/<blockquote>/g) || []).length === 1;
  check("multi-line blockquote merges", oneBq && /line one/.test(h) && /line two/.test(h), h);
})();

// 3. ** inside inline code must stay literal (not become <strong>).
(() => {
  const h = norm(renderMarkdown("use `a**b**c` here"));
  check("** inside inline code stays literal", /<code>a\*\*b\*\*c<\/code>/.test(h) && !/<strong>/.test(h), h);
})();

// 4. GFM task list [x] -> checked checkbox that survives DOMPurify.
(() => {
  const h = norm(renderMarkdown("- [x] done\n- [ ] todo"));
  const hasInput = /<input[^>]*type="checkbox"/.test(h);
  const hasChecked = /<input[^>]*checked/.test(h);
  check("task list renders checkbox input", hasInput && hasChecked, h);
})();

// ---- Heading slug id (renderer + slugify), incl CJK ----
(() => {
  const h = norm(renderMarkdown("## Hello World\n\n## 中文 标题"));
  check("heading gets slug id", /<h2 id="hello-world">/.test(h), h);
  check("heading slug keeps CJK", /<h2 id="中文-标题">/.test(h), h);
})();

// ---- Dedup smoke: htmlToMarkdown exists once and both contexts use the SAME global ----
(() => {
  check("htmlToMarkdown is a single global function",
    typeof htmlToMarkdown === "function", "typeof = " + typeof htmlToMarkdown);
  check("markdownToPlainText moved here (single global)",
    typeof markdownToPlainText === "function", "typeof = " + typeof markdownToPlainText);
  // round-trip proves the consolidated Turndown rules are live in this one definition
  const md = htmlToMarkdown("<h1>Title</h1><pre><code class=\"language-js\">x=1</code></pre><table><tr><th>A</th></tr><tr><td>1</td></tr></table>", { baseUrl: "https://e.com" });
  check("htmlToMarkdown emits atx heading", /^# Title/m.test(md), md);
  check("htmlToMarkdown emits fenced code with lang", /```js\n/.test(md), md);
  check("htmlToMarkdown emits pipe table", /\|\s*A\s*\|/.test(md) && /\|\s*---\s*\|/.test(md), md);
})();

// ---- Security: renderMarkdown is the lone sanitize point (XSS closed) ----
(() => {
  const s = norm(renderMarkdown("a <script>alert(1)<\/script> b"));
  check("renderMarkdown strips <script>", !/<script/i.test(s) && !/alert\(1\)/.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('text <img src="x" onerror="alert(1)"> end'));
  check("renderMarkdown strips img onerror", /<img/i.test(s) && !/onerror/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("[x](javascript:alert(1))"));
  check("renderMarkdown neutralizes javascript: link", !/javascript:/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("<iframe src=\"https://evil\"></iframe>"));
  check("renderMarkdown drops iframe", !/<iframe/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('<a href="javascript:void(document.cookie)">raw</a>'));
  check("renderMarkdown neutralizes raw <a> javascript: href", !/javascript:/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("[ok](https://example.com)"));
  check("renderMarkdown safe link gets target+rel", /rel="noopener noreferrer"/.test(s) && /target="_blank"/.test(s), s);
})();

// ---- END of existing tests ----

  // ---- safeFilename (shared download helper) ----
  section("safeFilename");
  (() => {
    assertEq(safeFilename("a:b/c*d"), "a_b_c_d", "punctuation -> underscore");
    assertEq(safeFilename("标题 x"), "标题 x", "keeps CJK and spaces");
    assertEq(safeFilename(""), "untitled", "empty -> untitled");
    assertEq(safeFilename("x".repeat(100)).length, 80, "caps at 80 chars");
    assert(typeof downloadFile === "function", "downloadFile is a shared global");
  })();

</script>

<script>
  // ---- buildObsidianUri (obsidian://new URI builder) ----
  section("buildObsidianUri");
  (() => {
    try {
      assertEq(buildObsidianUri({ name: "My Note" }), "obsidian://new?file=My%20Note", "basic name");
      assertEq(buildObsidianUri({ name: "N", folder: "Clips" }), "obsidian://new?file=Clips%2FN", "folder joined, slash encoded");
      assertEq(buildObsidianUri({ name: "N", folder: "/a/b/" }), "obsidian://new?file=a%2Fb%2FN", "folder slashes trimmed");
      assert(/&vault=My%20Vault/.test(buildObsidianUri({ name: "N", vault: "My Vault" })), "vault encoded");
      const clip = buildObsidianUri({ name: "N", clipboard: true });
      assert(/&clipboard/.test(clip) && !/&content=/.test(clip), "clipboard mode: &clipboard, no &content");
      const cont = buildObsidianUri({ name: "N", clipboard: false, content: "# Hi & bye" });
      assert(/&content=%23%20Hi%20%26%20bye/.test(cont) && !/&clipboard/.test(cont), "content mode: encoded &content, no &clipboard");
      assertEq(buildObsidianUri({}), "obsidian://new?file=Untitled", "empty opts -> Untitled");
    } catch (e) {
      assert(false, "buildObsidianUri threw: " + e.message);
    }
  })();
</script>

<script>
  section("P2.1 applyFrontmatter / yamlString");

  // yamlString escapes quotes, colons, newlines
  assertEq(yamlString('Plain title'), '"Plain title"', "wraps plain in quotes");
  assertEq(yamlString('Has: colon'), '"Has: colon"', "quotes colon");
  assertEq(yamlString('Quote "x"'), '"Quote \\"x\\""', "escapes inner quotes");
  assertEq(yamlString('Line1\nLine2'), '"Line1\\nLine2"', "escapes newline");

  // Full block with all fields
  const fm1 = applyFrontmatter("# Body\n", {
    title: 'A: "quoted"',
    url: "https://e.com/p",
    date: "2026-06-03",
    tags: ["dev", "go"],
    source: "defuddle",
    description: "Desc: with colon"
  }, {});
  assert(fm1.startsWith("---\n"), "starts with fence");
  assert(fm1.includes('title: "A: \\"quoted\\""'), "title escaped");
  assert(fm1.includes("url: https://e.com/p"), "url bare");
  assert(fm1.includes("date: 2026-06-03"), "date bare");
  assert(fm1.includes("tags: [dev, go]"), "tags inline array");
  assert(fm1.includes("source: defuddle"), "source bare");
  assert(fm1.includes('description: "Desc: with colon"'), "description escaped");
  assert(fm1.includes("\n---\n\n# Body"), "closes fence then body");

  // description omitted when absent
  const fm2 = applyFrontmatter("body", { title: "T", url: "u", date: "d", tags: [], source: "jina" }, {});
  assert(!fm2.includes("description:"), "no description field when absent");
  assert(fm2.includes("tags: []"), "empty tags renders empty array");

  // fields option restricts + orders output
  const fm3 = applyFrontmatter("body", { title: "T", url: "u", date: "d", tags: ["a"], source: "x" }, { fields: ["url", "title"] });
  const lines3 = fm3.split("\n");
  assertEq(lines3[1], "url: u", "field order honored (url first)");
  assertEq(lines3[2], 'title: "T"', "field order honored (title second)");
  assert(!fm3.includes("source:"), "excluded field absent");
</script>

<script>
  section("P2.2 applyImagePolicy");
  const base = "https://e.com/blog/post/";

  // keep: absolutize relative src, leave absolute untouched
  const keep = applyImagePolicy("![a](pics/x.png) ![b](https://cdn.io/y.png) ![c](/z.png)", { policy: "keep", baseUrl: base });
  assert(keep.includes("![a](https://e.com/blog/post/pics/x.png)"), "relative src absolutized");
  assert(keep.includes("![b](https://cdn.io/y.png)"), "absolute src untouched");
  assert(keep.includes("![c](https://e.com/z.png)"), "root-relative src absolutized");

  // alt: ![alt](url) -> alt text; drop image entirely when no alt
  const alt = applyImagePolicy("see ![my pic](pics/x.png) and ![](pics/y.png) end", { policy: "alt", baseUrl: base });
  assert(alt.includes("see my pic and  end"), "alt kept, empty-alt image removed: " + alt);
  assert(!alt.includes("!["), "no image syntax remains");

  // strip: remove all images
  const strip = applyImagePolicy("a ![x](pics/x.png) b ![y](z.png) c", { policy: "strip", baseUrl: base });
  assert(!strip.includes("!["), "no images remain");
  assert(strip.includes("a ") && strip.includes(" b ") && strip.includes(" c"), "surrounding text intact: " + strip);

  // invalid/unparseable relative src under keep is left as-is (no throw)
  const safe = applyImagePolicy("![a](::::)", { policy: "keep", baseUrl: base });
  assert(safe.includes("![a]("), "unparseable src does not throw and is preserved");
</script>

<script>
  section("P2.3 buildToc");

  const tocMd = [
    "# Title (h1 skipped)",
    "## First Section",
    "text",
    "### Sub A",
    "#### Deep",
    "##### Too deep (skipped, >maxLevel)",
    "```",
    "## Fake heading in code",
    "```",
    "## 中文 标题"
  ].join("\n");

  const { tocMarkdown, headings } = buildToc(tocMd, { minLevel: 2, maxLevel: 4 });

  // h1 excluded (below minLevel), h5 excluded (above maxLevel), fenced heading skipped
  assertEq(headings.length, 4, "4 headings in range: " + JSON.stringify(headings.map(h => h.text)));
  assertEq(headings[0].text, "First Section", "first heading text");
  assertEq(headings[0].level, 2, "first heading level");
  assertEq(headings[0].slug, "first-section", "slug uses P1 slugify");
  assertEq(headings[1].text, "Sub A", "nested heading text");
  assertEq(headings[3].text, "中文 标题", "CJK heading captured");
  assertEq(headings[3].slug, "中文-标题", "CJK slug preserves CJK (P1 slugify)");
  assert(!headings.some(h => h.text.includes("Fake heading")), "fenced code heading skipped");

  // tocMarkdown is a nested bullet list under "## Contents", indented by (level-minLevel)
  assert(tocMarkdown.startsWith("## Contents\n"), "TOC header present");
  assert(tocMarkdown.includes("- [First Section](#first-section)"), "top-level entry, no indent");
  assert(tocMarkdown.includes("  - [Sub A](#sub-a)"), "level-3 entry indented 2 spaces");
  assert(tocMarkdown.includes("    - [Deep](#deep)"), "level-4 entry indented 4 spaces");

  // empty input -> empty toc, empty headings
  const none = buildToc("just a paragraph", {});
  assertEq(none.headings.length, 0, "no headings");
  assertEq(none.tocMarkdown, "", "empty tocMarkdown when no headings");
</script>

<script>
  section("P2.4 readingStats");

  // Pure Latin: markdown markup stripped first, word count from plain text
  const lat = readingStats("# Heading\n\n**Hello** world this is a [link](http://x) test.");
  assertEq(lat.words, 8, "latin word count after markdownToPlainText (Heading Hello world this is a link test): " + JSON.stringify(lat));
  assertEq(lat.cjkChars, 0, "no CJK chars");
  assertEq(lat.minutes, 1, "ceil(8/200 + 0/350) = 1");

  // CJK: counted per character, not per whitespace word
  const cjk = readingStats("这是一段中文文本");
  assertEq(cjk.cjkChars, 8, "8 CJK chars");
  assertEq(cjk.words, 0, "no latin words");
  assertEq(cjk.minutes, 1, "ceil(0 + 8/350) = 1");

  // Mixed: latin words + CJK chars combine in minutes
  const mixed = readingStats("hello 世界 world 测试 done");
  assertEq(mixed.words, 3, "3 latin words (hello world done)");
  assertEq(mixed.cjkChars, 4, "4 CJK chars (世界测试)");
  assertEq(mixed.minutes, 1, "ceil(3/200 + 4/350)=1");

  // Larger volume crosses minute boundary
  const big = readingStats(Array(420).fill("word").join(" "));
  assertEq(big.words, 420, "420 words");
  assertEq(big.minutes, 3, "ceil(420/200)=3");

  // Empty
  const empty = readingStats("");
  assertEq(empty.words, 0, "empty words");
  assertEq(empty.cjkChars, 0, "empty cjk");
  assertEq(empty.minutes, 0, "empty minutes 0");
</script>

<script>
  section("P2.5 composeExport");

  const cmeta = {
    title: "My Post",
    url: "https://e.com/blog/post/",
    date: "2026-06-03",
    tags: ["dev"],
    source: "defuddle"
  };
  const cmd = "## Section One\n\n![pic](pics/x.png)\n\n### Section Two\n\nbody text";

  // All on: frontmatter at top, TOC after frontmatter & before body, images absolutized
  const full = composeExport(cmd, cmeta, { frontmatter: true, imagePolicy: "keep", includeToc: true });
  assert(full.startsWith("---\n"), "frontmatter first");
  const afterFm = full.split("\n---\n\n")[1] || full;
  assert(afterFm.indexOf("## Contents") < afterFm.indexOf("## Section One"), "TOC before body");
  assert(full.includes("![pic](https://e.com/blog/post/pics/x.png)"), "image absolutized via baseUrl=url");

  // All off: raw body only, no frontmatter, no TOC, images untouched (keep is default off path)
  const bare = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false });
  assert(!bare.startsWith("---"), "no frontmatter");
  assert(!bare.includes("## Contents"), "no TOC");
  assert(bare.includes("## Section One"), "body present");

  // strip policy removes images even with frontmatter/toc off
  const stripped = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "strip", includeToc: false });
  assert(!stripped.includes("!["), "images stripped");

  // imagePolicy resolves baseUrl from meta.url automatically
  const altd = composeExport("![cap](rel.png)", cmeta, { frontmatter: false, imagePolicy: "alt", includeToc: false });
  assertEq(altd.trim(), "cap", "alt policy uses meta.url baseUrl, yields alt text");
</script>

<script>
  // ---- P3.2 highlightCodeBlocks (needs vendor/highlight.min.js loaded above) ----
  section("P3.2 highlightCodeBlocks");
  (() => {
    const fixture = document.createElement("div");
    fixture.innerHTML = renderMarkdown("```js\nconst x = 1;\nfunction f(){ return x; }\n```");
    highlightCodeBlocks(fixture);
    const codeEl = fixture.querySelector("pre > code");
    check("hljs adds .hljs class to language-tagged block", !!codeEl && codeEl.classList.contains("hljs"), codeEl ? codeEl.className : "<no code el>");
    check("hljs emits token spans", !!codeEl && codeEl.querySelector("span[class*='hljs-']") !== null, "no hljs-* span");
    // Untagged fenced block (no language-) must still highlight via hljs auto-detect —
    // Defuddle/Turndown often drops the language, so this is the common real-world case.
    // (hljs ADDS a language-<detected> class on auto-detect, so check untagged-ness BEFORE.)
    const untagged = document.createElement("div");
    untagged.innerHTML = renderMarkdown("```\nconst y = 2;\nfunction g(){ return y; }\n```");
    const uCode = untagged.querySelector("pre > code");
    const wasUntagged = !!uCode && !/language-/.test(uCode.className);
    highlightCodeBlocks(untagged);
    check("untagged code block (no language-) gets auto-detect highlighting",
      wasUntagged && uCode.classList.contains("hljs") && uCode.querySelector("span[class*='hljs-']") !== null,
      uCode ? ("untaggedInput=" + wasUntagged + " after=" + uCode.className) : "<no code el>");
    const plain = document.createElement("div");
    plain.innerHTML = "<pre><code>plain text</code></pre>";
    let threw = false; try { highlightCodeBlocks(plain); } catch (e) { threw = true; }
    check("highlightCodeBlocks no-throw on untagged block", !threw, "threw on plain <pre><code>");
    let threw2 = false; try { highlightCodeBlocks(document.createElement("div")); } catch (e) { threw2 = true; }
    check("highlightCodeBlocks no-throw on empty root", !threw2, "threw on empty root");
  })();
</script>

<script>
  // ---- composeStyledHtml (standalone styled .html export) ----
  section("composeStyledHtml");
  (() => {
    const meta = { title: "My <Doc>", url: "https://e.com/a", date: "2026-06-04", tags: ["x", "y"], source: "defuddle" };
    const md = "## Intro\n\nHello ![pic](/img.png) world.\n\n```js\nconst a=1;\n```\n";

    const plain = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/^<!DOCTYPE html>/.test(plain), "starts with doctype");
    assert(/<\/html>\s*$/.test(plain), "ends with </html>");
    assert(/<style>[\s\S]*\.export-doc[\s\S]*<\/style>/.test(plain), "inlines READER_CSS");
    assert(/<title>My &lt;Doc&gt;<\/title>/.test(plain), "title is HTML-escaped");
    assert(/<h2 id="intro">/.test(plain), "renders heading with slug id");
    assert(!/doc-header/.test(plain), "no visible header when frontmatter off");

    const stripped = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "strip", includeToc: false, hljsCss: "" });
    assert(!/<img/.test(stripped), "imagePolicy:strip removes images");

    const toc = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "keep", includeToc: true, hljsCss: "" });
    assert(/<h2 id="contents">/.test(toc), "includeToc injects a Contents heading");

    const fm = composeStyledHtml(md, meta, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/<header class="doc-header">/.test(fm), "frontmatter renders a VISIBLE header");
    assert(/<h1 class="doc-title">My &lt;Doc&gt;<\/h1>/.test(fm), "header shows escaped title");
    assert(!/^---/m.test(fm.replace(/<[^>]+>/g, "")), "no YAML --- fences in styled HTML");

    assert(/HLJSMARKER/.test(composeStyledHtml(md, meta, { hljsCss: "/*HLJSMARKER*/" })), "injects caller hljsCss");

    const evil = composeStyledHtml(md, { ...meta, url: "javascript:alert(1)" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(!/href="javascript:/i.test(evil), "non-http(s) url is NOT emitted as an href (XSS guard)");
    assert(/<span>javascript:alert\(1\)<\/span>/.test(evil), "non-http(s) url falls back to a text span");
    const amp = composeStyledHtml(md, { ...meta, url: "https://e.com/?a=1&b=2" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/href="https:\/\/e\.com\/\?a=1&amp;b=2"/.test(amp), "http url & is escaped in the href attribute");
  })();
</script>

<script>

// Site rules / Zhihu extraction

section("site-rules: matcher + fallback");

(() => {
  const doc = new DOMParser().parseFromString("<html><body><p>hi</p></body></html>", "text/html");
  check("non-matching host → applySiteRule null",

section("site-rules: helpers");
(() => {
  const doc = new DOMParser().parseFromString(
    '<div id="c"><p>hi <img data-src="https://x/i.jpg" src="data:image/gif,p"></p><span class="ad">x</span></div>', "text/html");
  const c = doc.getElementById("c").cloneNode(true);
  c.querySelectorAll(".ad").forEach(n => n.remove());
  c.querySelectorAll("img").forEach(img => { const r = img.getAttribute("data-src"); if (r) img.setAttribute("src", r); });
  check("data-src promoted (helper parity)", /src="https:\/\/x\/i\.jpg"/.test(norm(c.innerHTML)) && !/class="ad"/.test(c.innerHTML), c.innerHTML);
})();
</script>
