<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Union Tags Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
</style></head>
<body>
<h1>unionTags() tests</h1>
<div id="results"></div>
<script src="shared.js"></script>
<script>
const cases = [
  { existing: "work project", new: "review", out: "work project review" },
  { existing: "work Project", new: "PROJECT", out: "work Project" },
  { existing: "  tag1  tag2  ", new: "  tag3  ", out: "tag1 tag2 tag3" },
  { existing: "python coding", new: "python tutorial", out: "python coding tutorial" },
  { existing: "", new: "tag1 tag2", out: "tag1 tag2" },
  { existing: "tag1 tag2", new: "", out: "tag1 tag2" },
  { existing: "", new: "", out: "" },
  { existing: "Python PYTHON python", new: "python", out: "Python" },
  { existing: "a b c", new: "c d e", out: "a b c d e" },
  { existing: "work", new: "Work WORK work", out: "work" },
  { existing: "  ", new: "  tag  ", out: "tag" },
  { existing: "x-ray x_ray", new: "X-RAY", out: "x-ray x_ray" },
];
const root = document.getElementById("results");
for (const c of cases) {
  const r = unionTags(c.existing, c.new);
  const ok = r === c.out;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  unionTags("${c.existing}", "${c.new}")\n   OUT: "${r}"${ok ? "" : `\n   EXPECTED: "${c.out}"`}`;
  root.appendChild(div);
}
</script>
</body></html>
