<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="md-preview.css" />
  <link rel="stylesheet" id="hljs-light-link" href="vendor/hljs-github.min.css" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" id="hljs-dark-link" href="vendor/hljs-github-dark.min.css" media="(prefers-color-scheme: dark)" />
  <script src="md-preview-theme-early.js"></script>
</head>
<body>
  <div id="copy-status" class="sr-only" aria-live="polite"></div>
  <button id="rail-toggle" class="rail-toggle" type="button" aria-label="Toggle controls" data-i18n-aria="mdToggleControls" aria-expanded="false" aria-controls="rail" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="rail-scrim" class="rail-scrim" hidden></div>
  <aside id="rail" class="rail" aria-labelledby="preview-title">
    <div class="rail-ident">
      <h1 id="preview-title"></h1>
      <a id="preview-url" href="#" target="_blank" rel="noopener"></a>
    </div>
    <div class="rail-badges">
      <span id="source-badge" class="source-badge" role="group" aria-label="Extraction engine" data-i18n-aria="mdEngineGroupAria">
        <button type="button" class="src-seg" data-engine="local">Defuddle</button>
        <button type="button" class="src-seg" data-engine="jina">Jina Reader</button>
      </span>
      <span id="engine-status" class="engine-status" role="status" aria-live="polite"></span>
      <span id="reading-stats" class="rail-stats"></span>
      <span id="token-count" class="token-badge"></span>
    </div>
    <div class="view-toggle">
      <button id="btn-raw" class="toggle-btn" data-i18n="mdViewRaw" aria-pressed="false">Raw</button>
      <button id="btn-rendered" class="toggle-btn active" data-i18n="mdViewRendered" aria-pressed="true">Rendered</button>
    </div>
    <div class="rail-section" id="export-section">
      <div class="rail-label" data-i18n="mdExportSection">Export</div>
      <div class="exp-toggles" role="group" aria-label="Export" data-i18n-aria="mdExportSection">
        <button type="button" id="exp-frontmatter" class="action-btn exp-tgl" aria-pressed="true">Frontmatter</button>
        <button type="button" id="exp-include-toc" class="action-btn exp-tgl" aria-pressed="false" data-i18n="mdTglToc">TOC</button>
        <button type="button" id="exp-include-hl" class="action-btn exp-tgl" aria-pressed="true" data-i18n="mdTglHl">Highlights</button>
      </div>
      <label class="exp-img-row"><span data-i18n="mdOptImages">Images</span>
        <select id="exp-image-policy">
          <option value="keep" data-i18n="mdImgKeep">Keep</option>
          <option value="alt" data-i18n="mdImgAlt">Alt text</option>
          <option value="strip" data-i18n="mdImgStrip">Remove</option>
          <option value="embed" data-i18n="mdImgEmbed">Embed (offline, downloads only)</option>
        </select>
      </label>
      <div class="export-grid">
        <div class="export-fmt">
          <span class="fmt-name">Markdown</span>
          <button id="btn-copy-md" class="action-btn" aria-label="Copy Markdown" data-i18n-aria="mdCopyMarkdown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="btn-label" data-i18n="mdCopy">Copy</span>
          </button>
          <button id="btn-dl-md" class="action-btn icon-only" title="Download Markdown file" data-i18n-title="mdDownloadMdTitle" aria-label="Download .md" data-i18n-aria="mdDownloadMd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
        <div class="export-fmt">
          <span class="fmt-name">HTML</span>
          <button id="btn-copy-html" class="action-btn" aria-label="Copy HTML" data-i18n-aria="mdCopyHtml">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="btn-label" data-i18n="mdCopy">Copy</span>
          </button>
          <button id="btn-dl-html" class="action-btn icon-only" title="Download HTML file" data-i18n-title="mdDownloadHtmlTitle" aria-label="Download .html" data-i18n-aria="mdDownloadHtml">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
        <div class="export-fmt">
          <span class="fmt-name">EPUB</span>
          <button id="btn-dl-epub" class="action-btn exp-fmt-span" title="Download EPUB (e-book)" data-i18n-title="mdDownloadEpubTitle" aria-label="Download .epub" data-i18n-aria="mdDownloadEpub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span class="btn-label" data-i18n="mdDownload">Download</span>
          </button>
        </div>
      </div>
      <div id="export-note" class="export-note" aria-live="polite" hidden></div>
      <div class="send-split" id="send-split">
        <button id="send-primary" class="action-btn send-primary" type="button">
          <span class="send-ic" id="send-primary-ic" aria-hidden="true"></span>
          <span class="btn-label" id="send-primary-label">Send to…</span>
        </button>
        <button id="send-caret" class="action-btn send-caret" type="button"
                aria-haspopup="menu" aria-expanded="false"
                aria-label="Choose destination" data-i18n-aria="mdSendChoose">
          <span class="send-tri" aria-hidden="true"></span>
        </button>
        <div id="send-menu" class="send-menu" role="menu" hidden></div>
      </div>
        <div id="send-status" class="send-status" role="status" aria-live="polite" hidden></div>
    </div>
    <nav id="toc" class="toc rail-section" aria-label="Table of contents" data-i18n-aria="mdTocContents" hidden>
      <div class="rail-label" data-i18n="mdTocContents">Contents</div>
      <ul id="toc-list" class="toc-list"></ul>
    </nav>
  </aside>
  <main>
    <div class="doc-body">
      <!-- Image-fix status: SCREEN-READER ONLY. The visible affordance is an
           in-place row rendered after each block that holds a failed image
           (md-preview.js) -- a sticky/fixed bar covered the text it sat over,
           and a bar at the top of the article was off-screen by the time lazy
           images actually failed. This element only announces the aggregate. -->
      <div id="img-fix-note" class="sr-only" role="status" aria-live="polite"></div>
      <article id="rendered-view" class="content-view"></article>
      <pre id="raw-view" class="content-view hidden"></pre>
    </div>
  </main>
  <!-- Deferred so the page parses/paints before scripts run. highlight.min.js (122KB) is
       NOT loaded here — md-preview.js lazy-injects it only when the article has code. -->
  <script defer src="vendor/turndown.js"></script>
  <script defer src="vendor/marked.min.js"></script>
  <script defer src="vendor/purify.min.js"></script>
  <script defer src="md-convert.js"></script>
  <script defer src="md-embed.js"></script>
  <script defer src="md-epub.js"></script>
  <script defer src="export-targets.js"></script>
  <script defer src="md-export-send.js"></script>
  <script defer src="i18n.js"></script>
  <script defer src="shared.js"></script>
  <script defer src="ai.js"></script>
  <script defer src="ai-cache.js"></script>
  <script defer src="md-preview.js"></script>
  <script defer src="md-ai-core.js"></script>
  <script defer src="md-translate.js"></script>
  <script defer src="md-dict.js"></script>
  <script defer src="md-ask.js"></script>
  <script defer src="md-highlight.js"></script>
  <script defer src="md-reader.js"></script>
  <script defer src="md-skim.js"></script>
</body>
</html>
