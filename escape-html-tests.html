<!DOCTYPE html><html><head><title>HTML Escape Tests</title>
<style>body{font-family:monospace;padding:16px;max-width:600px;}.case{padding:6px;border-bottom:1px solid #eee;}.pass{color:#0a0;}.fail{color:#c00;font-weight:bold;}</style>
</head><body><h1>escapeForExtended() tests</h1><div id="results"></div>
<script src="shared.js"></script><script>
const cases=[
  {in:"hello",out:"hello"},
  {in:"<blockquote>",out:"&lt;blockquote&gt;"},
  {in:"test</blockquote>",out:"test&lt;/blockquote&gt;"},
  {in:"A & B",out:"A &amp; B"},
  {in:'<img src=x onerror=alert(1)>',out:"&lt;img src=x onerror=alert(1)&gt;"},
  {in:"line1\nline2",out:"line1\nline2"},
  {in:null,out:""},
  {in:"",out:""}
];
const root=document.getElementById("results");
for(const c of cases){
  const r=escapeForExtended(c.in);
  const ok=r===c.out;
  const div=document.createElement("div");
  div.className="case "+(ok?"pass":"fail");
  div.textContent=(ok?"✓":"✗")+" IN: "+JSON.stringify(c.in)+"\n   OUT: "+JSON.stringify(r)+(ok?"":"\n   EXPECT: "+JSON.stringify(c.out));
  root.appendChild(div);
}
</script></body></html>
