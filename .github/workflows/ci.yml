name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .qa-scan/package-lock.json

      - name: Install QA dependencies
        run: npm ci --prefix .qa-scan

      - name: Install bundled Chromium
        run: npx --prefix .qa-scan playwright install --with-deps chromium

      - name: Verify source and tests
        run: xvfb-run -a sh scripts/verify.sh

      - name: Build and smoke-test release ZIP
        run: xvfb-run -a bash scripts/release.sh --build-only
