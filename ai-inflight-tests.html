<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>AI In-Flight Dedup Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
</style></head>
<body>
<h1>getOrCreateInflight() tests</h1>
<div id="results"></div>
<!-- ai.js has a top-level chrome.storage.onChanged listener that throws ReferenceError
     in a plain browser tab, so we inline the two symbols under test instead. -->
<script>
const _inflightAI = new Map();

function getOrCreateInflight(key, factory) {
  if (_inflightAI.has(key)) return _inflightAI.get(key);
  const promise = factory();
  _inflightAI.set(key, promise);
  promise.finally(() => _inflightAI.delete(key));
  return promise;
}

(async () => {
  const cases = [];

  // 1. Same key: factory called only once, both callers get the same result
  {
    let n = 0;
    const f = () => { n++; return Promise.resolve("r1"); };
    const p1 = getOrCreateInflight("k1", f);
    const p2 = getOrCreateInflight("k1", f);
    const [r1, r2] = await Promise.all([p1, p2]);
    cases.push({ name: "same key dedups (factory called once, same result)", ok: n === 1 && r1 === r2 && r1 === "r1" });
  }

  // 2. Different keys: each factory runs independently
  {
    let n = 0;
    const f = () => { n++; return Promise.resolve("r"); };
    await Promise.all([getOrCreateInflight("ka", f), getOrCreateInflight("kb", f)]);
    cases.push({ name: "different keys run separately", ok: n === 2 });
  }

  // 3. After resolve: registry entry is removed, next call creates a new promise
  {
    const f = () => Promise.resolve("done");
    const p1 = getOrCreateInflight("kc", f);
    await p1;
    const p2 = getOrCreateInflight("kc", f);
    cases.push({ name: "registry cleared after resolve", ok: p1 !== p2 });
    await p2;
  }

  // 4. After reject: registry entry is removed, next call creates a new promise
  {
    const f = () => Promise.reject(new Error("x"));
    const p1 = getOrCreateInflight("kr", f);
    try { await p1; } catch (_) {}
    const p2 = getOrCreateInflight("kr", f);
    cases.push({ name: "registry cleared after reject", ok: p1 !== p2 });
    try { await p2; } catch (_) {}
  }

  const root = document.getElementById("results");
  let passed = 0;
  for (const c of cases) {
    if (c.ok) passed++;
    const d = document.createElement("div");
    d.className = "case " + (c.ok ? "pass" : "fail");
    d.textContent = (c.ok ? "PASS  " : "FAIL  ") + c.name;
    root.appendChild(d);
  }
  const summary = document.createElement("div");
  summary.style.cssText = "margin-top:12px;font-weight:bold;";
  summary.textContent = `${passed}/${cases.length} passed`;
  summary.style.color = passed === cases.length ? "#0a0" : "#c00";
  root.appendChild(summary);
})();
</script>
</body></html>
