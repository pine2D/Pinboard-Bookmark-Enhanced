<!doctype html>
<html><head><meta charset="utf-8"><title>pinboard-sort tests</title>
<style>.case{font-family:monospace;white-space:pre}.pass{color:#176}.fail{color:#b00}</style>
</head><body>
<div id="results"></div>
<!-- the content script under test; its DOM injection no-ops outside a tag page -->
<script src="pinboard-sort.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function assertEq(actual, expected, label) {
  check(label, actual === expected, "expected " + JSON.stringify(expected) + " got " + JSON.stringify(actual));
}

const F = window.__PBP_POPSORT__;
check("pure helpers exposed on window.__PBP_POPSORT__", !!F);

// parsePopCount
assertEq(F.parsePopCount("9 others"), 9, "parsePopCount '9 others' -> 9");
assertEq(F.parsePopCount("1 other"), 1, "parsePopCount '1 other' -> 1");
assertEq(F.parsePopCount("  3 others "), 3, "parsePopCount leading space -> 3");
assertEq(F.parsePopCount(""), 0, "parsePopCount '' -> 0");
assertEq(F.parsePopCount("copy to mine"), 0, "parsePopCount non-numeric -> 0");
assertEq(F.parsePopCount(null), 0, "parsePopCount null -> 0");

// extractPop + computeSortedOrder over a DOMParser fixture
const html = `<div id="main_column">
  <div class="bookmark"><div class="display"><a class="url_link">9 others</a></div></div>
  <div class="bookmark"><div class="display"><a class="url_link">1 other</a></div></div>
  <div class="bookmark"><div class="display"></div></div>
  <div class="bookmark"><div class="display"><a class="url_link">9 others</a></div></div>
</div>`;
const doc = new DOMParser().parseFromString(html, "text/html");
const bms = Array.from(doc.querySelectorAll("div.bookmark"));
assertEq(F.extractPop(bms[0]), 9, "extractPop bms[0] -> 9");
assertEq(F.extractPop(bms[2]), 0, "extractPop bms[2] (no url_link) -> 0");
assertEq(F.extractPop(null), 0, "extractPop null -> 0");

const order = F.computeSortedOrder(bms);
assertEq(order.length, 4, "computeSortedOrder keeps all 4");
check("sorted[0] = first pop-9 (stable)", order[0] === bms[0]);
check("sorted[1] = second pop-9 (stable tie keeps input order)", order[1] === bms[3]);
check("sorted[2] = pop-1", order[2] === bms[1]);
check("sorted[3] = pop-0 sinks to bottom", order[3] === bms[2]);
check("computeSortedOrder does not mutate input array", bms[1] === doc.querySelectorAll("div.bookmark")[1]);
const originalFirst = bms[0], originalLast = bms[3];
F.computeSortedOrder(bms);
check("input array order is not reordered by sort", bms[0] === originalFirst && bms[3] === originalLast);
assertEq(F.computeSortedOrder([]).length, 0, "computeSortedOrder([]) -> empty array");

// --- getBookmarkRows: row resolution across the two real page structures ---
// public /t: : bookmarks are DIRECT children of #main_column
const pubMc = new DOMParser().parseFromString(html, "text/html").getElementById("main_column");
const pubRows = F.getBookmarkRows(pubMc);
assertEq(pubRows.length, 4, "getBookmarkRows public -> 4 rows");
check("public rows ARE the bookmark divs", pubRows[0].classList.contains("bookmark"));
// user /u:x/t: : each bookmark WRAPPED in an anonymous <div> under #main_column
const wrapped = `<div id="main_column"><div id="bookmark_subbanner"></div><div><div class="bookmark"><div class="display"><a class="url_link">2 others</a></div></div></div><div><div class="bookmark"><div class="display"></div></div></div><div><div class="bookmark"><div class="display"><a class="url_link">5 others</a></div></div></div></div>`;
const userMc = new DOMParser().parseFromString(wrapped, "text/html").getElementById("main_column");
const userRows = F.getBookmarkRows(userMc);
assertEq(userRows.length, 3, "getBookmarkRows user -> 3 rows (wrappers)");
check("user rows are the WRAPPER divs, not the bookmark", !userRows[0].classList.contains("bookmark") && !!userRows[0].querySelector("div.bookmark"));
assertEq(F.extractPop(userRows[0]), 2, "extractPop reads pop through the wrapper -> 2");
assertEq(F.extractPop(userRows[1]), 0, "extractPop wrapper without url_link -> 0");
const userSorted = F.computeSortedOrder(userRows);
check("wrapped rows sort by pop (5 > 2 > 0)", userSorted[0] === userRows[2] && userSorted[1] === userRows[0] && userSorted[2] === userRows[1]);

// auto-pagination page-container: an appended page nests wrappers inside a page block
const contHtml = '<div id="main_column">' +
  '<div class="bookmark"><div class="display"><a class="url_link">5 others</a></div></div>' +
  '<div class="autopagerize_page_element">' +
    '<div><div class="bookmark"><div class="display"><a class="url_link">9 others</a></div></div></div>' +
    '<div><div class="bookmark"><div class="display"><a class="url_link">1 other</a></div></div></div>' +
  '</div></div>';
const contMc = new DOMParser().parseFromString(contHtml, "text/html").getElementById("main_column");
const contRows = F.getBookmarkRows(contMc);
assertEq(contRows.length, 3, "getBookmarkRows: page-container -> 3 per-bookmark rows");
check("page-container rows are per-bookmark units, not the page block", !contRows.some(r => r.classList && r.classList.contains("autopagerize_page_element")));
assertEq(F.extractPop(contRows[0]), 5, "page-container row[0] pop=5 (top-level bookmark)");
assertEq(F.extractPop(contRows[1]), 9, "page-container row[1] pop=9 (nested wrapper)");

// --- mergeNewRows: auto-pagination fold-in (pure) ---
const ra = {}, rb = {}, rc = {}, rd = {};
const snap = [ra, rb];
check("mergeNewRows: no new rows -> SAME array (identity)", F.mergeNewRows(snap, [ra, rb]) === snap);
check("mergeNewRows: reordered current, nothing new -> SAME array", F.mergeNewRows(snap, [rb, ra]) === snap);
const merged = F.mergeNewRows(snap, [ra, rb, rc, rd]);
assertEq(merged.length, 4, "mergeNewRows: extends snapshot to 4");
check("mergeNewRows: appends new rows in load order", merged[2] === rc && merged[3] === rd);
assertEq(snap.length, 2, "mergeNewRows: input snapshot not mutated");

console.log(`PASS ${pass} | FAIL ${fail}`);
</script>
</body></html>
