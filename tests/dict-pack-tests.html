<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>dict-pack Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>dict-pack Tests</h1>
<div id="summary"></div>
<div id="results"></div>
<script src="../dict-pack.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond;
  ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = (ok ? "✓" : "✗") + "  " + name + (ok ? "" : "\n   " + (detail || ""));
  root.appendChild(div);
}
function section(name) {
  const h = document.createElement("h2");
  h.textContent = name;
  root.appendChild(h);
}
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}
function assertArrayEq(a, e, label) {
  const ok = JSON.stringify(a) === JSON.stringify(e);
  check(label || ("array " + JSON.stringify(e)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}

section("pbpCedictParseLine");
const p1 = pbpCedictParseLine("中國 中国 [Zhong1 guo2] /China/");
check("normal line parsed", p1 && p1.trad === "中國" && p1.simp === "中国" && p1.pinyin === "Zhong1 guo2" && p1.defs.length === 1);

const p2 = pbpCedictParseLine("你好 你好 [ni3 hao3] /hello/hi/how are you/");
check("multiple defs", p2 && p2.defs.length === 3 && p2.defs[0] === "hello" && p2.defs[1] === "hi" && p2.defs[2] === "how are you");

const p3 = pbpCedictParseLine("女 女 [nu:3] /woman/female/");
check("u: preserved in pinyin", p3 && p3.pinyin === "nu:3");

assertEq(pbpCedictParseLine("# This is a comment"), null, "comment line returns null");
assertEq(pbpCedictParseLine(""), null, "empty line returns null");
assertEq(pbpCedictParseLine("   \t  "), null, "whitespace-only line returns null");
assertEq(pbpCedictParseLine("中國 中国 Zhong1 guo2 /China/"), null, "malformed no brackets returns null");
assertEq(pbpCedictParseLine("中國 中国 [Zhong1 guo2] China"), null, "malformed no slashes returns null");

const p4 = pbpCedictParseLine("北京 北京 [Bei3 jing1] /Beijing/");
check("pinyin case preserved", p4 && p4.pinyin === "Bei3 jing1");

const p5 = pbpCedictParseLine("字 字 [zi4] /word/");
check("normal single def", p5 && p5.defs.length === 1 && p5.defs[0] === "word");

section("pbpCedictPinyinPretty");
assertEq(pbpCedictPinyinPretty("ni3 hao3"), "nǐ hǎo", "ni3 hao3 -> nǐ hǎo");
assertEq(pbpCedictPinyinPretty("lu:4"), "lǜ", "lu:4 -> lǜ");
assertEq(pbpCedictPinyinPretty("de5"), "de", "de5 -> de (neutral tone)");
assertEq(pbpCedictPinyinPretty("Bei3 jing1"), "Běi jīng", "Bei3 jing1 -> Běi jīng (uppercase preserved)");
assertEq(pbpCedictPinyinPretty("nǐ"), "nǐ", "already marked nǐ passes through");
assertEq(pbpCedictPinyinPretty("Zhong1 guo2"), "Zhōng guó", "Zhong1 guo2 -> Zhōng guó");
assertEq(pbpCedictPinyinPretty(""), "", "empty pinyin -> empty");
assertEq(pbpCedictPinyinPretty("le0"), "le", "le0 (tone 0) -> le");
assertEq(pbpCedictPinyinPretty("xx5"), "xx5", "xx5 marker passes through");
assertEq(pbpCedictPinyinPretty("r5"), "r", "r5 (erhua) -> r");
assertEq(pbpCedictPinyinPretty("Tu2 shu1 guan3"), "Tú shū guǎn", "Tu2 shu1 guan3 -> Tú shū guǎn");

section("pbpCedictLookupKeys");
assertArrayEq(pbpCedictLookupKeys("图书馆里"), ["图书馆里", "图书馆", "图书", "图"], "lookup keys longest-first");
assertArrayEq(pbpCedictLookupKeys("字"), ["字"], "single char key");
assertArrayEq(pbpCedictLookupKeys(""), [], "empty string -> empty keys");
assertArrayEq(pbpCedictLookupKeys(null), [], "null -> empty keys");

const composed = "é"; // U+00E9, single precomposed code point
const decomposed = "é"; // U+0065 + U+0301 (combining acute accent), the real decomposed form
const keysC = pbpCedictLookupKeys(composed);
const keysD = pbpCedictLookupKeys(decomposed);
assertEq(JSON.stringify(keysC), JSON.stringify(keysD), "NFC normalization applied");

const long17 = "一二三四五六七八九十一二三四五六七";
const keys = pbpCedictLookupKeys(long17);
check("capped at 16 code points", keys[0].length === 16);

// Astral (surrogate-pair) CJK: the cap must count CODE POINTS, not UTF-16
// units -- a naive .length cap would slice a surrogate pair in half.
const astral17 = "\u{20000}".repeat(17);
const astralKeys = pbpCedictLookupKeys(astral17);
assertEq(Array.from(astralKeys[0]).length, 16, "astral CJK capped at 16 CODE POINTS (not UTF-16 units)");
assertEq(astralKeys[0].length, 32, "16 astral code points serialize to 32 UTF-16 units (no split surrogate pair)");

assertArrayEq(pbpCedictLookupKeys("  图书  "), ["图书", "图"], "leading/trailing whitespace trimmed");

section("pbpCedictEntryToNorm");
const entry1 = pbpCedictEntryToNorm([{ trad: "中國", simp: "中国", pinyin: "Zhong1 guo2", defs: ["China", "PRC"] }], "中國");
check("word field", entry1.word === "中國");
check("entries array", Array.isArray(entry1.entries) && entry1.entries.length === 1);
check("pos field empty", entry1.entries[0].pos === "");
check("ipas with Pinyin tag", Array.isArray(entry1.entries[0].ipas) && entry1.entries[0].ipas[0].tags.includes("Pinyin"));
check("forms array present", Array.isArray(entry1.entries[0].forms));
check("senses array present", Array.isArray(entry1.entries[0].senses));
assertEq(entry1.sourceLabel, "CC-CEDICT", "sourceLabel");
assertEq(entry1.license, "CC BY-SA 4.0", "license CC BY-SA 4.0");

const entry2 = pbpCedictEntryToNorm([{ trad: "中國", simp: "中国", pinyin: "Zhong1 guo2", defs: ["China"] }], "中國");
check("matched=trad shows simp form", entry2.entries[0].forms.length === 1 && entry2.entries[0].forms[0].word === "中国" && entry2.entries[0].forms[0].tags[0] === "simp");

const entry3 = pbpCedictEntryToNorm([{ trad: "中國", simp: "中国", pinyin: "Zhong1 guo2", defs: ["China"] }], "中国");
check("matched=simp shows trad form", entry3.entries[0].forms.length === 1 && entry3.entries[0].forms[0].word === "中國" && entry3.entries[0].forms[0].tags[0] === "trad");

const entry4 = pbpCedictEntryToNorm([{ trad: "你好", simp: "你好", pinyin: "ni3 hao3", defs: ["hello"] }], "你好");
assertEq(entry4.entries[0].forms.length, 0, "trad === simp, forms empty");

const entry5 = pbpCedictEntryToNorm([{ trad: "你好", simp: "你好", pinyin: "ni3 hao3", defs: ["hello", "hi", "how are you"] }], "你好");
assertEq(entry5.entries[0].senses.length, 3, "multiple defs -> multiple senses");
assertEq(entry5.entries[0].senses[0].definition, "hello", "first sense");

const entry6 = pbpCedictEntryToNorm([], "test");
assertEq(entry6.entries.length, 0, "empty rows -> empty entries");

const entry7 = pbpCedictEntryToNorm(null, "test");
assertEq(entry7.entries.length, 0, "null rows -> empty entries");

section("pbpCedictLines");
(async function() {
  // Single line (no newline)
  const lines1 = [];
  const stream1 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("中國 中国 [Zhong1 guo2] /China/"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream1)) {
    lines1.push(line);
  }
  assertArrayEq(lines1, ["中國 中国 [Zhong1 guo2] /China/"], "single line no newline");

  // Multiple lines
  const lines2 = [];
  const stream2 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("你好 你好 [ni3 hao3] /hello/\n北京 北京 [Bei3 jing1] /Beijing/"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream2)) {
    lines2.push(line);
  }
  assertArrayEq(lines2, ["你好 你好 [ni3 hao3] /hello/", "北京 北京 [Bei3 jing1] /Beijing/"], "multiple lines");

  // Newline across chunks
  const lines3 = [];
  const stream3 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("你好\n"));
      c.enqueue(new TextEncoder().encode("北京"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream3)) {
    lines3.push(line);
  }
  assertArrayEq(lines3, ["你好", "北京"], "newline across chunks");

  // UTF-8 multi-byte character split across chunks
  const lines4 = [];
  const utf8Bytes = new TextEncoder().encode("你好");
  const stream4 = new ReadableStream({
    start(c) {
      c.enqueue(utf8Bytes.slice(0, 1));
      c.enqueue(utf8Bytes.slice(1));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream4)) {
    lines4.push(line);
  }
  assertArrayEq(lines4, ["你好"], "UTF-8 multi-byte split across chunks");

  // CRLF handling
  const lines5 = [];
  const stream5 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("你好\r\n北京\r\n"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream5)) {
    lines5.push(line);
  }
  assertArrayEq(lines5, ["你好", "北京"], "CRLF stripped");

  // Last line without newline (flush)
  const lines6 = [];
  const stream6 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("你好\n北京"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream6)) {
    lines6.push(line);
  }
  assertArrayEq(lines6, ["你好", "北京"], "last line without newline flushed");

  // stats.bytes tracking
  const stats = {};
  const stream7 = new ReadableStream({
    start(c) {
      const bytes = new TextEncoder().encode("你好");
      c.enqueue(bytes);
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream7, false, stats)) {
    // consume
  }
  check("stats.bytes exact decompressed byte count", stats.bytes === 6); // "你好" = 2 x 3 UTF-8 bytes

  // gzip=false explicit path
  const lines8 = [];
  const stream8 = new ReadableStream({
    start(c) {
      c.enqueue(new TextEncoder().encode("test"));
      c.close();
    }
  });
  for await (const line of pbpCedictLines(stream8, false)) {
    lines8.push(line);
  }
  assertArrayEq(lines8, ["test"], "gzip=false plain path");

  // Invalid UTF-8 should reject
  let utf8Error = false;
  try {
    const stream9 = new ReadableStream({
      start(c) {
        c.enqueue(new Uint8Array([0xFF, 0xFE]));
        c.close();
      }
    });
    for await (const line of pbpCedictLines(stream9)) {
      // should not reach
    }
  } catch (e) {
    utf8Error = e.message.includes("UTF-8") || e.name === "TypeError";
  }
  check("invalid UTF-8 rejects", utf8Error);

  // Line too long
  let longError = false;
  try {
    const stream10 = new ReadableStream({
      start(c) {
        const longLine = new Uint8Array(65537);
        c.enqueue(longLine);
        c.enqueue(new TextEncoder().encode("\n"));
        c.close();
      }
    });
    for await (const line of pbpCedictLines(stream10)) {
      // should not reach
    }
  } catch (e) {
    longError = e.message.includes("too long");
  }
  check("line too long throws (cross-chunk fallback check)", longError);

  // Overlong line WITH its newline in the SAME chunk: must hit the pre-yield
  // check -- deleting that guard is exactly the regression this pins.
  let sameChunkError = false;
  try {
    const stream10b = new ReadableStream({
      start(c) {
        const buf = new Uint8Array(65538);
        buf.fill(0x61); // 'a' x 65537
        buf[65537] = 0x0a; // '\n' in the SAME chunk
        c.enqueue(buf);
        c.close();
      }
    });
    for await (const line of pbpCedictLines(stream10b)) {
      // should not reach
    }
  } catch (e) {
    sameChunkError = e.message.includes("too long");
  }
  check("overlong line with newline in the SAME chunk throws (pre-yield guard)", sameChunkError);

  // Same-chunk overlong line, CJK variant: proves the 65536 threshold is
  // counted in UTF-16 code units AFTER decode, not UTF-8 bytes -- each "字"
  // is 3 bytes but 1 UTF-16 unit, so this line is ~197KB of UTF-8 yet only
  // 65537 code units, still tripping the same guard as the ASCII case above.
  let sameChunkCjkError = false;
  try {
    const cjkLine = "字".repeat(65537);
    const cjkBytes = new TextEncoder().encode(cjkLine + "\n");
    const stream10c = new ReadableStream({
      start(c) { c.enqueue(cjkBytes); c.close(); }
    });
    for await (const line of pbpCedictLines(stream10c)) {
      // should not reach
    }
  } catch (e) {
    sameChunkCjkError = e.message.includes("too long");
  }
  check("overlong CJK line (65537 units, ~197KB UTF-8, same chunk) throws by UTF-16 unit count", sameChunkCjkError);

  // File too large
  let sizeError = false;
  try {
    const stats2 = {};
    const stream11 = new ReadableStream({
      start(c) {
        c.enqueue(new Uint8Array(65 * 1024 * 1024));
        c.close();
      }
    });
    for await (const line of pbpCedictLines(stream11, false, stats2)) {
      // should not reach
    }
  } catch (e) {
    sizeError = e.message.includes("too large");
  }
  check("file >64MB throws", sizeError);

  section("dict-pack IDB layer (pbpPackImport/Lookup/Meta/Delete)");
  async function* arrLines(arr) { for (const l of arr) yield l; }

  // Clean slate: a prior run (or file:// dev usage) must not leak state
  // across the pass/fail count this suite pins.
  await new Promise((resolve) => {
    const req = indexedDB.deleteDatabase("pbp-dict-packs");
    req.onsuccess = resolve; req.onerror = resolve; req.onblocked = resolve;
  });
  check("clean db before IDB tests: meta is null", (await pbpPackMeta()) === null);

  const L_BEIJING = "北京 北京 [Bei3 jing1] /Beijing/";
  const L_NIHAO = "你好 你好 [ni3 hao3] /hello/hi/";
  const L_ZHONGGUO = "中國 中国 [Zhong1 guo2] /China/PRC/";
  const L_TU = "图 图 [tu2] /picture/map/";
  const L_CESHI_A = "測試 测试 [ce4 shi4] /testA/"; // trad=測試 simp=测试
  const L_CESHI_B = "测试 测试异体 [ce4 shi4] /testB/"; // trad=测试 (== L_CESHI_A's simp)
  const SAMPLE1 = [L_BEIJING, L_NIHAO, L_ZHONGGUO, L_TU, L_CESHI_A, L_CESHI_B, "# comment line", "   "];

  const stats1 = { bytes: 4242 };
  const res1 = await pbpPackImport(arrLines(SAMPLE1), null, stats1);
  check("import small sample: entries=6", res1.entries === 6, "got " + JSON.stringify(res1));
  check("import small sample: malformed=0", res1.malformed === 0, "got " + JSON.stringify(res1));

  const meta1 = await pbpPackMeta();
  check("meta state ready after import", !!meta1 && meta1.state === "ready");
  check("meta entries matches import result", !!meta1 && meta1.entries === 6);
  check("meta bytes field stored from stats", !!meta1 && meta1.bytes === 4242);
  check("meta importedAt is a fresh timestamp", !!meta1 && typeof meta1.importedAt === "number" && meta1.importedAt > 0);

  const bySimp = await pbpPackLookup(["中国"]);
  check("lookup by simp: matched key", !!bySimp && bySimp.matched === "中国");
  check("lookup by simp: returns the trad-differing row", !!bySimp && bySimp.rows.length === 1 && bySimp.rows[0].trad === "中國");

  const byTrad = await pbpPackLookup(["中國"]);
  check("lookup by trad: matched key", !!byTrad && byTrad.matched === "中國");
  check("lookup by trad: returns the simp-differing row", !!byTrad && byTrad.rows.length === 1 && byTrad.rows[0].simp === "中国");

  const dedupe = await pbpPackLookup(["你好"]);
  check("same record hit via both indexes dedupes to one row", !!dedupe && dedupe.rows.length === 1);

  const merged = await pbpPackLookup(["测试"]);
  check("cross-index merge: matched key", !!merged && merged.matched === "测试");
  check("cross-index merge: returns both distinct records (id-merge, not just one index)", !!merged && merged.rows.length === 2);
  check("cross-index merge: rows sorted by id ascending", !!merged && merged.rows[0].id < merged.rows[1].id);

  const fallbackKeys = pbpCedictLookupKeys("图书馆");
  const fb = await pbpPackLookup(fallbackKeys);
  check("prefix fallback lands on the shortest available key", !!fb && fb.matched === "图");

  const dbRef = await _pbpPackOpenDB();
  await new Promise((resolve, reject) => {
    const tx = dbRef.transaction(_PBP_PACK_META, "readwrite");
    tx.objectStore(_PBP_PACK_META).delete("cedict");
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
  const afterMetaDelete = await pbpPackLookup(["你好"]);
  check("lookup returns null when meta is missing (not ready)", afterMetaDelete === null);

  async function* throwingLines() {
    yield L_BEIJING;
    throw new Error("boom mid-import");
  }
  let midThrew = false;
  try { await pbpPackImport(throwingLines()); } catch (e) { midThrew = /boom/.test(e && e.message); }
  check("iterator throw after first batch propagates as a rejection", midThrew);
  const metaAfterThrow = await pbpPackMeta();
  check("no ready meta survives a mid-import throw", !metaAfterThrow || metaAfterThrow.state !== "ready");

  const res2 = await pbpPackImport(arrLines(SAMPLE1), null, { bytes: 999 });
  check("re-import: entries count is consistent on overwrite", res2.entries === 6);
  const meta2 = await pbpPackMeta();
  check("re-import: meta reflects the latest stats.bytes", !!meta2 && meta2.bytes === 999);
  const reCheck = await pbpPackLookup(["你好"]);
  check("re-import: does not duplicate rows (old store was cleared first)", !!reCheck && reCheck.rows.length === 1);

  // Two controlled writers: prove Web Locks serializes pbpPackImport callers
  // rather than letting a second import race the first's clear+put tx.
  let writerAStarted = false, writerAFinished = false, writerBStarted = false;
  let releaseWriterA;
  const gate = new Promise((r) => { releaseWriterA = r; });
  async function* writerA() {
    writerAStarted = true;
    yield L_BEIJING;
    await gate;
    yield L_NIHAO;
  }
  async function* writerB() {
    writerBStarted = true;
    yield L_CESHI_A;
  }
  const p1 = pbpPackImport(writerA()).then((r) => { writerAFinished = true; return r; });
  await new Promise((r) => setTimeout(r, 30));
  check("Web Locks: writer A acquired the lock and is running", writerAStarted);
  const p2 = pbpPackImport(writerB());
  await new Promise((r) => setTimeout(r, 30));
  check("Web Locks: writer B is queued behind writer A, not yet started", !writerBStarted);
  check("Web Locks: writer A has not finished (still holding the lock)", !writerAFinished);
  releaseWriterA();
  const [, r2] = await Promise.all([p1, p2]);
  check("Web Locks: writer A completed", writerAFinished);
  check("Web Locks: writer B started only after writer A released the lock", writerBStarted);
  check("Web Locks: writer B's own entries count", r2.entries === 1);
  const metaFinal = await pbpPackMeta();
  check("Web Locks: last writer wins (store reflects writer B only)", !!metaFinal && metaFinal.entries === 1);
  const lookupA = await pbpPackLookup(["北京"]);
  check("Web Locks: writer A's data was cleared by writer B's overwrite", lookupA === null);

  const delRes = await pbpPackDelete();
  check("pbpPackDelete resolves true", delRes === true);
  const metaAfterDelete = await pbpPackMeta();
  check("meta is null after delete", metaAfterDelete === null);
  const lookupAfterDelete = await pbpPackLookup(["测试"]);
  check("lookup is null after delete", lookupAfterDelete === null);

  section("pbpPackZipTextStream");
  // Hand-built single-entry zips: local header + data + central dir + EOCD.
  // Real CRC32 and true uncompressed size so the fixtures are also valid for
  // standard ZIP tools (our reader skips CRC, but honest fixtures prove
  // interop rather than merely echoing the reader's own assumptions).
  function crc32(bytes) {
    let c, crc = 0xffffffff;
    for (let i = 0; i < bytes.length; i++) {
      c = (crc ^ bytes[i]) & 0xff;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      crc = (crc >>> 8) ^ c;
    }
    return (crc ^ 0xffffffff) >>> 0;
  }
  function buildZip(name, rawBytes, dataBytes, method) {
    const enc = new TextEncoder();
    const nameB = enc.encode(name);
    const crc = crc32(rawBytes);
    const lh = new Uint8Array(30 + nameB.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(8, method, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, dataBytes.length, true);
    lv.setUint32(22, rawBytes.length, true);
    lv.setUint16(26, nameB.length, true);
    lh.set(nameB, 30);
    const localOfs = 0;
    const cd = new Uint8Array(46 + nameB.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(10, method, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, dataBytes.length, true);
    cv.setUint32(24, rawBytes.length, true);
    cv.setUint16(28, nameB.length, true);
    cv.setUint32(42, localOfs, true);
    cd.set(nameB, 46);
    const cdOfs = lh.length + dataBytes.length;
    const eocd = new Uint8Array(22);
    const ev = new DataView(eocd.buffer);
    ev.setUint32(0, 0x06054b50, true);
    ev.setUint16(8, 1, true);
    ev.setUint16(10, 1, true);
    ev.setUint32(12, cd.length, true);
    ev.setUint32(16, cdOfs, true);
    return new Blob([lh, dataBytes, cd, eocd]);
  }
  async function collectLines(stream) {
    const out = [];
    for await (const line of pbpCedictLines(stream, false)) out.push(line);
    return out;
  }
  const zipContent = "中國 中国 [Zhong1 guo2] /China/\n";
  const zipRaw = new TextEncoder().encode(zipContent);
  const storedZip = buildZip("cedict_ts.u8", zipRaw, zipRaw, 0);
  const storedLines = await collectLines(await pbpPackZipTextStream(storedZip));
  assertEq(storedLines.length, 1, "stored zip: one line extracted");
  check("stored zip: content intact", storedLines[0].indexOf("Zhong1 guo2") >= 0);

  const deflateBlob = new Blob([new TextEncoder().encode(zipContent)]);
  const deflateBytes = new Uint8Array(await new Response(
    deflateBlob.stream().pipeThrough(new CompressionStream("deflate-raw"))
  ).arrayBuffer());
  const deflateZip = buildZip("cedict_ts.u8", zipRaw, deflateBytes, 8);
  const deflateLines = await collectLines(await pbpPackZipTextStream(deflateZip));
  check("deflate zip: decompressed and parsed", deflateLines.length === 1 && deflateLines[0].indexOf("/China/") >= 0);

  let zipErr = false;
  try { await pbpPackZipTextStream(new Blob([new Uint8Array([1, 2, 3, 4])])); } catch (e) { zipErr = /zip/.test(e.message); }
  check("non-zip blob throws a zip error", zipErr);

  const zipFile = new File([await storedZip.arrayBuffer()], "cedict.zip");
  await new Promise((r) => { const del = indexedDB.deleteDatabase("pbp-dict-packs"); del.onsuccess = del.onerror = del.onblocked = r; });
  const zipRes = await pbpPackImportFile(zipFile, null);
  check("pbpPackImportFile imports a .zip end to end", zipRes.entries === 1);

  document.getElementById("summary").textContent = pass + " passed, " + fail + " failed";
})();
</script>
