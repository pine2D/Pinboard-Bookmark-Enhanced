<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>AI Tags Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1200px; }
h2 { margin-top: 24px; font-size: 16px; }
.suite { margin: 12px 0; padding: 8px; border-left: 3px solid #ccc; }
.case { padding: 4px 8px; margin: 4px 0; white-space: pre-wrap; }
.pass { color: #0a0; background: #f0fff0; }
.fail { color: #c00; background: #fff0f0; font-weight: bold; }
#summary { font-weight: bold; margin: 8px 0; }
</style></head>
<body>
<h1>AI tag-quality + combined-prompt tests (ai.js + shared.js)</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../i18n.js"></script>
<script src="../shared.js"></script>
<script src="../ai.js"></script>

<script>
let PASS = 0, FAIL = 0;
function test(name, fn) {
  const div = document.createElement("div");
  try { fn(); PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
  catch (e) { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + e.message; }
  document.getElementById("results").appendChild(div);
}
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function assertEq(actual, expected, label) {
  if (actual !== expected) throw new Error((label || "assertEq") + ": expected " + JSON.stringify(expected) + " got " + JSON.stringify(actual));
}
function suite(name, fn) {
  const div = document.createElement("div"); div.className = "suite";
  const h = document.createElement("h2"); h.textContent = name; div.appendChild(h);
  const results = document.getElementById("results");
  const savedAppend = results.appendChild;
  results.appendChild = function(el) { if (el.className?.includes("case")) div.appendChild(el); else savedAppend.call(results, el); };
  fn();
  results.appendChild = savedAppend; results.appendChild(div);
}
window.addEventListener("load", () => {
  const el = document.getElementById("summary");
  el.textContent = "SUMMARY: " + PASS + " passed, " + FAIL + " failed";
  el.style.color = FAIL ? "#c00" : "#0a0";
  document.title = (FAIL ? "FAIL " : "PASS ") + document.title;
});
</script>

<script>
// ============ Task 1: refineTags ============
suite("refineTags", () => {
  test("AI_TAG_CAP is 8", () => {
    assertEq(AI_TAG_CAP, 8, "cap const");
  });
  test("passes short lists through unchanged, order preserved", () => {
    assertEq(refineTags(["ai_token_relay", "rating", "proxy"], { cap: 8, separator: "_" }).join(","),
      "ai_token_relay,rating,proxy", "order kept");
  });
  test("caps to opts.cap, keeping the first N (most specific first)", () => {
    const out = refineTags(["a", "b", "c", "d", "e"], { cap: 3, separator: "-" });
    assertEq(out.join(","), "a,b,c", "first 3");
  });
  test("defaults cap to AI_TAG_CAP when not given", () => {
    const many = Array.from({ length: 12 }, (_, i) => "t" + i);
    assertEq(refineTags(many, { separator: "-" }).length, 8, "default cap 8");
  });
  test("dedups case/separator-insensitively, keeps first casing", () => {
    assertEq(refineTags(["Token-Relay", "token_relay", "tokenrelay"], { cap: 8, separator: "_" }).join(","),
      "Token-Relay", "separator+case variants collapse");
  });
  test("folds ASCII plural when singular already kept (rating before ratings)", () => {
    assertEq(refineTags(["rating", "ratings", "proxy"], { cap: 8, separator: "-" }).join(","),
      "rating,proxy", "ratings dropped");
  });
  test("CJK tags are never plural-folded and survive", () => {
    assertEq(refineTags(["评分", "代理"], { cap: 8, separator: "-" }).join(","), "评分,代理", "cjk kept");
  });
  test("drops empties and trims; tolerates non-strings", () => {
    assertEq(refineTags(["  spaced  ", "", null, 5, "real"], { cap: 8, separator: "-" }).join(","),
      "spaced,real", "cleaned");
  });
  test("non-array input -> empty array", () => {
    assertEq(refineTags(null, { cap: 8 }).length, 0, "null");
    assertEq(refineTags(undefined).length, 0, "undefined");
  });
});
</script>

<script>
// ============ Task 2: DEFAULT_TAG_PROMPT + TAG_GUIDANCE ============
suite("default tag prompt", () => {
  test("TAG_GUIDANCE pushes specificity and bans no evaluation facet", () => {
    assert(/most specific/i.test(TAG_GUIDANCE), "asks for most specific term");
    assert(/differentia/i.test(TAG_GUIDANCE), "genus/differentia framing");
    assert(/Avoid over-generic/i.test(TAG_GUIDANCE), "anti-generic guidance");
    assert(!/rating|ranking|comparison|evaluat/i.test(TAG_GUIDANCE), "no evaluation-facet wording");
  });
  test("DEFAULT_TAG_PROMPT embeds guidance, cap, and keeps placeholders", () => {
    assert(DEFAULT_TAG_PROMPT.indexOf(TAG_GUIDANCE) !== -1, "guidance embedded");
    assert(DEFAULT_TAG_PROMPT.indexOf("up to 8") !== -1, "cap 8 stated");
    ["{{lang_instruction}}", "{{separator_instruction}}", "{{title}}", "{{url}}", "{{content}}"].forEach(ph =>
      assert(DEFAULT_TAG_PROMPT.indexOf(ph) !== -1, "placeholder kept: " + ph));
  });
  test("buildTagPrompt substitutes placeholders and injects guidance", () => {
    const p = buildTagPrompt({ aiTagLang: "en", aiTagSeparator: "_" }, "My$Title", "https://x.test/", "Body & <stuff>", "", []);
    assert(p.indexOf("My$Title") !== -1, "title verbatim incl $");
    assert(p.indexOf("{{title}}") === -1, "title placeholder gone");
    assert(p.indexOf("Tags must be in English.") !== -1, "lang instruction");
    assert(p.indexOf("underscores") !== -1, "separator instruction");
    assert(p.indexOf("most specific") !== -1, "guidance present");
  });
  test("buildTagPrompt appends existing-tags line only when userTags present", () => {
    const withTags = buildTagPrompt({ aiTagLang: "en" }, "t", "u", "c", "", ["alpha", "beta"]);
    assert(/Existing tags \(prefer reusing/.test(withTags), "reuse line present");
    const none = buildTagPrompt({ aiTagLang: "en" }, "t", "u", "c", "", []);
    assert(!/Existing tags/.test(none), "no reuse line when empty");
  });
});
</script>

<script>
// ============ Task 3: lang helpers + combined prompt/parse ============
suite("lang instruction helpers", () => {
  test("tag lang: explicit, auto, fallback", () => {
    assertEq(aiTagLangInstruction({ aiTagLang: "en" }), "Tags must be in English.", "en");
    assertEq(aiTagLangInstruction({ aiTagLang: "zh" }), "Tags must be in Chinese (简体中文).", "zh");
    assertEq(aiTagLangInstruction({ aiTagLang: "auto" }), "Use the same language as the content for tags.", "auto");
    assertEq(aiTagLangInstruction({ aiTagLang: "fr" }), "Tags must be in fr.", "fallback");
    assertEq(aiTagLangInstruction({}), "Tags must be in English.", "default en");
  });
  test("summary lang: explicit, auto default, fallback", () => {
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "ja" }), "Write in Japanese.", "ja");
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "auto" }), "Write in the same language as the content.", "auto");
    assertEq(aiSummaryLangInstruction({}), "Write in the same language as the content.", "default auto");
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "fr" }), "Write in fr.", "fallback");
  });
});

suite("buildCombinedPrompt", () => {
  test("requests one JSON object with summary + tags, embeds guidance & cap", () => {
    const p = buildCombinedPrompt({ aiTagLang: "en", aiSummaryLang: "auto", aiTagSeparator: "_" }, "T", "https://x.test/", "Body", "", []);
    assert(/"summary"/.test(p) && /"tags"/.test(p), "two keys named");
    assert(p.indexOf("up to 8") !== -1, "cap 8");
    assert(p.indexOf(TAG_GUIDANCE) !== -1, "guidance embedded");
    assert(p.indexOf("Write in the same language") !== -1, "summary lang");
    assert(p.indexOf("Tags must be in English.") !== -1, "tag lang");
    assert(p.indexOf("underscores") !== -1, "separator wording");
    assert(/\{"summary":"\.\.\.","tags":\[/.test(p), "output shape shown");
  });
  test("content capped to 4000 and title is $-safe", () => {
    const p = buildCombinedPrompt({ aiTagLang: "en" }, "A$1B", "u", "x".repeat(5000), "", []);
    assert(p.indexOf("A$1B") !== -1, "title verbatim incl $1");
    assert(p.indexOf("x".repeat(4000)) !== -1, "4000 present");
    assert(p.indexOf("x".repeat(4001)) === -1, "not 4001");
  });
  test("appends existing-tags line only when userTags present", () => {
    assert(/Existing tags \(prefer reusing/.test(buildCombinedPrompt({}, "t", "u", "c", "", ["a"])), "present");
    assert(!/Existing tags/.test(buildCombinedPrompt({}, "t", "u", "c", "", [])), "absent");
  });
});

suite("parseAICombined", () => {
  test("clean object parsed; tags normalized + refined", () => {
    const r = parseAICombined('{"summary":"  A short summary. ","tags":["AI Token Relay","rating","ratings"]}', "_");
    assertEq(r.summary, "A short summary.", "summary trimmed");
    assertEq(r.tags.join(","), "ai_token_relay,rating", "tags normalized, ratings folded");
  });
  test("object embedded in prose / fences is extracted", () => {
    const r = parseAICombined('Sure!\n```json\n{"summary":"S","tags":["proxy"]}\n```\nDone', "-");
    assertEq(r.summary, "S", "summary");
    assertEq(r.tags.join(","), "proxy", "tags");
  });
  test("missing tags array tolerated (summary still returned)", () => {
    const r = parseAICombined('{"summary":"only summary"}', "-");
    assertEq(r.summary, "only summary", "summary");
    assertEq(r.tags.length, 0, "no tags");
  });
  test("bad JSON throws (caller falls back)", () => {
    let threw = false;
    try { parseAICombined('{"summary": not json', "-"); } catch (e) { threw = true; }
    assert(threw, "throws on bad json");
  });
  test("no object at all throws", () => {
    let threw = false;
    try { parseAICombined("sorry, I cannot help", "-"); } catch (e) { threw = true; }
    assert(threw, "throws when no object");
  });
  test("empty object (no summary, no tags) throws", () => {
    let threw = false;
    try { parseAICombined('{"foo":1}', "-"); } catch (e) { threw = true; }
    assert(threw, "throws on empty result");
  });
});
</script>
</body></html>
