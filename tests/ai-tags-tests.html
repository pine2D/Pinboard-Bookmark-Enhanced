<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>AI Tags Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1200px; }
h2 { margin-top: 24px; font-size: 16px; }
.suite { margin: 12px 0; padding: 8px; border-left: 3px solid #ccc; }
.case { padding: 4px 8px; margin: 4px 0; white-space: pre-wrap; }
.pass { color: #0a0; background: #f0fff0; }
.fail { color: #c00; background: #fff0f0; font-weight: bold; }
#summary { font-weight: bold; margin: 8px 0; }

<body>
<h1>AI tag-quality + combined-prompt tests (ai.js + shared.js)</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../i18n.js"></script>
<script src="../shared.js"></script>
<script src="../ai.js"></script>
<script src="../options-connectivity.js"></script>

<script>
let PASS = 0, FAIL = 0;
function test(name, fn) {
  const div = document.createElement("div");
  try { fn(); PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
  catch (e) { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + e.message; }
  document.getElementById("results").appendChild(div);
}
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function assertEq(actual, expected, label) {
  if (actual !== expected) throw new Error((label || "assertEq") + ": expected " + JSON.stringify(expected) + " got " + JSON.stringify(actual));
}
function suite(name, fn) {
  const div = document.createElement("div"); div.className = "suite";
  const h = document.createElement("h2"); h.textContent = name; div.appendChild(h);
  const results = document.getElementById("results");
  const savedAppend = results.appendChild;
  results.appendChild = function(el) { if (el.className?.includes("case")) div.appendChild(el); else savedAppend.call(results, el); };
  fn();
  results.appendChild = savedAppend; results.appendChild(div);
}
window.addEventListener("load", () => {
  const el = document.getElementById("summary");
  el.textContent = "SUMMARY: " + PASS + " passed, " + FAIL + " failed";
  el.style.color = FAIL ? "#c00" : "#0a0";
  document.title = (FAIL ? "FAIL " : "PASS ") + document.title;
});
</script>

<script>
// ============ Task 1: refineTags ============
suite("refineTags", () => {
  test("AI_TAG_CAP is 8", () => {
    assertEq(AI_TAG_CAP, 8, "cap const");
  });
  test("passes short lists through unchanged, order preserved", () => {
    assertEq(refineTags(["ai_token_relay", "rating", "proxy"], { cap: 8, separator: "_" }).join(","),
      "ai_token_relay,rating,proxy", "order kept");
  });
  test("caps to opts.cap, keeping the first N (most specific first)", () => {
    const out = refineTags(["a", "b", "c", "d", "e"], { cap: 3, separator: "-" });
    assertEq(out.join(","), "a,b,c", "first 3");
  });
  test("defaults cap to AI_TAG_CAP when not given", () => {
    const many = Array.from({ length: 12 }, (_, i) => "t" + i);
    assertEq(refineTags(many, { separator: "-" }).length, 8, "default cap 8");
  });
  test("dedups case/separator-insensitively, keeps first casing", () => {
    assertEq(refineTags(["Token-Relay", "token_relay", "tokenrelay"], { cap: 8, separator: "_" }).join(","),
      "Token-Relay", "separator+case variants collapse");
  });
  test("folds ASCII plural when singular already kept (rating before ratings)", () => {
    assertEq(refineTags(["rating", "ratings", "proxy"], { cap: 8, separator: "-" }).join(","),
      "rating,proxy", "ratings dropped");
  });
  test("CJK tags are never plural-folded and survive", () => {
    assertEq(refineTags(["评分", "代理"], { cap: 8, separator: "-" }).join(","), "评分,代理", "cjk kept");
  });
  test("drops empties and trims; tolerates non-strings", () => {
    assertEq(refineTags(["  spaced  ", "", null, 5, "real"], { cap: 8, separator: "-" }).join(","),
      "spaced,real", "cleaned");
  });
  test("non-array input -> empty array", () => {
    assertEq(refineTags(null, { cap: 8 }).length, 0, "null");
    assertEq(refineTags(undefined).length, 0, "undefined");
  });
});
</script>

<script>
// ============ Task 2: DEFAULT_TAG_PROMPT + TAG_GUIDANCE ============
suite("default tag prompt", () => {
  test("TAG_GUIDANCE pushes specificity and bans no evaluation facet", () => {
    assert(/most specific/i.test(TAG_GUIDANCE), "asks for most specific term");
    assert(/differentia/i.test(TAG_GUIDANCE), "genus/differentia framing");
    assert(/Avoid over-generic/i.test(TAG_GUIDANCE), "anti-generic guidance");
    assert(!/rating|ranking|comparison|evaluat/i.test(TAG_GUIDANCE), "no evaluation-facet wording");
  });
  test("DEFAULT_TAG_PROMPT embeds guidance, cap, and keeps placeholders", () => {
    assert(DEFAULT_TAG_PROMPT.indexOf(TAG_GUIDANCE) !== -1, "guidance embedded");
    assert(DEFAULT_TAG_PROMPT.indexOf("up to 8") !== -1, "cap 8 stated");
    ["{{lang_instruction}}", "{{separator_instruction}}", "{{title}}", "{{url}}", "{{content}}"].forEach(ph =>
      assert(DEFAULT_TAG_PROMPT.indexOf(ph) !== -1, "placeholder kept: " + ph));
  });
  test("buildTagPrompt substitutes placeholders and injects guidance", () => {
    const p = buildTagPrompt({ aiTagLang: "en", aiTagSeparator: "_" }, "My$Title", "https://x.test/", "Body & <stuff>", "", []);
    assert(p.indexOf("My$Title") !== -1, "title verbatim incl $");
    assert(p.indexOf("{{title}}") === -1, "title placeholder gone");
    assert(p.indexOf("Tags must be in English.") !== -1, "lang instruction");
    assert(p.indexOf("underscores") !== -1, "separator instruction");
    assert(p.indexOf("most specific") !== -1, "guidance present");
  });
  test("buildTagPrompt appends existing-tags line only when userTags present", () => {
    const withTags = buildTagPrompt({ aiTagLang: "en" }, "t", "u", "c", "", ["alpha", "beta"]);
    assert(/Existing tags \(prefer reusing/.test(withTags), "reuse line present");
    const none = buildTagPrompt({ aiTagLang: "en" }, "t", "u", "c", "", []);
    assert(!/Existing tags/.test(none), "no reuse line when empty");
  });
  test("inserted values are never re-expanded as placeholders (single-pass fill)", () => {
    const p = buildTagPrompt({ aiTagLang: "en" }, "literal {{content}}", "u", "SECRETBODY", "", []);
    assert(p.indexOf("literal {{content}}") !== -1, "title keeps its literal placeholder text");
    assert(p.indexOf("literal SECRETBODY") === -1, "title must not swallow the page body");
    const s = buildSummaryPrompt({}, "t", "u", "body with {{description}}", "DESCVALUE");
    assert(s.indexOf("body with {{description}}") !== -1, "content keeps literal placeholder");
    const c = buildCombinedPrompt({}, "{{url}} in title", "https://real.test/", "c", "", []);
    assert(c.indexOf("{{url}} in title") !== -1, "combined title not re-expanded");
    assert(c.indexOf("https://real.test/ in title") === -1, "combined title must not get the url");
  });
  test("unknown placeholders in custom templates stay literal", () => {
    const p = buildTagPrompt({ aiTagLang: "en", customTagPrompt: "X {{typo_var}} {{title}}" }, "T", "u", "c", "", []);
    assert(p.indexOf("{{typo_var}}") !== -1, "typo placeholder visible");
    assert(p.indexOf("T") !== -1, "known placeholder filled");
  });
});
</script>

<script>
// ============ Task 3: lang helpers + combined prompt/parse ============
suite("lang instruction helpers", () => {
  test("tag lang: explicit, auto, fallback", () => {
    assertEq(aiTagLangInstruction({ aiTagLang: "en" }), "Tags must be in English.", "en");
    assertEq(aiTagLangInstruction({ aiTagLang: "zh" }), "Tags must be in Chinese (简体中文).", "zh");
    assertEq(aiTagLangInstruction({ aiTagLang: "auto" }), "Use the same language as the content for tags.", "auto");
    assertEq(aiTagLangInstruction({ aiTagLang: "fr" }), "Tags must be in fr.", "fallback");
    assertEq(aiTagLangInstruction({}), "Tags must be in English.", "default en");
  });
  test("summary lang: explicit, auto default, fallback", () => {
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "ja" }), "Write in Japanese.", "ja");
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "auto" }), "Write in the same language as the content.", "auto");
    assertEq(aiSummaryLangInstruction({}), "Write in the same language as the content.", "default auto");
    assertEq(aiSummaryLangInstruction({ aiSummaryLang: "fr" }), "Write in fr.", "fallback");
  });
});

suite("buildCombinedPrompt", () => {
  test("requests one JSON object with summary + tags, embeds guidance & cap", () => {
    const p = buildCombinedPrompt({ aiTagLang: "en", aiSummaryLang: "auto", aiTagSeparator: "_" }, "T", "https://x.test/", "Body", "", []);
    assert(/"summary"/.test(p) && /"tags"/.test(p), "two keys named");
    assert(p.indexOf("up to 8") !== -1, "cap 8");
    assert(p.indexOf(TAG_GUIDANCE) !== -1, "guidance embedded");
    assert(p.indexOf("Write in the same language") !== -1, "summary lang");
    assert(p.indexOf("Tags must be in English.") !== -1, "tag lang");
    assert(p.indexOf("underscores") !== -1, "separator wording");
    assert(/\{"summary":"\.\.\.","tags":\[/.test(p), "output shape shown");
  });
  test("content capped to 4000 and title is $-safe", () => {
    const p = buildCombinedPrompt({ aiTagLang: "en" }, "A$1B", "u", "x".repeat(5000), "", []);
    assert(p.indexOf("A$1B") !== -1, "title verbatim incl $1");
    assert(p.indexOf("x".repeat(4000)) !== -1, "4000 present");
    assert(p.indexOf("x".repeat(4001)) === -1, "not 4001");
  });
  test("appends existing-tags line only when userTags present", () => {
    assert(/Existing tags \(prefer reusing/.test(buildCombinedPrompt({}, "t", "u", "c", "", ["a"])), "present");
    assert(!/Existing tags/.test(buildCombinedPrompt({}, "t", "u", "c", "", [])), "absent");
  });
});

suite("parseAICombined", () => {
  test("clean object parsed; tags normalized + refined", () => {
    const r = parseAICombined('{"summary":"  A short summary. ","tags":["AI Token Relay","rating","ratings"]}', "_");
    assertEq(r.summary, "A short summary.", "summary trimmed");
    assertEq(r.tags.join(","), "ai_token_relay,rating", "tags normalized, ratings folded");
  });
  test("object embedded in prose / fences is extracted", () => {
    const r = parseAICombined('Sure!\n```json\n{"summary":"S","tags":["proxy"]}\n```\nDone', "-");
    assertEq(r.summary, "S", "summary");
    assertEq(r.tags.join(","), "proxy", "tags");
  });
  test("missing tags array tolerated (summary still returned)", () => {
    const r = parseAICombined('{"summary":"only summary"}', "-");
    assertEq(r.summary, "only summary", "summary");
    assertEq(r.tags.length, 0, "no tags");
  });
  test("bad JSON throws (caller falls back)", () => {
    let threw = false;
    try { parseAICombined('{"summary": not json', "-"); } catch (e) { threw = true; }
    assert(threw, "throws on bad json");
  });
  test("no object at all throws", () => {
    let threw = false;
    try { parseAICombined("sorry, I cannot help", "-"); } catch (e) { threw = true; }
    assert(threw, "throws when no object");
  });
  test("empty object (no summary, no tags) throws", () => {
    let threw = false;
    try { parseAICombined('{"foo":1}', "-"); } catch (e) { threw = true; }
    assert(threw, "throws on empty result");
  });
});

const AI_ORIGIN_CASES = [
  [{ aiProvider: "gemini" }, "https://generativelanguage.googleapis.com/*"],
  [{ aiProvider: "openai" }, "https://api.openai.com/*"],
  [{ aiProvider: "claude" }, "https://api.anthropic.com/*"],
  [{ aiProvider: "deepseek" }, "https://api.deepseek.com/*"],
  [{ aiProvider: "qwen" }, "https://dashscope.aliyuncs.com/*"],
  [{ aiProvider: "minimax" }, "https://api.minimaxi.com/*"],
  [{ aiProvider: "openrouter" }, "https://openrouter.ai/*"],
  [{ aiProvider: "groq" }, "https://api.groq.com/*"],
  [{ aiProvider: "mistral" }, "https://api.mistral.ai/*"],
  [{ aiProvider: "cohere" }, "https://api.cohere.ai/*"],
  [{ aiProvider: "siliconflow" }, "https://api.siliconflow.cn/*"],
  [{ aiProvider: "zhipu" }, "https://open.bigmodel.cn/*"],
  [{ aiProvider: "kimi" }, "https://api.moonshot.cn/*"],
  [{ aiProvider: "ollama" }, "http://localhost:11434/*"],
  [{ aiProvider: "custom", customBaseUrl: "https://proxy.example/v1" }, "https://proxy.example/*"],
];

suite("endpoint origin policy", () => {
  test("normalizes HTTPS to an exact origin pattern", () => {
    assertEq(pbpEndpointOriginPattern(" https://Example.COM:443/v1 "), "https://example.com/*", "normalized HTTPS");
  });
  test("allows only literal loopback authorities over HTTP", () => {
    assertEq(pbpEndpointOriginPattern("http://localhost:11434/api"), "http://localhost:11434/*", "localhost");
    assertEq(pbpEndpointOriginPattern("http://127.0.0.1:8080/"), "http://127.0.0.1:8080/*", "IPv4 loopback");
    assertEq(pbpEndpointOriginPattern("http://[::1]:8080/"), "http://[::1]:8080/*", "IPv6 loopback");
  });
  test("rejects LAN and public HTTP", () => {
    ["http://192.168.1.2/api", "http://10.0.0.2/", "http://example.com/"].forEach((url) =>
      assertEq(pbpEndpointOriginPattern(url), null, url));
  });
  test("rejects normalized aliases of loopback", () => {
    ["http://LOCALHOST/", "http://localhost./", "http://127.1/", "http://2130706433/", "http://[0:0:0:0:0:0:0:1]/"].forEach((url) =>
      assertEq(pbpEndpointOriginPattern(url), null, url));
  });
  test("rejects credentials, unsupported schemes, and malformed input", () => {
    ["https://user:pass@example.com/", "https://@example.com/", "http://user@localhost/", "ftp://example.com/", "not a url", ""].forEach((url) =>
      assertEq(pbpEndpointOriginPattern(url), null, url));
  });
  test("rejects literal and percent-normalized wildcard hosts", () => {
    ["https://*.example.com/v1", "https://%2a.example.com/v1", "https://%2A.example.com/v1"].forEach((url) =>
      assertEq(pbpEndpointOriginPattern(url), null, url));
  });
  test("all 15 AI providers resolve to the origin actually fetched", () => {
    AI_ORIGIN_CASES.forEach(([settings, expected]) =>
      assertEq(_aiTargetOriginPattern(settings), expected, settings.aiProvider));
    assertEq(_aiTargetOriginPattern({ aiProvider: "openai", openaiBaseUrl: "https://azure.example:8443/openai" }), "https://azure.example:8443/*", "OpenAI override");
    assertEq(_aiTargetOriginPattern({ aiProvider: "ollama", ollamaBaseUrl: "http://127.0.0.1:11435" }), "http://127.0.0.1:11435/*", "Ollama override");
  });
  test("origin collector normalizes, deduplicates, and rejects invalid extras", () => {
    assertEq(_aiRequiredOriginPatterns({ aiProvider: "gemini" }, ["https://r.jina.ai/*", "https://r.jina.ai/v1"]).join(","),
      "https://generativelanguage.googleapis.com/*,https://r.jina.ai/*", "deduped origins");
    let caught = null;
    try { _aiRequiredOriginPatterns({ aiProvider: "gemini" }, ["*://*/*"]); } catch (e) { caught = e; }
    assert(caught && caught.code === "endpoint_invalid", "invalid additional pattern rejected");
  });
});
</script>

<script>
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "AI endpoint network gate";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  const realFetch = window.fetch;
  const realChrome = window.chrome;
  try {
    await atest("summary cache is account-scoped and survives same-account token rotation", async () => {
      const realCacheGet = window.pbpAiCacheGet;
      const realCacheSet = window.pbpAiCacheSet;
      const realCacheDelete = window.pbpAiCacheDelete;
      const entries = new Map();
      window.pbpAiCacheGet = async (key) => entries.get(key) || null;
      window.pbpAiCacheSet = async (key, result, ts) => { entries.set(key, { key, result, ts }); };
      window.pbpAiCacheDelete = async (key) => { entries.delete(key); };
      try {
        const url = "https://summary-scope.example/article";
        await setAICache(url, "summary", "Alice summary", 60, "local", "alice");
        assertEq(await getAICache(url, "summary", 60, "local", "bob"), null, "Bob miss");
        assertEq(await getAICache(url, "summary", 60, "local", "alice"), "Alice summary", "same account rotation hit");
        entries.set(`ai_cache_summary_local_${url}`, { result: "legacy", ts: Date.now() });
        assertEq(await getAICache(url, "summary", 60, "local"), null, "ownerless legacy miss");
      } finally {
        window.pbpAiCacheGet = realCacheGet;
        window.pbpAiCacheSet = realCacheSet;
        window.pbpAiCacheDelete = realCacheDelete;
      }
    });

    await atest("page extraction rejects navigation between tab check and script execution", async () => {
      const expectedUrl = "https://example.test/old";
      let liveUrl = expectedUrl;
      let bodyExtractions = 0;
      window.chrome = {
        runtime: { lastError: null },
        tabs: { get: (_tabId, callback) => callback({ url: liveUrl, title: "Article" }) },
        scripting: { executeScript: (args, callback) => {
          if (args.files) {
            liveUrl = "https://example.test/new";
            callback([{}]);
            return;
          }
          bodyExtractions++;
          callback([{ result: { url: liveUrl, pageText: "wrong page" } }]);
        } },
      };
      const result = await getPageInfoFromTab(7, { withDefuddle: true, expectedUrl });
      assertEq(result, null, "navigation result");
      assertEq(bodyExtractions, 0, "body extraction count");

      liveUrl = expectedUrl;
      window.chrome.scripting.executeScript = (args, callback) => {
        if (args.files) {
          callback([{}]);
          return;
        }
        bodyExtractions++;
        liveUrl = "https://example.test/new";
        callback([{ result: { url: expectedUrl, pageText: "stale page" } }]);
      };
      const lateResult = await getPageInfoFromTab(7, { withDefuddle: true, expectedUrl });
      assertEq(lateResult, null, "post-extraction live navigation result");
      assertEq(bodyExtractions, 1, "late body extraction count");
    });

    await atest("invalid custom endpoint fails before fetch", async () => {
      let fetches = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      window.chrome = { runtime: { id: "test-extension" }, i18n: { getMessage: () => "" }, permissions: { contains: async () => true } };
      let caught = null;
      try { await callAI({ aiProvider: "custom", customBaseUrl: "http://192.168.1.2", customApiKey: "k", customModel: "m" }, "x"); }
      catch (e) { caught = e; }
      assert(caught && caught.code === "endpoint_invalid", "expected endpoint_invalid");
      assertEq(fetches, 0, "zero fetches");
    });

    await atest("wildcard custom endpoints fail before any permission call or fetch", async () => {
      let permissionCalls = 0, fetches = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      window.chrome = {
        runtime: { id: "test-extension" },
        i18n: { getMessage: () => "" },
        permissions: {
          contains: async () => { permissionCalls++; return true; },
          request: async () => { permissionCalls++; return true; },
        },
      };
      for (const base of ["https://*.example.com/v1", "https://%2a.example.com/v1"]) {
        let caught = null;
        try { await callAI({ aiProvider: "custom", customBaseUrl: base, customApiKey: "k", customModel: "m" }, "x"); }
        catch (e) { caught = e; }
        assert(caught && caught.code === "endpoint_invalid", base + ": expected endpoint_invalid");
        caught = null;
        try { await requestAIHostPermissions({ aiProvider: "custom", customBaseUrl: base }); }
        catch (e) { caught = e; }
        assert(caught && caught.code === "endpoint_invalid", base + ": grant helper accepted wildcard");
      }
      assertEq(permissionCalls, 0, "zero permission calls");
      assertEq(fetches, 0, "zero fetches");
    });

    await atest("permissions.contains false or failure is fail-closed before fetch", async () => {
      let fetches = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      for (const mode of ["false", "throw"]) {
        window.chrome = {
          runtime: { id: "test-extension" },
          i18n: { getMessage: () => "permission denied" },
          permissions: { contains: async () => {
            if (mode === "throw") throw new Error("API unavailable");
            return false;
          } },
        };
        let caught = null;
        try { await callAI({ aiProvider: "custom", customBaseUrl: "https://proxy.example/v1", customApiKey: "k", customModel: "m" }, "x"); }
        catch (e) { caught = e; }
        assert(caught && caught.code === "host_permission", mode + ": expected host_permission");
      }
      assertEq(fetches, 0, "zero fetches");
    });

    await atest("extension context missing permissions API is fail-closed before fetch", async () => {
      let fetches = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      for (const permissions of [undefined, {}]) {
        window.chrome = {
          runtime: { id: "test-extension" },
          i18n: { getMessage: () => "permission denied" },
          permissions,
        };
        let caught = null;
        try { await callAI({ aiProvider: "custom", customBaseUrl: "https://proxy.example/v1", customApiKey: "k", customModel: "m" }, "x"); }
        catch (e) { caught = e; }
        assert(caught && caught.code === "host_permission", "expected host_permission when API is missing");
      }
      assertEq(fetches, 0, "zero fetches");
    });

    await atest("all providers and both dispatchers use the contains-only gate", async () => {
      let fetches = 0, checks = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      window.chrome = {
        runtime: { id: "test-extension" },
        i18n: { getMessage: () => "permission denied" },
        permissions: { contains: async () => { checks++; return false; } },
      };
      for (const [settings] of AI_ORIGIN_CASES) {
        let caught = null;
        try { await callAI(settings, "x"); } catch (e) { caught = e; }
        assert(caught && caught.code === "host_permission", settings.aiProvider + ": expected host_permission");
      }
      let streamCaught = null;
      try { await callAIStream({ aiProvider: "gemini" }, "x", {}, () => {}); } catch (e) { streamCaught = e; }
      assert(streamCaught && streamCaught.code === "host_permission", "stream expected host_permission");
      assertEq(checks, 16, "one contains check per call");
      assertEq(fetches, 0, "zero fetches");
    });

    await atest("grant helper requests deduplicated exact origins in one call", async () => {
      let requested = null;
      window.chrome = { permissions: { request: (spec) => { requested = spec.origins; return Promise.resolve(true); } } };
      const granted = await requestAIHostPermissions({ aiProvider: "gemini" }, ["https://r.jina.ai/*", "https://r.jina.ai/v1"]);
      assert(granted, "grant result");
      assertEq(requested.join(","), "https://generativelanguage.googleapis.com/*,https://r.jina.ai/*", "requested origins");
    });

    await atest("grant helper returns false when request is unavailable or fails", async () => {
      for (const request of [undefined, () => { throw new Error("sync"); }, () => Promise.reject(new Error("async"))]) {
        window.chrome = { permissions: request ? { request } : {} };
        assertEq(await requestAIHostPermissions({ aiProvider: "openai" }), false, "failed request");
      }
    });

    await atest("Options Test with no API key requests no host permission", async () => {
      let requests = 0;
      const fixture = document.createElement("div");
      fixture.innerHTML = '<button id="test-gemini"></button><span id="test-gemini-status"></span>' +
        '<input id="opt-pinboard-token"><span id="token-format-warn"></span>';
      document.body.appendChild(fixture);
      window.chrome = {
        i18n: { getMessage: (key) => key },
        permissions: { request: async () => { requests++; return true; } },
      };
      setupApiTests();
      document.getElementById("test-gemini").click();
      await Promise.resolve();
      assertEq(requests, 0, "permission requests");
      assert(document.getElementById("test-gemini-status").textContent.includes("testNoApiKey"), "no-key status");
      fixture.remove();
    });

    await atest("live AI settings snapshot preserves the selected unsaved endpoint", async () => {
      const fixture = document.createElement("div");
      fixture.innerHTML = '<input id="opt-custom-key" value=" live-key ">' +
        '<input id="opt-custom-model" value=" live-model ">' +
        '<input id="opt-custom-baseurl" value=" https://live.example/v1 ">';
      document.body.appendChild(fixture);
      const snapshot = pbpLiveAiSettingsSnapshot("custom");
      assertEq(snapshot.aiProvider, "custom", "provider");
      assertEq(snapshot.customApiKey, "live-key", "key");
      assertEq(snapshot.customModel, "live-model", "model");
      assertEq(snapshot.customBaseUrl, "https://live.example/v1", "base URL");
      fixture.remove();
    });

    await atest("non-extension test contexts skip the permission gate", async () => {
      window.chrome = undefined;
      await _ensureAIHostPermission({ aiProvider: "custom", customBaseUrl: "https://proxy.example/v1" });
      let checks = 0;
      window.chrome = { permissions: { contains: async () => { checks++; return false; } } };
      await _ensureAIHostPermission({ aiProvider: "custom", customBaseUrl: "https://proxy.example/v1" });
      assertEq(checks, 0, "contains not called without runtime.id");
    });

    await atest("non-stream and stream AI fetches reject redirects", async () => {
      const redirects = [];
      window.fetch = async (_url, init) => {
        redirects.push(init && init.redirect);
        return redirects.length === 1
          ? { ok: true }
          : new Response("x", { status: 200 });
      };
      await fetchWithTimeout("https://example.test/non-stream");
      await _pbpStreamRead("https://example.test/stream", {}, {}, "API", () => "");
      assertEq(redirects.join(","), "error,error", "redirect modes");
    });
  } finally {
    window.fetch = realFetch;
    window.chrome = realChrome;
  }
})();
