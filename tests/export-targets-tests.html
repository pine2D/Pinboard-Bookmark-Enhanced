<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>export-targets Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>export-targets.js tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../vendor/turndown.js"></script>
<script src="../vendor/marked.min.js"></script>
<script src="../vendor/purify.min.js"></script>
<script src="../md-convert.js"></script>
<script src="../shared.js"></script>
<script src="../export-targets.js"></script>
<script src="../md-export-send.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function section(name) { const h = document.createElement("h2"); h.textContent = name; root.appendChild(h); }
function assert(cond, detail) { check(detail || String(cond), cond, detail); }
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}

section("pbpStripFrontmatter");
assertEq(pbpStripFrontmatter("---\ntitle: X\n---\n\nbody"), "body", "strips a leading YAML block");
assertEq(pbpStripFrontmatter("no frontmatter"), "no frontmatter", "no-op when absent");
assertEq(pbpStripFrontmatter(pbpStripFrontmatter("---\na: b\n---\nx")), "x", "idempotent");
assertEq(pbpStripFrontmatter("---\ntitle: X\n---"), "", "strips a closing --- with no trailing newline");

section("registry shape");
assertEq(pbpExportTargetIds().join(","), "obsidian,github,webhook", "id order");
assert(PBP_EXPORT_TARGETS.obsidian.mechanism === "url-scheme", "obsidian is url-scheme");
assert(PBP_EXPORT_TARGETS.obsidian.viaClipboard === true, "obsidian uses clipboard");
assert(PBP_EXPORT_TARGETS.obsidian.settings.some((s) => s.key === "route" && s.type === "select"), "obsidian has a route select");
assert(PBP_EXPORT_TARGETS.github.mechanism === "token-api", "github is token-api");
assert(PBP_EXPORT_TARGETS.github.frontmatter === "inline", "github keeps YAML (inline)");
assert(PBP_EXPORT_TARGETS.github.settings[0].required === true, "github token is required (-> needs-setup gate)");
assert(PBP_EXPORT_TARGETS.webhook.mechanism === "token-api", "webhook is token-api");
assert(typeof PBP_EXPORT_TARGETS.webhook.origin === "function", "webhook origin is a fn of cfg (dynamic host)");
assert(PBP_EXPORT_TARGETS.webhook.settings[0].required === true, "webhook url is required");
assert(PBP_EXPORT_TARGETS.webhook.settings[0].secret === true, "webhook capability URL is classified as a secret");
assert(PBP_URI_BUDGET === 2000, "budget constant");
pbpExportTargetIds().forEach((id) => {
  const registrySecrets = (PBP_EXPORT_TARGETS[id].settings || [])
    .filter((setting) => setting.type === "secret" || setting.secret === true)
    .map((setting) => setting.key);
  const routedSecrets = pbpExportTargetSecretKeys(id);
  assert(registrySecrets.every((key) => routedSecrets.includes(key)),
    `every ${id} registry secret is covered by shared secret routing`);
});

section("github.buildRequest (private gist)");
{
  const req = PBP_EXPORT_TARGETS.github.buildRequest({ title: "My Post" }, "# body\n\ntext", {}, "ghp_x");
  assert(req.url === "https://api.github.com/gists", "gists endpoint");
  assert(req.method === "POST", "POST");
  assert(req.headers.Authorization === "Bearer ghp_x", "bearer token");
  assert(req.headers["X-GitHub-Api-Version"] === "2022-11-28", "pinned api version");
  const b = JSON.parse(req.body);
  assert(b.public === false, "private gist");
  assert(b.description === "My Post", "description = title");
  const fname = Object.keys(b.files)[0];
  assert(fname === "My Post.md", "filename = slug + .md");
  assert(b.files[fname].content.includes("# body"), "body content present");
}
{
  const req2 = PBP_EXPORT_TARGETS.github.buildRequest({ title: "a/b:c?#x" }, "", {}, "x");
  const b2 = JSON.parse(req2.body);
  const fn = Object.keys(b2.files)[0];
  assert(!/[\/:?#]/.test(fn), "filename sanitized (no path/reserved chars)");
  assert(b2.files[fn].content.length > 0, "empty body guarded (gist 422)");
}

section("github.precheckRequest");
{
  const pr = PBP_EXPORT_TARGETS.github.precheckRequest({}, "tok");
  assert(pr.url === "https://api.github.com/user", "GET /user precheck");
  assert(pr.method === "GET", "GET");
  assert(pr.headers.Authorization === "Bearer tok", "bearer token");
}

section("webhook.buildRequest (JSON envelope + optional auth)");
{
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest(
    { title: "T", url: "U", date: "D", tags: ["a", "b"] }, "# body", { url: "https://hook.example.com/x" }, "Bearer tok");
  assert(req.url === "https://hook.example.com/x", "posts to the user URL");
  assert(req.method === "POST", "POST");
  assert(req.headers["Content-Type"] === "application/json", "json content-type");
  assert(req.headers.Authorization === "Bearer tok", "auth value sent verbatim");
  const b = JSON.parse(req.body);
  assert(b.title === "T" && b.url === "U" && b.date === "D", "envelope carries meta fields");
  assert(Array.isArray(b.tags) && b.tags[0] === "a", "tags array");
  assert(b.markdown === "# body", "markdown field carries the body");
}
{
  // any scheme is sent verbatim — Readwise uses "Token", not "Bearer"
  const r = PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T" }, "x", { url: "https://h/x" }, "Token rw_key");
  assert(r.headers.Authorization === "Token rw_key", "non-Bearer scheme sent verbatim");
}
{
  const req2 = PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T" }, "x", { url: "https://h/x" }, "");
  assert(req2.headers.Authorization === undefined, "no Authorization header when value is empty");
}

section("webhook.buildRequest -- X4 extended metadata (author/published/site/image/words)");
{
  // Extended metadata absent from meta -> payload stays byte-identical to the 5-key envelope
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest(
    { title: "T", url: "U", date: "D", tags: ["a"] }, "# body", { url: "https://h/x" }, "");
  const b = JSON.parse(req.body);
  assertEq(Object.keys(b).join(","), "title,url,date,tags,markdown", "no extended meta -> exactly the original 5 keys, same order");
}
{
  // Extended metadata present -> conditionally appended AFTER the original 5 keys
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest(
    { title: "T", url: "U", date: "2026-01-05", clipped: "2026-07-08", tags: ["a"], author: "Jane Doe", published: "2026-01-05", site: "The Verge", image: "https://cdn.example.com/x.jpg", words: 1534 },
    "# body", { url: "https://h/x" }, "");
  const b = JSON.parse(req.body);
  assertEq(Object.keys(b).join(","), "title,url,date,tags,markdown,clipped,author,published,site,image,words", "extended meta appended after the original 5 keys, in order clipped/author/published/site/image/words");
  assertEq(b.clipped, "2026-07-08", "clipped carried");
  assertEq(b.author, "Jane Doe", "author carried");
  assertEq(b.published, "2026-01-05", "published carried");
  assertEq(b.site, "The Verge", "site carried");
  assertEq(b.image, "https://cdn.example.com/x.jpg", "image carried");
  assertEq(b.words, 1534, "words carried as a number, not a string");
}
{
  // Non-string meta values are coerced via String() for author/site (published/image are strings already elsewhere)
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", author: 123, site: 456 }, "x", { url: "https://h/x" }, "");
  const b = JSON.parse(req.body);
  assertEq(b.author, "123", "author coerced to string via String()");
  assertEq(b.site, "456", "site coerced to string via String()");
}
{
  // words gate is Number.isFinite, not truthiness -- 0 must still be carried, NaN/Infinity/string must not
  const zero = JSON.parse(PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", words: 0 }, "x", { url: "https://h/x" }, "").body);
  assert("words" in zero && zero.words === 0, "words:0 is finite -> carried (not falsy-omitted)");
  const nanReq = JSON.parse(PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", words: NaN }, "x", { url: "https://h/x" }, "").body);
  assert(!("words" in nanReq), "words:NaN -> omitted");
  const infReq = JSON.parse(PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", words: Infinity }, "x", { url: "https://h/x" }, "").body);
  assert(!("words" in infReq), "words:Infinity -> omitted");
  const strReq = JSON.parse(PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", words: "1534" }, "x", { url: "https://h/x" }, "").body);
  assert(!("words" in strReq), "words as a string -> omitted (not Number.isFinite)");
}
{
  // Extended fields individually optional -- one present, others absent, no leaked keys
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T", author: "Solo" }, "x", { url: "https://h/x" }, "");
  const b = JSON.parse(req.body);
  assertEq(Object.keys(b).join(","), "title,url,date,tags,markdown,author", "author alone appended; published/site/image/words stay absent");
}

section("webhook.origin (derived from the user URL)");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "https://hook.example.com/abc?x=1" }) === "https://hook.example.com/*", "origin = URL host + /*");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "http://localhost:3000/hook" }) === "http://localhost:3000/*", "localhost http -> exact origin");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "http://127.0.0.1:8080/hook" }) === "http://127.0.0.1:8080/*", "127.0.0.1 http -> exact origin");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "http://[::1]:8080/hook" }) === "http://[::1]:8080/*", "[::1] http -> exact origin");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "http://192.168.1.50/hook" }) === null, "LAN http -> blocked");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "http://example.com/hook" }) === null, "public http -> blocked");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "not a url" }) === null, "malformed URL -> null origin");
assert(PBP_EXPORT_TARGETS.webhook.origin({ url: "https://user:pass@hook.example.com/x" }) === null, "credential URL -> blocked");
{
  const encodedUrl = obfuscateKey("https://secret-hook.example.com/abc?token=x");
  const origin = PBP_EXPORT_TARGETS.webhook.origin({ url: encodedUrl });
  const req = PBP_EXPORT_TARGETS.webhook.buildRequest({ title: "T" }, "x", { url: encodedUrl }, "");
  assert(origin === "https://secret-hook.example.com/*" && req.url === "https://secret-hook.example.com/abc?token=x",
    "obfuscated webhook capability URL is decoded for permission and dispatch");
}

section("pbpWebhookHttpWarn (mirrors the hard runtime policy)");
assert(pbpWebhookHttpWarn("https://example.com/hook") === false, "https -> no warn");
assert(pbpWebhookHttpWarn("http://localhost:3000/hook") === false, "localhost http -> exempt");
assert(pbpWebhookHttpWarn("http://127.0.0.1:8080/hook") === false, "127.0.0.1 http -> exempt");
assert(pbpWebhookHttpWarn("http://[::1]:8080/hook") === false, "[::1] (bracketed IPv6 loopback) http -> exempt");
assert(pbpWebhookHttpWarn("http://192.168.1.50/hook") === true, "LAN http -> blocked warning");
assert(pbpWebhookHttpWarn("http://example.com/hook") === true, "public http -> blocked warning");
assert(pbpWebhookHttpWarn("not a url") === true, "malformed URL -> blocked warning");
assert(pbpWebhookHttpWarn("https://user:pass@example.com/hook") === true, "credential URL -> blocked warning");
assert(pbpWebhookHttpWarn("") === false, "empty -> no warn");

section("webhook.parseSuccess (any 2xx)");
assert(PBP_EXPORT_TARGETS.webhook.parseSuccess({ ok: true }) === true, "2xx -> delivered");
assert(PBP_EXPORT_TARGETS.webhook.parseSuccess({ ok: false }) === false, "non-2xx -> not delivered");

section("pbpUriTooLong");
assert(pbpUriTooLong("x".repeat(2001)) === true, "over budget");
assert(pbpUriTooLong("x".repeat(10)) === false, "under budget");

section("pbpBuildFileBody — inline (obsidian)");
{
  const out = pbpBuildFileBody("obsidian", { title: "T", url: "U", date: "D", tags: ["x"] }, "body text");
  assert(/^---[\s\S]*title[\s\S]*---/.test(out), "inline policy prepends YAML frontmatter");
  assert(out.includes("body text"), "inline keeps the body");
}

section("obsidian.buildUri");
{
  const uri = PBP_EXPORT_TARGETS.obsidian.buildUri({ title: "My Note" }, "ignored", { vault: "V", folder: "F" });
  assert(uri.startsWith("obsidian://new?file="), "obsidian scheme");
  assert(uri.includes("vault=V"), "passes vault");
  assert(uri.includes("&clipboard"), "uses clipboard flag");
  assert(!uri.includes("content="), "no inline content (clipboard path)");
  const appendUri = PBP_EXPORT_TARGETS.obsidian.buildUri({ title: "My Note" }, "ignored", { vault: "V", folder: "F", route: "append" });
  assert(appendUri.startsWith("obsidian://new?file=F%2FMy%20Note"), "append route keeps target file path");
  assert(appendUri.includes("&append"), "append route adds append flag");
  const dailyUri = PBP_EXPORT_TARGETS.obsidian.buildUri({ title: "My Note" }, "ignored", { vault: "V", folder: "F", route: "daily" });
  assert(dailyUri.startsWith("obsidian://daily?"), "daily route uses daily action");
  assert(!dailyUri.includes("file="), "daily route does not force the clipped page filename");
  assert(dailyUri.includes("vault=V") && dailyUri.includes("&clipboard") && dailyUri.includes("&append"), "daily route passes vault, clipboard, append");
}

async function runSendNetworkPolicyTests() {
  section("pbpSendToTarget network boundary");
  const prevChrome = globalThis.chrome;
  const prevFetch = globalThis.fetch;
  const prevClipboard = Object.getOwnPropertyDescriptor(navigator, "clipboard");
  const copied = [];
  let permissionCalls = 0;
  let requestCalls = 0;
  let fetchCalls = 0;
  try {
    Object.defineProperty(navigator, "clipboard", {
      configurable: true,
      value: { writeText: async (body) => { copied.push(body); } }
    });
    globalThis.chrome = {
      permissions: {
        contains: async () => { permissionCalls++; return true; },
        request: async () => { permissionCalls++; requestCalls++; return true; }
      }
    };
    globalThis.fetch = async () => { fetchCalls++; throw new Error("must not fetch"); };

    const blocked = [
      "http://example.com/hook",
      "http://192.168.1.50/hook",
      "not a url",
      "https://user:pass@example.com/hook"
    ];
    const blockedResults = [];
    for (const url of blocked) {
      blockedResults.push(await pbpSendToTarget("webhook", { meta: { title: "T" }, rawBody: "body", cfg: { url } }));
    }
    assert(blockedResults.every((r) => r.error === "api-insecure"), "all unsafe endpoint classes return recoverable api-insecure");
    assert(copied.length === blocked.length && copied.every((body) => body === "body"), "unsafe endpoints copy every body to the clipboard fallback");
    assert(permissionCalls === 0, "unsafe endpoints are rejected before permissions API calls");
    assert(fetchCalls === 0, "unsafe endpoints are rejected before fetch");

    navigator.clipboard.writeText = async () => { throw new Error("clipboard unavailable"); };
    const noClipboard = await pbpSendToTarget("webhook", { meta: { title: "T" }, rawBody: "body", cfg: { url: "http://example.com/hook" } });
    assert(noClipboard.error === "api-insecure", "unsafe endpoint remains actionable when clipboard fallback is unavailable");
    navigator.clipboard.writeText = async (body) => { copied.push(body); };

    let requested = null;
    globalThis.chrome.permissions.request = async ({ origins }) => { requestCalls++; requested = origins; return true; };
    const grant = await pbpRequestTargetPermission("webhook", { url: "https://hook.example.com/x" });
    assert(grant === true && requested && requested.join(",") === "https://hook.example.com/*", "click helper requests only the target's exact origin");

    for (const mode of ["false", "throw"]) {
      globalThis.chrome.permissions.contains = async () => {
        permissionCalls++;
        if (mode === "throw") throw new Error("permissions unavailable");
        return false;
      };
      const copiedBeforePermError = copied.length;
      const requestsBeforeSend = requestCalls;
      const permError = await pbpSendToTarget("webhook", { meta: { title: "T" }, rawBody: "safe body", cfg: { url: "https://hook.example.com/x" } });
      assert(permError.error === "api-perm", mode + " contains fails closed as api-perm");
      assert(copied.length === copiedBeforePermError + 1 && copied.at(-1) === "safe body", mode + " contains preserves the clipboard fallback");
      assert(requestCalls === requestsBeforeSend && fetchCalls === 0, mode + " execution gate neither requests nor fetches");
    }

    const redirects = [];
    globalThis.chrome.permissions.contains = async () => true;
    globalThis.fetch = async (url, opts) => {
      redirects.push(opts.redirect);
      if (url.endsWith("/user")) return { ok: true, status: 200 };
      return { ok: true, status: 201, json: async () => ({ id: "gist-1" }) };
    };
    const github = await pbpSendToTarget("github", { meta: { title: "T" }, rawBody: "body", cfg: { token: "token" } });
    assert(github.ok === true, "safe token API request still succeeds");
    assert(redirects.length === 2, "GitHub precheck and main request both run");
    assert(redirects.every((mode) => mode === "error"), "every token API fetch rejects redirects");
  } finally {
    globalThis.chrome = prevChrome;
    globalThis.fetch = prevFetch;
    if (prevClipboard) Object.defineProperty(navigator, "clipboard", prevClipboard);
    else delete navigator.clipboard;
  }
}

(async function () {
  await runSendNetworkPolicyTests();
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
})();
</script>
</body></html>
