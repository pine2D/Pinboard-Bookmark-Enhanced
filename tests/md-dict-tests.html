<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>md-dict Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>md-dict.js tests</h1>
<div id="summary"></div>
<div id="results"></div>
<script src="../md-dict.js"></script>
<script src="../md-vocab-echo.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function section(name) { const h = document.createElement("h2"); h.textContent = name; root.appendChild(h); }
function assert(cond, detail) { check(detail || String(cond), cond, detail); }
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}

section("pbpDictPrimaryLang");
assertEq(pbpDictPrimaryLang("en-US"), "en", "en-US -> en");
assertEq(pbpDictPrimaryLang("ZH_cn"), "zh", "ZH_cn -> zh");
assertEq(pbpDictPrimaryLang("  de "), "de", "trims");
assertEq(pbpDictPrimaryLang(""), "", "empty -> empty");
assertEq(pbpDictPrimaryLang(null), "", "null -> empty");

section("pbpDictRouteLang");
assertEq(pbpDictRouteLang("en", true, "de", "fr"), "fr", "manual wins");
assertEq(pbpDictRouteLang("en", true, "de", ""), "en", "reliable detection second");
assertEq(pbpDictRouteLang("en", false, "de", ""), "de", "unreliable falls to article lang");
assertEq(pbpDictRouteLang("und", true, "de", ""), "de", "und never routes");
assertEq(pbpDictRouteLang("", false, "", ""), "", "nothing -> auto-unknown");

section("pbpDictVocabKey / pbpDictCacheKeyPublic");
assertEq(pbpDictVocabKey("acct_u1", "en-US", "  Running  "), "acct_u1|en|running", "owner + primary + normalized");
assertEq(pbpDictVocabKey("", "en", "x"), "ownerless|en|x", "empty owner -> ownerless");
assertEq(pbpDictVocabKey("acct_u1", "zh", "书"), "acct_u1|zh|书", "CJK passthrough");
assertEq(pbpDictCacheKeyPublic("en", "New  York"), pbpDictCacheKeyPublic("en", "New York"), "public key collapses whitespace");
assertEq(pbpDictCacheKeyPublic("de", "Straße"), "de|straße", "public key has no owner");

section("pbpDictOwnerScope");
assertEq(pbpDictOwnerScope("alice"), "acct_alice", "account -> acct_ prefix");
assertEq(pbpDictOwnerScope(""), "ownerless", "falsy -> ownerless");
assertEq(pbpDictOwnerScope("a b"), "acct_a%20b", "encodes special chars");

section("pbpDictSafeUrl");
assertEq(pbpDictSafeUrl("https://en.wiktionary.org/wiki/x"), "https://en.wiktionary.org/wiki/x", "https passes");
assertEq(pbpDictSafeUrl("http://a.example/x"), "http://a.example/x", "http passes");
assertEq(pbpDictSafeUrl("javascript:alert(1)"), "", "javascript: blocked");
assertEq(pbpDictSafeUrl("data:text/html,x"), "", "data: blocked");
assertEq(pbpDictSafeUrl("not a url"), "", "garbage blocked");

section("pbpDictLemmaRetry");
assert(pbpDictLemmaRetry(404, "run", "running", "en") === true, "404 + different lemma -> retry");
assert(pbpDictLemmaRetry(404, "Running", "running", "en") === false, "same after normalize -> no retry");
assert(pbpDictLemmaRetry(404, "-", "running", "en") === false, "'-' sentinel -> no retry");
assert(pbpDictLemmaRetry(404, "", "running", "en") === false, "empty -> no retry");
assert(pbpDictLemmaRetry(200, "run", "running", "en") === false, "non-404 -> no retry");

section("pbpDictNormalizeEntry");
const FDA_SAMPLE = { /* hello 样本，含 source.url 变体 */
  word: "hello",
  entries: [{
    language: { code: "en", name: "English" },
    partOfSpeech: "interjection",
    pronunciations: [
      { type: "ipa", text: "/hɛˈloʊ/", tags: ["General American"] },
      { type: "ipa", text: "/həˈləʊ/", tags: ["Received Pronunciation"] },
      { type: "ipa", text: "/x1/", tags: [] }, { type: "ipa", text: "/x2/", tags: [] }
    ],
    forms: [{ word: "hellos", tags: ["plural"] }],
    senses: [
      { definition: "A greeting.", examples: ["Hello, world!", "Hello there.", "third dropped"] },
      { definition: "s2", examples: [] }, { definition: "s3", examples: [] },
      { definition: "s4", examples: [] }, { definition: "s5", examples: [] },
      { definition: "s6-dropped", examples: [] }
    ]
  }],
  source: { url: "https://en.wiktionary.org/wiki/hello", license: { name: "CC BY-SA 4.0", url: "https://creativecommons.org/licenses/by-sa/4.0/" } }
};
const norm = pbpDictNormalizeEntry(FDA_SAMPLE);
assert(norm !== null, "sample normalizes");
assertEq(norm.word, "hello", "word");
assertEq(norm.entries.length, 1, "one entry");
assertEq(norm.entries[0].pos, "interjection", "pos");
assertEq(norm.entries[0].ipas.length, 3, "ipa capped at 3");
assertEq(norm.entries[0].ipas[0].tags[0], "General American", "ipa accent tag");
assertEq(norm.entries[0].senses.length, 5, "senses capped at 5");
assertEq(norm.entries[0].senses[0].examples.length, 2, "examples capped at 2");
assertEq(norm.sourceUrl, "https://en.wiktionary.org/wiki/hello", "source url");
assertEq(norm.license, "CC BY-SA 4.0", "license name");
assertEq(norm.sourceLabel, "Wiktionary", "network normalizer labels source");
assertEq(pbpDictNormalizeEntry({ ...FDA_SAMPLE, source: { url: "javascript:x", license: {} } }).sourceUrl, "", "unsafe source url stripped");
assertEq(pbpDictNormalizeEntry({ word: "书", entries: [], source: {} }), null, "empty entries (zh) -> null");
assertEq(pbpDictNormalizeEntry(null), null, "null json -> null");
assertEq(pbpDictNormalizeEntry({ entries: [{ partOfSpeech: "noun" }] }), null, "no ipa/sense/form -> null");

section("_pbpDictRenderEntry source line");
// _pbpDictRenderEntry reads t() (i18n.js, not loaded on this pure-layer test
// page); stub it so the render call below does not throw.
window.t = window.t || ((k) => k);
const RENDER_ENTRIES = [{ pos: "", ipas: [], forms: [], senses: [{ definition: "d", examples: [] }] }];
const cedictSlot = document.createElement("div");
_pbpDictRenderEntry(cedictSlot, { entries: RENDER_ENTRIES, sourceLabel: "CC-CEDICT", sourceUrl: "https://cc-cedict.org/wiki/", license: "CC BY-SA 4.0" }, "词", "zh");
assert(cedictSlot.querySelector(".xp-dict-src a").textContent.includes("CC-CEDICT"), "CC-CEDICT source rendered");
const legacySlot = document.createElement("div");
// No sourceLabel field at all -- shape of an entry cached before this field existed.
_pbpDictRenderEntry(legacySlot, { entries: RENDER_ENTRIES, sourceUrl: "https://en.wiktionary.org/wiki/word", license: "CC BY-SA 4.0" }, "word", "en");
assert(legacySlot.querySelector(".xp-dict-src a").textContent.includes("Wiktionary"), "missing sourceLabel (old cache shape) falls back to Wiktionary");

section("pbpDictParseCtxAnswer / StripLemmaLine");
const ans = "LEMMA: run\n\nIn this sentence it means to manage a business.";
assertEq(pbpDictParseCtxAnswer(ans).lemma, "run", "lemma parsed");
assert(pbpDictParseCtxAnswer(ans).gloss.indexOf("LEMMA") === -1, "gloss excludes lemma line");
assertEq(pbpDictParseCtxAnswer("LEMMA: -\n\ngloss").lemma, "", "'-' -> empty lemma");
assertEq(pbpDictParseCtxAnswer("no marker at all").lemma, "", "missing marker tolerated");
assertEq(pbpDictParseCtxAnswer("no marker at all").gloss, "no marker at all", "gloss = full text when no marker");
assertEq(pbpDictStripLemmaLine("L"), "", "partial marker prefix hidden: L");
assertEq(pbpDictStripLemmaLine("LEMM"), "", "partial marker prefix hidden: LEMM");
assertEq(pbpDictStripLemmaLine("LEMMA: ru"), "", "partial lemma line hidden");
assertEq(pbpDictStripLemmaLine("Hello"), "Hello", "ordinary token NOT swallowed");
assertEq(pbpDictStripLemmaLine("AI"), "AI", "short ordinary token NOT swallowed");
assertEq(pbpDictStripLemmaLine("Meaning of the word"), "Meaning of the word", "L-adjacent word NOT swallowed");
assert(pbpDictStripLemmaLine(ans).indexOf("manage") >= 0, "strip keeps gloss");

section("pbpDictCtxHash");
assertEq(pbpDictCtxHash("abc"), pbpDictCtxHash("abc"), "deterministic");
assert(pbpDictCtxHash("abc") !== pbpDictCtxHash("abd"), "differs");
assertEq(pbpDictCtxHash(""), pbpDictCtxHash(null), "null == empty");

section("pbpDictBuildCtxPrompt");
const cp = pbpDictBuildCtxPrompt({ selection: "bank", sentence: "He sat by the river bank.", title: "T", answerLang: "Simplified Chinese" });
assert(cp.system.indexOf("LEMMA:") >= 0, "system demands LEMMA first line");
assert(/do not output ipa/i.test(cp.system), "system forbids IPA");
assert(cp.system.indexOf("Simplified Chinese") >= 0, "answer lang injected");
assert(cp.prompt.indexOf("bank") >= 0 && cp.prompt.indexOf("river") >= 0, "prompt carries selection + sentence");
assert(cp.prompt.indexOf("T") >= 0, "prompt carries title (title is part of cache identity)");
const longSel = "x".repeat(500);
assert(pbpDictBuildCtxPrompt({ selection: longSel, sentence: "", title: "", answerLang: "English" }).prompt.indexOf("x".repeat(401)) === -1, "selection capped at 400");
assert(cp.prompt.indexOf("Answer language: Simplified Chinese only.") >= 0, "trailing language directive pinned (recency compliance)");

section("pbpDictMergeContext");
const c1 = { quote: "q1", articleUrl: "u1", articleTitle: "t1", highlightId: null, createdAt: 1 };
assertEq(pbpDictMergeContext([], c1).length, 1, "append to empty");
assertEq(pbpDictMergeContext([c1], { ...c1 }).length, 1, "dedup by url+quote");
assertEq(pbpDictMergeContext([c1], { ...c1, articleUrl: "u2" }).length, 2, "same quote different article kept");
assertEq(pbpDictMergeContext([c1], null).length, 1, "null ctx no-op");
assert(Array.isArray(pbpDictMergeContext([c1], c1)), "returns array");

section("pbpDictTsv");
const tsv = pbpDictTsv([
  { term: "hello", reading: "/həˈləʊ/", definition: "a greeting", contexts: ["Hello, world"], source: "https://a", license: "CC BY-SA 4.0 https://en.wiktionary.org/wiki/hello" },
  { term: "tab\there", reading: "", definition: 'say "hi" x', contexts: ["c1", "c2"], source: "", license: "" },
  { term: "书", reading: "", definition: "book; letter", contexts: ["我在读一本书。"], source: "https://b", license: "" }
]);
assert(tsv.startsWith("#separator:Tab\n#html:false\n#columns:Term\tReading\tDefinition\tContext\tSource\tLicense\n"), "anki headers, 6 columns");
assert(tsv.indexOf("hello\t/həˈləʊ/\ta greeting\tHello, world\thttps://a\tCC BY-SA 4.0 https://en.wiktionary.org/wiki/hello") >= 0, "plain row raw");
assert(tsv.indexOf('"tab\there"') >= 0, "tab field quoted");
assert(tsv.indexOf('"c1\nc2"') >= 0, "multiple contexts exported as quoted multiline");
assert(tsv.indexOf("我在读一本书。") >= 0, "CJK golden row survives");
assertEq(pbpDictTsv([]), "#separator:Tab\n#html:false\n#columns:Term\tReading\tDefinition\tContext\tSource\tLicense\n", "empty -> header only");
assert(tsv.indexOf('say "hi" x') === -1 || tsv.indexOf('"say ""hi"" x"') >= 0, "inner quotes doubled when field needs quoting");

section("pbpEchoTermSet");
const _ets = (rows, cap) => pbpEchoTermSet(rows, cap);
{
  const set1 = _ets([{ term: "net" }, { term: "internet" }, { term: "NET" }]);
  assertEq(set1.length, 2, "dedup by folded key");
  assertEq(set1[0].key, "internet", "longest-first ordering");
  const nfc = _ets([{ term: "café" }, { term: "café" }]);
  assertEq(nfc.length, 1, "NFC merges composed/decomposed");
  const capd = _ets([{ term: "alpha" }, { term: "beta" }, { term: "gamma" }], 2);
  assertEq(capd.length, 2, "cap keeps the first (newest) rows only");
  assertEq(_ets([{ term: "a" }]).length, 0, "single latin letter dropped");
  assert(_ets([{ term: "书" }]).length === 1 && _ets([{ term: "단" }]).length === 1,
    "single non-latin chars kept (han substring-matched, hangul boundary-matched)");
  const lem = _ets([{ term: "running", lemma: "run" }]);
  assert(lem.length === 1 && lem[0].key === "running", "lemma is NOT echoed (term only)");
  const turk = _ets([{ term: "İstanbul" }]);
  assertEq(turk[0].key, "İstanbul", "length-shifting case fold degrades to exact-case key");
}

section("pbpEchoNeedsBoundary");
assertEq(pbpEchoNeedsBoundary("word"), true, "latin needs boundary");
assertEq(pbpEchoNeedsBoundary("слово"), true, "cyrillic needs boundary");
assertEq(pbpEchoNeedsBoundary("λόγος"), true, "greek needs boundary");
assertEq(pbpEchoNeedsBoundary("단어"), true, "hangul needs boundary");
assertEq(pbpEchoNeedsBoundary("书"), false, "han is substring-matched");
assertEq(pbpEchoNeedsBoundary("ひらがな"), false, "kana is substring-matched");

section("pbpEchoFindInText");
const _terms = (list) => pbpEchoTermSet(list.map((t) => ({ term: t })));
{
  assertEq(pbpEchoFindInText("running fast", _terms(["run"])).length, 0, "latin: no hit inside a longer word");
  const hit1 = pbpEchoFindInText("a run.", _terms(["run"]));
  assert(hit1.length === 1 && hit1[0].start === 2 && hit1[0].end === 5, "latin boundary hit with offsets");
  assertEq(pbpEchoFindInText("словом", _terms(["слово"])).length, 0, "cyrillic: слово does not hit словом");
  assertEq(pbpEchoFindInText("слово,", _terms(["слово"])).length, 1, "cyrillic exact word hits");
  assertEq(pbpEchoFindInText("λόγοςα", _terms(["λόγος"])).length, 0, "greek adjacency rejected");
  assertEq(pbpEchoFindInText("café", _terms(["cafe"])).length, 0, "combining mark after edge rejects (\\p{M})");
  const cjk = pbpEchoFindInText("读书人", _terms(["书"]));
  assert(cjk.length === 1 && cjk[0].start === 1, "han substring hit inside run");
  assertEq(pbpEchoFindInText("かなひらがなだ", _terms(["ひらがな"])).length, 1, "kana substring hit");
  const ov = pbpEchoFindInText("internet", _terms(["net", "internet"]));
  assert(ov.length === 1 && ov[0].key === "internet", "overlap: longest term claims first");
  {
    const caps = new Map([["读书", 1]]);
    const r = pbpEchoFindInText("读书读书", _terms(["书", "读书"]), 10, caps);
    assert(r.length === 2 && r[0].key === "读书" && r[0].start === 0 && r[1].key === "书" && r[1].start === 3,
      "per-term cap inside the matcher frees the region for the shorter term (no ghost claim)");
  }
  const ci = pbpEchoFindInText("HELLO there", _terms(["Hello"]));
  assert(ci.length === 1 && ci[0].start === 0 && ci[0].end === 5, "case-insensitive with original offsets");
  assertEq(pbpEchoFindInText("𝐀ab", _terms(["ab"])).length, 0, "astral letter adjacency rejected (code point, not UTF-16 unit)");
  assertEq(pbpEchoFindInText("😀ab", _terms(["ab"])).length, 1, "emoji adjacency is a boundary (not \\p{L})");
  assertEq(pbpEchoFindInText("anything", []).length, 0, "empty term set -> no hits");
}

section("per-document language override");
assertEq(typeof _pbpDictManualLang, "string", "module override state exists, defaults empty");
_pbpDictManualLang = "en";
document.dispatchEvent(new CustomEvent("pbp:rendered", { detail: { account: "" } }));
assertEq(_pbpDictManualLang, "", "pbp:rendered resets the override (never carried across documents)");

async function runVocabIdbTests() {
  section("pbp-vocab IDB (runtime)");
  await new Promise((r) => { const del = indexedDB.deleteDatabase("pbp-vocab"); del.onsuccess = del.onerror = del.onblocked = r; });
  const ctx1 = { quote: "q1", articleUrl: "u1", articleTitle: "t1", highlightId: null, createdAt: 1 };
  const e1 = await pbpVocabSaveWord("acct_a", { term: "Running", language: "en-US", gloss: "g1", ipa: "", sourceUrl: "https://en.wiktionary.org/wiki/run", license: "CC BY-SA 4.0", context: ctx1 });
  assert(e1 && e1.id === "acct_a|en|running", "save creates owner-scoped id");
  assertEq(e1 && e1.sourceUrl, "https://en.wiktionary.org/wiki/run", "attribution saved WITHOUT ipa (independent merge)");
  const e2 = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", context: { ...ctx1 } });
  assertEq(e2.contexts.length, 1, "same url+quote deduped");
  assertEq(e2.gloss, "g2", "latest gloss wins");
  // A re-save carrying NEW attribution (e.g. a re-lookup that landed on
  // CC-CEDICT instead of Wiktionary) must overwrite BOTH sourceUrl and
  // license as a pair, not just fill them when empty -- otherwise the old
  // Wiktionary line survives into a CC-CEDICT-attributed export.
  const e2b = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", sourceUrl: "https://cc-cedict.org/wiki/", license: "CC BY-SA 4.0 (CC-CEDICT)", context: { ...ctx1 } });
  assertEq(e2b.sourceUrl, "https://cc-cedict.org/wiki/", "re-save overwrites sourceUrl with the latest lookup's attribution");
  assertEq(e2b.license, "CC BY-SA 4.0 (CC-CEDICT)", "re-save overwrites license with the latest lookup's attribution");
  const e2c = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", license: "MIT", context: { ...ctx1 } });
  assert(e2c.license === "MIT" && e2c.sourceUrl === null, "one-sided attribution nulls the other side (no mixed attribution)");
  const e3 = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "", context: { ...ctx1, articleUrl: "u2" } });
  assertEq(e3.contexts.length, 2, "second article context appended");
  const got = await pbpVocabGet("acct_a|en|running");
  assert(got && got.contexts.length === 2 && got.gloss === "g2", "pbpVocabGet returns the merged record by id");
  assertEq(await pbpVocabGet("acct_a|en|missing"), null, "pbpVocabGet miss resolves null");
  await pbpVocabSaveWord("acct_b", { term: "running", language: "en", gloss: "other-account", context: ctx1 });
  const aRows = await pbpVocabAll("acct_a");
  const bRows = await pbpVocabAll("acct_b");
  assertEq(aRows.length, 1, "owner filter: acct_a sees 1");
  assertEq(bRows.length, 1, "owner filter: acct_b sees 1");
  assert(aRows[0].gloss !== "other-account", "no cross-account leak");
  await new Promise((r) => setTimeout(r, 5)); // Date.now() must differ for the sort assertion
  await pbpVocabSaveWord("acct_a", { term: "walk", language: "en", gloss: "gw", context: ctx1 });
  const sorted = await pbpVocabAll("acct_a");
  assertEq(sorted.length, 2, "second word saved for sort check");
  assertEq(sorted[0].term, "walk", "pbpVocabAll sorts newest updatedAt first");
  assert(await pbpVocabDelete("acct_a|en|walk", "acct_a"), "cleanup sort-check word");
  assertEq(await pbpVocabDelete("acct_a|en|ghost", "acct_a"), true, "delete of a missing id is idempotent-true (UI treats it as done)");
  const badDel = await pbpVocabDelete(aRows[0].id, "acct_wrong");
  assert(badDel === false, "delete with wrong owner resolves false");
  assertEq((await pbpVocabAll("acct_a")).length, 1, "wrong-owner delete leaves the record in place");
  const okDel = await pbpVocabDelete(aRows[0].id, "acct_a");
  assert(okDel === true, "delete resolves true on tx complete");
  assertEq((await pbpVocabAll("acct_a")).length, 0, "deleted row gone");
  assertEq((await pbpVocabAll("acct_b")).length, 1, "other owner untouched");
}
(async function () {
  await runVocabIdbTests();
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
})();
</script>
</body></html>
