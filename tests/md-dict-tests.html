<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>md-dict Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>md-dict.js tests</h1>
<div id="summary"></div>
<div id="results"></div>
<script src="../md-dict.js"></script>
<script src="../md-vocab-echo.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function section(name) { const h = document.createElement("h2"); h.textContent = name; root.appendChild(h); }
function assert(cond, detail) { check(detail || String(cond), cond, detail); }
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}

section("pbpDictPrimaryLang");
assertEq(pbpDictPrimaryLang("en-US"), "en", "en-US -> en");
assertEq(pbpDictPrimaryLang("ZH_cn"), "zh", "ZH_cn -> zh");
assertEq(pbpDictPrimaryLang("  de "), "de", "trims");
assertEq(pbpDictPrimaryLang(""), "", "empty -> empty");
assertEq(pbpDictPrimaryLang(null), "", "null -> empty");
assertEq(pbpDictLanguageLabel("und", "en"), "", "unknown language code stays hidden from users");
assert(pbpDictLanguageLabel("fr", "en") !== "FR" && pbpDictLanguageLabel("fr", "en").length > 2,
  "supported language code uses the platform's localized language name");

section("pbpDictRouteLang");
assertEq(pbpDictRouteLang("en", true, "de", "fr"), "fr", "manual wins");
assertEq(pbpDictRouteLang("en", true, "de", ""), "en", "reliable detection second");
assertEq(pbpDictRouteLang("en", false, "de", ""), "de", "unreliable falls to article lang");
assertEq(pbpDictRouteLang("und", true, "de", ""), "de", "und never routes");
assertEq(pbpDictRouteLang("", false, "", ""), "", "nothing -> auto-unknown");

section("pbpDictVocabKey / pbpDictCacheKeyPublic");
assertEq(pbpDictVocabKey("acct_u1", "en-US", "  Running  "), "acct_u1|en|running", "owner + primary + normalized");
assertEq(pbpDictVocabKey("", "en", "x"), "ownerless|en|x", "empty owner -> ownerless");
assertEq(pbpDictVocabKey("acct_u1", "zh", "书"), "acct_u1|zh|书", "CJK passthrough");
assertEq(pbpDictCacheKeyPublic("en", "New  York"), pbpDictCacheKeyPublic("en", "New York"), "public key collapses whitespace");
assertEq(pbpDictCacheKeyPublic("de", "Straße"), "de|straße", "public key has no owner");
assertEq(pbpDictCacheKeyExact("en", "Polish"), "en|Polish", "query key preserves uppercase");
assertEq(pbpDictCacheKeyExact("en", "polish"), "en|polish", "query key keeps lowercase separate");
assertEq(pbpDictCacheKeyExact("fr", "  Défense  "), "fr|Défense", "query key trims but preserves case");
assertEq(pbpDictCacheKeyExact("en", "New  York"), "en|New York", "query key collapses whitespace");
assertEq(pbpDictCacheKeyExact("fr", "Défense"), "fr|Défense", "query key NFC-normalizes");
assertEq(pbpDictQueryCacheKey("fr", "Défense"), "dict2_fr|Défense", "online cache uses versioned dict2 prefix");
assertEq(pbpDictLowerCandidate("Défense", "fr"), "défense", "French uppercase gets a lowercase candidate");
assertEq(pbpDictLowerCandidate("défense", "fr"), "", "already-lowercase term has no duplicate candidate");
assertEq(pbpDictLowerCandidate("Word", "xx"), "", "unsupported locale never reaches toLocaleLowerCase");

section("pbpDictOwnerScope");
assertEq(pbpDictOwnerScope("alice"), "acct_alice", "account -> acct_ prefix");
assertEq(pbpDictOwnerScope(""), "ownerless", "falsy -> ownerless");
assertEq(pbpDictOwnerScope("a b"), "acct_a%20b", "encodes special chars");

section("pbpDictSafeUrl");
assertEq(pbpDictSafeUrl("https://en.wiktionary.org/wiki/x"), "https://en.wiktionary.org/wiki/x", "https passes");
assertEq(pbpDictSafeUrl("http://a.example/x"), "http://a.example/x", "http passes");
assertEq(pbpDictSafeUrl("javascript:alert(1)"), "", "javascript: blocked");
assertEq(pbpDictSafeUrl("data:text/html,x"), "", "data: blocked");
assertEq(pbpDictSafeUrl("not a url"), "", "garbage blocked");

section("pbpDictNormalizeEntry");
const FDA_SAMPLE = { /* hello 样本，含 source.url 变体 */
  word: "hello",
  entries: [{
    language: { code: "en", name: "English" },
    partOfSpeech: "interjection",
    pronunciations: [
      { type: "ipa", text: "/hɛˈloʊ/", tags: ["General American"] },
      { type: "ipa", text: "/həˈləʊ/", tags: ["Received Pronunciation"] },
      { type: "ipa", text: "/x1/", tags: [] }, { type: "ipa", text: "/x2/", tags: [] }
    ],
    forms: [{ word: "hellos", tags: ["plural"] }],
    senses: [
      { definition: "A greeting.", examples: ["Hello, world!", "Hello there.", "third dropped"] },
      { definition: "s2", examples: [] }, { definition: "s3", examples: [] },
      { definition: "s4", examples: [] }, { definition: "s5", examples: [] },
      { definition: "s6-dropped", examples: [] }
    ]
  }],
  source: { url: "https://en.wiktionary.org/wiki/hello", license: { name: "CC BY-SA 4.0", url: "https://creativecommons.org/licenses/by-sa/4.0/" } }
};
const norm = pbpDictNormalizeEntry(FDA_SAMPLE);
assert(norm !== null, "sample normalizes");
assertEq(norm.word, "hello", "word");
assertEq(norm.entries.length, 1, "one entry");
assertEq(norm.entries[0].pos, "interjection", "pos");
assertEq(norm.entries[0].ipas.length, 3, "ipa capped at 3");
assertEq(norm.entries[0].ipas[0].tags[0], "General American", "ipa accent tag");
assertEq(norm.entries[0].senses.length, 5, "senses capped at 5");
assertEq(norm.entries[0].senses[0].examples.length, 2, "examples capped at 2");
assertEq(norm.sourceUrl, "https://en.wiktionary.org/wiki/hello", "source url");
assertEq(norm.license, "CC BY-SA 4.0", "license name");
assertEq(norm.sourceLabel, "Wiktionary", "network normalizer labels source");
assertEq(pbpDictNormalizeEntry({ ...FDA_SAMPLE, source: { url: "javascript:x", license: {} } }).sourceUrl, "", "unsafe source url stripped");
assertEq(pbpDictNormalizeEntry({ word: "书", entries: [], source: {} }), null, "empty entries (zh) -> null");
assertEq(pbpDictNormalizeEntry(null), null, "null json -> null");
assertEq(pbpDictNormalizeEntry({ entries: [{ partOfSpeech: "noun" }] }), null, "no ipa/sense/form -> null");

section("response classification / Wiktionary fallback / circuit");
assertEq(pbpDictClassifyResponse({ status: 200, data: FDA_SAMPLE }).kind, "hit", "renderable 200 is a hit");
assertEq(pbpDictClassifyResponse({ status: 200, data: { entries: [] } }).kind, "miss", "200 + empty entries is a semantic miss");
assertEq(pbpDictClassifyResponse({ status: 200, data: { entries: [{ partOfSpeech: "noun" }] } }).kind, "miss", "200 + unrenderable entries is a semantic miss");
assertEq(pbpDictClassifyResponse({ status: 404, data: null }).kind, "miss", "404 is a semantic miss");
assertEq(pbpDictClassifyResponse({ status: 500, data: null }).kind, "failure", "500 is a failure, never no-entry");
assertEq(pbpDictClassifyResponse(null).kind, "failure", "missing response is a failure");
assertEq(pbpDictWiktionaryUrl("Défense"), "https://en.wiktionary.org/wiki/D%C3%A9fense", "fallback URL encodes accents on fixed English Wiktionary");
assertEq(pbpDictWiktionaryUrl("New York"), "https://en.wiktionary.org/wiki/New%20York", "fallback URL encodes spaces");
assert(pbpDictWiktionaryUrl("mot").startsWith("https://en.wiktionary.org/"), "fallback never derives a language subdomain");
let circuit = pbpDictCircuitAfter(null, "failure", 1000);
assertEq(circuit.failures, 1, "circuit counts first failure");
circuit = pbpDictCircuitAfter(circuit, "failure", 1001);
assertEq(circuit.failures, 2, "circuit counts consecutive failure");
circuit = pbpDictCircuitAfter(circuit, "failure", 1002);
assertEq(circuit.failures, 3, "third failure opens circuit");
assertEq(circuit.openUntil, 61002, "circuit cooldown is 60 seconds from threshold failure");
circuit = pbpDictCircuitAfter(circuit, "abort", 1003);
assertEq(circuit.openUntil, 61002, "non-failure event leaves circuit unchanged");
circuit = pbpDictCircuitAfter(circuit, "healthy", 1004);
assert(circuit.failures === 0 && circuit.openUntil === 0, "healthy response resets circuit");

section("_pbpDictRenderEntry source line");
// _pbpDictRenderEntry reads t() (i18n.js, not loaded on this pure-layer test
// page); stub it so the render call below does not throw.
window.t = window.t || ((k, ...args) => k + (args.length ? ":" + args.join(",") : ""));
const RENDER_ENTRIES = [{ pos: "", ipas: [], forms: [], senses: [{ definition: "d", examples: [] }] }];
const cedictSlot = document.createElement("div");
_pbpDictRenderEntry(cedictSlot, { entries: RENDER_ENTRIES, sourceLabel: "CC-CEDICT", sourceUrl: "https://cc-cedict.org/wiki/", license: "CC BY-SA 4.0" }, "词", "zh");
assert(cedictSlot.querySelector(".xp-dict-src a").textContent.includes("CC-CEDICT"), "CC-CEDICT source rendered");
const legacySlot = document.createElement("div");
// No sourceLabel field at all -- shape of an entry cached before this field existed.
_pbpDictRenderEntry(legacySlot, { entries: RENDER_ENTRIES, sourceUrl: "https://en.wiktionary.org/wiki/word", license: "CC BY-SA 4.0" }, "word", "en");
assert(legacySlot.querySelector(".xp-dict-src a").textContent.includes("Wiktionary"), "missing sourceLabel (old cache shape) falls back to Wiktionary");
const matchedSlot = document.createElement("div");
_pbpDictRenderEntry(matchedSlot, { word: "défense", entries: RENDER_ENTRIES, sourceLabel: "Wiktionary", sourceUrl: "https://en.wiktionary.org/wiki/défense", license: "CC BY-SA 4.0" }, "défense", "fr", "Défense");
assert(matchedSlot.querySelector(".xp-dict-match")?.textContent === "dictMatchedHeadword:défense",
  "entry renderer discloses a lowercase actual headword without changing the selection title");
const exactSlot = document.createElement("div");
_pbpDictRenderEntry(exactSlot, { word: "mot", entries: RENDER_ENTRIES, sourceLabel: "Wiktionary", sourceUrl: "https://en.wiktionary.org/wiki/mot", license: "CC BY-SA 4.0" }, "mot", "fr", "mot");
assert(!exactSlot.querySelector(".xp-dict-match"), "exact headword match adds no redundant label");
const tagSlot = document.createElement("div");
_pbpDictRenderEntry(tagSlot, { word: "漢字", entries: [{ pos: "", ipas: [{ text: "han4 zi4", tags: ["Pinyin"] }], forms: [{ word: "汉字", tags: ["simp"] }, { word: "漢字", tags: ["trad"] }], senses: [] }], sourceLabel: "CC-CEDICT", sourceUrl: "https://cc-cedict.org/wiki/", license: "CC BY-SA 4.0" }, "漢字", "zh", "漢字");
assert(tagSlot.textContent.includes("dictTagPinyin") && tagSlot.textContent.includes("dictTagSimplified") && tagSlot.textContent.includes("dictTagTraditional"),
  "CC-CEDICT technical tags render through localized labels");
assert(!/\b(?:simp|trad|Pinyin)\b/.test(tagSlot.textContent), "raw simp/trad/Pinyin labels are not exposed");

section("pbpDictParseCtxAnswer / StripLemmaLine");
const ans = "LEMMA: run\n\nIn this sentence it means to manage a business.";
assertEq(pbpDictParseCtxAnswer(ans).lemma, "run", "lemma parsed");
assert(pbpDictParseCtxAnswer(ans).gloss.indexOf("LEMMA") === -1, "gloss excludes lemma line");
assertEq(pbpDictParseCtxAnswer("LEMMA: -\n\ngloss").lemma, "", "'-' -> empty lemma");
assertEq(pbpDictParseCtxAnswer("no marker at all").lemma, "", "missing marker tolerated");
assertEq(pbpDictParseCtxAnswer("no marker at all").gloss, "no marker at all", "gloss = full text when no marker");
assertEq(pbpDictStripLemmaLine("L"), "", "partial marker prefix hidden: L");
assertEq(pbpDictStripLemmaLine("LEMM"), "", "partial marker prefix hidden: LEMM");
assertEq(pbpDictStripLemmaLine("LEMMA: ru"), "", "partial lemma line hidden");
assertEq(pbpDictStripLemmaLine("Hello"), "Hello", "ordinary token NOT swallowed");
assertEq(pbpDictStripLemmaLine("AI"), "AI", "short ordinary token NOT swallowed");
assertEq(pbpDictStripLemmaLine("Meaning of the word"), "Meaning of the word", "L-adjacent word NOT swallowed");
assert(pbpDictStripLemmaLine(ans).indexOf("manage") >= 0, "strip keeps gloss");

section("pbpDictCtxHash");
assertEq(pbpDictCtxHash("abc"), pbpDictCtxHash("abc"), "deterministic");
assert(pbpDictCtxHash("abc") !== pbpDictCtxHash("abd"), "differs");
assertEq(pbpDictCtxHash(""), pbpDictCtxHash(null), "null == empty");

section("pbpDictBuildCtxPrompt");
const cp = pbpDictBuildCtxPrompt({ selection: "bank", sentence: "He sat by the river bank.", title: "T", answerLang: "Simplified Chinese" });
assert(cp.system.indexOf("LEMMA:") >= 0, "system demands LEMMA first line");
assert(/do not output ipa/i.test(cp.system), "system forbids IPA");
assert(cp.system.indexOf("Simplified Chinese") >= 0, "answer lang injected");
assert(cp.prompt.indexOf("bank") >= 0 && cp.prompt.indexOf("river") >= 0, "prompt carries selection + sentence");
assert(cp.prompt.indexOf("T") >= 0, "prompt carries title (title is part of cache identity)");
const longSel = "x".repeat(500);
assert(pbpDictBuildCtxPrompt({ selection: longSel, sentence: "", title: "", answerLang: "English" }).prompt.indexOf("x".repeat(401)) === -1, "selection capped at 400");
assert(cp.prompt.endsWith("Answer language: Simplified Chinese only."), "language directive is the LAST prompt part (recency compliance)");

section("pbpDictMergeContext");
const c1 = { quote: "q1", articleUrl: "u1", articleTitle: "t1", highlightId: null, createdAt: 1 };
assertEq(pbpDictMergeContext([], c1).length, 1, "append to empty");
assertEq(pbpDictMergeContext([c1], { ...c1 }).length, 1, "dedup by url+quote");
assertEq(pbpDictMergeContext([c1], { ...c1, articleUrl: "u2" }).length, 2, "same quote different article kept");
assertEq(pbpDictMergeContext([c1], null).length, 1, "null ctx no-op");
assert(Array.isArray(pbpDictMergeContext([c1], c1)), "returns array");

section("pbpDictTsv");
const tsv = pbpDictTsv([
  { term: "hello", reading: "/həˈləʊ/", definition: "a greeting", contexts: ["Hello, world"], source: "https://a", license: "CC BY-SA 4.0 https://en.wiktionary.org/wiki/hello" },
  { term: "tab\there", reading: "", definition: 'say "hi" x', contexts: ["c1", "c2"], source: "", license: "" },
  { term: "书", reading: "", definition: "book; letter", contexts: ["我在读一本书。"], source: "https://b", license: "" }
]);
assert(tsv.startsWith("#separator:Tab\n#html:false\n#columns:Term\tReading\tDefinition\tContext\tSource\tLicense\n"), "anki headers, 6 columns");
assert(tsv.indexOf("hello\t/həˈləʊ/\ta greeting\tHello, world\thttps://a\tCC BY-SA 4.0 https://en.wiktionary.org/wiki/hello") >= 0, "plain row raw");
assert(tsv.indexOf('"tab\there"') >= 0, "tab field quoted");
assert(tsv.indexOf('"c1\nc2"') >= 0, "multiple contexts exported as quoted multiline");
assert(tsv.indexOf("我在读一本书。") >= 0, "CJK golden row survives");
assertEq(pbpDictTsv([]), "#separator:Tab\n#html:false\n#columns:Term\tReading\tDefinition\tContext\tSource\tLicense\n", "empty -> header only");
assert(tsv.indexOf('say "hi" x') === -1 || tsv.indexOf('"say ""hi"" x"') >= 0, "inner quotes doubled when field needs quoting");

section("pbpEchoTermSet");
const _ets = (rows, cap) => pbpEchoTermSet(rows, cap);
{
  const set1 = _ets([{ term: "net" }, { term: "internet" }, { term: "NET" }]);
  assertEq(set1.length, 2, "dedup by folded key");
  assertEq(set1[0].key, "internet", "longest-first ordering");
  const nfc = _ets([{ term: "café" }, { term: "café" }]);
  assertEq(nfc.length, 1, "NFC merges composed/decomposed");
  const capd = _ets([{ term: "alpha" }, { term: "beta" }, { term: "gamma" }], 2);
  assertEq(capd.length, 2, "cap keeps the first (newest) rows only");
  assertEq(_ets([{ term: "a" }]).length, 0, "single latin letter dropped");
  assert(_ets([{ term: "书" }]).length === 1 && _ets([{ term: "단" }]).length === 1,
    "single non-latin chars kept (han substring-matched, hangul boundary-matched)");
  const lem = _ets([{ term: "running", lemma: "run" }]);
  assert(lem.length === 1 && lem[0].key === "running", "lemma is NOT echoed (term only)");
  const turk = _ets([{ term: "İstanbul" }]);
  assertEq(turk[0].key, "İstanbul", "length-shifting case fold degrades to exact-case key");
}

section("pbpEchoNeedsBoundary");
assertEq(pbpEchoNeedsBoundary("word"), true, "latin needs boundary");
assertEq(pbpEchoNeedsBoundary("слово"), true, "cyrillic needs boundary");
assertEq(pbpEchoNeedsBoundary("λόγος"), true, "greek needs boundary");
assertEq(pbpEchoNeedsBoundary("단어"), true, "hangul needs boundary");
assertEq(pbpEchoNeedsBoundary("书"), false, "han is substring-matched");
assertEq(pbpEchoNeedsBoundary("ひらがな"), false, "kana is substring-matched");

section("pbpEchoFindInText");
const _terms = (list) => pbpEchoTermSet(list.map((t) => ({ term: t })));
{
  assertEq(pbpEchoFindInText("running fast", _terms(["run"])).length, 0, "latin: no hit inside a longer word");
  const hit1 = pbpEchoFindInText("a run.", _terms(["run"]));
  assert(hit1.length === 1 && hit1[0].start === 2 && hit1[0].end === 5, "latin boundary hit with offsets");
  assertEq(pbpEchoFindInText("словом", _terms(["слово"])).length, 0, "cyrillic: слово does not hit словом");
  assertEq(pbpEchoFindInText("слово,", _terms(["слово"])).length, 1, "cyrillic exact word hits");
  assertEq(pbpEchoFindInText("λόγοςα", _terms(["λόγος"])).length, 0, "greek adjacency rejected");
  assertEq(pbpEchoFindInText("café", _terms(["cafe"])).length, 0, "combining mark after edge rejects (\\p{M})");
  const cjk = pbpEchoFindInText("读书人", _terms(["书"]));
  assert(cjk.length === 1 && cjk[0].start === 1, "han substring hit inside run");
  assertEq(pbpEchoFindInText("かなひらがなだ", _terms(["ひらがな"])).length, 1, "kana substring hit");
  const ov = pbpEchoFindInText("internet", _terms(["net", "internet"]));
  assert(ov.length === 1 && ov[0].key === "internet", "overlap: longest term claims first");
  {
    const caps = new Map([["读书", 1]]);
    const r = pbpEchoFindInText("读书读书", _terms(["书", "读书"]), 10, caps);
    assert(r.length === 2 && r[0].key === "读书" && r[0].start === 0 && r[1].key === "书" && r[1].start === 3,
      "per-term cap inside the matcher frees the region for the shorter term (no ghost claim)");
  }
  const ci = pbpEchoFindInText("HELLO there", _terms(["Hello"]));
  assert(ci.length === 1 && ci[0].start === 0 && ci[0].end === 5, "case-insensitive with original offsets");
  assertEq(pbpEchoFindInText("𝐀ab", _terms(["ab"])).length, 0, "astral letter adjacency rejected (code point, not UTF-16 unit)");
  assertEq(pbpEchoFindInText("😀ab", _terms(["ab"])).length, 1, "emoji adjacency is a boundary (not \\p{L})");
  assertEq(pbpEchoFindInText("anything", []).length, 0, "empty term set -> no hits");
}

section("per-document language override");
assertEq(typeof _pbpDictManualLang, "string", "module override state exists, defaults empty");
_pbpDictManualLang = "en";
document.dispatchEvent(new CustomEvent("pbp:rendered", { detail: { account: "" } }));
assertEq(_pbpDictManualLang, "", "pbp:rendered resets the override (never carried across documents)");

async function runDictNetworkTests() {
  section("dictionary abort causes / circuit runtime");
  const parent = new AbortController();
  const fromParent = _pbpDictChildSignal(parent.signal, 1000);
  parent.abort();
  assert(fromParent.signal.aborted, "parent abort reaches child signal");
  assertEq(fromParent.reason(), "parent", "child records parent as first abort cause");
  fromParent.done();
  const fromTimeout = _pbpDictChildSignal(null, 5);
  await new Promise((r) => setTimeout(r, 15));
  assert(fromTimeout.signal.aborted, "timeout aborts child signal");
  assertEq(fromTimeout.reason(), "timeout", "child distinguishes its own timeout");
  fromTimeout.done();

  const realFetch = window.fetch;
  try {
    _pbpDictCircuit = { failures: 0, openUntil: 0 };
    window.fetch = async () => ({ status: 500, ok: false });
    await _pbpDictFetch("en", "one", null);
    assertEq(_pbpDictCircuit.failures, 1, "500 counts as a circuit failure");
    window.fetch = async () => ({ status: 429, ok: false });
    await _pbpDictFetch("en", "two", null);
    assertEq(_pbpDictCircuit.failures, 2, "429 counts as a circuit failure");
    window.fetch = async () => ({ status: 200, ok: true, json: async () => ({ entries: [] }) });
    await _pbpDictFetch("en", "healthy-empty", null);
    assert(_pbpDictCircuit.failures === 0 && _pbpDictCircuit.openUntil === 0, "healthy 200-empty response resets the circuit");
    _pbpDictCircuit = { failures: 1, openUntil: 0 };
    window.fetch = async () => ({ status: 404, ok: false });
    await _pbpDictFetch("en", "healthy-404", null);
    assert(_pbpDictCircuit.failures === 0 && _pbpDictCircuit.openUntil === 0, "healthy 404 resets the circuit");
    window.fetch = async () => ({ status: 200, ok: true, json: async () => { throw new SyntaxError("bad json"); } });
    try { await _pbpDictFetch("en", "bad-json", null); } catch (_) {}
    assertEq(_pbpDictCircuit.failures, 1, "invalid JSON counts as a circuit failure");

    _pbpDictCircuit = { failures: 0, openUntil: 0 };
    const bodyCtrl = new AbortController();
    let bodyStarted;
    const bodyGate = new Promise((resolve) => { bodyStarted = resolve; });
    window.fetch = async (_url, opts) => ({
      status: 200, ok: true,
      json: () => new Promise((_resolve, reject) => {
        bodyStarted();
        opts.signal.addEventListener("abort", () => reject(new DOMException("Aborted", "AbortError")), { once: true });
      })
    });
    const bodyRead = _pbpDictFetch("en", "slow-body", bodyCtrl.signal).catch((e) => e);
    await bodyGate;
    bodyCtrl.abort();
    const bodyErr = await bodyRead;
    assert(bodyErr && bodyErr.name === "AbortError", "parent abort during response JSON read stays AbortError");
    assertEq(_pbpDictCircuit.failures, 0, "in-flight parent abort during JSON read does not increment failures");
    assert(bodyCtrl.signal.aborted, "deferred JSON regression aborts only after body reading started");

    _pbpDictCircuit = { failures: 0, openUntil: 0 };
    let fetchCalls = 0;
    window.fetch = async () => { fetchCalls++; throw new TypeError("offline"); };
    const stopped = new AbortController();
    stopped.abort();
    let parentErr = null;
    try { await _pbpDictFetch("en", "closed", stopped.signal); } catch (e) { parentErr = e; }
    assert(parentErr && parentErr.name === "AbortError", "pre-aborted parent exits as AbortError");
    assertEq(_pbpDictCircuit.failures, 0, "parent abort never increments circuit failures");
    assertEq(fetchCalls, 0, "pre-aborted parent performs no fetch");

    for (let i = 0; i < 3; i++) {
      try { await _pbpDictFetch("en", "offline-" + i, null); } catch (_) {}
    }
    assertEq(fetchCalls, 3, "three network failures perform exactly three fetches");
    assertEq(_pbpDictCircuit.failures, 3, "three network failures reach the threshold");
    assert(_pbpDictCircuit.openUntil > Date.now(), "threshold opens a future cooldown window");
    let openErr = null;
    try { await _pbpDictFetch("en", "blocked", null); } catch (e) { openErr = e; }
    assert(openErr && openErr.code === "dict_circuit_open", "cooldown rejects with the circuit-open reason");
    assertEq(fetchCalls, 3, "cooldown performs no fourth fetch");
  } finally {
    window.fetch = realFetch;
    _pbpDictCircuit = { failures: 0, openUntil: 0 };
  }
}

async function runDictLookupChainTests() {
  section("dictionary exact / lowercase / lemma chain");
  const realPerm = _pbpDictHasPerm;
  const realFetch = _pbpDictFetch;
  const realCacheGet = window.pbpAiCacheGet;
  const realCacheSet = window.pbpAiCacheSet;
  const cache = new Map();
  let calls = [];
  window.pbpAiCacheGet = async (key) => cache.has(key) ? { result: cache.get(key) } : null;
  window.pbpAiCacheSet = async (key, result) => { cache.set(key, result); };
  _pbpDictHasPerm = async () => true;
  const dataFor = (word) => ({ ...FDA_SAMPLE, word, source: { ...FDA_SAMPLE.source, url: "https://en.wiktionary.org/wiki/" + encodeURIComponent(word) } });
  try {
    _pbpDictFetch = async (_lang, candidate) => {
      calls.push(candidate);
      return candidate === "défense" ? { status: 200, data: dataFor(candidate) } : { status: 200, data: { entries: [] } };
    };
    let slot = document.createElement("div");
    let result = await _pbpDictSlotRun(slot, "Défense", "fr", null, Promise.resolve("défendre"), null);
    assertEq(calls.join(" → "), "Défense → défense", "200-empty exact lookup continues to lowercase in order");
    assert(result && result.word === "défense", "lowercase candidate returns the dictionary entry");
    assert(slot.querySelector(".xp-dict-match")?.textContent === "dictMatchedHeadword:défense",
      "real lowercase lookup renders the actual matched headword");
    assert(cache.has("dict2_fr|défense"), "lowercase result is cached under its actual query key");
    assert(cache.has("dict2_fr|Défense"), "lowercase result writes an exact-form alias");

    cache.clear(); calls = [];
    _pbpDictFetch = async (_lang, candidate) => {
      calls.push(candidate);
      return candidate === "run" ? { status: 200, data: dataFor(candidate) } : { status: 200, data: { entries: [] } };
    };
    slot = document.createElement("div");
    result = await _pbpDictSlotRun(slot, "Running", "en", null, Promise.resolve("run"), null);
    assertEq(calls.join(" → "), "Running → running → run", "semantic misses continue exact to lowercase to lemma");
    assert(result && result.word === "run", "third distinct lemma can satisfy the lookup");
    assert(slot.querySelector(".xp-dict-match")?.textContent === "dictMatchedHeadword:run",
      "real lemma lookup renders the actual matched headword");

    cache.clear(); calls = [];
    _pbpDictFetch = async (_lang, candidate) => { calls.push(candidate); return { status: 200, data: { entries: [] } }; };
    slot = document.createElement("div");
    await _pbpDictSlotRun(slot, "Running", "en", null, Promise.resolve("running"), null);
    assertEq(calls.join(" → "), "Running → running", "lemma identical to a tried candidate is not requested twice");

    cache.clear(); calls = [];
    _pbpDictFetch = async (_lang, candidate) => {
      calls.push(candidate);
      if (candidate === "run") throw new TypeError("offline");
      return { status: 200, data: { entries: [] } };
    };
    slot = document.createElement("div");
    await _pbpDictSlotRun(slot, "running", "en", null, Promise.resolve("run"), null);
    assert(slot.textContent.includes("dictLoadFailed") && slot.querySelector("a").href.startsWith("https://en.wiktionary.org/"),
      "lemma network failure stays unavailable and exposes Wiktionary");

    cache.clear(); calls = [];
    _pbpDictFetch = async (_lang, candidate) => { calls.push(candidate); return { status: 404, data: null }; };
    slot = document.createElement("div");
    await _pbpDictSlotRun(slot, "ghost word", "en", null, Promise.resolve("-"), null);
    assert(slot.textContent.includes("dictNoEntry") && slot.querySelector("a").href === "https://en.wiktionary.org/wiki/ghost%20word",
      "all semantic misses end as no-entry with an encoded fixed-domain fallback");
  } finally {
    _pbpDictHasPerm = realPerm;
    _pbpDictFetch = realFetch;
    if (realCacheGet === undefined) delete window.pbpAiCacheGet; else window.pbpAiCacheGet = realCacheGet;
    if (realCacheSet === undefined) delete window.pbpAiCacheSet; else window.pbpAiCacheSet = realCacheSet;
  }
}

async function runDictPackRoutingTests() {
  section("ready CC-CEDICT routing");
  const realLoad = _pbpDictLoadPack;
  const realPerm = _pbpDictHasPerm;
  const realFetch = _pbpDictFetch;
  const realCacheGet = window.pbpAiCacheGet;
  const realCacheSet = window.pbpAiCacheSet;
  const realLookup = window.pbpPackLookup;
  const realKeys = window.pbpCedictLookupKeys;
  const realToNorm = window.pbpCedictEntryToNorm;
  const onlineData = { ...FDA_SAMPLE, word: "在线词" };
  const packNorm = { ...pbpDictNormalizeEntry(FDA_SAMPLE), word: "词", sourceLabel: "CC-CEDICT", sourceUrl: "https://cc-cedict.org/wiki/" };
  let permCalls = 0, fetchCalls = [];
  _pbpDictLoadPack = async () => true;
  _pbpDictHasPerm = async () => { permCalls++; return true; };
  _pbpDictFetch = async (_lang, candidate) => { fetchCalls.push(candidate); return { status: 200, data: onlineData }; };
  window.pbpAiCacheGet = async () => null;
  window.pbpAiCacheSet = async () => {};
  window.pbpCedictLookupKeys = (term) => [term];
  window.pbpCedictEntryToNorm = () => packNorm;
  try {
    window.pbpPackLookup = async () => ({ state: "hit", matched: "词", rows: [{}] });
    let slot = document.createElement("div");
    let result = await _pbpDictSlotRun(slot, "词", "zh", null, Promise.resolve("-"), null);
    assert(result && result.word === "词", "ready CC-CEDICT hit renders the local entry");
    assert(!slot.querySelector(".xp-dict-match"), "exact CC-CEDICT hit adds no redundant matched-headword label");
    assert(permCalls === 0 && fetchCalls.length === 0, "ready hit needs no permission or network");

    slot = document.createElement("div");
    result = await _pbpDictSlotRun(slot, "词语", "zh", null, Promise.resolve("-"), null);
    assert(slot.querySelector(".xp-dict-match")?.textContent === "dictMatchedHeadword:词",
      "real CC-CEDICT longest-prefix hit discloses the shorter matched headword");

    window.pbpPackLookup = async () => ({ state: "ready-miss" });
    permCalls = 0; fetchCalls = [];
    slot = document.createElement("div");
    result = await _pbpDictSlotRun(slot, "缺词", "zh", null, Promise.resolve("-"), null);
    assertEq(result, null, "ready CC-CEDICT miss ends locally");
    assert(slot.textContent.includes("dictNoEntry") && slot.querySelector("a").href === "https://en.wiktionary.org/wiki/%E7%BC%BA%E8%AF%8D",
      "ready miss uses the unified encoded Wiktionary fallback");
    assert(permCalls === 0 && fetchCalls.length === 0, "ready miss skips FDA permission/network without a second meta read");

    window.pbpPackLookup = async () => ({ state: "unavailable" });
    permCalls = 0; fetchCalls = [];
    slot = document.createElement("div");
    result = await _pbpDictSlotRun(slot, "在线词", "zh", null, Promise.resolve("-"), null);
    assert(result && result.word === "在线词", "missing pack may still use the online dictionary path");
    assert(permCalls === 1 && fetchCalls.join() === "在线词", "missing pack continues through permission and exact FDA request");

    window.pbpPackLookup = async () => ({ state: "error" });
    permCalls = 0; fetchCalls = [];
    slot = document.createElement("div");
    result = await _pbpDictSlotRun(slot, "故障词", "zh", null, Promise.resolve("-"), null);
    assert(result === null && slot.textContent.includes("dictLoadFailed") && slot.querySelector("a"),
      "pack lookup error stays a load failure with Wiktionary fallback");
    assert(permCalls === 0 && fetchCalls.length === 0, "pack lookup error is never disguised by an FDA retry");
  } finally {
    _pbpDictLoadPack = realLoad;
    _pbpDictHasPerm = realPerm;
    _pbpDictFetch = realFetch;
    if (realCacheGet === undefined) delete window.pbpAiCacheGet; else window.pbpAiCacheGet = realCacheGet;
    if (realCacheSet === undefined) delete window.pbpAiCacheSet; else window.pbpAiCacheSet = realCacheSet;
    if (realLookup === undefined) delete window.pbpPackLookup; else window.pbpPackLookup = realLookup;
    if (realKeys === undefined) delete window.pbpCedictLookupKeys; else window.pbpCedictLookupKeys = realKeys;
    if (realToNorm === undefined) delete window.pbpCedictEntryToNorm; else window.pbpCedictEntryToNorm = realToNorm;
  }
}

async function runDictPermissionFeedbackTests() {
  section("online dictionary permission denial feedback");
  const realPerm = _pbpDictHasPerm;
  const realCacheGet = window.pbpAiCacheGet;
  const realChrome = window.chrome;
  let requests = 0;
  _pbpDictHasPerm = async () => false;
  window.pbpAiCacheGet = async () => null;
  window.chrome = { permissions: { request: async () => { requests++; return false; } } };
  try {
    const slot = document.createElement("div");
    await _pbpDictSlotRun(slot, "word", "en", null, Promise.resolve("-"), () => {});
    const button = slot.querySelector(".xp-dict-connect");
    assert(button?.textContent === "dictConnect" && slot.textContent.includes("dictConnectHint"),
      "production permission gate explains the online dictionary before requesting access");
    button.click();
    await new Promise((resolve) => setTimeout(resolve, 0));
    const feedback = slot.querySelector('[role="status"]');
    assert(feedback && !feedback.hidden && feedback.textContent === "dictPermissionDenied" &&
      button.textContent === "dictConnectRetry" && !button.disabled,
      "permission denial is visible, announced, and leaves a retry action enabled");
    button.click();
    await new Promise((resolve) => setTimeout(resolve, 0));
    assert(requests === 2 && !button.disabled, "denied permission can be retried through the same production action");
  } finally {
    _pbpDictHasPerm = realPerm;
    if (realCacheGet === undefined) delete window.pbpAiCacheGet; else window.pbpAiCacheGet = realCacheGet;
    if (realChrome === undefined) delete window.chrome; else window.chrome = realChrome;
  }
}

async function runDictNoAiAndSavedStateTests() {

  const previousOwner = _pbpDictOwner;
  _pbpDictResolveLang = async () => "en";
  _pbpDictSlotRun = async () => pbpDictNormalizeEntry(FDA_SAMPLE);

async function runVocabIdbTests() {
  section("pbp-vocab IDB (runtime)");
  await new Promise((r) => { const del = indexedDB.deleteDatabase("pbp-vocab"); del.onsuccess = del.onerror = del.onblocked = r; });
  const ctx1 = { quote: "q1", articleUrl: "u1", articleTitle: "t1", highlightId: null, createdAt: 1 };
  const e1 = await pbpVocabSaveWord("acct_a", { term: "Running", language: "en-US", gloss: "g1", ipa: "", sourceUrl: "https://en.wiktionary.org/wiki/run", license: "CC BY-SA 4.0", context: ctx1 });
  assert(e1 && e1.id === "acct_a|en|running", "save creates owner-scoped id");
  assert(Array.isArray(e1.groups) && e1.groups.length === 0, "new vocab records default to an empty groups array");
  assertEq(e1 && e1.sourceUrl, "https://en.wiktionary.org/wiki/run", "attribution saved WITHOUT ipa (independent merge)");
  const e2 = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", context: { ...ctx1 } });
  assertEq(e2.contexts.length, 1, "same url+quote deduped");
  assertEq(e2.gloss, "g2", "latest gloss wins");
  // A re-save carrying NEW attribution (e.g. a re-lookup that landed on
  // CC-CEDICT instead of Wiktionary) must overwrite BOTH sourceUrl and
  // license as a pair, not just fill them when empty -- otherwise the old
  // Wiktionary line survives into a CC-CEDICT-attributed export.
  const e2b = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", sourceUrl: "https://cc-cedict.org/wiki/", license: "CC BY-SA 4.0 (CC-CEDICT)", context: { ...ctx1 } });
  assertEq(e2b.sourceUrl, "https://cc-cedict.org/wiki/", "re-save overwrites sourceUrl with the latest lookup's attribution");
  assertEq(e2b.license, "CC BY-SA 4.0 (CC-CEDICT)", "re-save overwrites license with the latest lookup's attribution");
  const e2c = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "g2", license: "MIT", context: { ...ctx1 } });
  assert(e2c.license === "MIT" && e2c.sourceUrl === null, "one-sided attribution nulls the other side (no mixed attribution)");
  const e3 = await pbpVocabSaveWord("acct_a", { term: "running", language: "en", gloss: "", context: { ...ctx1, articleUrl: "u2" } });
  assertEq(e3.contexts.length, 2, "second article context appended");
  const got = await pbpVocabGet("acct_a|en|running");
  assert(got && got.contexts.length === 2 && got.gloss === "g2", "pbpVocabGet returns the merged record by id");
  assertEq(await pbpVocabGet("acct_a|en|missing"), null, "pbpVocabGet miss resolves null");
  await pbpVocabSaveWord("acct_b", { term: "running", language: "en", gloss: "other-account", context: ctx1 });
  const aRows = await pbpVocabAll("acct_a");
  const bRows = await pbpVocabAll("acct_b");
  assertEq(aRows.length, 1, "owner filter: acct_a sees 1");
  assertEq(bRows.length, 1, "owner filter: acct_b sees 1");
  assert(aRows[0].gloss !== "other-account", "no cross-account leak");
  await new Promise((r) => setTimeout(r, 5)); // Date.now() must differ for the sort assertion
  await pbpVocabSaveWord("acct_a", { term: "walk", language: "en", gloss: "gw", context: ctx1 });
  const sorted = await pbpVocabAll("acct_a");
  assertEq(sorted.length, 2, "second word saved for sort check");
  assertEq(sorted[0].term, "walk", "pbpVocabAll sorts newest updatedAt first");
  assert(await pbpVocabDelete("acct_a|en|walk", "acct_a"), "cleanup sort-check word");
  assertEq(await pbpVocabDelete("acct_a|en|ghost", "acct_a"), true, "delete of a missing id is idempotent-true (UI treats it as done)");
  const badDel = await pbpVocabDelete(aRows[0].id, "acct_wrong");
  assert(badDel === false, "delete with wrong owner resolves false");
  assertEq((await pbpVocabAll("acct_a")).length, 1, "wrong-owner delete leaves the record in place");
  const okDel = await pbpVocabDelete(aRows[0].id, "acct_a");
  assert(okDel === true, "delete resolves true on tx complete");
  assertEq((await pbpVocabAll("acct_a")).length, 0, "deleted row gone");
  assertEq((await pbpVocabAll("acct_b")).length, 1, "other owner untouched");

  await pbpVocabSaveWord("acct_a", { term: "alpha", language: "en", gloss: "ga", context: ctx1 });
  await pbpVocabSaveWord("acct_a", { term: "beta", language: "en", gloss: "gb", context: ctx1 });
  const groupIds = (await pbpVocabAll("acct_a")).map((row) => row.id);
  const otherId = (await pbpVocabAll("acct_b"))[0].id;
  assertEq(pbpVocabNormalizeGroupName("  Study   List  "), "Study List", "group names NFC-trim and collapse whitespace");
  assertEq(pbpVocabGroups({ groups: undefined }).length, 0, "legacy record without groups reads as an empty array");
  assert(await pbpVocabBatchAddGroup(groupIds, "acct_a", " Study   List "), "batch add-group resolves true on transaction completion");
  assert((await pbpVocabAll("acct_a")).every((row) => row.groups.includes("Study List")), "batch add-group updates every selected owner record");
  assert(await pbpVocabBatchAddGroup(groupIds, "acct_a", "Study List"), "adding an existing group is idempotent-success");
  assert((await pbpVocabAll("acct_a")).every((row) => row.groups.filter((g) => g === "Study List").length === 1), "batch add-group never duplicates a group name");
  assertEq(await pbpVocabBatchAddGroup([groupIds[0], otherId], "acct_a", "Wrong"), false, "cross-owner batch add aborts");
  assert(!(await pbpVocabAll("acct_a")).some((row) => row.groups.includes("Wrong")), "aborted add-group leaves every owner record unchanged");
  assertEq(await pbpVocabBatchDelete([groupIds[0], otherId], "acct_a"), false, "cross-owner batch delete aborts");
  assertEq((await pbpVocabAll("acct_a")).length, 2, "aborted batch delete leaves all selected owner records");
  assert(await pbpVocabBatchDelete(groupIds, "acct_a"), "same-owner batch delete resolves true on transaction completion");
  assertEq((await pbpVocabAll("acct_a")).length, 0, "same-owner batch delete removes the complete selection");
  assertEq((await pbpVocabAll("acct_b")).length, 1, "batch mutations never touch the other owner");
}

  await runDictNetworkTests();
  await runDictLookupChainTests();
  await runDictPackRoutingTests();
  await runDictPermissionFeedbackTests();
  await runDictNoAiAndSavedStateTests();
  await runVocabIdbTests();
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
})();
</script>
