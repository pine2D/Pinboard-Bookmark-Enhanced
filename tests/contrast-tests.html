<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Popup Contrast Tests</title>
<link rel="stylesheet" href="../popup.css">
<style>
  .case.pass { color: #0a0; }
  .case.fail { color: #c00; font-weight: bold; }
</style>
</head>
<body>
<div id="results"></div>
<!-- Render each probe inside its real container so getComputedStyle resolves
     the shipped color + the inherited/declared background. -->
<div class="offline-queue-list"><div class="offline-queue-empty" id="oqe">empty</div></div>
<div class="autocomplete-dropdown">
  <div class="ac-item"><span>tag</span><span class="ac-count" id="acc">12</span></div>
  <div class="ac-hint-footer" id="ach">hint</div>
</div>
<script>
function pass(name){const d=document.createElement("div");d.className="case pass";d.textContent="OK "+name;document.getElementById("results").appendChild(d);}
function fail(name,msg){const d=document.createElement("div");d.className="case fail";d.textContent="X "+name+" :: "+msg;document.getElementById("results").appendChild(d);}
function test(name,fn){try{fn();pass(name);}catch(e){fail(name,e.message);}}

// WCAG relative-luminance contrast (same formula as tools/contrast-audit.mjs).
function _rgb(s){
  const m = s.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if (!m) throw new Error("not an rgb() color: " + s);
  return [+m[1], +m[2], +m[3]];
}
function _lum(c){
  const f = v => { v/=255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
  return 0.2126*f(c[0]) + 0.7152*f(c[1]) + 0.0722*f(c[2]);
}
function ratio(fg, bg){
  const a=_lum(_rgb(fg)), b=_lum(_rgb(bg));
  const hi=Math.max(a,b), lo=Math.min(a,b);
  return (hi+0.05)/(lo+0.05);
}
// Walk up to the first element with a non-transparent background-color.
function effectiveBg(el){
  for (let n=el; n; n=n.parentElement){
    const bg = getComputedStyle(n).backgroundColor;
    if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") return bg;
  }
  return "rgb(255, 255, 255)";
}

test("I1 .offline-queue-empty >= AA 4.5:1", () => {
  const el = document.getElementById("oqe");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("contrast " + r.toFixed(2) + ":1 < 4.5:1");
});
test("I2 .ac-count >= AA 4.5:1", () => {
  const el = document.getElementById("acc");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("contrast " + r.toFixed(2) + ":1 < 4.5:1");
});
test("I2 .ac-hint-footer >= AA 4.5:1", () => {
  const el = document.getElementById("ach");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("contrast " + r.toFixed(2) + ":1 < 4.5:1");
});
test("I3 solarized-light --pp-fg meets AA on --pp-bg", () => {
  document.documentElement.setAttribute("data-theme", "solarized-light");
  try {
    const s = getComputedStyle(document.documentElement);
    const fg = s.getPropertyValue("--pp-fg").trim();
    const bg = s.getPropertyValue("--pp-bg").trim();
    if (!fg || !bg) throw new Error("CSS vars not resolved (fg=" + fg + " bg=" + bg + ")");
    // Create a probe element so the browser resolves the vars to rgb()
    const probe = document.createElement("div");
    probe.style.color = "var(--pp-fg)";
    probe.style.backgroundColor = "var(--pp-bg)";
    probe.style.position = "fixed";
    probe.style.visibility = "hidden";
    document.body.appendChild(probe);
    const cs = getComputedStyle(probe);
    const fgRgb = cs.color;
    const bgRgb = cs.backgroundColor;
    document.body.removeChild(probe);
    const r = ratio(fgRgb, bgRgb);
    if (r < 4.5) throw new Error("contrast " + r.toFixed(3) + ":1 < 4.5:1 (fg=" + fg + " bg=" + bg + ")");
  } finally {
    document.documentElement.removeAttribute("data-theme");
  }
});

// ---- F1: default-dark layer (html.dark) AA — the hand-maintained layer the
// factory does NOT generate. Mirrors tools/contrast-audit.mjs's html.dark probe.
// Run each probe with html.dark set so the shipped dark rules + token palette apply.
function withDark(fn){
  document.documentElement.classList.add("dark");
  try { return fn(); } finally { document.documentElement.classList.remove("dark"); }
}
// Resolve a (color-var, bg-var) pair to its shipped rgb() under the current root.
function varPairRatio(fgVar, bgVar){
  const probe = document.createElement("div");
  probe.style.color = "var(" + fgVar + ")";
  probe.style.backgroundColor = "var(" + bgVar + ")";
  probe.style.position = "fixed";
  probe.style.visibility = "hidden";
  document.body.appendChild(probe);
  const cs = getComputedStyle(probe);
  const fgRgb = cs.color, bgRgb = cs.backgroundColor;
  document.body.removeChild(probe);
  if (!/^rgb/.test(bgRgb) || bgRgb === "rgba(0, 0, 0, 0)") throw new Error(bgVar + " did not resolve (" + bgRgb + ")");
  return ratio(fgRgb, bgRgb);
}
test("F1 dark .ac-count >= AA 4.5:1", () => withDark(() => {
  const el = document.getElementById("acc");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("dark contrast " + r.toFixed(2) + ":1 < 4.5:1");
}));
test("F1 dark .ac-hint-footer >= AA 4.5:1", () => withDark(() => {
  const el = document.getElementById("ach");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("dark contrast " + r.toFixed(2) + ":1 < 4.5:1");
}));
test("F1 dark .offline-queue-empty >= AA 4.5:1", () => withDark(() => {
  const el = document.getElementById("oqe");
  const r = ratio(getComputedStyle(el).color, effectiveBg(el));
  if (r < 4.5) throw new Error("dark contrast " + r.toFixed(2) + ":1 < 4.5:1");
}));
// Token-tier probes against the strictest surface each tier lands on (bg2=#252525).
test("F1 dark --pp-fg-hint meets AA on --pp-bg2", () => withDark(() => {
  const r = varPairRatio("--pp-fg-hint", "--pp-bg2");
  if (r < 4.5) throw new Error("fg-hint on bg2 " + r.toFixed(2) + ":1 < 4.5:1");
}));
test("F1 dark --pp-fg-muted meets AA on --pp-bg2", () => withDark(() => {
  const r = varPairRatio("--pp-fg-muted", "--pp-bg2");
  if (r < 4.5) throw new Error("fg-muted on bg2 " + r.toFixed(2) + ":1 < 4.5:1");
}));
test("F1 dark --pp-fg meets AA on --pp-bg", () => withDark(() => {
  const r = varPairRatio("--pp-fg", "--pp-bg");
  if (r < 4.5) throw new Error("fg on bg " + r.toFixed(2) + ":1 < 4.5:1");
}));
</script>
</body></html>
