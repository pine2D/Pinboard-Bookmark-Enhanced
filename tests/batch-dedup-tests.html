<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Batch Progress Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
</style></head>
<body>
<h1>Batch progress and liveness tests</h1>
<div id="results"></div>
<script src="../shared.js"></script>
<script>
async function test(name, fn) {
  let ok = true;
  let detail = "";
  try { await fn(); }
  catch (e) { ok = false; detail = "\n  " + e.message; }
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"} ${name}${detail}`;
  document.getElementById("results").appendChild(div);
}

function assert(condition, message) {
  if (!condition) throw new Error(message || "assertion failed");
}

function equal(actual, expected, message) {
  if (actual !== expected) throw new Error(`${message || "values differ"}: ${actual} !== ${expected}`);
}

let popupBatchSource;
async function getPopupBatchProgressSource() {
  if (popupBatchSource) return popupBatchSource;
  const source = await (await fetch("../popup-batch.js")).text();
  const start = source.indexOf("function renderBatchProgress");
  const end = source.indexOf("// ---- Tag Presets ----", start);
  assert(start >= 0 && end > start, "batch progress source block not found");
  popupBatchSource = source.slice(start, end);
  return popupBatchSource;
}

function fakeElement() {
  const classes = new Set(["hidden"]);
  return {
    disabled: false,
    innerHTML: "",
    style: {},
    attributes: {},
    classList: {
      add: (name) => classes.add(name),
      remove: (name) => classes.delete(name),
      contains: (name) => classes.has(name),
    },
    setAttribute(name, value) { this.attributes[name] = value; },
  };
}

async function createUiHarness(storedProgress, now) {
  const elements = {
    "batch-bookmark-btn": fakeElement(),
    "batch-progress": fakeElement(),
    "batch-progress-fill": fakeElement(),
    "batch-progress-text": fakeElement(),
  };
  const statuses = [];
  const chromeStub = {
    storage: {
      onChanged: { addListener: () => {} },
      local: { get: async () => ({ batch_progress: storedProgress }) },
    },
  };
  const source = await getPopupBatchProgressSource();
  const factory = new Function(
    "$id", "PBP_ICONS", "t", "showStatus", "setBtnIcon", "setTimeout",
    "chrome", "batchIsRunning", "BATCH_STALE_TTL", "Date",
    source + "\nreturn { renderBatchProgress, wireBatchProgress };"
  );
  const api = factory(
    (id) => elements[id] || null,
    PBP_ICONS,
    (key, ...args) => args.length ? `${key}:${args.join(":")}` : key,
    (id, message, kind) => statuses.push({ id, message, kind }),
    (button, _icon, label) => { button.label = label; },
    () => 0,
    chromeStub,
    batchIsRunning,
    BATCH_STALE_TTL,
    { now: () => now }
  );
  return { ...api, elements, statuses };
}

(async () => {
  await test("running + fresh ts -> true", () => {
    equal(batchIsRunning({ running: true, done: false, ts: 1000 }, 1500, 120000), true);
  });

  await test("running but stale ts -> false", () => {
    equal(batchIsRunning({ running: true, done: false, ts: 1000 }, 200000, 120000), false);
  });

  await test("done -> false even if ts fresh", () => {
    equal(batchIsRunning({ running: true, done: true, ts: 1000 }, 1500, 120000), false);
  });

  await test("missing progress -> false", () => {
    equal(batchIsRunning(undefined, 1500, 120000), false);
  });

  await test("missing ttl uses BATCH_STALE_TTL", () => {
    equal(batchIsRunning({ running: true, done: false, ts: 1000 }, 120000), true);
  });

  await test("running progress renders queued count", async () => {
    const h = await createUiHarness(null, 5000);
    h.renderBatchProgress({ running: true, done: false, total: 4, i: 2, saved: 1, queued: 1, failed: 0 });
    assert(h.elements["batch-progress-text"].innerHTML.includes("offlineQueued:1"), "queued count missing from running view");
    equal(h.elements["batch-bookmark-btn"].disabled, true);
  });

  await test("all-queued completion is informational", async () => {
    const h = await createUiHarness(null, 5000);
    h.renderBatchProgress({ running: false, done: true, total: 2, saved: 0, queued: 2, failed: 0, skipped: 0, tooLong: 0 });
    equal(h.statuses[0].kind, "info");
    assert(h.statuses[0].message.includes("offlineQueued:2"), "queued count missing from completion status");
  });

  await test("all-skipped completion is informational", async () => {
    const h = await createUiHarness(null, 5000);
    h.renderBatchProgress({ running: false, done: true, total: 3, saved: 0, queued: 0, failed: 0, skipped: 3, tooLong: 0 });
    equal(h.statuses[0].kind, "info");
    assert(h.statuses[0].message.includes("batchSkipped:3"), "skipped count missing from completion status");
  });

  await test("actual item failure renders error", async () => {
    const h = await createUiHarness(null, 5000);
    h.renderBatchProgress({ running: false, done: true, total: 2, saved: 1, queued: 0, failed: 1, skipped: 0, tooLong: 0 });
    equal(h.statuses[0].kind, "error");
    const oversized = await createUiHarness(null, 5000);
    oversized.renderBatchProgress({ running: false, done: true, total: 1, saved: 0, queued: 0, failed: 0, skipped: 0, tooLong: 1 });
    equal(oversized.statuses[0].kind, "error", "oversized item is a failed outcome");
  });

  await test("reopen restores fresh running/done progress but ignores stale done", async () => {
    const freshRunning = await createUiHarness({ running: true, done: false, total: 3, i: 1, queued: 1, ts: 4500 }, 5000);
    freshRunning.wireBatchProgress();
    await Promise.resolve(); await Promise.resolve();
    assert(freshRunning.elements["batch-progress-text"].innerHTML.includes("offlineQueued:1"), "fresh running progress not restored");

    const freshDone = await createUiHarness({ running: false, done: true, total: 2, saved: 0, queued: 2, failed: 0, ts: 4500 }, 5000);
    freshDone.wireBatchProgress();
    await Promise.resolve(); await Promise.resolve();
    equal(freshDone.statuses[0].kind, "info", "fresh completion not restored");

    const staleDone = await createUiHarness({ running: false, done: true, total: 2, saved: 0, queued: 2, failed: 0, ts: 1 }, 200000);
    staleDone.wireBatchProgress();
    await Promise.resolve(); await Promise.resolve();
    equal(staleDone.statuses.length, 0, "stale completion should stay hidden");
  });
})();
</script>
</body></html>
