<html><head><meta charset="UTF-8"><title>md-convert Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; }
.fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>md-convert.js tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../vendor/turndown.js"></script>
<script src="../vendor/marked.min.js"></script>
<script src="../vendor/purify.min.js"></script>
<script src="../vendor/highlight.min.js"></script>
<script src="../vendor/katex/katex.min.js"></script>
<script src="../vendor/katex/auto-render.min.js"></script>

<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond;
  ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
// normalize whitespace for resilient HTML substring checks
const norm = (h) => h.replace(/\s+/g, " ").trim();

// ---- P2+ harness helpers (wrap check() so plan code blocks run verbatim) ----
function section(name) {
  const h = document.createElement("h2");
  h.textContent = name;
  root.appendChild(h);
}
function assert(cond, detail) {
  check(detail || String(cond), cond, detail);
}
function assertEq(actual, expected, label) {
  const ok = actual === expected;
  check(label || (String(expected) + " === " + String(actual)), ok,
    ok ? "" : "expected " + JSON.stringify(expected) + " got " + JSON.stringify(actual));
}

// ---- Regression: the FOUR old renderMarkdown defects are now correct ----

// 1. Nested list must NOT be flattened.
(() => {
  const h = norm(renderMarkdown("- a\n  - b\n  - c\n- d"));
  // a <ul> nested inside an <li> proves nesting survived
  check("nested list keeps nesting", /<li>a\s*<ul>/.test(h), h);
})();

// 2. Multi-line blockquote -> one blockquote, both lines, not a literal newline in one <p>.
(() => {
  const h = norm(renderMarkdown("> line one\n> line two"));
  const oneBq = (h.match(/<blockquote>/g) || []).length === 1;
  check("multi-line blockquote merges", oneBq && /line one/.test(h) && /line two/.test(h), h);
})();

// 3. ** inside inline code must stay literal (not become <strong>).
(() => {
  const h = norm(renderMarkdown("use `a**b**c` here"));
  check("** inside inline code stays literal", /<code>a\*\*b\*\*c<\/code>/.test(h) && !/<strong>/.test(h), h);
})();

// 4. GFM task list [x] -> checked checkbox that survives DOMPurify.
(() => {
  const h = norm(renderMarkdown("- [x] done\n- [ ] todo"));
  const hasInput = /<input[^>]*type="checkbox"/.test(h);
  const hasChecked = /<input[^>]*checked/.test(h);
  check("task list renders checkbox input", hasInput && hasChecked, h);
})();

// ---- Heading slug id (renderer + slugify), incl CJK ----
(() => {
  const h = norm(renderMarkdown("## Hello World\n\n## 中文 标题"));
  check("heading gets slug id", /<h2 id="hello-world">/.test(h), h);
  check("heading slug keeps CJK", /<h2 id="中文-标题">/.test(h), h);
})();

// ---- Dedup smoke: htmlToMarkdown exists once and both contexts use the SAME global ----
(() => {
  check("htmlToMarkdown is a single global function",
    typeof htmlToMarkdown === "function", "typeof = " + typeof htmlToMarkdown);
  check("markdownToPlainText moved here (single global)",
    typeof markdownToPlainText === "function", "typeof = " + typeof markdownToPlainText);
  // round-trip proves the consolidated Turndown rules are live in this one definition
  const md = htmlToMarkdown("<h1>Title</h1><pre><code class=\"language-js\">x=1</code></pre><table><tr><th>A</th></tr><tr><td>1</td></tr></table>", { baseUrl: "https://e.com" });
  check("htmlToMarkdown emits atx heading", /^# Title/m.test(md), md);
  check("htmlToMarkdown emits fenced code with lang", /```js\n/.test(md), md);
  check("htmlToMarkdown emits pipe table", /\|\s*A\s*\|/.test(md) && /\|\s*---\s*\|/.test(md), md);
})();

// ---- Security: renderMarkdown is the lone sanitize point (XSS closed) ----
(() => {
  const s = norm(renderMarkdown("a <script>alert(1)<\/script> b"));
  check("renderMarkdown strips <script>", !/<script/i.test(s) && !/alert\(1\)/.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('text <img src="x" onerror="alert(1)"> end'));
  check("renderMarkdown strips img onerror", /<img/i.test(s) && !/onerror/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("[x](javascript:alert(1))"));
  check("renderMarkdown neutralizes javascript: link", !/javascript:/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("<iframe src=\"https://evil\"></iframe>"));
  check("renderMarkdown drops iframe", !/<iframe/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('<a href="javascript:void(document.cookie)">raw</a>'));
  check("renderMarkdown neutralizes raw <a> javascript: href", !/javascript:/i.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown("[ok](https://example.com)"));
  check("renderMarkdown safe link gets target+rel", /rel="noopener noreferrer"/.test(s) && /target="_blank"/.test(s), s);
})();

// ---- D1-1/D1-2: sanitize hardening (id-clobber + input allowlist) ----
(() => {
  const s = norm(renderMarkdown('before <input type="text" id="ask-input" value="x"> after'));
  check("renderMarkdown drops non-checkbox <input> but KEEPS sibling text (NodeIterator survives removeChild)",
    !/<input/i.test(s) && /before/.test(s) && /after/.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('<div id="ask-input">x</div>'));
  check("renderMarkdown keeps non-heading element but strips clobber id",
    /<div>x<\/div>/.test(s) && !/id="ask-input"/.test(s), s);
})();
(() => {
  const s = norm(renderMarkdown('<a id="ask-input" href="https://e.com">x</a>'));
  check("renderMarkdown strips id from <a> but keeps href + target/rel",
    !/id="ask-input"/.test(s) && /href="https:\/\/e\.com"/.test(s) &&
    /target="_blank"/.test(s) && /rel="noopener noreferrer"/.test(s), s);
})();
(() => {
  const h = norm(renderMarkdown("## Hello World"));
  check("renderMarkdown keeps id on real heading (h1-h6 exempt from id-strip)",
    /<h2 id="hello-world">/.test(h), h);
})();
(() => {
  // TOC fragment anchor must still resolve after the id-strip hardening.
  const md = "## Hello World\n\n[jump](#hello-world)";
  const { headings } = buildToc(md, { minLevel: 2, maxLevel: 4 });
  const fixture = document.createElement("div");
  fixture.innerHTML = renderMarkdown(md);
  check("buildToc slug still resolves to a rendered heading id after hardening",
    headings.length === 1 && fixture.querySelector("#" + headings[0].slug) !== null,
    JSON.stringify(headings) + " | " + fixture.innerHTML);
})();
(() => {
  const h = norm(renderMarkdown("- [ ] a\n- [x] b"));
  const inputs = h.match(/<input[^>]*>/g) || [];
  check("renderMarkdown emits 2 task-list checkboxes", inputs.length === 2, h);
  check("every surviving checkbox is forced disabled",
    inputs.length > 0 && inputs.every((tag) => /disabled/.test(tag)), h);
  check("every surviving checkbox keeps type=checkbox",
    inputs.length > 0 && inputs.every((tag) => /type="checkbox"/.test(tag)), h);
})();
(() => {
  // regression: fragment hrefs stay same-tab (no target/rel), unaffected by the
  // afterSanitizeAttributes refactor (early-return removed to let id-strip run).
  const s = norm(renderMarkdown("## Section\n\n[jump](#section)"));
  const aTag = (s.match(/<a[^>]*href="#section"[^>]*>/) || [""])[0];
  check("renderMarkdown fragment link keeps no target/rel",
    !!aTag && !/target=/.test(aTag) && !/rel=/.test(aTag), s);
})();

// ---- END of existing tests ----

  // ---- safeFilename (shared download helper) ----
  section("safeFilename");
  (() => {
    assertEq(safeFilename("a:b/c*d"), "a_b_c_d", "punctuation -> underscore");
    assertEq(safeFilename("标题 x"), "标题 x", "keeps CJK and spaces");
    assertEq(safeFilename(""), "untitled", "empty -> untitled");
    assertEq(safeFilename("x".repeat(100)).length, 80, "caps at 80 chars");
    assert(typeof downloadFile === "function", "downloadFile is a shared global");
  })();

</script>

<script>
  // ---- buildObsidianUri (obsidian://new URI builder) ----
  section("buildObsidianUri");
  (() => {
    try {
      assertEq(buildObsidianUri({ name: "My Note" }), "obsidian://new?file=My%20Note", "basic name");
      assertEq(buildObsidianUri({ name: "N", folder: "Clips" }), "obsidian://new?file=Clips%2FN", "folder joined, slash encoded");
      assertEq(buildObsidianUri({ name: "N", folder: "/a/b/" }), "obsidian://new?file=a%2Fb%2FN", "folder slashes trimmed");
      assert(/&vault=My%20Vault/.test(buildObsidianUri({ name: "N", vault: "My Vault" })), "vault encoded");
      const clip = buildObsidianUri({ name: "N", clipboard: true });
      assert(/&clipboard/.test(clip) && !/&content=/.test(clip), "clipboard mode: &clipboard, no &content");
      const cont = buildObsidianUri({ name: "N", clipboard: false, content: "# Hi & bye" });
      assert(/&content=%23%20Hi%20%26%20bye/.test(cont) && !/&clipboard/.test(cont), "content mode: encoded &content, no &clipboard");
      assertEq(buildObsidianUri({}), "obsidian://new?file=Untitled", "empty opts -> Untitled");
    } catch (e) {
      assert(false, "buildObsidianUri threw: " + e.message);
    }
  })();
</script>

<script>
  section("P2.1 applyFrontmatter / yamlString");

  // yamlString escapes quotes, colons, newlines
  assertEq(yamlString('Plain title'), '"Plain title"', "wraps plain in quotes");
  assertEq(yamlString('Has: colon'), '"Has: colon"', "quotes colon");
  assertEq(yamlString('Quote "x"'), '"Quote \\"x\\""', "escapes inner quotes");
  assertEq(yamlString('Line1\nLine2'), '"Line1\\nLine2"', "escapes newline");

  // Full block with all fields
  const fm1 = applyFrontmatter("# Body\n", {
    title: 'A: "quoted"',
    url: "https://e.com/p",
    date: "2026-06-03",
    tags: ["dev", "go"],
    source: "defuddle",
    description: "Desc: with colon"
  }, {});
  assert(fm1.startsWith("---\n"), "starts with fence");
  assert(fm1.includes('title: "A: \\"quoted\\""'), "title escaped");
  assert(fm1.includes("url: https://e.com/p"), "url bare");
  assert(fm1.includes("date: 2026-06-03"), "date bare");
  assert(fm1.includes("tags: [dev, go]"), "tags inline array");
  assert(fm1.includes("source: defuddle"), "source bare");
  assert(fm1.includes('description: "Desc: with colon"'), "description escaped");
  assert(fm1.includes("\n---\n\n# Body"), "closes fence then body");

  // description omitted when absent
  const fm2 = applyFrontmatter("body", { title: "T", url: "u", date: "d", tags: [], source: "jina" }, {});
  assert(!fm2.includes("description:"), "no description field when absent");
  assert(fm2.includes("tags: []"), "empty tags renders empty array");

  // fields option restricts + orders output
  const fm3 = applyFrontmatter("body", { title: "T", url: "u", date: "d", tags: ["a"], source: "x" }, { fields: ["url", "title"] });
  const lines3 = fm3.split("\n");
  assertEq(lines3[1], "url: u", "field order honored (url first)");
  assertEq(lines3[2], 'title: "T"', "field order honored (title second)");
  assert(!fm3.includes("source:"), "excluded field absent");
</script>

<script>
  section("P2.2 applyImagePolicy");
  const base = "https://e.com/blog/post/";

  // keep: absolutize relative src, leave absolute untouched
  const keep = applyImagePolicy("![a](pics/x.png) ![b](https://cdn.io/y.png) ![c](/z.png)", { policy: "keep", baseUrl: base });
  assert(keep.includes("![a](https://e.com/blog/post/pics/x.png)"), "relative src absolutized");
  assert(keep.includes("![b](https://cdn.io/y.png)"), "absolute src untouched");
  assert(keep.includes("![c](https://e.com/z.png)"), "root-relative src absolutized");

  // alt: ![alt](url) -> alt text; drop image entirely when no alt
  const alt = applyImagePolicy("see ![my pic](pics/x.png) and ![](pics/y.png) end", { policy: "alt", baseUrl: base });
  assert(alt.includes("see my pic and  end"), "alt kept, empty-alt image removed: " + alt);
  assert(!alt.includes("!["), "no image syntax remains");

  // strip: remove all images
  const strip = applyImagePolicy("a ![x](pics/x.png) b ![y](z.png) c", { policy: "strip", baseUrl: base });
  assert(!strip.includes("!["), "no images remain");
  assert(strip.includes("a ") && strip.includes(" b ") && strip.includes(" c"), "surrounding text intact: " + strip);

  // invalid/unparseable relative src under keep is left as-is (no throw)
  const safe = applyImagePolicy("![a](::::)", { policy: "keep", baseUrl: base });
  assert(safe.includes("![a]("), "unparseable src does not throw and is preserved");
</script>

<script>
  section("P2.3 buildToc");

  const tocMd = [
    "# Title (h1 skipped)",
    "## First Section",
    "text",
    "### Sub A",
    "#### Deep",
    "##### Too deep (skipped, >maxLevel)",
    "```",
    "## Fake heading in code",
    "```",
    "## 中文 标题"
  ].join("\n");

  const { tocMarkdown, headings } = buildToc(tocMd, { minLevel: 2, maxLevel: 4 });

  // h1 excluded (below minLevel), h5 excluded (above maxLevel), fenced heading skipped
  assertEq(headings.length, 4, "4 headings in range: " + JSON.stringify(headings.map(h => h.text)));
  assertEq(headings[0].text, "First Section", "first heading text");
  assertEq(headings[0].level, 2, "first heading level");
  assertEq(headings[0].slug, "first-section", "slug uses P1 slugify");
  assertEq(headings[1].text, "Sub A", "nested heading text");
  assertEq(headings[3].text, "中文 标题", "CJK heading captured");
  assertEq(headings[3].slug, "中文-标题", "CJK slug preserves CJK (P1 slugify)");
  assert(!headings.some(h => h.text.includes("Fake heading")), "fenced code heading skipped");

  // tocMarkdown is a nested bullet list under "## Contents", indented by (level-minLevel)
  assert(tocMarkdown.startsWith("## Contents\n"), "TOC header present");
  assert(tocMarkdown.includes("- [First Section](#first-section)"), "top-level entry, no indent");
  assert(tocMarkdown.includes("  - [Sub A](#sub-a)"), "level-3 entry indented 2 spaces");
  assert(tocMarkdown.includes("    - [Deep](#deep)"), "level-4 entry indented 4 spaces");

  // empty input -> empty toc, empty headings
  const none = buildToc("just a paragraph", {});
  assertEq(none.headings.length, 0, "no headings");
  assertEq(none.tocMarkdown, "", "empty tocMarkdown when no headings");
</script>

<script>
  section("P2.4 readingStats");

  // Pure Latin: markdown markup stripped first, word count from plain text
  const lat = readingStats("# Heading\n\n**Hello** world this is a [link](http://x) test.");
  assertEq(lat.words, 8, "latin word count after markdownToPlainText (Heading Hello world this is a link test): " + JSON.stringify(lat));
  assertEq(lat.cjkChars, 0, "no CJK chars");
  assertEq(lat.minutes, 1, "ceil(8/200 + 0/350) = 1");

  // CJK: counted per character, not per whitespace word
  const cjk = readingStats("这是一段中文文本");
  assertEq(cjk.cjkChars, 8, "8 CJK chars");
  assertEq(cjk.words, 0, "no latin words");
  assertEq(cjk.minutes, 1, "ceil(0 + 8/350) = 1");

  // Mixed: latin words + CJK chars combine in minutes
  const mixed = readingStats("hello 世界 world 测试 done");
  assertEq(mixed.words, 3, "3 latin words (hello world done)");
  assertEq(mixed.cjkChars, 4, "4 CJK chars (世界测试)");
  assertEq(mixed.minutes, 1, "ceil(3/200 + 4/350)=1");

  // Larger volume crosses minute boundary
  const big = readingStats(Array(420).fill("word").join(" "));
  assertEq(big.words, 420, "420 words");
  assertEq(big.minutes, 3, "ceil(420/200)=3");

  // Empty
  const empty = readingStats("");
  assertEq(empty.words, 0, "empty words");
  assertEq(empty.cjkChars, 0, "empty cjk");
  assertEq(empty.minutes, 0, "empty minutes 0");

  section("P2.4b readingProgressPercent");
  assertEq(readingProgressPercent(0, 1000, 3000), 0, "top of article -> 0%");
  assertEq(readingProgressPercent(1000, 1000, 3000), 50, "halfway through scrollable range -> 50%");
  assertEq(readingProgressPercent(2000, 1000, 3000), 100, "bottom of scrollable range -> 100%");
  assertEq(readingProgressPercent(-100, 1000, 3000), 0, "negative scroll clamps to 0%");
  assertEq(readingProgressPercent(5000, 1000, 3000), 100, "overscroll clamps to 100%");
  assertEq(readingProgressPercent(0, 1000, 800), 100, "non-scrollable article is already complete");
</script>

<script>
  section("P2.5 composeExport");

  const cmeta = {
    title: "My Post",
    url: "https://e.com/blog/post/",
    date: "2026-06-03",
    tags: ["dev"],
    source: "defuddle"
  };
  const cmd = "## Section One\n\n![pic](pics/x.png)\n\n### Section Two\n\nbody text";

  // All on: frontmatter at top, TOC after frontmatter & before body, images absolutized
  const full = composeExport(cmd, cmeta, { frontmatter: true, imagePolicy: "keep", includeToc: true });
  assert(full.startsWith("---\n"), "frontmatter first");
  const afterFm = full.split("\n---\n\n")[1] || full;
  assert(afterFm.indexOf("## Contents") < afterFm.indexOf("## Section One"), "TOC before body");
  assert(full.includes("![pic](https://e.com/blog/post/pics/x.png)"), "image absolutized via baseUrl=url");

  // All off: raw body only, no frontmatter, no TOC, images untouched (keep is default off path)
  const bare = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false });
  assert(!bare.startsWith("---"), "no frontmatter");
  assert(!bare.includes("## Contents"), "no TOC");
  assert(bare.includes("## Section One"), "body present");

  // strip policy removes images even with frontmatter/toc off
  const stripped = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "strip", includeToc: false });
  assert(!stripped.includes("!["), "images stripped");

  // imagePolicy resolves baseUrl from meta.url automatically
  const altd = composeExport("![cap](rel.png)", cmeta, { frontmatter: false, imagePolicy: "alt", includeToc: false });
  assertEq(altd.trim(), "cap", "alt policy uses meta.url baseUrl, yields alt text");

  // ---- H2 highlights branch (spec sec.5) ----
  const hlItems = [
    { id: "a", n: 1, quote: "Section One", prefix: "", suffix: "", color: 1, note: "important", ts: 1 },
    { id: "b", n: 2, quote: "body text", prefix: "", suffix: "", color: 4, note: "", ts: 2 }
  ];

  // Regression guard: absent highlights -> byte-identical to the pre-H2 baseline captured above.
  const noHl = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false });
  assertEq(noHl, bare, "composeExport with no opts.highlights is byte-identical to the pre-H2 bare case");
  const emptyHl = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: [] });
  assertEq(emptyHl, bare, "composeExport with opts.highlights:[] is byte-identical to the pre-H2 bare case");

  // Non-empty: section appended, inline mark applied by default (highlightsInline unset -> true).
  const withHl = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: hlItems });
  assert(withHl.includes("## Highlights"), "highlights section appended");
  assert(withHl.includes("#hl-quote") && withHl.includes("#hl-doubt"), "fixed color slugs present");
  assert(withHl.includes("==Section One=="), "unique quote gets opportunistic inline mark by default");

  // highlightsInline:false -- section only, no "==...==".
  const htmlPath = composeExport(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: hlItems, highlightsInline: false });
  assert(htmlPath.includes("## Highlights"), "section still appended when highlightsInline:false");
  assert(!htmlPath.includes("=="), "no inline mark when highlightsInline:false");

  // composeStyledHtml threads highlights into its own bodyMd and forces highlightsInline:false --
  // the exported HTML must render the aggregation heading and must NOT leave literal "==" in the doc.
  const styled = composeStyledHtml(cmd, cmeta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "", highlights: hlItems });
  assert(/<h2[^>]*>Highlights<\/h2>/.test(styled), "composeStyledHtml renders the Highlights heading");
  assert(!styled.includes("=="), "composeStyledHtml never leaks a literal == inline mark");
</script>

<script>
  section("H5 export tri-state (spec 1.6)");
  const h5meta = { title: "T", url: "https://e.com/", date: "2026-06-03", tags: ["dev"], source: "defuddle" };
  // A bilingual-style body carrying BOTH an original phrase and a translated phrase.
  const h5body = "Section One paragraph.\n\ntranslated body paragraph.";
  const h5items = [
    { id: "o", n: 1, quote: "Section One", prefix: "", suffix: "", color: 1, note: "", ts: 1 },
    { id: "t", n: 1, quote: "translated body", prefix: "", suffix: "", color: 3, note: "", ts: 2, side: "tr", lang: "zh-CN" }
  ];

  const orig = composeExport(h5body, h5meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: h5items, hlView: "orig" });
  check("hlView orig marks the original quote", orig.includes("==Section One=="), orig);
  check("hlView orig does NOT mark the tr quote", !orig.includes("==translated body=="), orig);

  const tr = composeExport(h5body, h5meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: h5items, hlView: "tr" });
  check("hlView tr marks the tr quote (fixes the old dropped-mark bug)", tr.includes("==translated body=="), tr);
  check("hlView tr does NOT mark the original quote", !tr.includes("==Section One=="), tr);

  const bi = composeExport(h5body, h5meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, highlights: h5items, hlView: "bilingual" });
  check("hlView bilingual marks both sides", bi.includes("==Section One==") && bi.includes("==translated body=="), bi);

  // Aggregation section: all items always present; tr item annotated, orig not.
  const sect = pbpHlComposeSection(h5items);
  check("composeSection lists both quotes", sect.includes("Section One") && sect.includes("translated body"), sect);
  check("composeSection tags the tr item with [tr:zh-CN]", sect.includes("[tr:zh-CN]"), sect);
  check("composeSection does not tag the original item's slug", !/#hl-quote[^\n]*\[tr:/.test(sect), sect);

  // Back-compat: 2-arg pbpHlInlineMark (no view) still wraps a unique quote.
  check("pbpHlInlineMark 2-arg back-compat still wraps", pbpHlInlineMark("a Section One b", [{ quote: "Section One", color: 1 }]).includes("==Section One=="), "back-compat");
</script>

<script>
  // ---- P3.2 highlightCodeBlocks (needs vendor/highlight.min.js loaded above) ----
  section("P3.2 highlightCodeBlocks");
  (() => {
    const fixture = document.createElement("div");
    fixture.innerHTML = renderMarkdown("```js\nconst x = 1;\nfunction f(){ return x; }\n```");
    highlightCodeBlocks(fixture);
    const codeEl = fixture.querySelector("pre > code");
    check("hljs adds .hljs class to language-tagged block", !!codeEl && codeEl.classList.contains("hljs"), codeEl ? codeEl.className : "<no code el>");
    check("hljs emits token spans", !!codeEl && codeEl.querySelector("span[class*='hljs-']") !== null, "no hljs-* span");
    // Untagged fenced block (no language-) must still highlight via hljs auto-detect —
    // Defuddle/Turndown often drops the language, so this is the common real-world case.
    // (hljs ADDS a language-<detected> class on auto-detect, so check untagged-ness BEFORE.)
    const untagged = document.createElement("div");
    untagged.innerHTML = renderMarkdown("```\nconst y = 2;\nfunction g(){ return y; }\n```");
    const uCode = untagged.querySelector("pre > code");
    const wasUntagged = !!uCode && !/language-/.test(uCode.className);
    highlightCodeBlocks(untagged);
    check("untagged code block (no language-) gets auto-detect highlighting",
      wasUntagged && uCode.classList.contains("hljs") && uCode.querySelector("span[class*='hljs-']") !== null,
      uCode ? ("untaggedInput=" + wasUntagged + " after=" + uCode.className) : "<no code el>");
    const plain = document.createElement("div");
    plain.innerHTML = "<pre><code>plain text</code></pre>";
    let threw = false; try { highlightCodeBlocks(plain); } catch (e) { threw = true; }
    check("highlightCodeBlocks no-throw on untagged block", !threw, "threw on plain <pre><code>");
    let threw2 = false; try { highlightCodeBlocks(document.createElement("div")); } catch (e) { threw2 = true; }
    check("highlightCodeBlocks no-throw on empty root", !threw2, "threw on empty root");
  })();
</script>

<script>
  // ---- composeStyledHtml (standalone styled .html export) ----
  section("composeStyledHtml");
  (() => {
    const meta = { title: "My <Doc>", url: "https://e.com/a", date: "2026-06-04", tags: ["x", "y"], source: "defuddle" };
    const md = "## Intro\n\nHello ![pic](/img.png) world.\n\n```js\nconst a=1;\n```\n";

    const plain = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/^<!DOCTYPE html>/.test(plain), "starts with doctype");
    assert(/<\/html>\s*$/.test(plain), "ends with </html>");
    assert(/<style>[\s\S]*\.export-doc[\s\S]*<\/style>/.test(plain), "inlines READER_CSS");
    assert(/<title>My &lt;Doc&gt;<\/title>/.test(plain), "title is HTML-escaped");
    assert(/<h2 id="intro">/.test(plain), "renders heading with slug id");
    assert(!/doc-header/.test(plain), "no visible header when frontmatter off");

    const stripped = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "strip", includeToc: false, hljsCss: "" });
    assert(!/<img/.test(stripped), "imagePolicy:strip removes images");

    const toc = composeStyledHtml(md, meta, { frontmatter: false, imagePolicy: "keep", includeToc: true, hljsCss: "" });
    assert(/<h2 id="contents">/.test(toc), "includeToc injects a Contents heading");

    const fm = composeStyledHtml(md, meta, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/<header class="doc-header">/.test(fm), "frontmatter renders a VISIBLE header");
    assert(/<h1 class="doc-title">My &lt;Doc&gt;<\/h1>/.test(fm), "header shows escaped title");
    assert(!/^---/m.test(fm.replace(/<[^>]+>/g, "")), "no YAML --- fences in styled HTML");

    assert(/HLJSMARKER/.test(composeStyledHtml(md, meta, { hljsCss: "/*HLJSMARKER*/" })), "injects caller hljsCss");

    // Math (audit E3 gap): Download .html / Copy HTML should match the live preview's
    // KaTeX rendering instead of leaving raw $...$/$$...$$ source in the export.
    const mathMd = "See $E=mc^2$ and\n\n$$x+y=z$$\n";
    const noMathOpt = composeStyledHtml(mathMd, meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/\$E=mc\^2\$/.test(noMathOpt), "opts.math unset: inline TeX source left untouched");
    assert(/\$\$x\+y=z\$\$/.test(noMathOpt), "opts.math unset: display TeX source left untouched");

    const mathOn = composeStyledHtml(mathMd, meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "", math: true });
    assert(/class="katex/.test(mathOn), "opts.math + KaTeX loaded: renders katex spans");
    assert(!/\$E=mc\^2\$/.test(mathOn), "opts.math on: inline TeX source no longer bare text");

    assert(/KATEXMARKER/.test(composeStyledHtml(md, meta, { hljsCss: "", katexCss: "/*KATEXMARKER*/" })), "injects caller katexCss");

    // Degrade: opts.math requested but renderMathInElement unavailable on the caller's
    // page (e.g. a load failure) must not throw, and the TeX source stays untouched.
    (() => {
      const saved = window.renderMathInElement;
      try {
        delete window.renderMathInElement;
        const degraded = composeStyledHtml(mathMd, meta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "", math: true });
        assert(/\$E=mc\^2\$/.test(degraded), "degrade: KaTeX unavailable -> TeX source untouched, no throw");
      } finally {
        window.renderMathInElement = saved;
      }
    })();

    const evil = composeStyledHtml(md, { ...meta, url: "javascript:alert(1)" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(!/href="javascript:/i.test(evil), "non-http(s) url is NOT emitted as an href (XSS guard)");
    assert(/<span>javascript:alert\(1\)<\/span>/.test(evil), "non-http(s) url falls back to a text span");
    const amp = composeStyledHtml(md, { ...meta, url: "https://e.com/?a=1&b=2" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
    assert(/href="https:\/\/e\.com\/\?a=1&amp;b=2"/.test(amp), "http url & is escaped in the href attribute");
  })();
</script>

<script>
// ---- Defuddle comment-tree: split same-depth sibling comments ----
// Defuddle's buildCommentTree opens a new <blockquote> only when depth INCREASES,
// so consecutive same-depth comments share one blockquote. htmlToMarkdown must
// split them so each comment is its own blockquote downstream (author accent,
// per-comment translation, ordering vs replies).
{
  section("htmlToMarkdown Defuddle sibling-comment split");
  const meta = (name) => '<div class="comment-metadata"><span class="comment-author"><strong>' + name +
    '</strong></span> · <a href="https://reddit.com/c/' + name + '" class="comment-link">2026-07-01</a> · <span class="comment-points">1 points</span></div>';
  const cmt = (name, body) => '<div class="comment">' + meta(name) + '<div class="comment-content"><p>' + body + '</p></div></div>';
  const render = (html) => { const d = document.createElement("div"); d.innerHTML = renderMarkdown(htmlToMarkdown(html, { baseUrl: "https://reddit.com" })); return d; };

  // 1. two same-depth siblings merged by buildCommentTree -> split into sibling blockquotes
  const v1 = render("<blockquote>" + cmt("alice", "alice body") + cmt("bob", "bob body") + "</blockquote>");
  const tops1 = v1.querySelectorAll(":scope > blockquote");
  check("merged siblings → two sibling blockquotes", tops1.length === 2, v1.innerHTML);
  check("each split comment's author <p> is first child with <strong>",
    tops1.length === 2 &&
    Array.from(tops1).every((b) => { const p = b.firstElementChild; return p && p.tagName === "P" && p.firstElementChild && p.firstElementChild.tagName === "STRONG"; }),
    v1.innerHTML);

  // 2. sibling B after A's nested replies: reply stays with A, B stays BELOW the reply
  const v2 = render("<blockquote>" + cmt("alice", "alice body") +
    "<blockquote>" + cmt("carol", "carol reply text") + "</blockquote>" +
    cmt("bob", "bob body") + "</blockquote>");
  const tops2 = v2.querySelectorAll(":scope > blockquote");
  check("A + A-replies + B → two top blockquotes", tops2.length === 2, v2.innerHTML);
  check("carol stays nested under alice; bob's text after carol's",
    tops2.length === 2 && /carol/.test(tops2[0].textContent) && !/carol/.test(tops2[1].textContent) &&
    v2.textContent.indexOf("carol reply") < v2.textContent.indexOf("bob body"), v2.innerHTML);

  // 3. single comment per blockquote → unchanged
  const v3 = render("<blockquote>" + cmt("dave", "dave body") + "</blockquote>");
  check("single comment per blockquote unchanged", v3.querySelectorAll(":scope > blockquote").length === 1, v3.innerHTML);

  // 4. plain quote without comment divs → untouched
  const v4 = render("<blockquote><p>just a quote</p><p>second para</p></blockquote>");
  check("plain blockquote untouched", v4.querySelectorAll("blockquote").length === 1, v4.innerHTML);
}
</script>

<script>
section("site-rules: pbpNormalizeLazyImages");
{
  const BASE = "https://example.com/articles/1";
  const wrap = (html) => { const d = document.createElement("div"); d.innerHTML = html; return d; };

  // 1. placeholder: missing src attribute
  {
    const d = wrap('<img data-src="/a.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("missing src + data-src -> promoted", d.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", d.innerHTML);
    assertEq(n, 1, "missing src -> return count 1");
  }

  // 2. placeholder: empty string src
  {
    const d = wrap('<img src="" data-src="/a.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("empty src + data-src -> promoted", d.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", d.innerHTML);
    assertEq(n, 1, "empty src -> return count 1");
  }

  // 3. placeholder: whitespace-only src
  {
    const d = wrap('<img src="   " data-src="/a.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("whitespace src + data-src -> promoted", d.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", d.innerHTML);
    assertEq(n, 1, "whitespace src -> return count 1");
  }

  // 4. placeholder: data: URI src
  {
    const d = wrap('<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP" data-src="/a.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data: src + data-src -> promoted", d.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", d.innerHTML);
    assertEq(n, 1, "data: src -> return count 1");
  }

  // 5. real src untouched
  {
    const d = wrap('<img src="https://real.com/pic.jpg" data-src="https://other.com/x.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("real src untouched", d.querySelector("img").getAttribute("src") === "https://real.com/pic.jpg", d.innerHTML);
    assertEq(n, 0, "real src -> return count 0");
  }

  // 6. candidate order: data-src wins over data-original and data-lazy-src
  {
    const d = wrap('<img data-src="/a.jpg" data-original="/b.jpg" data-lazy-src="/c.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data-src wins over data-original/data-lazy-src", d.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", d.innerHTML);
    assertEq(n, 1, "data-src wins -> return count 1");
  }

  // 7. data-original picked when data-src absent
  {
    const d = wrap('<img data-original="/b.jpg" data-lazy-src="/c.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data-original picked when data-src absent", d.querySelector("img").getAttribute("src") === "https://example.com/b.jpg", d.innerHTML);
    assertEq(n, 1, "data-original picked -> return count 1");
  }

  // 8. data-lazy-src picked when data-src and data-original absent
  {
    const d = wrap('<img data-lazy-src="/c.jpg">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data-lazy-src picked when others absent", d.querySelector("img").getAttribute("src") === "https://example.com/c.jpg", d.innerHTML);
    assertEq(n, 1, "data-lazy-src picked -> return count 1");
  }

  // 9. data-src present but invalid URL does NOT fall through to srcset
  {
    const d = wrap('<img data-src="http://[invalid" srcset="/valid.jpg 1x">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("invalid data-src does not fall through to srcset", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "invalid data-src, no fallthrough -> return count 0");
  }

  // 9b. data-src present but whitespace-only does NOT fall through to srcset
  {
    const d = wrap('<img data-src="   " srcset="/valid.jpg 1x">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("whitespace-only data-src does not fall through to srcset", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "whitespace-only data-src, no fallthrough -> return count 0");
  }

  // 10. invalid URL skipped (no alternative candidate present)
  {
    const d = wrap('<img data-src="http://[invalid">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("invalid data-src alone -> skipped, no src written", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "invalid URL alone -> return count 0");
  }

  // 11. srcset last-candidate extraction (with descriptors)
  {
    const d = wrap('<img srcset="a.jpg 1x, b.jpg 2x">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("srcset picks last candidate", d.querySelector("img").getAttribute("src") === "https://example.com/articles/b.jpg", d.innerHTML);
    assertEq(n, 1, "srcset last candidate -> return count 1");
  }

  // 12. srcset messy whitespace
  {
    const d = wrap('<img srcset="  a.jpg   1x  ,   b.jpg   2x   ">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("srcset messy whitespace still extracts last URL", d.querySelector("img").getAttribute("src") === "https://example.com/articles/b.jpg", d.innerHTML);
    assertEq(n, 1, "srcset messy whitespace -> return count 1");
  }

  // 13. data-srcset fallback when srcset absent
  {
    const d = wrap('<img data-srcset="a.jpg 1x, b.jpg 2x">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data-srcset used when srcset absent", d.querySelector("img").getAttribute("src") === "https://example.com/articles/b.jpg", d.innerHTML);
    assertEq(n, 1, "data-srcset fallback -> return count 1");
  }

  // 14. relative URL absolutized against a baseHref with a path
  {
    const d = wrap('<img data-src="assets/pic.png">');
    const n = pbpNormalizeLazyImages(d, "https://example.com/articles/2026/post.html");
    check("relative URL absolutized against baseHref path", d.querySelector("img").getAttribute("src") === "https://example.com/articles/2026/assets/pic.png", d.innerHTML);
    assertEq(n, 1, "relative URL absolutized -> return count 1");
  }

  // 15. non-http(s) rejected: javascript: candidate
  {
    const d = wrap('<img data-src="javascript:alert(1)">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("javascript: candidate skipped", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "javascript: candidate -> return count 0");
  }

  // 16. non-http(s) rejected: data: candidate
  {
    const d = wrap('<img data-src="data:image/png;base64,xx">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("data: data-src candidate skipped", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "data: data-src candidate -> return count 0");
  }

  // 17. about:blank (SafeURL shim) rejected
  {
    const d = wrap('<img data-src="about:blank">');
    const n = pbpNormalizeLazyImages(d, BASE);
    check("about:blank candidate skipped (SafeURL shim compat)", d.querySelector("img").getAttribute("src") === null, d.innerHTML);
    assertEq(n, 0, "about:blank candidate -> return count 0");
  }

  // 18. falsy / non-element rootEl -> 0
  assertEq(pbpNormalizeLazyImages(null, BASE), 0, "null rootEl -> 0");
  assertEq(pbpNormalizeLazyImages(undefined, BASE), 0, "undefined rootEl -> 0");
  assertEq(pbpNormalizeLazyImages({}, BASE), 0, "no querySelectorAll rootEl -> 0");

  // 19. Document-as-rootEl works
  {
    const hdoc = document.implementation.createHTMLDocument("t");
    hdoc.body.innerHTML = '<img data-src="/a.jpg">';
    const n = pbpNormalizeLazyImages(hdoc, BASE);
    check("Document rootEl: img promoted", hdoc.querySelector("img").getAttribute("src") === "https://example.com/a.jpg", hdoc.body.innerHTML);
    assertEq(n, 1, "Document rootEl -> return count 1");
  }

  // 20. return count correctness across a mixed batch
  {
    const d = wrap(
      '<img src="https://real.com/pic.jpg" data-src="https://other.com/x.jpg">' +
      '<img data-src="/ok.jpg">' +
      '<img data-src="http://[invalid">' +
      '<img srcset="c.jpg 1x, d.jpg 2x">'
    );
    const n = pbpNormalizeLazyImages(d, BASE);
    const imgs = d.querySelectorAll("img");
    assertEq(n, 2, "mixed batch -> return count 2");
    check("mixed batch: real src untouched", imgs[0].getAttribute("src") === "https://real.com/pic.jpg", d.innerHTML);
    check("mixed batch: valid data-src promoted", imgs[1].getAttribute("src") === "https://example.com/ok.jpg", d.innerHTML);
    check("mixed batch: invalid data-src skipped", imgs[2].getAttribute("src") === null, d.innerHTML);
    check("mixed batch: srcset promoted", imgs[3].getAttribute("src") === "https://example.com/articles/d.jpg", d.innerHTML);
  }
}
</script>

<script>
// ---- E1: detached-div innerHTML roundtrip (site-rule path regression, spec invariant 4) ----
// Hook Pattern A stuffs a site-rule's contentHtml into a DETACHED div, calls
// pbpNormalizeLazyImages(div, baseHref), then reads back div.innerHTML as the
// new contentHtml -- on a page with no lazy images this must not silently
// mutate the returned markup. This is NOT a general innerHTML guarantee (see
// the second half of this block); it holds because every existing site-rule
// already builds contentHtml in canonical serialized form.
{
  section("E1: detached-div innerHTML roundtrip (non-lazy site-rule content)");
  const rep = '<p>See <a href="https://example.com/ref">reference</a> for details.</p>'
    + '<img src="https://example.com/real.png" alt="diagram">'
    + '<pre><code>const x = 1;\nconsole.log(x);</code></pre>'
    + '<ul><li>a<ul><li>b</li><li>c</li></ul></li><li>d</li></ul>';
  const div = document.createElement("div");
  div.innerHTML = rep;
  const n = pbpNormalizeLazyImages(div, "https://example.com/page");
  check("real-src-only fragment -> 0 images normalized (real src never touched)", n === 0, String(n));
  check("canonical-form fragment (link, real-src img, pre/code, nested list) round-trips byte-identical",
    div.innerHTML === rep, div.innerHTML);

  // Boundary: byte-identity is NOT a general innerHTML guarantee -- it holds
  // because contentHtml is already canonical, not because Chrome preserves
  // arbitrary input syntax. Single-quoted + self-closing markup normalizes
  // on the FIRST pass, then is stable (idempotent) from then on.
  const nonCanonical = "<img src='https://example.com/x.png'/>";
  const div2 = document.createElement("div");
  div2.innerHTML = nonCanonical;
  const firstPass = div2.innerHTML;
  check("non-canonical syntax (single quotes + self-close) is NOT preserved byte-for-byte",
    firstPass !== nonCanonical, firstPass);
  div2.innerHTML = firstPass;
  check("second roundtrip of already-canonical output is stable (idempotent -- the real guarantee)",
    div2.innerHTML === firstPass, div2.innerHTML);
}
</script>

<script>
  // ---- X4: publishedIso (pure date normalizer, called ONLY at meta-build time) ----
  section("publishedIso");

  // ISO-prefixed: JSON-LD/meta datePublished mainstream shapes -> take the 10-char prefix
  assertEq(publishedIso("2026-01-05T10:00:00Z"), "2026-01-05", "ISO datetime with Z -> date prefix");
  assertEq(publishedIso("2026-01-05T10:00:00+08:00"), "2026-01-05", "ISO datetime with offset -> date prefix");
  assertEq(publishedIso("2026-01-05"), "2026-01-05", "bare ISO date is idempotent");

  // Date.parse()-able but not ISO-prefixed: RFC 2822 with an explicit GMT offset (TZ-independent --
  // getUTCDate() reads an absolute instant, not a local-time interpretation of a date-only string).
  assertEq(publishedIso("Tue, 05 Jan 2026 00:00:00 GMT"), "2026-01-05", "RFC 2822 (explicit GMT) -> UTC YYYY-MM-DD");

  // Unparseable: returned unchanged so the caller renders it via yamlString, never as a bare date
  assertEq(publishedIso("not a real date at all"), "not a real date at all", "unparseable string returned as-is");

  // Empty in, empty out
  assertEq(publishedIso(""), "", "empty string -> empty string");
  assertEq(publishedIso(null), "", "null -> empty string");
  assertEq(publishedIso(undefined), "", "undefined -> empty string");
</script>

<script>
  // ---- X4: applyFrontmatter extended metadata trailers ----
  section("X4 applyFrontmatter extended metadata trailers");

  const fmBase = { title: "T", url: "https://e.com/p", date: "2026-06-03", tags: ["dev"], source: "defuddle" };

  // Regression gate: an old-shape meta (no extended fields) renders BYTE-IDENTICAL
  // to fm1 above (P2.1 section) -- same literal fields, computed before this batch
  // existed. If any extended key ever leaked into the no-extended-field path this
  // equality breaks immediately.
  const fmNoExt = applyFrontmatter("# Body\n", {
    title: 'A: "quoted"',
    url: "https://e.com/p",
    date: "2026-06-03",
    tags: ["dev", "go"],
    source: "defuddle",
    description: "Desc: with colon"
  }, {});
  assertEq(fmNoExt, fm1, "meta without any extended field renders byte-identical to the pre-X4 baseline (fm1)");

  // Full extended fields: fixed order published, author, site, image, words -- AFTER description.
  const fmFull = applyFrontmatter("body", {
    ...fmBase,
    description: "Desc",
    published: "2026-01-05",
    clipped: "2026-07-08",
    author: "Jane Doe",
    site: "The Verge",
    image: "https://cdn.example.com/cover.jpg",
    words: 1534
  }, {});
  const trailerBlock = fmFull.split("description: \"Desc\"\n")[1].split("\n---\n\n")[0];
  const trailerLines = trailerBlock.split("\n");
  assertEq(trailerLines[0], "published: 2026-01-05", "published bare scalar (matches YYYY-MM-DD) comes right after description: " + trailerBlock);
  assertEq(trailerLines[1], "clipped: 2026-07-08", "clipped bare scalar comes right after published: " + trailerBlock);
  assertEq(trailerLines[2], 'author: "Jane Doe"', "author quoted, third: " + trailerBlock);
  assertEq(trailerLines[3], 'site: "The Verge"', "site quoted, fourth: " + trailerBlock);
  assertEq(trailerLines[4], 'image: "https://cdn.example.com/cover.jpg"', "image quoted, fifth: " + trailerBlock);
  assertEq(trailerLines[5], "words: 1534", "words bare integer, sixth (last, right before closing ---): " + trailerBlock);
  assert(fmFull.includes("\n---\n\nbody"), "closing fence still immediately precedes the body");

  // published that failed normalization upstream (not YYYY-MM-DD shaped) renders quoted, not bare --
  // meta-build time is responsible for normalizing; applyFrontmatter only judges the shape it's given.
  const fmBadPublished = applyFrontmatter("body", { ...fmBase, published: "circa 1990s" }, {});
  assert(fmBadPublished.includes('published: "circa 1990s"'), "unnormalized published string is yamlString-quoted, not emitted bare: " + fmBadPublished);

  // author/site/image individually absent -> individually omitted (independent presence, not all-or-nothing)
  const fmPartial = applyFrontmatter("body", { ...fmBase, author: "Jane Doe" }, {});
  assert(fmPartial.includes('author: "Jane Doe"'), "author alone still renders: " + fmPartial);
  assert(!/published:|site:|image:|words:/.test(fmPartial), "site/image/published/words individually omitted when absent from meta: " + fmPartial);

  // words: only a finite number renders; NaN/Infinity/non-number are omitted (Number.isFinite gate)
  assert(!applyFrontmatter("body", { ...fmBase, words: NaN }, {}).includes("words:"), "words:NaN omitted");
  assert(!applyFrontmatter("body", { ...fmBase, words: Infinity }, {}).includes("words:"), "words:Infinity omitted");
  assert(!applyFrontmatter("body", { ...fmBase, words: "1534" }, {}).includes("words:"), "words as a string (not Number.isFinite) omitted");
  assert(applyFrontmatter("body", { ...fmBase, words: 0 }, {}).includes("words: 0"), "words:0 IS finite -> renders (0 is not falsy-omitted)");

  // yamlString escaping applies to author (quotes/newlines), same as title/description
  const fmEscaped = applyFrontmatter("body", { ...fmBase, author: 'Jane "JD" Doe\nSecond line' }, {});
  assert(fmEscaped.includes('author: "Jane \\"JD\\" Doe\\nSecond line"'), "author with quotes+newline escaped via yamlString: " + fmEscaped);
</script>

<script>
  // ---- X4: composeStyledHtml byline (second .doc-meta: author (middot) site (middot) published) ----
  section("X4 composeStyledHtml byline");

  const bylineMeta = {
    title: "Piece", url: "https://e.com/a", date: "2026-06-04", tags: ["x"],
    source: "defuddle",
    author: "Jane Doe", site: "The Verge", published: "2026-01-05"
  };
  const bylineMd = "## Intro\n\nBody.";

  const withByline = composeStyledHtml(bylineMd, bylineMeta, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
  const bylineParas = withByline.match(/<p class="doc-meta">[\s\S]*?<\/p>/g) || [];
  assertEq(bylineParas.length, 2, "extended meta present -> TWO .doc-meta paragraphs (url/date/tags, then author/site/published)");
  const byline2 = bylineParas[1] || "";
  assert(byline2.includes("Jane Doe") && byline2.includes("The Verge") && byline2.includes("2026-01-05"), "second .doc-meta carries author, site, published: " + byline2);
  assert(byline2.indexOf("Jane Doe") < byline2.indexOf("The Verge") && byline2.indexOf("The Verge") < byline2.indexOf("2026-01-05"), "byline order is author, site, published: " + byline2);

  // Absent extended meta -> only the original ONE .doc-meta paragraph, no empty second line
  const noBylineMeta = { title: "Piece", url: "https://e.com/a", date: "2026-06-04", tags: ["x"], source: "defuddle" };
  const noByline = composeStyledHtml(bylineMd, noBylineMeta, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
  const noBylineParas = noByline.match(/<p class="doc-meta">[\s\S]*?<\/p>/g) || [];
  assertEq(noBylineParas.length, 1, "no extended meta -> only ONE .doc-meta paragraph, no empty second line");

  // Partial (author only, no site/published) -> byline still renders with just that one span
  const partialByline = composeStyledHtml(bylineMd, { ...noBylineMeta, author: "Solo Author" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
  const partialParas = partialByline.match(/<p class="doc-meta">[\s\S]*?<\/p>/g) || [];
  assertEq(partialParas.length, 2, "author alone still triggers the second .doc-meta");
  const partial2 = partialParas[1] || "";
  assert(partial2.includes("Solo Author") && !partial2.includes("&middot;"), "single-field byline has no dangling middot separator: " + partial2);

  // Escaping: author/site with HTML-significant chars must be _xmlEscape'd
  const evilByline = composeStyledHtml(bylineMd, { ...noBylineMeta, author: '<b>Evil</b> & "Author"', site: "A & B" }, { frontmatter: true, imagePolicy: "keep", includeToc: false, hljsCss: "" });
  assert(!/<b>Evil<\/b>/.test(evilByline) && /&lt;b&gt;Evil&lt;\/b&gt;/.test(evilByline), "author HTML is escaped, not rendered as markup: " + evilByline);
  assert(/A &amp; B/.test(evilByline), "site ampersand is escaped: " + evilByline);

  // frontmatter:false -> no header at all, so no byline either (existing invariant, extended meta
  // present). NOTE: must match the rendered <p class="doc-meta"> tag, NOT a bare /doc-meta/
  // substring -- READER_CSS unconditionally embeds a ".doc-meta{...}" style rule in every
  // <style> block regardless of opts.frontmatter, so a bare substring test always finds a hit
  // and this assertion would falsely fail even when the byline is correctly suppressed.
  const noHeaderAtAll = composeStyledHtml(bylineMd, bylineMeta, { frontmatter: false, imagePolicy: "keep", includeToc: false, hljsCss: "" });
  assert(!/<p class="doc-meta">/.test(noHeaderAtAll), "frontmatter:false suppresses the byline too (no header rendered at all)");
</script>

<script>
  section("E2/E7/E10 md-preview fidelity regressions");

  // E2: code language fidelity. Keep source-provided language hints in the
  // exported fenced code; no guessing when the source gives none.
  (() => {
    const fromPre = htmlToMarkdown('<pre data-lang="python"><code>print(1)</code></pre>');
    assert(/```python\nprint\(1\)/.test(fromPre), "pre[data-lang] becomes a python fence: " + fromPre);
    const noLang = htmlToMarkdown('<pre><code>plain text</code></pre>');
    assert(/```\nplain text\n```/.test(noLang), "no source language hint stays untagged: " + noLang);
  })();

  // E7: nested span wrappers inside links must not drop the visible link text.
  (() => {
    const md = htmlToMarkdown('<p>Read <a href="https://e.test/docs"><span><span>Nested Docs</span></span></a>.</p>');
    assert(md.includes("[Nested Docs](https://e.test/docs)"), "nested span link text preserved: " + md);
  })();

  // E10: footnote fragment links stay local; default image export keeps and absolutizes.
  (() => {
    const h = renderMarkdown("[1](#fn:note-abc) [back](#fnref:note-abc)");
    const links = Array.from(new DOMParser().parseFromString(h, "text/html").querySelectorAll('a[href^="#"]'));
    assert(links.length >= 1 && links.every((a) => !a.hasAttribute("target") && !a.hasAttribute("rel")),
      "footnote-shaped fragment links do not get target/rel: " + h);
    const out = composeExport("![alt](img/p.png)", { url: "https://e.test/a/b/" }, {});
    assert(out.includes("![alt](https://e.test/a/b/img/p.png)"), "default image policy keeps+absolutizes: " + out);
  })();

  // E10: Zhihu lazy image strategy stays at the site-rule layer.
  (() => {
    const doc = new DOMParser().parseFromString(QUESTION_HTML, "text/html");
    const r = applySiteRule(doc, "https://www.zhihu.com/question/659317023");
    assert(r && /src="https:\/\/pic\/a\.jpg"/.test(r.contentHtml || ""), "zhihu lazy image promoted: " + (r && r.contentHtml));
  })();
</script>

<script>
document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
document.getElementById("summary").style.color = fail ? "#c00" : "#0a0";
</script>
