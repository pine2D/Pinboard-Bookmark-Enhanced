<script>
section("md-embed: pbpEmbedScan / pbpEmbedRewrite / pbpEmbedBudget (pure layer)");

// scan classification matrix
(() => {
  const mdImgs = [
    "![a](https://cdn.example.com/a.png)",
    "![b](/rel/b.jpg)",                       // relative -> baseUrl absolutized -> candidate
    "![c](data:image/png;base64,AAAA)",       // inline kept as-is
    "![d](blob:https://page/xyz)",            // blob -> blobs
    "![e](http://insecure.example.com/e.gif)",// http -> kept
    "```",
    "![in-fence](https://x.example.com/f.png)", // fenced code -> not scanned
    "```",
  ].join("\n");
  const scan = pbpEmbedScan(mdImgs, "https://page.example.com/post");
  assertEq(scan.candidates.length, 2, "scan matrix: candidate count");
  assertEq(scan.candidates[0], "https://cdn.example.com/a.png", "scan matrix: absolute candidate kept as-is");
  assertEq(scan.candidates[1], "https://page.example.com/rel/b.jpg", "scan matrix: relative candidate absolutized against baseUrl");
  assertEq(scan.blobs.length, 1, "scan matrix: blob URL classified into blobs");
  assertEq(scan.kept.length, 1, "scan matrix: http (insecure) URL classified into kept");
  assertEq(scan.origins.join(","), "https://cdn.example.com,https://page.example.com", "scan matrix: origins collected in candidate order");
})();

// upper-bound truncation (2 assertions)
(() => {
  const lines51 = [];
  for (let i = 0; i < 51; i++) lines51.push(`![i${i}](https://cap.example.com/img${i}.png)`);
  const s51 = pbpEmbedScan(lines51.join("\n"), "");
  assert(s51.candidates.length === 50 && s51.kept.length === 1,
    "maxImages caps candidates at 50; 51st image overflows into kept: " + JSON.stringify({ c: s51.candidates.length, k: s51.kept.length }));

  const lines11 = [];
  for (let i = 0; i < 11; i++) lines11.push(`![o${i}](https://origin${i}.example.com/x.png)`);
  const s11 = pbpEmbedScan(lines11.join("\n"), "");
  assert(s11.origins.length === 10 && s11.kept.length === 1,
    "maxOrigins caps distinct origins at 10; 11th origin's image overflows into kept: " + JSON.stringify({ o: s11.origins.length, k: s11.kept.length }));
})();

// de-dup, order-preserving (1 assertion)
(() => {
  const md = "![a](https://dup.example.com/x.png)\n![a2](https://dup.example.com/x.png)";
  const s = pbpEmbedScan(md, "");
  assertEq(s.candidates.length, 1, "same URL referenced twice only appears once in candidates");
})();

// masking surface (Codex-P3): inline code span + escaped \![ must not drive scan/fetch (4 assertions)
(() => {
  const codeSpanLine = "Use `![x](https://evil.example.com/x.png)` in your code.";
  const sCode = pbpEmbedScan(codeSpanLine, "");
  assert(!sCode.candidates.includes("https://evil.example.com/x.png") && !sCode.origins.includes("https://evil.example.com"),
    "inline code-span pseudo-image excluded from candidates/origins: " + JSON.stringify(sCode));

  const escapedLine = "See \\![y](https://e2.example.com/y.png) literally.";
  const sEsc = pbpEmbedScan(escapedLine, "");
  assert(!sEsc.candidates.includes("https://e2.example.com/y.png"),
    "escaped \\![ pseudo-image excluded from candidates: " + JSON.stringify(sEsc));

  const rCode = pbpEmbedRewrite(codeSpanLine, { "https://evil.example.com/x.png": "REPLACED" }, "", pbpEmbedBudget(999999));
  assertEq(rCode.md, codeSpanLine, "code-span pseudo-image left byte-for-byte untouched by rewrite");

  const rEsc = pbpEmbedRewrite(escapedLine, { "https://e2.example.com/y.png": "REPLACED" }, "", pbpEmbedBudget(999999));
  assertEq(rEsc.md, escapedLine, "escaped pseudo-image left byte-for-byte untouched by rewrite");
})();

// rewrite: dataURI substitution, blob->alt, fence untouched, map-absent URL kept as-is (4 assertions)
(() => {
  const mdData = "![a](https://cdn.example.com/a.png)";
  const rData = pbpEmbedRewrite(mdData, { "https://cdn.example.com/a.png": "data:image/png;base64,ABCD" }, "", pbpEmbedBudget(999999));
  assertEq(rData.md, "![a](data:image/png;base64,ABCD)", "candidate URL rewritten to data URI src");

  const mdBlob = "![d](blob:https://page/xyz)";
  const rBlob = pbpEmbedRewrite(mdBlob, { "blob:https://page/xyz": null }, "", pbpEmbedBudget(999999));
  assertEq(rBlob.md, "d", "blob map value null degrades whole image to alt text");

  const mdFence = "```\n![f](https://cdn.example.com/f.png)\n```";
  const rFence = pbpEmbedRewrite(mdFence, { "https://cdn.example.com/f.png": "data:image/png;base64,X" }, "", pbpEmbedBudget(999999));
  assertEq(rFence.md, mdFence, "fenced code block content is never rewritten");

  const mdAbsent = "![g](https://cdn.example.com/g.png)";
  const rAbsent = pbpEmbedRewrite(mdAbsent, {}, "", pbpEmbedBudget(999999));
  assertEq(rAbsent.md, mdAbsent, "URL with no map entry is left as-is");
})();

// A4: canonical URL key + preview-fix cache entry validity (9 assertions)
(() => {
  const c = pbpEmbedCanonicalUrl;
  assertEq(c("https://cdn.example/图.png"), "https://cdn.example/%E5%9B%BE.png",
    "canonical: raw CJK path percent-encoded to the browser form");
  assertEq(c("https://cdn.example/%E5%9B%BE.png"), "https://cdn.example/%E5%9B%BE.png",
    "canonical: already-encoded input is idempotent (no double-encoding)");
  assertEq(c("https://a.example/b/../c.png"), "https://a.example/c.png",
    "canonical: dot segments normalized");
  assertEq(c("https://例子.example/图.png"), c("https://xn--fsqu00a.example/%E5%9B%BE.png"),
    "canonical: IDN host converges on one punycoded form");
  assertEq(c("https://[::1]/a.png"), "https://[::1]/a.png",
    "canonical: bracketed IPv6 host degrades to the original value without throwing");
  assert(!pbpEmbedCacheEntryValid(null), "entryValid: null rejected");
  assert(!pbpEmbedCacheEntryValid({ dataUri: "data:image/png;base64,AA", byteLength: 5, decoded: false }),
    "entryValid: undecoded entry rejected (no <img> has proven it renders)");
  assert(!pbpEmbedCacheEntryValid({ dataUri: "data:image/png;base64,AA", byteLength: NaN, decoded: true }),
    "entryValid: NaN byteLength rejected (cannot charge the export budget)");
  assert(pbpEmbedCacheEntryValid({ dataUri: "data:image/png;base64,AA", mime: "image/png", byteLength: 5, decoded: true }),
    "entryValid: decoded entry with a real size accepted");
})();

// export honesty counter (plan A, Codex-adjudicated): pbpEmbedBrokenCount counts
// observed-broken links that a keep export would ship as URLs (7 assertions)
(() => {
  const obs = new Set(["https://cdn.example.com/a.png"]);
  assertEq(pbpEmbedBrokenCount("![a](https://cdn.example.com/a.png)", "", obs), 1,
    "brokenCount: observed absolute candidate counted");
  assertEq(pbpEmbedBrokenCount("![a](https://cdn.example.com/other.png)", "", obs), 0,
    "brokenCount: unobserved URL not counted");
  assertEq(pbpEmbedBrokenCount("![a](https://cdn.example.com/a.png)\n![b](https://cdn.example.com/a.png)", "", obs), 1,
    "brokenCount: duplicate references count once");
  assertEq(pbpEmbedBrokenCount("![r](/rel/a.png)", "https://cdn.example.com/post",
    new Set(["https://cdn.example.com/rel/a.png"])), 1,
    "brokenCount: relative src normalized against baseUrl before matching");
  // the 51st image overflows into kept, but a keep export still ships it as a link
  const capLines = [];
  for (let i = 0; i < 51; i++) capLines.push(`![i${i}](https://cap.example.com/img${i}.png)`);
  assertEq(pbpEmbedBrokenCount(capLines.join("\n"), "", new Set(["https://cap.example.com/img50.png"])), 1,
    "brokenCount: over-maxImages (kept) URL still counted");
  // marked encodeURI()s emitted hrefs — the browser-side key can be the encoded variant
  assertEq(pbpEmbedBrokenCount("![u](https://cdn.example.com/图.png)", "",
    new Set([encodeURI("https://cdn.example.com/图.png")])), 1,
    "brokenCount: encodeURI variant of a non-ASCII URL matches");
  assertEq(pbpEmbedBrokenCount("![a](https://cdn.example.com/a.png)", "", new Set()), 0,
    "brokenCount: empty observed set counts zero");
})();

// rewrite output budget (Codex-P2): same URL referenced 3x, budget only covers 2 replacements (2 assertions)
(() => {
  const url = "https://cdn.example.com/rep.png";
  const repl = "data:image/png;base64,ZZZZ";
  const md = ["![1](" + url + ")", "![2](" + url + ")", "![3](" + url + ")"].join("\n");
  const replLen = ("![1](" + repl + ")").length; // same length for alt "1"/"2"/"3"
  const budget = pbpEmbedBudget(replLen * 2); // exactly enough for 2 of the 3 references
  const r = pbpEmbedRewrite(md, { [url]: repl }, "", budget);
  const outLines = r.md.split("\n");
  assert(outLines[0] === "![1](" + repl + ")" && outLines[1] === "![2](" + repl + ")" && outLines[2] === "![3](" + url + ")",
    "budget exhausted after 2 replacements; 3rd occurrence keeps original URL: " + r.md);
  assertEq(r.dropped, 1, "exactly one occurrence dropped once outBudget is exhausted");
})();

// budget primitive: accumulate-to-limit false + atomicity (3 assertions)
(() => {
  const b = pbpEmbedBudget(100);
  assert(b.reserve(60) === true && b.used() === 60, "reserve within budget succeeds and accumulates in used()");
  assert(b.reserve(50) === false, "reserve exceeding remaining budget returns false");
  assertEq(b.used(), 60, "used() unchanged after a rejected reserve (atomic — no partial charge)");
})();

// budget primitive: table-driven boundary cases (8 assertions)
(() => {
  const cases = [
    { n: 0, total: 100, pre: 0, expect: true, label: "reserve(0) succeeds as a no-op" },
    { n: 100, total: 100, pre: 0, expect: true, label: "reserve(total) exactly fills the budget" },
    { n: 101, total: 100, pre: 0, expect: false, label: "reserve(total+1) is rejected" },
    { n: -1, total: 100, pre: 0, expect: false, label: "negative n is rejected" },
    { n: NaN, total: 100, pre: 0, expect: false, label: "NaN is rejected" },
    { n: Infinity, total: 100, pre: 0, expect: false, label: "Infinity is rejected" },
    { n: 1, total: 100, pre: 100, expect: false, label: "any positive n rejected once budget is fully used" },
    { n: 0.5, total: 1, pre: 0, expect: true, label: "fractional n within budget succeeds" },
  ];
  for (const c of cases) {
    const bud = pbpEmbedBudget(c.total);
    if (c.pre) bud.reserve(c.pre);
    assertEq(bud.reserve(c.n), c.expect, c.label);
  }
})();

// masking placeholder collision (Critical fix): literal " M<n> " prose must never
// be treated as a mask token — restore must not corrupt ordinary text.
(() => {
  const prose = "Apple M1 chip and M3 too";
  assertEq(pbpEmbedRewrite(prose, {}, "", pbpEmbedBudget(999999)).md, prose,
    "plain prose with literal M<n> words survives rewrite verbatim (empty map)");
  assertEq(pbpEmbedRewrite(prose, { "https://cdn.example.com/a.png": "data:image/png;base64,AA" }, "", pbpEmbedBudget(999999)).md, prose,
    "plain prose with literal M<n> words survives rewrite verbatim (non-empty map)");

  const mixed = "Run `npm test` on the M0 build";
  assertEq(pbpEmbedRewrite(mixed, {}, "", pbpEmbedBudget(999999)).md, mixed,
    "line with a code span AND a literal M0 word: span restored, literal untouched");

  const multi = "Mix `one` and `two` plus \\![esc](https://e3.example.com/z.png) end";
  assertEq(pbpEmbedRewrite(multi, {}, "", pbpEmbedBudget(999999)).md, multi,
    "multiple code spans + escaped \\![ on one line all restored verbatim");

  const withImg = "M3 note ![a](https://cdn.example.com/a.png) and M7 tail";
  assertEq(pbpEmbedRewrite(withImg, { "https://cdn.example.com/a.png": "data:image/png;base64,AA" }, "", pbpEmbedBudget(999999)).md,
    "M3 note ![a](data:image/png;base64,AA) and M7 tail",
    "real image rewritten while neighboring literal M<n> prose stays intact");
})();

// masking surface v2 (Codex-C1b): multi-backtick code spans and HTML comments
// must also be masked -- the old single-backtick regex `[^`]*` was pierced by
// a double-backtick span (it matched the empty "``" pairs instead of spanning
// the whole thing), leaking the pseudo-image inside straight into candidates.
// Also covers stripping a literal NUL that mimics the internal mask token
// format, so an adversarial input can never be mistaken for a real stash ref.
(() => {
  const dblBacktick = "Use ``![x](https://evil.example.com/a.png)`` in prose.";
  const sDbl = pbpEmbedScan(dblBacktick, "");
  assert(!sDbl.candidates.includes("https://evil.example.com/a.png") && !sDbl.origins.includes("https://evil.example.com"),
    "double-backtick code-span pseudo-image excluded from candidates/origins: " + JSON.stringify(sDbl));
  const rDbl = pbpEmbedRewrite(dblBacktick, { "https://evil.example.com/a.png": "REPLACED" }, "", pbpEmbedBudget(999999));
  assertEq(rDbl.md, dblBacktick, "double-backtick code-span pseudo-image left byte-for-byte untouched by rewrite");

  const commentLine = "before <!-- ![y](https://e2.example.com/b.png) --> after";
  const sComment = pbpEmbedScan(commentLine, "");
  assert(!sComment.candidates.includes("https://e2.example.com/b.png"),
    "HTML comment pseudo-image excluded from candidates: " + JSON.stringify(sComment));
  const rComment = pbpEmbedRewrite(commentLine, { "https://e2.example.com/b.png": "REPLACED" }, "", pbpEmbedBudget(999999));
  assertEq(rComment.md, commentLine, "HTML comment pseudo-image left byte-for-byte untouched by rewrite");

  const nulLine = "before \x00M0\x00 after";
  assert(nulLine.includes("\x00"), "sanity: test input actually carries a literal NUL byte");
  const rNul = pbpEmbedRewrite(nulLine, {}, "", pbpEmbedBudget(999999));
  assertEq(rNul.md, "before M0 after",
    "literal NUL-delimited fake mask token is stripped before masking, never mistaken for a real stash reference, and the output carries no NUL");
})();
</script>

<script>
section("md-epub: pbpCrc32 / pbpZipStore / pbpEpubContentOpf / pbpEpubNavXhtml / pbpEpubXmlEscape (pure layer)");

// CRC32 known vectors (2 assertions)
(() => {
  assertEq(pbpCrc32(new TextEncoder().encode("123456789")), 0xCBF43926, "CRC32('123456789') matches known IEEE 802.3 test vector");
  assertEq(pbpCrc32(new Uint8Array(0)), 0, "CRC32 of empty bytes is 0");
})();

// ZIP structure: 2-entry pack -> reverse-assert local header fields (3 assertions)
const _pbpZipTestBytes = { mt: new TextEncoder().encode("application/epub+zip"), ci: new TextEncoder().encode("<x/>") };
const _pbpZipTest = pbpZipStore([
  { name: "mimetype", data: _pbpZipTestBytes.mt },
  { name: "META-INF/container.xml", data: _pbpZipTestBytes.ci },
]);
(() => {
  const dv = new DataView(_pbpZipTest.buffer);
  assertEq(dv.getUint32(0, true), 0x04034b50, "first local file header signature is PK\\x03\\x04");
  assertEq(dv.getUint16(8, true), 0, "compression method 0 = stored");
  assertEq(new TextDecoder().decode(_pbpZipTest.slice(30, 38)), "mimetype", "first entry's stored name is 'mimetype' (entries[0] contract)");
})();

// EOCD locate + central directory count + offset consistency (3 assertions)
(() => {
  const dv = new DataView(_pbpZipTest.buffer);
  const eocdOff = _pbpZipTest.length - 22; // fixed-size EOCD record, no archive comment
  assertEq(dv.getUint32(eocdOff, true), 0x06054b50, "EOCD signature located at zip.length-22");
  assertEq(dv.getUint16(eocdOff + 8, true), 2, "EOCD total central-directory entry count matches the 2 entries packed");
  const cdSize = dv.getUint32(eocdOff + 12, true);
  const cdOffset = dv.getUint32(eocdOff + 16, true);
  assertEq(cdOffset + cdSize, eocdOff, "central directory offset + size lands exactly at EOCD start");
})();

// mimetype entry's stored CRC matches pbpCrc32(data) independently (1 assertion)
(() => {
  const dv = new DataView(_pbpZipTest.buffer);
  assertEq(dv.getUint32(14, true), pbpCrc32(_pbpZipTestBytes.mt), "mimetype local-header CRC field equals pbpCrc32(mimetype bytes)");
})();

// central directory walk: 3 entries, each CD record's byte-42 local-header offset
// checked against HAND-COMPUTED literals (30 + namelen + datalen accumulated by hand,
// NOT via the implementation's own accumulator — that would be tautological):
//   "mimetype"(8)               + 20B data -> lh 58, offset   0
//   "META-INF/container.xml"(22) + 4B data -> lh 56, offset  58
//   "OEBPS/content.opf"(17)      + 6B data -> lh 53, offset 114
// (7 assertions)
(() => {
  const enc = new TextEncoder();
  const zip = pbpZipStore([
    { name: "mimetype", data: enc.encode("application/epub+zip") },
    { name: "META-INF/container.xml", data: enc.encode("<x/>") },
    { name: "OEBPS/content.opf", data: enc.encode("<opf/>") },
  ]);
  const dv = new DataView(zip.buffer);
  const eocdOff = zip.length - 22;
  const expectedOffsets = [0, 58, 114];
  let rec = dv.getUint32(eocdOff + 16, true); // cdStart from EOCD's central-directory-offset field
  for (let i = 0; i < 3; i++) {
    assertEq(dv.getUint32(rec, true), 0x02014b50, `CD record ${i}: signature is PK\\x01\\x02`);
    assertEq(dv.getUint32(rec + 42, true), expectedOffsets[i],
      `CD record ${i}: relative local-header offset field = hand-computed ${expectedOffsets[i]}`);
    rec += 46 + dv.getUint16(rec + 28, true) + dv.getUint16(rec + 30, true) + dv.getUint16(rec + 32, true);
  }
  assertEq(rec, eocdOff, "stepping all 3 CD records via their namelen/extralen/commentlen fields lands exactly at EOCD");
})();

// OPF: required fields, escaping, no-author omission, identifier determinism (6 assertions)
(() => {
  const meta = { title: 'My <Title> & "Quote\'s"', url: "https://e.com/a", clipped: "2026-01-02", lang: "en" };
  const opf = pbpEpubContentOpf(meta, [{ id: "content", href: "content.xhtml", mediaType: "application/xhtml+xml" }]);
  assert(opf.includes("<dc:title>My &lt;Title&gt; &amp; &quot;Quote&apos;s&quot;</dc:title>"),
    "dc:title carries the escaped title text: " + opf);
  assert(opf.includes("<dc:source>https://e.com/a</dc:source>"), "dc:source carries the url: " + opf);
  assert(opf.includes("<dc:date>2026-01-02</dc:date>"), "dc:date falls back to meta.clipped when meta.date is absent: " + opf);
  assert(opf.includes('<meta property="dcterms:modified">2026-01-02T00:00:00Z</meta>'),
    "dcterms:modified = clipped + T00:00:00Z: " + opf);

  const opfNoAuthor = pbpEpubContentOpf({ title: "T", url: "https://e.com/b", clipped: "2026-01-03" }, []);
  assert(!/<dc:creator>/.test(opfNoAuthor), "dc:creator tag is omitted entirely when meta.author is absent: " + opfNoAuthor);

  const ident = "urn:pbp:" + pbpCrc32(new TextEncoder().encode("https://e.com/b")).toString(16).padStart(8, "0");
  const opfNoAuthor2 = pbpEpubContentOpf({ title: "T", url: "https://e.com/b", clipped: "2026-01-03" }, []);
  assert(opfNoAuthor.includes(`<dc:identifier id="pub-id">${ident}</dc:identifier>`) && opfNoAuthor === opfNoAuthor2,
    "dc:identifier is urn:pbp:+crc32(url) as fixed 8-digit hex and identical output for identical input (deterministic): " + opfNoAuthor);
})();

// nav: heading anchors, XML escaping, empty-headings fallback (4 assertions)
(() => {
  const nav = pbpEpubNavXhtml([{ id: "sec-1", text: "Intro" }, { id: "sec-2", text: "More" }], "My Doc");
  assert(nav.includes('<a href="content.xhtml#sec-1">Intro</a>') && nav.includes('<a href="content.xhtml#sec-2">More</a>'),
    "each heading renders an anchor list item pointing at content.xhtml#<id>: " + nav);

  const navEsc = pbpEpubNavXhtml([{ id: 'a&b', text: "<X> & \"Y\"" }], "T");
  assert(navEsc.includes('href="content.xhtml#a&amp;b"') && navEsc.includes(">&lt;X&gt; &amp; &quot;Y&quot;<"),
    "heading id and text are both XML-escaped: " + navEsc);

  const navEmptyTitled = pbpEpubNavXhtml([], "My Doc");
  const liCount = (navEmptyTitled.match(/<li>/g) || []).length;
  assertEq(liCount, 1, "empty headings array falls back to a single <li> entry");
  assert(navEmptyTitled.includes('<a href="content.xhtml">My Doc</a>'),
    "fallback li has no #id fragment and uses fallbackTitle as its text: " + navEmptyTitled);

  const navEmptyNoTitle = pbpEpubNavXhtml([], undefined);
  assert(navEmptyNoTitle.includes('<a href="content.xhtml">Content</a>') && navEmptyNoTitle.includes("<title>Contents</title>"),
    "with no fallbackTitle: li falls back to 'Content', <title> falls back to 'Contents' (distinct defaults, verbatim): " + navEmptyNoTitle);
})();

// xmlEscape: table-driven, all five reserved XML characters (5 assertions)
[
  ["&", "&amp;"],
  ["<", "&lt;"],
  [">", "&gt;"],
  ['"', "&quot;"],
  ["'", "&apos;"],
].forEach(([ch, esc]) => assertEq(pbpEpubXmlEscape(ch), esc, `pbpEpubXmlEscape(${JSON.stringify(ch)}) -> ${esc}`));

// pbpEpubLang (Codex-C3): canonicalize to BCP-47, "und" for anything illegal --
// a legal tag ("zh-CN"/"ja") round-trips, a free-text translate-target label
// ("Classical Chinese") and an empty string both fall back to "und" (4 assertions).
[
  ["zh-CN", "zh-CN"],
  ["ja", "ja"],
  ["Classical Chinese", "und"],
  ["", "und"],
].forEach(([input, expected]) => assertEq(pbpEpubLang(input), expected, `pbpEpubLang(${JSON.stringify(input)}) -> ${expected}`));
</script>

<script>
section("md-epub: pbpBuildEpub (Task 6 RUNTIME integration)");

// Reverse-parse a stored-only zip straight from its bytes (independent of
// pbpZipStore's own accumulator -- walks the central directory via the EOCD,
// then each local file header via the CD record's byte-42 offset field, same
// technique as the pure-layer "central directory walk" test above).
function _pbpZipEntries(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const eocdOff = bytes.length - 22;
  const count = dv.getUint16(eocdOff + 8, true);
  let rec = dv.getUint32(eocdOff + 16, true);
  const dec = new TextDecoder();
  const out = [];
  for (let i = 0; i < count; i++) {
    const nameLen = dv.getUint16(rec + 28, true);
    const extraLen = dv.getUint16(rec + 30, true);
    const commentLen = dv.getUint16(rec + 32, true);
    const method = dv.getUint16(rec + 10, true);
    const lhOff = dv.getUint32(rec + 42, true);
    const lhNameLen = dv.getUint16(lhOff + 26, true);
    const lhExtraLen = dv.getUint16(lhOff + 28, true);
    const size = dv.getUint32(lhOff + 22, true);
    const dataStart = lhOff + 30 + lhNameLen + lhExtraLen;
    out.push({ name: dec.decode(bytes.slice(rec + 46, rec + 46 + nameLen)), method, data: bytes.slice(dataStart, dataStart + size) });
    rec += 46 + nameLen + extraLen + commentLen;
  }
  return out;
}

// Async (Blob.arrayBuffer()) -- matches the webdav-tests.html convention: the
// whole section runs inside one IIFE whose promise the trailing summary
// script awaits, so #summary/#results only settle once every check() below
// has actually run (no false-early "N passed" while assertions are pending).
window._pbpEpubIntegrationDone = (async () => {
  const meta = { title: "Test Article", url: "https://example.com/a", clipped: "2026-07-12", lang: "en" };

  // Group A: no images -> mimetype first+stored, exactly the 5 required entries (5 assertions).
  const zip1 = new Uint8Array(await pbpBuildEpub({ md: "## Intro\n\nHello world.", meta, images: new Map() }).arrayBuffer());
  const dv1 = new DataView(zip1.buffer);
  assertEq(dv1.getUint32(0, true), 0x04034b50, "pbpBuildEpub zip starts with a local file header signature");
  assertEq(dv1.getUint16(8, true), 0, "pbpBuildEpub first entry (mimetype) uses stored (method 0)");
  assertEq(new TextDecoder().decode(zip1.slice(30, 38)), "mimetype", "pbpBuildEpub first entry's name is literally 'mimetype'");
  const names1 = _pbpZipEntries(zip1).map(e => e.name);
  assertEq(JSON.stringify(names1),
    JSON.stringify(["mimetype", "META-INF/container.xml", "OEBPS/content.opf", "OEBPS/nav.xhtml", "OEBPS/content.xhtml"]),
    "pbpBuildEpub with no images produces exactly the 5 required entries, mimetype first: " + names1.join(", "));

  // Group B: frontmatter + highlights forced off (spec F5) -> content.xhtml carries
  // no YAML block and no literal "==" mark, even though highlights are non-empty
  // (i.e. the "## Highlights" aggregation section IS present -- only the inline
  // "==...==" mark and YAML frontmatter are suppressed). Mirrors the handler's own
  // composeExport call in md-preview.js.
  const hlItems = [{ quote: "important insight", color: 1 }];
  const composedMd = composeExport("## Section\n\nSome important insight text here.", meta, {
    frontmatter: false, highlightsInline: false, highlights: hlItems, imagePolicy: "keep"
  });
  const zip2 = new Uint8Array(await pbpBuildEpub({ md: composedMd, meta, images: new Map() }).arrayBuffer());
  const contentXhtml2 = new TextDecoder().decode(_pbpZipEntries(zip2).find(e => e.name === "OEBPS/content.xhtml").data);
  assert(!/^---$/m.test(contentXhtml2), "content.xhtml carries no YAML frontmatter '---' block: " + contentXhtml2.slice(0, 200));
  assert(!contentXhtml2.includes("=="), "content.xhtml has no literal ==...== inline-highlight mark: " + contentXhtml2.slice(0, 200));

  // Group C: heading id backfill (empty-slug punctuation heading + id-less raw HTML
  // heading) + nav.xhtml anchors correspond 1:1, in order, to content.xhtml heading
  // ids; both files parse as well-formed XHTML (7 assertions).
  const headingMd = ["## !!!", "", "Punctuation-only heading paragraph.", "",
    "<h3>Raw HTML Heading</h3>", "", "Raw HTML heading paragraph.", "",
    "## Normal Heading", "", "Normal heading paragraph."].join("\n");
  const zip3 = new Uint8Array(await pbpBuildEpub({ md: headingMd, meta, images: new Map() }).arrayBuffer());
  const entries3 = _pbpZipEntries(zip3);
  const contentXhtml3 = new TextDecoder().decode(entries3.find(e => e.name === "OEBPS/content.xhtml").data);
  const navXhtml3 = new TextDecoder().decode(entries3.find(e => e.name === "OEBPS/nav.xhtml").data);
  const parser = new DOMParser();
  const contentDoc3 = parser.parseFromString(contentXhtml3, "application/xhtml+xml");
  assertEq(contentDoc3.getElementsByTagName("parsererror").length, 0,
    "content.xhtml parses as well-formed XHTML (no parsererror): " + contentXhtml3.slice(0, 300));
  const navDoc3 = parser.parseFromString(navXhtml3, "application/xhtml+xml");
  assertEq(navDoc3.getElementsByTagName("parsererror").length, 0,
    "nav.xhtml parses as well-formed XHTML (no parsererror): " + navXhtml3.slice(0, 300));
  const headingEls3 = [...contentDoc3.querySelectorAll("h2, h3, h4")];
  assertEq(headingEls3.length, 3, "content.xhtml has all 3 headings (punctuation h2, raw-HTML h3, normal h2)");
  const [hPunct, hRaw, hNormal] = headingEls3;
  assert(!!hPunct && hPunct.id.startsWith("pbp-h-"),
    "punctuation-only heading (slugify -> empty) gets a backfilled pbp-h-N id: " + (hPunct && hPunct.id));
  assert(!!hRaw && hRaw.id.startsWith("pbp-h-"),
    "raw-HTML heading (marked never assigns it an id) gets a backfilled pbp-h-N id: " + (hRaw && hRaw.id));
  assert(!!hNormal && hNormal.id && !hNormal.id.startsWith("pbp-h-"),
    "an ordinary heading keeps its natural slug id, not a backfilled one: " + (hNormal && hNormal.id));
  const navHrefs3 = [...navDoc3.querySelectorAll("a")].map(a => a.getAttribute("href"));
  const expectedHrefs3 = headingEls3.map(h => "content.xhtml#" + h.id);
  assertEq(JSON.stringify(navHrefs3), JSON.stringify(expectedHrefs3),
    "nav.xhtml anchors correspond 1:1, in order, to content.xhtml heading ids: " + navHrefs3.join(", "));

  // Group D: images Map -> zip gets an images/ entry and the XHTML src is
  // rewritten from the absolute URL to the relative images/ path (2 assertions).
  const images4 = new Map([["https://cdn.example.com/pic.jpg", { mime: "image/jpeg", bytes: new Uint8Array([1, 2, 3, 4]) }]]);
  const zip4 = new Uint8Array(await pbpBuildEpub({ md: "![alt text](https://cdn.example.com/pic.jpg)", meta, images: images4 }).arrayBuffer());
  const entries4 = _pbpZipEntries(zip4);
  assert(!!entries4.find(e => e.name === "OEBPS/images/img-0.jpg"),
    "pbpBuildEpub zip contains an OEBPS/images/img-0.jpg entry for a fetched image: " + entries4.map(e => e.name).join(", "));
  const contentXhtml4 = new TextDecoder().decode(entries4.find(e => e.name === "OEBPS/content.xhtml").data);
  assert(contentXhtml4.includes('src="images/img-0.jpg"') && !contentXhtml4.includes("https://cdn.example.com/pic.jpg"),
    "content.xhtml's <img> src is rewritten from the absolute URL to the relative images/ path: " + contentXhtml4);

  // Group E: remote-resources (Codex-C2) -- an <img src="https://..."> left
  // unembedded (default "keep" policy, permission denied, or a partial embed
  // failure all reach pbpBuildEpub with `images` not covering that URL) means
  // EPUB3 requires the content document be declared via manifest
  // properties="remote-resources", or epubcheck fails (1 assertion).
  const zip5 = new Uint8Array(await pbpBuildEpub({ md: "![alt](https://cdn.example.com/unfetched.png)", meta, images: new Map() }).arrayBuffer());
  const opf5 = new TextDecoder().decode(_pbpZipEntries(zip5).find(e => e.name === "OEBPS/content.opf").data);
  const contentItem5 = (opf5.match(/<item id="content"[^>]*\/>/) || [""])[0];
  assert(contentItem5.includes('properties="remote-resources"'),
    'content manifest item gets properties="remote-resources" when a remote <img> stays unembedded: ' + contentItem5);

  // Group F: fully-embedded doc (Group D's images4 case) must NOT declare
  // remote-resources -- no <img src="http..."> is left in the DOM (1 assertion).
  const opf4 = new TextDecoder().decode(entries4.find(e => e.name === "OEBPS/content.opf").data);
  assert(!opf4.includes("remote-resources"), "fully-embedded doc's manifest carries no remote-resources property: " + opf4);

  // Group G: encodeURI fallback (Fable-A) -- marked encodeURI()s the href it
  // renders, so a source URL containing non-ASCII characters lands percent-
  // encoded in the DOM's src attribute even though `images` is keyed by the
  // raw absolute URL. The exact-match querySelectorAll misses; the
  // encodeURI(absUrl) retry must still find and rewrite it (2 assertions).
  const cjkUrl = "https://cdn.example.com/中文图.jpg";
  const images7 = new Map([[cjkUrl, { mime: "image/jpeg", bytes: new Uint8Array([9, 9]) }]]);
  const zip7 = new Uint8Array(await pbpBuildEpub({ md: `![alt](${cjkUrl})`, meta, images: images7 }).arrayBuffer());
  const entries7 = _pbpZipEntries(zip7);
  assert(!!entries7.find(e => e.name === "OEBPS/images/img-0.jpg"),
    "encodeURI-mismatched src still resolves via the encoded-URL fallback and gets a real zip entry: " + entries7.map(e => e.name).join(", "));
  const contentXhtml7 = new TextDecoder().decode(entries7.find(e => e.name === "OEBPS/content.xhtml").data);
  assert(contentXhtml7.includes('src="images/img-0.jpg"'),
    "content.xhtml src is rewritten to the relative images/ path via the encodeURI fallback match: " + contentXhtml7);

  // Group H: an images Map entry with no matching <img> in the DOM at all
  // (neither the raw nor the encodeURI-encoded src) must be skipped entirely --
  // no manifest item, no zip entry (an orphan zip entry fails epubcheck) (2 assertions).
  const images8 = new Map([["https://cdn.example.com/never-referenced.png", { mime: "image/png", bytes: new Uint8Array([1]) }]]);
  const zip8 = new Uint8Array(await pbpBuildEpub({ md: "no images here", meta, images: images8 }).arrayBuffer());
  const entries8 = _pbpZipEntries(zip8);
  assert(!entries8.find(e => e.name.startsWith("OEBPS/images/")),
    "unmatched images Map entry produces no images/ zip entry: " + entries8.map(e => e.name).join(", "));
  const opf8 = new TextDecoder().decode(entries8.find(e => e.name === "OEBPS/content.opf").data);
  assert(!/id="img0"/.test(opf8), "unmatched images Map entry gets no manifest item either: " + opf8);
})();
</script>

<script>
(async () => {
  if (window._pbpEpubIntegrationDone) await window._pbpEpubIntegrationDone;
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
  document.getElementById("summary").style.color = fail ? "#c00" : "#0a0";
})();
</script>
