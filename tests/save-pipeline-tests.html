<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Save Pipeline Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
h2 { margin-top: 24px; font-size: 16px; }
.suite { margin: 12px 0; padding: 8px; border-left: 3px solid #ccc; }
.case { padding: 4px 8px; margin: 4px 0; }
.pass { color: #0a0; background: #f0fff0; }
.fail { color: #c00; background: #fff0f0; font-weight: bold; }
</style></head>
<body>
<h1>Unified Save Pipeline Tests</h1>
<div id="results"></div>
<script src="../shared.js"></script>
<script>
async function test(name, fn) {
  try {
    await fn();
    const div = document.createElement("div"); div.className = "case pass";
    div.textContent = "PASS " + name; document.getElementById("results").appendChild(div);
  } catch (e) {
    const div = document.createElement("div"); div.className = "case fail";
    div.textContent = "FAIL " + name + "\n  " + e.message; document.getElementById("results").appendChild(div);
  }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function equal(actual, expected, msg) {
  if (actual !== expected) throw new Error((msg || "values differ") + `: ${actual} !== ${expected}`);
}
async function suite(name, fn) {
  const div = document.createElement("div"); div.className = "suite";
  const h = document.createElement("h2"); h.textContent = name; div.appendChild(h);
  const results = document.getElementById("results"); const savedAppend = results.appendChild;
  results.appendChild = function(el) { if (el.className?.includes("case")) div.appendChild(el); else savedAppend.call(results, el); };
  await fn(); results.appendChild = savedAppend; results.appendChild(div);
}

const BASE_INTENT = Object.freeze({
  mode: "create",
  url: "https://example.com/article",
  title: "New title",
  notes: "New notes",
  tags: "new-tag",
  private: false,
});

function intent(overrides) { return { ...BASE_INTENT, ...(overrides || {}) }; }
function response(status, data, parseFails) {
  return {
    ok: status >= 200 && status < 300,
    status,
    json: async () => {
      if (parseFails) throw new Error("not json");
      return data;
    },
  };
}

let backgroundSource;
let coreSource;
let backgroundSaveSource;
let batchSaveSource;
let undoSource;
async function getBackgroundSource() {
  if (!backgroundSource) backgroundSource = await (await fetch("../background.js")).text();
  return backgroundSource;
}
async function getCoreSource() {
  if (coreSource) return coreSource;
  const source = await getBackgroundSource();
  const start = source.indexOf("const PBP_SAVE_MODES");
  const end = source.indexOf("// ---- P1: Shared save function ----", start);
  assert(start >= 0 && end > start, "unified pipeline source block not found");
  coreSource = source.slice(start, end);
  return coreSource;
}

async function getBackgroundSaveSource() {
  if (backgroundSaveSource) return backgroundSaveSource;
  const source = await getBackgroundSource();
  const start = source.indexOf("async function saveFromBackground");
  const end = source.indexOf("// Helper: resolve prefix-specific settings", start);
  assert(start >= 0 && end > start, "background save preparation source not found");
  backgroundSaveSource = source.slice(start, end);
  return backgroundSaveSource;
}

async function getBatchSaveSource() {
  if (batchSaveSource) return batchSaveSource;
  const source = await getBackgroundSource();
  const start = source.indexOf("function handleBatchSave");
  const end = source.indexOf("// ===================== Tab Set", start);
  assert(start >= 0 && end > start, "batch save source not found");
  batchSaveSource = source.slice(start, end);
  return batchSaveSource;
}

async function getUndoSource() {
  if (undoSource) return undoSource;
  const source = await getBackgroundSource();
  const start = source.indexOf("const _recentSaves");
  const end = source.indexOf("// ---- 设置图标", start);
  assert(start >= 0 && end > start, "Undo notification source not found");
  undoSource = source.slice(start, end);
  return undoSource;
}

async function createStatusCacheHarness(initialToken, initialFetch) {
  const source = await getBackgroundSource();
  const cacheStart = source.indexOf("// URL 状态缓存");
  const cacheEnd = source.indexOf("// ---- P2: Cached token", cacheStart);
  const checkStart = source.indexOf("async function checkBookmarked");
  const checkEnd = source.indexOf("// ---- Badge:", checkStart);
  const branchStart = source.indexOf('if (message.type === "get_bookmark_data"');
  const branchEnd = source.indexOf('if (message.type === "get_offline_queue"', branchStart);
  assert(cacheStart >= 0 && cacheEnd > cacheStart && checkStart >= 0 && checkEnd > checkStart,
    "account-scoped status cache source not found");
  assert(branchStart >= 0 && branchEnd > branchStart, "bookmark-data branch not found");

  const factory = new Function("initialToken", "initialFetch", "pbpPinboardAccountFromToken", "console", `
    ${source.slice(cacheStart, cacheEnd)}
    let currentToken = initialToken;
    let fetchHandler = initialFetch;
    const pinboardFetch = (...args) => fetchHandler(...args);
    async function getCurrentPinboardAuth() {
      return { token: currentToken || "", account: pbpPinboardAccountFromToken(currentToken), epoch: _pinboardAuthEpoch };
    }
    ${source.slice(checkStart, checkEnd)}
    function invokeBookmarkData(message, sendResponse) {
      ${source.slice(branchStart, branchEnd)}
      throw new Error("unhandled message");
    }
    return {
      checkBookmarked,
      invokeBookmarkData,
      rawCache: statusCache,
      setAuth(token) {
        _pinboardAuthEpoch++;
        currentToken = token;
        statusCache.clear();
      },
      seedRaw(url, account, value) { statusCache.set(url, { ...value, account }); },
      setFetch(fn) { fetchHandler = fn; },
    };
  `);
  return factory(initialToken, initialFetch, pbpPinboardAccountFromToken, console);
}

async function createHarness(options) {
  const opts = options || {};
  const storageData = { offlineQueue: (opts.queue || []).map((item) => ({ ...item })) };
  const events = [];
  const fetchCalls = [];
  const waybackCalls = [];
  const iconCalls = [];
  const badgeCalls = [];
  const statusCache = new Map(opts.cacheEntries || []);
  const settings = {
    pinboardToken: "alice:current-token",
    offlineQueueEnabled: true,
    bgSaveMode: "merge",
    ...(opts.settings || {}),
  };
  const authState = {
    token: Object.prototype.hasOwnProperty.call(opts, "currentToken") ? opts.currentToken : settings.pinboardToken,
    epoch: 0,
  };
  const captureAuth = (token) => ({ account: pbpPinboardAccountFromToken(token), epoch: authState.epoch });
  const authIsCurrent = (auth) => !!auth?.account && auth.epoch === authState.epoch;
  const statusCacheGet = (url, auth) => {
    if (!authIsCurrent(auth)) return null;
    const cached = statusCache.get(url);
    return cached?.account === auth.account ? cached : null;
  };
  const statusCacheSet = (url, auth, value) => {
    if (!authIsCurrent(auth)) return false;
    statusCache.set(url, { ...value, account: auth.account });
    return true;
  };
  const chromeStub = {
    storage: {
      local: {
        get: async (key) => {
          if (typeof key === "string") return { [key]: storageData[key] };
          return { ...storageData };
        },
        set: async (values) => {
          if (opts.failStorageSet) throw new Error("storage unavailable");
          Object.assign(storageData, values);
          events.push("storage:set");
        },
      },
    },
    tabs: { query: async () => opts.activeTab ? [opts.activeTab] : [] },
  };
  const pinboardFetchStub = async (url) => {
    fetchCalls.push(url);
    if (!opts.pinboardFetch) throw new Error("unexpected Pinboard request");
    return opts.pinboardFetch(url, fetchCalls);
  };
  const waybackStub = (url, loadedSettings, archiveOptions) => {
    waybackCalls.push({ url, settings: loadedSettings, options: archiveOptions });
    events.push("wayback");
    if (opts.waybackThrows) throw new Error("wayback unavailable");
    return Promise.resolve();
  };
  const deps = {
    chrome: chromeStub,
    pinboardFetch: pinboardFetchStub,
    statusCache,
    cleanupStatusCache: () => {},
    loadSettings: async () => settings,
    setIcon: (tabId, bookmarked) => iconCalls.push({ tabId, bookmarked }),
    updateBadge: () => { badgeCalls.push(true); return Promise.resolve(); },
    pbpWaybackArchive: waybackStub,
    pbpSameBookmark,
    pbpCreateRecoveringTail,
    pbpOfflineQueueReduce,
    pbpPinboardAccountFromToken,
    pbpOfflineQueueAccount,
    pbpResolveOfflineQueueToken,
    pbpDrainOfflineQueue,
    pbpResolveSavePlan,
    buildPostsAddUri,
    POSTS_ADD_URI_BUDGET,
    pbpCapturePinboardAuth: captureAuth,
    pbpPinboardAuthIsCurrent: authIsCurrent,
    pbpStatusCacheGet: statusCacheGet,
    pbpStatusCacheSet: statusCacheSet,
    getCurrentPinboardAuth: async () => ({
      token: authState.token || "",
      account: pbpPinboardAccountFromToken(authState.token),
      epoch: authState.epoch,
    }),
  };
  const source = await getCoreSource();
  const factory = new Function(...Object.keys(deps), source + `
    return {
      validateSaveIntent, fetchExistingBookmark, deliverSaveIntent,
      submitSaveIntent, submitPopupSaveIntent, sendOfflineItem,
      drainOfflineQueueIds, readOfflineQueueWithIds, retryOfflineItem,
      normalizeOfflineSaveIntent, applySaveResultSideEffects, processOfflineQueue
    };
  `);
  return {
    ...factory(...Object.values(deps)),
    storageData, settings, authState, events, fetchCalls, waybackCalls, iconCalls, badgeCalls, statusCache,
  };
}

async function createBackgroundSaveHarness(options) {
  const opts = options || {};
  const cachedSettings = opts.cachedSettings || {
    pinboardToken: "alice:old-token",
    bgSaveMode: "merge",
    optPrivateDefault: false,
    optPrivateIncognito: true,
    _defaultTags: "base-tag",
    _autoNotes: false,
    _blockquote: false,
    _aiTags: false,
    _aiSummary: false,
  };
  const settingsSequence = opts.settingsSequence || [cachedSettings];
  const notifications = [];
  const intents = [];
  const aiSnapshots = [];
  let loadCount = 0;
  let drainCalls = 0;
  const result = opts.result || { status: "queued", queueId: "q1" };
  const deps = {
    loadSettings: opts.loadSettings || (async () => settingsSequence[Math.min(loadCount++, settingsSequence.length - 1)]),
    pbpEffectivePrivate: (settings, ctx) => !!(
      settings.optPrivateDefault || (settings.optPrivateIncognito && ctx?.incognito)
    ),
    pbpSaveFailure: (reason) => ({ status: "failed", reason }),
    showNotification: (...args) => notifications.push(args),
    t: (key, ...args) => args.length ? `${key}:${args.join(":")}` : key,
    getPageInfoFromTab: opts.getPageInfoFromTab || (async () => {
      if (opts.onGetPageInfo) opts.onGetPageInfo(cachedSettings);
      return null;
    }),
    buildAutoNotes: () => "",
    hasAIKey: (settings) => {
      aiSnapshots.push({
        defaultTags: settings._defaultTags,
        aiTags: settings._aiTags,
        aiSummary: settings._aiSummary,
      });
      return false;
    },
    submitSaveIntent: async (prepared) => {
      intents.push(prepared);
      return result;
    },
    processOfflineQueue: () => { drainCalls++; return Promise.resolve(); },
    getCurrentPinboardAuth: async () => ({
      token: cachedSettings.pinboardToken,
      account: pbpPinboardAccountFromToken(cachedSettings.pinboardToken),
      epoch: 0,
    }),
    POSTS_ADD_URI_BUDGET,
  };
  const source = await getBackgroundSaveSource();
  const factory = new Function(...Object.keys(deps), source + "\nreturn saveFromBackground;");
  return {
    saveFromBackground: factory(...Object.values(deps)),
    cachedSettings,
    notifications,
    intents,
    aiSnapshots,
    get drainCalls() { return drainCalls; },
  };
}

async function createBatchSaveHarness(options) {
  const opts = options || {};
  const settings = {
    pinboardToken: "alice:token",
    optBatchTagEnabled: true,
    optBatchTag: "Batch Tag",
    batchAiTags: false,
    batchAiSummary: false,
    optRespectTagCase: false,
    batchSkipExisting: false,
    optPrivateDefault: false,
    optPrivateIncognito: true,
    optReadlaterDefault: false,
    waybackArchiveBatch: false,
    ...(opts.settings || {}),
  };
  const intents = [];
  const progress = [];
  const notifications = [];
  const badgeCalls = [];
  const outcomes = opts.outcomes || [{ status: "saved", mutation: "created" }];
  let outcomeIndex = 0;
  const deps = {
    _writeBatchProgress: async (value) => progress.push({ ...value }),
    loadSettings: opts.loadSettings || (async () => settings),
    getCurrentPinboardAuth: async () => ({ token: settings.pinboardToken, account: "alice", epoch: 0 }),
    showNotification: (...args) => notifications.push(args),
    t: (key, ...args) => args.length ? `${key}:${args.join(":")}` : key,
    hasAIKey: () => false,
    chrome: { storage: { local: { get: async () => ({}) } } },
    buildTagCaseMap: () => ({}),
    pbpEffectivePrivate: (loaded, ctx) => !!(
      loaded.optPrivateDefault || (loaded.optPrivateIncognito && ctx?.incognito)
    ),
    submitSaveIntent: async (prepared, deliveryOptions) => {
      intents.push({ prepared, deliveryOptions });
      if (opts.submitSaveIntent) return opts.submitSaveIntent(prepared, deliveryOptions, intents.length - 1);
      const outcome = outcomes[Math.min(outcomeIndex++, outcomes.length - 1)];
      if (outcome instanceof Error) throw outcome;
      return outcome;
    },
    updateBadge: () => {
      badgeCalls.push(true);
      return opts.updateBadge ? opts.updateBadge() : Promise.resolve();
    },
  };
  const source = await getBatchSaveSource();
  const factory = new Function(...Object.keys(deps), `let _batchRunning = false;\n${source}\nreturn handleBatchSave;`);
  return {
    handleBatchSave: factory(...Object.values(deps)),
    intents,
    progress,
    notifications,
    badgeCalls,
  };
}

function batchTabs(count) {
  return Array.from({ length: count }, (_, i) => ({
    id: i + 1,
    title: `Tab ${i + 1}`,
    url: `https://batch.example/${i + 1}`,
    incognito: i === 0,
  }));
}

function runBackgroundSave(harness, overrides) {
  return harness.saveFromBackground({
    url: BASE_INTENT.url,
    title: BASE_INTENT.title,
    tab: { id: 9, url: BASE_INTENT.url, incognito: false },
    settingsOverrides: null,
    toread: false,
    notifyId: "qs",
    notifyTitle: "Quick saved",
    notifyCategory: "quickSave",
    ...(overrides || {}),
  });
}

(async () => {
await suite("unified save pipeline", async () => {
  await test("resolver creates with replace=no and materializes read-later false", () => {
    const plan = pbpResolveSavePlan(intent(), null);
    equal(plan.action, "send");
    equal(plan.replace, false);
    equal(plan.mutation, "created");
    equal(plan.fields.toread, false);
    assert(plan.fields.time === undefined, "create must not invent dt");
  });

  await test("resolver merge preserves full existing metadata and only promotes read-later", () => {
    const lookup = { exists: true, post: {
      description: "Existing title", extended: "Existing notes", tags: "Alpha shared",
      shared: "no", toread: "yes", time: "2024-01-02T03:04:05Z",
    } };
    const plan = pbpResolveSavePlan(intent({ mode: "merge", tags: "alpha New", private: false, toread: false }), lookup);
    equal(plan.replace, true);
    equal(plan.mutation, "updated");
    equal(plan.fields.title, "Existing title");
    equal(plan.fields.notes, "Existing notes");
    equal(plan.fields.tags, "Alpha shared New");
    equal(plan.fields.private, true);
    equal(plan.fields.toread, true);
    equal(plan.fields.time, "2024-01-02T03:04:05Z");
    const promoted = pbpResolveSavePlan(intent({ mode: "merge", toread: true }), {
      exists: true, post: {
        description: "", extended: "", tags: "", shared: "yes", toread: "no", time: "known-time",
      },
    });
    equal(promoted.fields.toread, true, "incoming true promotes read-later");
  });

  await test("resolver skip avoids writes and merge-missing discards untrusted time", () => {
    const skipped = pbpResolveSavePlan(intent({ mode: "skip" }), {
      exists: true, post: { description: "Old", shared: "yes", toread: "no", time: "old-time" },
    });
    equal(skipped.action, "skip");
    const missing = pbpResolveSavePlan(intent({ mode: "merge", time: "caller-time" }), { exists: false });
    equal(missing.action, "send");
    equal(missing.replace, false);
    assert(missing.fields.time === undefined, "missing merge must not forward caller dt");
  });

  await test("cached bookmark data is account-scoped after an account switch", async () => {
    const h = await createStatusCacheHarness("alice:old", async () => {
      throw new Error("unexpected fetch");
    });
    h.seedRaw(BASE_INTENT.url, "alice", {
      bookmarked: true,
      timestamp: Date.now(),
      posts: [{ description: "Alice private notes" }],
    });
    h.setAuth("bob:new");
    // Model an old response that somehow survives clearing; the read guard must
    // still reject it for the new account.
    h.seedRaw(BASE_INTENT.url, "alice", {
      bookmarked: true,
      timestamp: Date.now(),
      posts: [{ description: "Alice private notes" }],
    });
    const result = await new Promise((resolve) => {
      const retained = h.invokeBookmarkData(
        { type: "get_bookmark_data", url: BASE_INTENT.url, account: "bob" },
        resolve
      );
      equal(retained, true, "async message channel not retained");
    });
    equal(result.posts, null, "account B received account A cached post data");
    equal(result.account, "bob", "matching account response lost its owner");
    const mismatch = await new Promise((resolve) => {
      h.invokeBookmarkData({ type: "get_bookmark_data", url: BASE_INTENT.url, account: "alice" }, resolve);
    });
    equal(mismatch.account, "", "mismatch response leaked the current account name");
  });

  await test("an account-A check resolving after switch cannot refill the cache", async () => {
    let releaseFetch;
    let fetchStartedResolve;
    const fetchStarted = new Promise((resolve) => { fetchStartedResolve = resolve; });
    const h = await createStatusCacheHarness("alice:old", async () => {
      fetchStartedResolve();
      return new Promise((resolve) => { releaseFetch = () => resolve(response(200, {
        posts: [{ description: "Alice private notes" }],
      })); });
    });
    const pending = h.checkBookmarked(BASE_INTENT.url);
    await fetchStarted;
    h.setAuth("bob:new");
    releaseFetch();
    equal(await pending, false, "stale account check returned account A status");
    equal(h.rawCache.has(BASE_INTENT.url), false, "stale account response refilled the cleared cache");
  });

  await test("queued Pinboard dispatch rejects switch/logout and rewrites same-account rotation", async () => {
    const sharedSource = await (await fetch("../shared.js")).text();
    const start = sharedSource.indexOf("const _pinboardQueue = [];");
    const end = sharedSource.indexOf("// ---- Pinboard posts/add URI builder", start);
    assert(start >= 0 && end > start, "Pinboard queue source not found");
    async function dispatch(currentToken, queuedToken) {
      const fetchCalls = [];
      const chrome = { storage: { local: {
        get: async () => ({ _pbRateLimitTs: 0 }),
        set: async () => {},
      } } };
      const factory = new Function(
        "chrome", "pbpReadSettingsWithSecrets", "SETTINGS_DEFAULTS",
        "pbpAuthorizePinboardApiUrl", "deobfuscateKey", "fetch",
        sharedSource.slice(start, end) + "; return pinboardFetch;"
      );
      const queuedFetch = factory(
        chrome,
        async () => ({ pinboardToken: obfuscateKey(currentToken) }),
        SETTINGS_DEFAULTS,
        pbpAuthorizePinboardApiUrl,
        deobfuscateKey,
        async (requestUrl) => { fetchCalls.push(requestUrl); return response(200, {}); }
      );
      let error = null;
      try {
        await queuedFetch(`https://api.pinboard.in/v1/posts/get?auth_token=${encodeURIComponent(queuedToken)}&format=json`);
      } catch (e) { error = e; }
      return { fetchCalls, error };
    }
    const switched = await dispatch("bob:new", "alice:old");
    equal(switched.error?.code, "account_changed");
    equal(switched.fetchCalls.length, 0, "account switch reached fetch");
    const loggedOut = await dispatch("", "alice:old");
    equal(loggedOut.error?.code, "account_changed");
    equal(loggedOut.fetchCalls.length, 0, "logout reached fetch");
    const rotated = await dispatch("alice:new", "alice:old");
    equal(rotated.fetchCalls.length, 1, "same-account rotation was cancelled");
    equal(new URL(rotated.fetchCalls[0]).searchParams.get("auth_token"), "alice:new");
  });

  await test("preview re-extraction preserves immutable opener owner, tags, and description", async () => {
    const source = await getBackgroundSource();
    const start = source.indexOf('if (message.type === "reextractMarkdown")');
    const end = source.indexOf('if (message.type === "mdPreviewBookmarkInfo"', start);
    assert(start >= 0 && end > start, "reextract branch not found");
    const key = "md_preview_data_owner-test";
    let slot = {
      pending: true, url: BASE_INTENT.url, tabId: 7,
      account: "alice", tags: ["Tag-A", "two words"], description: "A notes\nline 2",
    };
    const chrome = { storage: { local: {
      get: async () => ({ [key]: slot }),
      set: async (values) => { slot = values[key]; },
    } } };
    const factory = new Function("chrome", "extractForPreview", `
      return function invoke(message, sendResponse) { ${source.slice(start, end)} };
    `);
    const invoke = factory(chrome, async ({ engine }) => ({
      source: engine, markdown: "# rebuilt", contentHtml: "", title: "Rebuilt", url: BASE_INTENT.url,
    }));
    const malicious = {
      type: "reextractMarkdown", url: BASE_INTENT.url, tabId: 7, engine: "jina", k: "owner-test",
      account: "bob", tags: ["Bob-secret"], description: "Bob notes",
    };
    const result = await new Promise((resolve) => {
      equal(invoke(malicious, resolve), true, "async reextract channel not retained");
    });
    equal(result.ok, true);
    equal(slot.account, "alice");
    equal(JSON.stringify(slot.tags), JSON.stringify(["Tag-A", "two words"]));
    equal(slot.description, "A notes\nline 2");
  });

  await test("preview bookmark lookup never crosses from captured account A into B", async () => {
    const source = await getBackgroundSource();
    const start = source.indexOf('if (message.type === "mdPreviewBookmarkInfo"');
    const end = source.indexOf("\n});", start);
    assert(start >= 0 && end > start, "preview bookmark branch not found");
    const authA = { token: "alice:old", account: "alice", epoch: 1 };
    let current = authA;
    let checks = 0;
    const factory = new Function(
      "getCurrentPinboardAuth", "pbpPinboardAuthIsCurrent", "checkBookmarked",
      "pbpStatusCacheGet", "pbpStatusCacheSet", "pinboardFetch", "chrome", `
        return function invoke(message, sendResponse) { ${source.slice(start, end)} };
      `
    );
    const invoke = factory(
      async () => { current = { token: "bob:new", account: "bob", epoch: 2 }; return authA; },
      (candidate) => candidate === current,
      async (_url, captured) => { checks++; return captured === current; },
      () => null,
      () => false,
      async () => { throw new Error("cross-account fetch"); },
      { storage: { local: {} } }
    );
    const stale = await new Promise((resolve) => invoke({
      type: "mdPreviewBookmarkInfo", url: BASE_INTENT.url, account: "alice",
    }, resolve));
    equal(checks, 1, "captured lookup was not invoked once");
    equal(stale.bookmarked, false);
    equal(stale.account, "", "stale preview learned the new account");

    checks = 0;
    const legacy = await new Promise((resolve) => invoke({
      type: "mdPreviewBookmarkInfo", url: BASE_INTENT.url, account: "",
    }, resolve));
    equal(checks, 0, "ownerless legacy preview performed a Pinboard lookup");
    equal(legacy.account, "");
  });

  await test("preview opener and restore payloads carry account, tags, and description", async () => {
    const [popupSource, previewSource, source] = await Promise.all([
      fetch("../popup.js").then((r) => r.text()),
      fetch("../md-preview.js").then((r) => r.text()),
      getBackgroundSource(),
    ]);
    const popupPayload = popupSource.slice(popupSource.indexOf("const openPreview"), popupSource.indexOf("const downloadMd"));
    assert(popupPayload.includes("account: sessionAccount"), "popup preview payload has no owner");
    assert(popupPayload.includes('description: $id("description-input")?.value || ""'), "popup preview drops notes");
    assert(previewSource.includes("account: previewAccount, tags, description, ts: Date.now()"), "restore record drops owner metadata");
    assert(previewSource.includes("if (url && previewAccount)"), "ownerless preview still requests bookmark data");
    const shortcut = source.slice(source.indexOf("async function openMarkdownPreviewFromShortcut"));
    assert(shortcut.includes('account: auth.account || ""'), "shortcut preview payload has no owner field");
  });

  await test("concurrent Batch start messages reserve exactly one run before auth resolves", async () => {
    const source = await getBackgroundSource();

    equal(quick.intents[0].mode, "skip");
    equal(quick.intents[0].private, true);
    equal(quick.intents[0].toread, undefined);
    equal(quick.intents[0].archive, undefined);
    equal(quick.intents[0].tags, "quick-tag");

    const readLater = await createBackgroundSaveHarness({ cachedSettings: {
      pinboardToken: "token", bgSaveMode: "overwrite", optPrivateDefault: false,
      optPrivateIncognito: false, _defaultTags: "", _aiTags: false, _aiSummary: false,
    } });
    await runBackgroundSave(readLater, { toread: true, notifyId: "rl", notifyCategory: "readLater" });
    equal(readLater.intents[0].mode, "overwrite");
    equal(readLater.intents[0].private, false);
    equal(readLater.intents[0].toread, true);
  });

  await test("concurrent background preparations isolate prefix settings from the shared cache", async () => {
    const cachedSettings = {
      pinboardToken: "token", bgSaveMode: "merge", optPrivateDefault: false,
      optPrivateIncognito: false, _defaultTags: "base-tag", _aiTags: false, _aiSummary: false,
    };
    let pageInfoCalls = 0;
    let releaseFirst;
    let markFirstEntered;
    const firstEntered = new Promise((resolve) => { markFirstEntered = resolve; });
    const firstGate = new Promise((resolve) => { releaseFirst = resolve; });
    const h = await createBackgroundSaveHarness({
      cachedSettings,
      getPageInfoFromTab: async () => {
        pageInfoCalls++;
        if (pageInfoCalls === 1) {
          markFirstEntered();
          await firstGate;
        }
        return { pageText: "body" };
      },
    });
    const quick = runBackgroundSave(h, {
      settingsOverrides: { _defaultTags: "quick-tag", _aiTags: true, _aiSummary: false },
    });
    await firstEntered;
    const read = runBackgroundSave(h, {
      toread: true,
      settingsOverrides: { _defaultTags: "read-tag", _aiTags: false, _aiSummary: true },
    });
    await read;
    releaseFirst();
    await quick;

    equal(cachedSettings._defaultTags, "base-tag");
    equal(cachedSettings._aiTags, false);
    equal(cachedSettings._aiSummary, false);
    assert(h.intents.some((prepared) => prepared.tags === "quick-tag" && prepared.toread === undefined), "Quick snapshot preserved");
    assert(h.intents.some((prepared) => prepared.tags === "read-tag" && prepared.toread === true), "Read Later snapshot preserved");
    assert(h.aiSnapshots.some((snapshot) => snapshot.defaultTags === "quick-tag" && snapshot.aiTags && !snapshot.aiSummary), "Quick AI flags isolated");
    assert(h.aiSnapshots.some((snapshot) => snapshot.defaultTags === "read-tag" && !snapshot.aiTags && snapshot.aiSummary), "Read Later AI flags isolated");
  });

  await test("only confirmed creation receives Undo bound to the captured save account", async () => {
    const beforeAi = {
      pinboardToken: "old-token", bgSaveMode: "merge", optPrivateDefault: false,
      optPrivateIncognito: false, _defaultTags: "", _aiTags: false, _aiSummary: false,
    };
    const atSave = { ...beforeAi, pinboardToken: "current-token" };
    const created = await createBackgroundSaveHarness({
      settingsSequence: [beforeAi, atSave],
      result: { status: "saved", mutation: "created", account: "alice" },
    });
    const createdResult = await runBackgroundSave(created);
    equal(createdResult.mutation, "created");
    equal(created.notifications[0][4].account, "alice");
    assert(!("token" in created.notifications[0][4]), "Undo metadata must not retain a raw token");
    equal(created.drainCalls, 1);

    let reads = 0;
    const undoReadFailure = await createBackgroundSaveHarness({
      loadSettings: async () => {
        reads++;
        if (reads > 1) throw new Error("storage unavailable");
        return beforeAi;
      },
      result: { status: "saved", mutation: "created" },
    });
    const accepted = await runBackgroundSave(undoReadFailure);
    equal(accepted.status, "saved");
    equal(undoReadFailure.notifications[0][4], undefined, "Undo read failure does not downgrade saved result");

    for (const mutation of ["updated", "unknown"]) {
      const h = await createBackgroundSaveHarness({ result: { status: "saved", mutation } });
      await runBackgroundSave(h);
      equal(h.notifications[0][4], undefined, `${mutation} must not expose destructive Undo`);
      equal(h.drainCalls, 1, "saved result keeps opportunistic drain");
    }
  });

  await test("Undo rereads the current token, rejects logout/account switch, and accepts same-account rotation", async () => {
    let releaseSave;
    let saveStartedResolve;
    const saveStarted = new Promise((resolve) => { saveStartedResolve = resolve; });
    const h = await createHarness({
      settings: { pinboardToken: "alice:at-save" },
      pinboardFetch: async () => {
        saveStartedResolve();
        await new Promise((resolve) => { releaseSave = resolve; });
        return response(200, { result_code: "done" });
      },
    });
    const pending = h.submitSaveIntent(intent());
    await saveStarted;
    h.settings.pinboardToken = "bob:after-save";
    releaseSave();
    const captured = await pending;
    equal(captured.account, "alice", "pending save must retain its delivery account");

    let clickHandler;
    let currentToken = "";
    let authEpoch = 0;
    let switchDuringRead = false;
    const deleteCalls = [];
    const notificationChrome = {
      notifications: {
        onButtonClicked: { addListener(fn) { clickHandler = fn; } },
        create() {},
      },
    };
    const deps = {
      chrome: notificationChrome,
      SETTINGS_DEFAULTS,
      pbpReadSettingsWithSecrets: async () => {
        const tokenAtRead = currentToken;
        if (switchDuringRead) {
          switchDuringRead = false;
          authEpoch++;
          currentToken = "bob:after-race";
        }
        return { pinboardToken: tokenAtRead ? obfuscateKey(tokenAtRead) : "" };
      },
      deobfuscateKey,
      pbpResolveOfflineQueueToken,
      pbpPinboardAccountFromToken,
      pbpPinboardAuthEpoch: () => authEpoch,
      pbpPinboardAuthIsCurrent: (auth) => !!auth?.account && auth.epoch === authEpoch,
      pinboardFetch: async (url) => {
        deleteCalls.push(url);
        return { json: async () => ({ result_code: "done" }) };
      },
      getSettingsStorage: async () => ({ get: async (defaults) => defaults }),
      statusCache: new Map(),
      pbpCapturePinboardAuth: (token) => ({ account: pbpPinboardAccountFromToken(token), epoch: authEpoch }),
      pbpStatusCacheSet: (url, auth, value) => {
        if (!auth?.account || auth.epoch !== authEpoch) return false;
        deps.statusCache.set(url, { ...value, account: auth.account });
        return true;
      },
      t: (key) => key,
      setTimeout: () => 0,
      console,
    };
    const source = await getUndoSource();
    const factory = new Function(...Object.keys(deps), `${source}\nreturn { recent: _recentSaves };`);
    const { recent } = factory(...Object.values(deps));

    recent.set("logout", { url: BASE_INTENT.url, account: "alice" });
    authEpoch++;
    currentToken = "";
    await clickHandler("logout", 0);
    equal(deleteCalls.length, 0, "logout must not reuse an Undo credential");

    recent.set("switched", { url: BASE_INTENT.url, account: captured.account });
    authEpoch++;
    currentToken = "bob:current";
    await clickHandler("switched", 0);
    equal(deleteCalls.length, 0, "account switch must not delete the prior account bookmark");

    recent.set("switch-during-read", { url: BASE_INTENT.url, account: "alice" });
    authEpoch++;
    currentToken = "alice:stale-read";
    switchDuringRead = true;
    await clickHandler("switch-during-read", 0);
    equal(deleteCalls.length, 0, "account switch during the fresh read reused its stale token");

    recent.set("rotated", { url: BASE_INTENT.url, account: "alice" });
    authEpoch++;
    currentToken = "alice:rotated";
    await clickHandler("rotated", 0);
    equal(deleteCalls.length, 1, "same-account token rotation should keep Undo usable");
    equal(new URL(deleteCalls[0]).searchParams.get("auth_token"), "alice:rotated");
  });

  await test("queued background save notifies without success or opportunistic drain", async () => {
    const h = await createBackgroundSaveHarness({ result: { status: "queued", queueId: "q1" } });
    const result = await runBackgroundSave(h);
    equal(result.status, "queued");
    equal(h.notifications.length, 1);
    equal(h.notifications[0][0], "qs-queued");
    equal(h.notifications[0][1], "bgQueuedOffline");
    equal(h.drainCalls, 0);
  });

  await test("skipped background save notifies without success or opportunistic drain", async () => {
    const h = await createBackgroundSaveHarness({ result: { status: "skipped" } });
    const result = await runBackgroundSave(h);
    equal(result.status, "skipped");
    equal(h.notifications.length, 1);
    equal(h.notifications[0][0], "qs-skipped");
    equal(h.notifications[0][1], "bgSkippedTitle");
    equal(h.drainCalls, 0);
  });

  await test("failed background saves reuse the existing failure notification mappings", async () => {
    const cases = [
      [{ status: "failed", reason: "not_logged_in" }, "bgNotLoggedIn", "bgSetToken"],
      [{ status: "failed", reason: "too_long", detail: "4001" }, "bgSaveFailed", "uriTooLong:4001:3900"],
      [{ status: "failed", reason: "lookup" }, "bgNetworkError", "pinboardErrorOffline"],
      [{ status: "failed", reason: "api", detail: "bad response" }, "bgSaveFailed", "bad response"],
    ];
    for (const [failure, expectedTitle, expectedMessage] of cases) {
      const h = await createBackgroundSaveHarness({ result: failure });
      const result = await runBackgroundSave(h);
      equal(result.reason, failure.reason);
      equal(h.notifications[0][0], "qs-error");
      equal(h.notifications[0][1], expectedTitle);
      equal(h.notifications[0][2], expectedMessage);
      equal(h.drainCalls, 0);
    }

    const noToken = await createBackgroundSaveHarness({ cachedSettings: {
      pinboardToken: "", bgSaveMode: "merge", optPrivateDefault: false,
      optPrivateIncognito: false, _defaultTags: "", _aiTags: false, _aiSummary: false,
    } });
    const early = await runBackgroundSave(noToken);
    equal(early.reason, "not_logged_in");
    equal(noToken.intents.length, 0, "missing token stops before submit");
    equal(noToken.notifications[0][1], "bgNotLoggedIn");
  });

  await test("Batch delegates mixed outcomes to unified intents and aggregates once", async () => {
    const productionSource = await getBatchSaveSource();
    for (const legacyCall of [
      "buildPostsAddUri(", "pinboardFetch(", "statusCache", "pbpWaybackArchive(",
      "fetchExistingUrlSet(", "computeSavedUrlSet(", "cached_existing_urls",
    ]) {
      assert(!productionSource.includes(legacyCall), `legacy Batch delivery remains: ${legacyCall}`);
    }

    const h = await createBatchSaveHarness({ outcomes: [
      { status: "saved", mutation: "created" },
      { status: "queued", queueId: "q1" },
      { status: "skipped" },
      { status: "failed", reason: "too_long" },
      { status: "failed", reason: "api" },
    ] });
    await h.handleBatchSave(batchTabs(5));

    equal(h.intents.length, 5);
    assert(h.intents.every((call) => call.prepared.mode === "merge"), "default Batch mode must be merge");
    assert(h.intents.every((call) => call.prepared.toread === undefined), "disabled read-later must stay undefined");
    assert(h.intents.every((call) => call.prepared.archive === false), "disabled Batch Wayback must be explicit false");
    assert(h.intents.every((call) => call.deliveryOptions.deferBadge === true), "each Batch delivery must defer badge refresh");
    equal(h.intents[0].prepared.private, true, "incognito privacy snapshot lost");
    equal(h.intents[0].prepared.tags, "Batch-Tag");

    const done = h.progress[h.progress.length - 1];
    assert(done, "missing Batch progress: " + JSON.stringify(h.progress));
    equal(h.progress.filter((entry) => !entry.done).map((entry) => entry.i).join(","), "0,1,2,3,4,5");
    equal(done.i, 5);
    equal(done.saved, 1); equal(done.queued, 1); equal(done.skipped, 1);
    equal(done.failed, 1); equal(done.tooLong, 1);
    equal(h.badgeCalls.length, 1, "saved Batch refreshes badge once after the loop");
    equal(h.notifications.length, 1);
    equal(h.notifications[0][1], "bgBatchSaved");
    assert(h.notifications[0][2].includes("offlineQueued:1"), "mixed notification omits queued count");
    assert(h.notifications[0][2].includes("batchTaggedSuffix:Batch-Tag"), "Batch tag suffix missing");

    const noToken = await createBatchSaveHarness({ settings: { pinboardToken: "" } });
    await noToken.handleBatchSave(batchTabs(3));
    equal(noToken.progress.length, 0, "missing token created accountless Batch progress");

    const loadFailed = await createBatchSaveHarness({ loadSettings: async () => { throw new Error("settings unavailable"); } });
    await loadFailed.handleBatchSave(batchTabs(3));
    equal(loadFailed.progress[loadFailed.progress.length - 1].i, 0, "settings failure falsely processed every tab");
  });

  await test("Batch completion waits for its single deferred badge refresh", async () => {
    let markBadgeStarted;
    let releaseBadge;
    const badgeStarted = new Promise((resolve) => { markBadgeStarted = resolve; });
    const badgeGate = new Promise((resolve) => { releaseBadge = resolve; });
    const h = await createBatchSaveHarness({
      outcomes: [{ status: "saved", mutation: "created" }],
      updateBadge: () => { markBadgeStarted(); return badgeGate; },
    });

    let resolved = false;
    const pending = h.handleBatchSave(batchTabs(1)).then(() => { resolved = true; });
    await badgeStarted;
    await Promise.resolve();
    equal(h.badgeCalls.length, 1, "badge refresh must be invoked exactly once");
    equal(resolved, false, "Batch resolved before badge refresh settled");
    assert(!h.progress.some((entry) => entry.done), "final progress was written before badge refresh settled");

    releaseBadge();
    await pending;
    equal(resolved, true);
    equal(h.badgeCalls.length, 1);
    equal(h.progress[h.progress.length - 1].done, true);
  });

  await test("Batch skip/read-later/archive settings map exactly without success side effects", async () => {
    const h = await createBatchSaveHarness({
      settings: { batchSkipExisting: true, optReadlaterDefault: true, waybackArchiveBatch: true },
      outcomes: [{ status: "skipped" }],
    });
    await h.handleBatchSave(batchTabs(1));
    equal(h.intents[0].prepared.mode, "skip");
    equal(h.intents[0].prepared.toread, true);
    equal(h.intents[0].prepared.archive, undefined);
    equal(h.progress[h.progress.length - 1].skipped, 1);
    equal(h.badgeCalls.length, 0);
    equal(h.notifications.length, 0, "all-skipped Batch must not masquerade as saved");
  });

  await test("Batch isolates a thrown tab delivery and continues", async () => {
    const h = await createBatchSaveHarness({ outcomes: [
      new Error("one tab failed"),
      { status: "saved", mutation: "created" },
    ] });
    await h.handleBatchSave(batchTabs(2));
    equal(h.intents.length, 2, "later tabs must still run");
    const done = h.progress[h.progress.length - 1];
    equal(done.failed, 1);
    equal(done.saved, 1);
    equal(h.badgeCalls.length, 1);
  });

  await test("all-queued Batch notifies acceptance without badge refresh", async () => {
    const h = await createBatchSaveHarness({
      outcomes: [{ status: "queued", queueId: "q1" }, { status: "queued", queueId: "q2" }],
    });
    await h.handleBatchSave(batchTabs(2));
    const done = h.progress[h.progress.length - 1];
    equal(done.queued, 2);
    equal(done.failed, 0);
    equal(h.badgeCalls.length, 0);
    equal(h.notifications.length, 1);
    equal(h.notifications[0][1], "bgQueuedOffline");
    assert(h.notifications[0][2].includes("batchDone:0:0"), "all-queued notification lacks completion summary");
    assert(h.notifications[0][2].includes("offlineQueued:2"), "all-queued notification lacks queued count");
  });
});
})();
