<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Jina Cache Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; } h2 { margin-top: 24px; }
</style></head>
<body>
<h1>isStaleCacheEntry() tests</h1>
<div id="results"></div>
<script src="../i18n.js"></script>
<script src="../shared.js"></script>
<script src="../ai.js"></script>
<script src="../jina.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}`;
  root.appendChild(div);
}
const ONE_HOUR = 60 * 60 * 1000, TWO_HOURS = 2 * ONE_HOUR, now = Date.now();
check("null entry is stale", isStaleCacheEntry(null, now, ONE_HOUR));
check("undefined entry is stale", isStaleCacheEntry(undefined, now, ONE_HOUR));
check("non-object entry is stale", isStaleCacheEntry("string", now, ONE_HOUR));
check("30min old / 1h TTL is fresh", !isStaleCacheEntry({ result: {}, timestamp: now - 30 * 60 * 1000 }, now, ONE_HOUR));
check("2h old / 1h TTL is stale", isStaleCacheEntry({ result: {}, timestamp: now - TWO_HOURS }, now, ONE_HOUR));
check("exactly 1h old is fresh (boundary, > not >=)", !isStaleCacheEntry({ result: {}, timestamp: now - ONE_HOUR }, now, ONE_HOUR));
check("1h+1ms old is stale", isStaleCacheEntry({ result: {}, timestamp: now - ONE_HOUR - 1 }, now, ONE_HOUR));
check("missing timestamp is stale", isStaleCacheEntry({ result: {} }, now, ONE_HOUR));

// ---- resolveCacheMs: 0 must mean "disabled", null/undefined must mean default ----
const HOUR_MS = 60 * 60 * 1000;
check("resolveCacheMs(0) returns 0 (disabled)", resolveCacheMs(0) === 0);
check("resolveCacheMs('0') returns 0 (numeric-string disabled)", resolveCacheMs("0") === 0);
check("resolveCacheMs(null) returns default 60m", resolveCacheMs(null) === HOUR_MS);
check("resolveCacheMs(undefined) returns default 60m", resolveCacheMs(undefined) === HOUR_MS);
check("resolveCacheMs('') returns default 60m", resolveCacheMs("") === HOUR_MS);
check("resolveCacheMs(NaN) returns default 60m", resolveCacheMs(NaN) === HOUR_MS);
check("resolveCacheMs(30) returns 30m in ms", resolveCacheMs(30) === 30 * 60 * 1000);
check("resolveCacheMs(120) returns 120m in ms", resolveCacheMs(120) === 120 * 60 * 1000);
// save-coercion contract (mirrors options.js:861 Math.min/Math.max clamp): 0 must survive
const coerce = (v) => Math.min(10080, Math.max(0, (v === "" || v == null || isNaN(parseInt(v))) ? 60 : parseInt(v)));
check("save coercion keeps 0 as 0 (not 60)", coerce("0") === 0);
check("save coercion keeps blank as 60", coerce("") === 60);
check("save coercion clamps 99999 to 10080", coerce("99999") === 10080);

async function acheck(name, fn) {
  try { await fn(); check(name, true); }
  catch (e) { console.error(name, e); check(name, false); }
}

(async function () {
  const realChrome = window.chrome;
  const realFetch = window.fetch;
  try {
    await acheck("Jina cache hit needs neither permission check nor fetch", async () => {
      let checks = 0, fetches = 0;
      const url = "https://example.com/cached";
      const key = `jina_md_${url}`;
      window.chrome = {
        runtime: { id: "test-extension" },
        storage: { local: { get: async () => ({ [key]: { result: { markdown: "cached" }, timestamp: Date.now() } }) } },
        permissions: { contains: async () => { checks++; return false; } },
      };
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      const result = await fetchJinaMarkdown(url, { cacheDuration: 60 });
      if (!result.fromCache || result.markdown !== "cached" || checks !== 0 || fetches !== 0) throw new Error("cache-first contract failed");
    });

    await acheck("Jina cache miss checks exact permission before one fetch", async () => {
      let checked = null, fetches = 0;
      window.chrome = {
        runtime: { id: "test-extension" },
        storage: { local: { get: async () => ({}) } },
        permissions: { contains: async (spec) => { checked = spec.origins; return true; } },
      };
      window.fetch = async () => {
        fetches++;
        return { ok: true, json: async () => ({ data: { content: "fresh", url: "https://example.com/fresh" } }) };
      };
      const result = await fetchJinaMarkdown("https://example.com/fresh", { cacheDuration: 0 });
      if (checked?.[0] !== PBP_JINA_ORIGIN_PATTERN || fetches !== 1 || result.fromCache || result.markdown !== "fresh") throw new Error("miss gate failed");
    });

    await acheck("Jina false, throwing, or missing permission state returns host_permission with zero fetch", async () => {
      let fetches = 0;
      window.fetch = async () => { fetches++; throw new Error("must not fetch"); };
      for (const mode of ["false", "throw", "missing"]) {
        const permissions = mode === "missing" ? {} : { contains: async () => {
          if (mode === "throw") throw new Error("unavailable");
          return false;
        } };
        window.chrome = {
          runtime: { id: "test-extension" },
          storage: { local: { get: async () => ({}) } },
          permissions,
        };
        const result = await fetchJinaMarkdown("https://example.com/denied", { cacheDuration: 0 });
        if (result.error !== "host_permission" || result.code !== "host_permission") throw new Error(mode + ": wrong result");
      }
      if (fetches !== 0) throw new Error("permission failure fetched");
    });

    await acheck("non-extension test context can exercise a Jina cache miss", async () => {
      let fetches = 0;
      window.chrome = { storage: { local: { get: async () => ({}) } } };
      window.fetch = async () => {
        fetches++;
        return { ok: true, json: async () => ({ data: { content: "test" } }) };
      };
      const result = await fetchJinaMarkdown("https://example.com/test", { cacheDuration: 0 });
      if (result.error || result.markdown !== "test" || fetches !== 1) throw new Error("non-extension compatibility failed");
    });
  } finally {
    window.chrome = realChrome;
    window.fetch = realFetch;
    const summary = document.createElement("h2");
    summary.textContent = `Results: ${pass} pass, ${fail} fail`;
    root.insertBefore(summary, root.firstChild);
  }
})();
</script>
</body></html>
