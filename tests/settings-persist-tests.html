<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Settings Persistence Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; } h2 { margin-top: 24px; }
</style></head>
<body>
<h1>Settings persistence robustness tests</h1>
<div id="results"></div>
<script>
// Load options.js helpers without booting the full settings page in this fixture.
document.addEventListener("DOMContentLoaded", (event) => event.stopImmediatePropagation(), { once: true });
</script>
<script src="../shared.js"></script>
<script src="../options-backup.js"></script>
<script src="../export-targets.js"></script>
<script src="../options.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}`;
  root.appendChild(div);
}
async function run() {
  // ---------- E1: persistSettings quota guard ----------
  const LARGE_KEYS = ["customTagPrompt","customSummaryPrompt","translateGlossary","tagPresets"];

  // (a) large keys are routed away from the inline batch (chunked separately)
  let batchSet = null;
  const largeWrites = [];
  globalThis.__pbpTestStorage = {
    set: (d) => { batchSet = d; return Promise.resolve(); },
    get: () => Promise.resolve({}),
  };
  // syncSetLarge in this stub mode records the key it was asked to chunk
  globalThis.__pbpTestSyncSetLarge = (k) => { largeWrites.push(k); return Promise.resolve(); };

  const data = { optTheme: "nord", customTagPrompt: "x".repeat(9000), tagPresets: "y".repeat(9000) };
  const r1 = await persistSettings(data);
  check("E1 persistSettings reports ok on success", r1.ok === true);
  check("E1 large keys NOT in inline batch", batchSet && !("customTagPrompt" in batchSet) && !("tagPresets" in batchSet));
  check("E1 large keys routed to syncSetLarge", largeWrites.includes("customTagPrompt") && largeWrites.includes("tagPresets"));
  check("E1 small keys stay in inline batch", batchSet && batchSet.optTheme === "nord");

  // (b) quota reject on the inline batch is caught + reported, not thrown
  globalThis.__pbpTestStorage = {
    set: () => Promise.reject(new Error("QUOTA_BYTES quota exceeded")),
    get: () => Promise.resolve({}),
  };
  let threw = false, r2 = null;
  try { r2 = await persistSettings({ optTheme: "dracula" }); }
  catch (_) { threw = true; }
  check("E1 quota reject does NOT throw out of persistSettings", threw === false);
  check("E1 quota reject reported as not-ok", r2 && r2.ok === false && /quota/i.test(r2.error.message));

  const baselineSettings = {
    optTheme: "auto",
    customTagPrompt: "",
    urlClean: { enabled: true, customParams: [], excludeParams: [] },
  };
  check("E1 settings delta: untouched stale form fields are omitted",
    JSON.stringify(pbpSettingsDelta({ ...baselineSettings, customFont: "Inter" }, baselineSettings)) ===
      JSON.stringify({ customFont: "Inter" }));
  check("E1 settings delta: an explicit empty value is preserved",
    pbpSettingsDelta({ ...baselineSettings, optTheme: "" }, baselineSettings).optTheme === "");
  check("E1 settings delta: nested settings use value equality",
    Object.keys(pbpSettingsDelta({ ...baselineSettings, urlClean: { ...baselineSettings.urlClean } }, baselineSettings)).length === 0 &&
    pbpSettingsDelta({ ...baselineSettings, urlClean: { ...baselineSettings.urlClean, enabled: false } }, baselineSettings).urlClean.enabled === false);

  let persistedDelta = null;
  let settingsSavedDelta = null;
  const snapshotState = { settings: { optTheme: "auto", customFont: "" }, overlay: "base-css" };
  const snapshotResult = await pbpSaveOptionsSnapshot(
    snapshotState,
    { optTheme: "auto", customFont: "Inter" },
    "base-css",
    {
      persist: async (delta) => { persistedDelta = delta; return { ok: true, fellBackToLocal: false }; },
      saveOverlay: async () => ({ fellBackToLocal: false }),
      assertOverlay: () => {},
      onSettingsSaved: (delta) => { settingsSavedDelta = delta; },
    }
  );
  check("E1 options snapshot: runtime save writes only the changed settings delta",
    JSON.stringify(persistedDelta) === JSON.stringify({ customFont: "Inter" }) &&
    JSON.stringify(settingsSavedDelta) === JSON.stringify(persistedDelta) &&
    snapshotState.settings.optTheme === "auto" && snapshotResult.overlayChanged === false);

  const inFlightState = { settings: { a: 1, b: 1 }, overlay: "" };
  const inFlightForm = { a: 2, b: 1 };
  let releaseInFlight;
  const inFlightSave = pbpSaveOptionsSnapshot(inFlightState, inFlightForm, "", {
    persist: async () => {
      await new Promise((resolve) => { releaseInFlight = resolve; });
      return { ok: true, fellBackToLocal: false };
    },
    saveOverlay: async () => ({ fellBackToLocal: false }),
    assertOverlay: () => {},
  });
  await Promise.resolve();
  inFlightForm.b = 3;
  releaseInFlight();
  await inFlightSave;
  check("E1 options snapshot: edits made while saving remain dirty for the next delta",
    JSON.stringify(pbpSettingsDelta(inFlightForm, inFlightState.settings)) === JSON.stringify({ b: 3 }));

  const failedState = { settings: { optTheme: "auto" }, overlay: "" };
  let failedSaveError = null;
  try {
    await pbpSaveOptionsSnapshot(failedState, { optTheme: "dark" }, "", {
      persist: async () => ({ ok: false, error: new Error("write failed") }),
      saveOverlay: async () => ({ fellBackToLocal: false }),
      assertOverlay: () => {},
    });
  } catch (error) { failedSaveError = error; }
  check("E1 options snapshot: failed settings write does not advance the baseline",
    failedSaveError?.message === "write failed" && failedState.settings.optTheme === "auto");

  const oversizedState = { settings: { optTheme: "auto" }, overlay: "valid-css" };
  let oversizedPersisted = null;
  let oversizedOverlayWrites = 0;
  let oversizedError = null;
  try {
    await pbpSaveOptionsSnapshot(oversizedState, { optTheme: "dark" }, "oversized-css", {
      persist: async (delta) => { oversizedPersisted = delta; return { ok: true, fellBackToLocal: false }; },
      saveOverlay: async () => { oversizedOverlayWrites++; return { fellBackToLocal: false }; },
      assertOverlay: () => { throw new RangeError("too large"); },
    });
  } catch (error) { oversizedError = error; }
  check("E1 options snapshot: invalid overlay cannot block or roll back ordinary settings",
    oversizedError instanceof RangeError && oversizedPersisted.optTheme === "dark" &&
    oversizedState.settings.optTheme === "dark" && oversizedState.overlay === "valid-css" && oversizedOverlayWrites === 0);

  const overlayOnlyState = { settings: { optTheme: "auto" }, overlay: "before" };
  let overlayOnlyPersistCalls = 0;
  let overlayOnlyValue = "";
  await pbpSaveOptionsSnapshot(overlayOnlyState, { optTheme: "auto" }, "after", {
    persist: async () => { overlayOnlyPersistCalls++; return { ok: true, fellBackToLocal: false }; },
    saveOverlay: async (value) => { overlayOnlyValue = value; return { fellBackToLocal: false }; },
    assertOverlay: () => {},
  });
  check("E1 options snapshot: overlay baseline advances independently without a settings write",
    overlayOnlyPersistCalls === 0 && overlayOnlyValue === "after" && overlayOnlyState.overlay === "after");

  const optionQueueState = { suspended: true, chain: Promise.resolve() };
  let optionQueueCalls = 0;
  await pbpQueueOptionsSave(optionQueueState, async () => { optionQueueCalls++; });
  optionQueueState.suspended = false;
  const optionQueueOrder = [];
  let releaseQueuedSave;
  const queuedFirst = pbpQueueOptionsSave(optionQueueState, async () => {
    optionQueueOrder.push("first-enter");
    await new Promise((resolve) => { releaseQueuedSave = resolve; });
    optionQueueOrder.push("first-exit");
  });
  const queuedSecond = pbpQueueOptionsSave(optionQueueState, async () => {
    optionQueueOrder.push("second");
  });
  await Promise.resolve();
  releaseQueuedSave();
  await Promise.all([queuedFirst, queuedSecond]);
  check("E1 options save queue: suspension blocks direct saves and active saves remain serialized",
    optionQueueCalls === 0 && optionQueueOrder.join(",") === "first-enter,first-exit,second");

  const recoveringQueueState = { suspended: false, chain: Promise.resolve() };
  let reportedQueueError = null;
  try {
    await pbpQueueOptionsSave(recoveringQueueState, async () => { throw new Error("unexpected save crash"); });
  } catch (error) { reportedQueueError = error; }
  let recoveredQueueCalls = 0;
  await pbpQueueOptionsSave(recoveringQueueState, async () => { recoveredQueueCalls++; });
  check("E1 options save queue: a rejected task is reportable but cannot poison the stored queue tail",
    reportedQueueError?.message === "unexpected save crash" && recoveredQueueCalls === 1 &&
    await recoveringQueueState.chain === undefined);

  // ---------- E1b: real large-value codec round trips ----------
  await (async () => {
    const previousChrome = globalThis.chrome;
    const previousCache = _settingsStorageCache;
    const previousTestStorage = globalThis.__pbpTestStorage;
    const previousTestLarge = globalThis.__pbpTestSyncSetLarge;
    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;

    const getFrom = (backing, keys) => {
      if (keys == null) return Object.assign({}, backing);
      if (typeof keys === "string") return keys in backing ? { [keys]: backing[keys] } : {};
      if (Array.isArray(keys)) {
        const out = {};
        keys.forEach((key) => { if (key in backing) out[key] = backing[key]; });
        return out;
      }
      const out = Object.assign({}, keys || {});
      Object.keys(keys || {}).forEach((key) => { if (key in backing) out[key] = backing[key]; });
      return out;
    };
    const removeFrom = (backing, keys) => {
      (Array.isArray(keys) ? keys : [keys]).forEach((key) => { delete backing[key]; });
    };
    const itemBytes = (key, value) => new TextEncoder().encode(key + JSON.stringify(value)).length;

    function installLargeStorage(syncEnabled) {
      const local = { optSyncEnabled: !!syncEnabled };
      const sync = { syncApiKeys: false };
      const state = { rejectSyncSet: false, syncSetCalls: 0, rejectOnSyncSetCall: 0, rejectLocalRemove: false };
      globalThis.chrome = {
        storage: {
          local: {
            get: async (keys) => getFrom(local, keys),
            set: async (data) => { Object.assign(local, data); },
            remove: async (keys) => {
              if (state.rejectLocalRemove) throw new Error("local remove failed");
              removeFrom(local, keys);
            },
          },
          sync: {
            QUOTA_BYTES_PER_ITEM: 8192,
            get: async (keys) => getFrom(sync, keys),
            set: async (data) => {
              state.syncSetCalls++;
              if (state.rejectSyncSet || state.syncSetCalls === state.rejectOnSyncSetCall) {
                throw new Error("QUOTA_BYTES_PER_ITEM exceeded");
              }
              Object.assign(sync, data);
            },
            remove: async (keys) => { removeFrom(sync, keys); },
          },
          onChanged: { addListener() {} },
        },
      };
      _settingsStorageCache = null;
      return { local, sync, state };
    }

    try {
      let env = installLargeStorage(false);
      const themes = [{ name: "Mine", css: ".x{color:red}" }];
      await syncSetLarge("savedThemes", themes);
      const localThemes = await syncGetLarge("savedThemes", []);
      check("E1b local large values preserve array type", Array.isArray(localThemes) && localThemes[0].name === "Mine");
      env.local.savedThemes = JSON.stringify(themes);
      check("E1b local legacy JSON strings decode back to their original type",
        Array.isArray(await syncGetLarge("savedThemes", [])) && (await syncGetLarge("savedThemes", []))[0].name === "Mine");

      env = installLargeStorage(true);
      const cjk = "中".repeat(3000) + "\u0000".repeat(2000) + "😀".repeat(1000);
      let cjkError = null;
      try { await syncSetLarge("customTagPrompt", cjk); } catch (error) { cjkError = error; }
      const cjkRoundTrip = await syncGetLarge("customTagPrompt", "");
      check("E1b sync codec round-trips multi-byte and escaped text", !cjkError && cjkRoundTrip === cjk);
      check("E1b every physical sync item stays within the 8 KB byte quota",
        Object.entries(env.sync).every(([key, value]) => itemBytes(key, value) <= 8192));

      const logicalRead = await pbpReadSettingsWithSecrets({ customTagPrompt: "" });
      check("E1b atomic settings read resolves chunk metadata", logicalRead.customTagPrompt === cjk);
      const physicalChunkKey = Object.keys(env.sync).find((key) => key.startsWith("customTagPrompt_") && key !== "customTagPrompt");
      check("E1b physical chunk changes invalidate the SW settings cache",
        !!physicalChunkKey && pbpSettingsKeysChanged({ [physicalChunkKey]: { oldValue: "a", newValue: "b" } }));

      env.sync.customSummaryPrompt = "direct pre-chunk value";
      check("E1b direct sync strings from pre-chunk migration remain readable",
        await syncGetLarge("customSummaryPrompt", "") === "direct pre-chunk value");

      env = installLargeStorage(true);
      await syncSetLarge("customSummaryPrompt", "old value");
      const oldSync = JSON.stringify(env.sync);
      env.state.rejectSyncSet = true;
      let quotaError = null;
      try { await syncSetLarge("customSummaryPrompt", "new value"); } catch (error) { quotaError = error; }
      env.state.rejectSyncSet = false;
      check("E1b failed sync write exposes the new local fallback",
        /quota/i.test(quotaError && quotaError.message || "") && await syncGetLarge("customSummaryPrompt", "") === "new value");
      await chrome.storage.local.remove("customSummaryPrompt_localFallback");
      check("E1b failed sync write leaves the previous cloud value intact",
        JSON.stringify(env.sync) === oldSync && await syncGetLarge("customSummaryPrompt", "") === "old value");

      env = installLargeStorage(true);
      await syncSetLarge("translateGlossary", "old glossary");
      const beforeMetaFailure = JSON.stringify(env.sync);
      env.state.rejectOnSyncSetCall = env.state.syncSetCalls + 2;
      let metadataError = null;
      try { await syncSetLarge("translateGlossary", "new glossary"); } catch (error) { metadataError = error; }
      env.state.rejectOnSyncSetCall = 0;
      check("E1b metadata commit failure keeps old cloud data and exposes the local fallback",
        /quota/i.test(metadataError && metadataError.message || "") &&
        beforeMetaFailure === JSON.stringify(env.sync) &&
        await syncGetLarge("translateGlossary", "") === "new glossary");
      env.state.rejectLocalRemove = true;
      await syncSetLarge("translateGlossary", "new glossary");
      env.local.translateGlossary_localFallback.value = "stale fallback sentinel";
      env.state.rejectLocalRemove = false;
      const resolvedAfterCleanupFailure = await syncGetLarge("translateGlossary", "");
      await Promise.resolve();
      check("E1b stale fallback cannot shadow an equivalent committed generation when cleanup fails",
        resolvedAfterCleanupFailure === "new glossary" && !("translateGlossary_localFallback" in env.local));

      env = installLargeStorage(true);
      env.sync.customSummaryPrompt = { _chunks: 1, _generation: "pendinggen" };
      env.local.customSummaryPrompt_localFallback = pbpLargeFallbackRecord("safe local copy", "pendinggen");
      check("E1b matching-generation fallback survives until every committed chunk is readable",
        await syncGetLarge("customSummaryPrompt", "") === "safe local copy" &&
        !!env.local.customSummaryPrompt_localFallback);

      env = installLargeStorage(true);
      Object.assign(env.sync, {
        customTagPrompt: { _chunks: 2 },
        customTagPrompt_0: "legacy ",
        customTagPrompt_1: "value",
      });
      check("E1b legacy chunk metadata remains readable",
        await syncGetLarge("customTagPrompt", "") === "legacy value");

      const lockOrder = [];
      await Promise.all([
        pbpWithLargeStorageLock("test-serialization", async () => {
          lockOrder.push("first-enter");
          await new Promise((resolve) => setTimeout(resolve, 20));
          lockOrder.push("first-exit");
        }),
        pbpWithLargeStorageLock("test-serialization", async () => {
          lockOrder.push("second-enter");
          lockOrder.push("second-exit");
        }),
      ]);
      check("E1b large-value lock prevents overlapping same-key critical sections",
        lockOrder.join(",") === "first-enter,first-exit,second-enter,second-exit");

      const localQueueOrder = [];
      await Promise.all([
        pbpWithLocalLargeStorageQueue("test-local-queue", async () => {
          localQueueOrder.push("first-enter");
          await new Promise((resolve) => setTimeout(resolve, 20));
          localQueueOrder.push("first-exit");
        }),
        pbpWithLocalLargeStorageQueue("test-local-queue", async () => {
          localQueueOrder.push("second-enter");
        }),
      ]);
      check("E1b no-Web-Locks fallback serializes same-key work in the current context",
        localQueueOrder.join(",") === "first-enter,first-exit,second-enter");

      env = installLargeStorage(true);
      const originalSyncSet = chrome.storage.sync.set;
      let firstGeneration = "";
      chrome.storage.sync.set = async (data) => {
        const chunkKey = Object.keys(data).find((key) => key.startsWith("customTagPrompt_") && key !== "customTagPrompt");
        if (chunkKey && !firstGeneration) firstGeneration = chunkKey.split("_")[1];
        if (data.customTagPrompt?._generation === firstGeneration) {
          await new Promise((resolve) => setTimeout(resolve, 30));
        }
        return originalSyncSet(data);
      };
      const firstConcurrentWrite = syncSetLarge("customTagPrompt", "first concurrent value");
      await new Promise((resolve) => setTimeout(resolve, 5));
      const secondConcurrentWrite = syncSetLarge("customTagPrompt", "second concurrent value");
      await Promise.all([firstConcurrentWrite, secondConcurrentWrite]);
      check("E1b same-key concurrent writes are serialized before stale-chunk cleanup",
        await syncGetLarge("customTagPrompt", "") === "second concurrent value");

      env = installLargeStorage(true);
      await syncSetLarge("customSummaryPrompt", "cloud before quota");
      env.state.rejectSyncSet = true;
      try { await syncSetLarge("customSummaryPrompt", "saved only on this device"); } catch (_) {}
      env.state.rejectSyncSet = false;
      check("E1b quota fallback remains the explicit device-local override while sync is unchanged",
        await syncGetLarge("customSummaryPrompt", "") === "saved only on this device");

      const priorFallback = JSON.stringify(env.local.customSummaryPrompt_localFallback);
      const realSetAfterFallback = chrome.storage.sync.set;
      chrome.storage.sync.set = async () => { throw new Error("storage unavailable"); };
      let nonQuotaError = null;
      try { await syncSetLarge("customSummaryPrompt", "failed replacement"); }
      catch (error) { nonQuotaError = error; }
      chrome.storage.sync.set = realSetAfterFallback;
      check("E1b non-quota retry failure restores the previous effective local override",
        nonQuotaError?.message === "storage unavailable" &&
        JSON.stringify(env.local.customSummaryPrompt_localFallback) === priorFallback &&
        await syncGetLarge("customSummaryPrompt", "") === "saved only on this device");

      // Another device commits AFTER this device's fallback was stranded.
      // chrome.storage.sync propagates per ITEM: while only the metadata has
      // arrived, the last-known fallback must survive — deleting it before
      // the chunks land would flash factory defaults and invite an overwrite
      // based on them.
      env.sync.customSummaryPrompt = { _chunks: 1, _generation: "zzforeign" };
      check("E1b foreign metadata without its chunks keeps the last-known fallback value",
        await syncGetLarge("customSummaryPrompt", "") === "saved only on this device");
      check("E1b the record survives until the replacement is actually readable",
        "customSummaryPrompt_localFallback" in env.local);
      env.sync["customSummaryPrompt_zzforeign_0"] = "newer value from another device";
      check("E1b a newer readable foreign generation beats the stranded quota fallback",
        await syncGetLarge("customSummaryPrompt", "") === "newer value from another device");
      check("E1b the stale fallback record is dropped so it cannot shadow future cloud updates",
        !("customSummaryPrompt_localFallback" in env.local));
    } finally {
      globalThis.chrome = previousChrome;
      _settingsStorageCache = previousCache;
      globalThis.__pbpTestStorage = previousTestStorage;
      globalThis.__pbpTestSyncSetLarge = previousTestLarge;
    }
  })();

  // ---------- E2: savedThemes import quota classification ----------
  // importThemesResult(err|null) maps the syncSetLarge outcome to a status key.
  check("E2 no error → importedReload", importThemesResult(null) === "importedReload");
  check("E2 quota error → importPartial (not importInvalid)",
        importThemesResult(new Error("QUOTA_BYTES_PER_ITEM quota exceeded")) === "importPartial");
  check("E2 explicit local-fallback marker → importPartial without relying on error text",
        importThemesResult(Object.assign(new Error("storage write failed"), { pbpFellBackToLocal: true })) === "importPartial");
  check("E2 non-quota error rethrows (returns null sentinel)",
        importThemesResult(new SyntaxError("bad json")) === null);

  // ---------- E3: v1 themePresetKey routes through getSettingsStorage ----------
  // Stub both areas; record which one themePresetKey lands in.
  // (chrome is not defined in headless non-extension Chromium; we install a full stub)
  const synced = {}, localed = {};
  const prevChrome = globalThis.chrome;
  globalThis.chrome = {
    storage: {
      sync: { set: (d) => { Object.assign(synced, d); return Promise.resolve(); },
              get: () => Promise.resolve({}) },
      local: { get: () => Promise.resolve({ optSyncEnabled: false }),
               set: (d) => { Object.assign(localed, d); return Promise.resolve(); } },
      onChanged: { addListener() {} },
    },
  };
  // Clear the module-level cache so getSettingsStorage re-evaluates against the stub
  if (typeof _settingsStorageCache !== "undefined") _settingsStorageCache = null;
  const target = await getSettingsStorage();
  await target.set({ themePresetKey: "nord" });
  check("E3 themePresetKey lands in LOCAL when sync off", localed.themePresetKey === "nord");
  check("E3 themePresetKey NOT forced into sync", synced.themePresetKey === undefined);
  globalThis.chrome = prevChrome;

  // ---------- E3b: routing-active prime never writes secret defaults to sync ----------
  await (async () => {
    const prevPrimeChrome = globalThis.chrome;
    const prevPrimeCache = _settingsStorageCache;
    const primeWrites = [];
    globalThis.chrome = {
      storage: {
        local: { get: async () => ({ optSyncEnabled: true }), remove: async () => {} },
        sync: {
          get: async (keys) => typeof keys === "string" ? { syncApiKeys: false } : {},
          set: async (data) => { primeWrites.push(data); },
        },
      },
    };
    _settingsStorageCache = null;
    await primeSettings();
    const primed = primeWrites[0] || {};
    check("E3b prime: routing-active sync write excludes all API key defaults and exportTargets",
      API_KEY_FIELDS.every((key) => !(key in primed)) && !("exportTargets" in primed));
    check("E3b prime: routing-active sync write still primes ordinary settings",
      Object.prototype.hasOwnProperty.call(primed, "optTheme"));

    primeWrites.length = 0;
    globalThis.chrome = {
      storage: {
        local: { get: async () => ({ optSyncEnabled: true }), remove: async () => {} },
        sync: {
          get: async (keys) => typeof keys === "string" ? { syncApiKeys: true } : {},
          set: async (data) => { primeWrites.push(data); },
        },
      },
    };
    await primeSettings();
    const keysOnPrime = primeWrites[0] || {};
    check("E3b prime: keys-on sync area never primes missing secret defaults",
      Object.prototype.hasOwnProperty.call(keysOnPrime, "optTheme") &&
      API_KEY_FIELDS.every((key) => !(key in keysOnPrime)) && !("exportTargets" in keysOnPrime));
    globalThis.chrome = prevPrimeChrome;
    _settingsStorageCache = prevPrimeCache;
  })();

  // ---------- E4: syncApiKeys secret routing (pure helpers) ----------

  // -- pbpSecretRoutingActive --
  check("E4 routing active: sync on + keys off", pbpSecretRoutingActive(true, false) === true);
  check("E4 routing inactive: sync off + keys off", pbpSecretRoutingActive(false, false) === false);
  check("E4 routing inactive: sync on + keys on", pbpSecretRoutingActive(true, true) === false);
  check("E4 routing inactive: sync off + keys on", pbpSecretRoutingActive(false, true) === false);

  // -- effective Pinboard credential event routing --
  check("E4 auth events: sync-off listens only to local token changes",
    pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "local", { optSyncEnabled: false, syncApiKeys: true }) &&
    !pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "sync", { optSyncEnabled: false, syncApiKeys: true }));
  check("E4 auth events: sync-on keys-local ignores cloud token residue",
    pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "local", { optSyncEnabled: true, syncApiKeys: false }) &&
    !pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "sync", { optSyncEnabled: true, syncApiKeys: false }));
  check("E4 auth events: sync-on keys-cloud ignores local token residue",
    pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "sync", { optSyncEnabled: true, syncApiKeys: true }) &&
    !pbpAuthStorageChangeIsRelevant({ pinboardToken: {} }, "local", { optSyncEnabled: true, syncApiKeys: true }));
  check("E4 auth events: only the cloud syncApiKeys marker can reroute synced settings",
    pbpAuthStorageChangeIsRelevant({ syncApiKeys: {} }, "sync", { optSyncEnabled: true, syncApiKeys: false }) &&
    !pbpAuthStorageChangeIsRelevant({ syncApiKeys: {} }, "local", { optSyncEnabled: true, syncApiKeys: false }));
  check("E4 auth events: local optSyncEnabled always reroutes the effective account",
    pbpAuthStorageChangeIsRelevant({ optSyncEnabled: {} }, "local", { optSyncEnabled: true, syncApiKeys: false }));

  // -- account-wide marker initialization / sync-off isolation --
  await (async () => {
    const previousChrome = globalThis.chrome;
    const previousSettingsCache = _settingsStorageCache;
    const previousTestStorage = globalThis.__pbpTestStorage;
    const previousTestLarge = globalThis.__pbpTestSyncSetLarge;
    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;
    const installState = (localBacking, syncBacking, failures = {}) => {

      check("E9 stray preset adoption probes own-property so a user-chosen None is never resurrected",
        optionsSource.includes('!("themePresetKey" in probe)'));
      check("E9 saveAll converts rejected persistence into a visible resolved failure",
        /catch \(error\) \{\s*return reportAutoSaveFailure\(error\)/.test(optionsSource) &&
        /pbpQueueOptionsSave\(autoSaveState, saveAll\)\.catch\(reportAutoSaveFailure\)/.test(optionsSource));
      const pullStart = optionsSource.indexOf('  $id("webdav-pull-btn")?.addEventListener');
      const pullEnd = optionsSource.indexOf("  // ===================== Auto-save", pullStart);
      const pullSource = optionsSource.slice(pullStart, pullEnd);
      check("E9 WebDAV pull saves live excluded credentials before applying and reloading the backup",
        pullSource.indexOf("await pauseOptionsAutoSave()") < pullSource.indexOf("const saved = await saveAll()") &&
        pullSource.indexOf("const saved = await saveAll()") < pullSource.indexOf("await pbpApplyBackupPayload"));
      check("E9 over-limit CSS cannot be stored as a custom theme that backups would reject",
        optionsSource.includes("saveBtn.disabled = !css.trim() || pbpOverlayByteLength(css) > OVERLAY_BYTE_LIMIT") &&
        optionsSource.includes("if (!css || pbpOverlayByteLength(css) > OVERLAY_BYTE_LIMIT) return"));
    } finally {
      globalThis.chrome = prevChromeE9;
      globalThis.__pbpTestStorage = prevStorageE9;
      globalThis.__pbpTestSyncSetLarge = prevLargeE9;
      _settingsStorageCache = prevCacheE9;

  })();

  // ---------- E10: tag-governance visual and ARIA progress stay in lockstep ----------
  (() => {
    const wrap = document.createElement("div");
    wrap.innerHTML = '<div id="tag-gov-progress"><button id="tag-gov-progress-btn" data-mode="dismiss"></button>' +
      '<div id="tag-gov-progress-bar" aria-valuenow="0"><div id="tag-gov-progress-fill"></div></div></div>';
    document.body.appendChild(wrap);
    const previousVisibleAccount = _tagGovVisibleAccount;
    try {
      _tagGovSetProgress(33.4);
      check("E10 progress rounds visual width and aria-valuenow together",
        document.getElementById("tag-gov-progress-fill").style.width === "33%" &&
        document.getElementById("tag-gov-progress-bar").getAttribute("aria-valuenow") === "33");
      _tagGovSetProgress(-4);
      check("E10 progress clamps negative values to zero",
        document.getElementById("tag-gov-progress-fill").style.width === "0%" &&
        document.getElementById("tag-gov-progress-bar").getAttribute("aria-valuenow") === "0");
      _tagGovSetProgress(140);
      check("E10 progress clamps oversized values to 100",
        document.getElementById("tag-gov-progress-fill").style.width === "100%" &&
        document.getElementById("tag-gov-progress-bar").getAttribute("aria-valuenow") === "100");

      _tagGovVisibleAccount = "alice";
      _tagGovClaimProgress("alice");
      _tagGovSetProgress(37, "alice");
      _tagGovVisibleAccount = "bob";
      _tagGovSetProgress(88, "alice");
      check("E10 old account batch cannot overwrite the visible account progress",
        document.getElementById("tag-gov-progress-fill").style.width === "37%");

      document.getElementById("tag-gov-progress-btn").click();
      check("E10 dismiss ignores a progress card owned by another account",
        !document.getElementById("tag-gov-progress").classList.contains("hidden"));
    } finally {
      _tagGovVisibleAccount = previousVisibleAccount;
      wrap.remove();
    }
  })();

  const summary = document.createElement("h2");
  summary.id = "summary";
  summary.textContent = `${pass} passed, ${fail} failed`;
  root.insertBefore(summary, root.firstChild);

run();
