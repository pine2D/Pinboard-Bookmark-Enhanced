<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Settings Persistence Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 900px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; } h2 { margin-top: 24px; }
</style></head>
<body>
<h1>Settings persistence robustness tests</h1>
<div id="results"></div>
<script src="../shared.js"></script>
<script src="../options-backup.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}`;
  root.appendChild(div);
}
async function run() {
  // ---------- E1: persistSettings quota guard ----------
  const LARGE_KEYS = ["customTagPrompt","customSummaryPrompt","translateGlossary","tagPresets"];

  // (a) large keys are routed away from the inline batch (chunked separately)
  let batchSet = null;
  const largeWrites = [];
  globalThis.__pbpTestStorage = {
    set: (d) => { batchSet = d; return Promise.resolve(); },
    get: () => Promise.resolve({}),
  };
  // syncSetLarge in this stub mode records the key it was asked to chunk
  globalThis.__pbpTestSyncSetLarge = (k) => { largeWrites.push(k); return Promise.resolve(); };

  const data = { optTheme: "nord", customTagPrompt: "x".repeat(9000), tagPresets: "y".repeat(9000) };
  const r1 = await persistSettings(data);
  check("E1 persistSettings reports ok on success", r1.ok === true);
  check("E1 large keys NOT in inline batch", batchSet && !("customTagPrompt" in batchSet) && !("tagPresets" in batchSet));
  check("E1 large keys routed to syncSetLarge", largeWrites.includes("customTagPrompt") && largeWrites.includes("tagPresets"));
  check("E1 small keys stay in inline batch", batchSet && batchSet.optTheme === "nord");

  // (b) quota reject on the inline batch is caught + reported, not thrown
  globalThis.__pbpTestStorage = {
    set: () => Promise.reject(new Error("QUOTA_BYTES quota exceeded")),
    get: () => Promise.resolve({}),
  };
  let threw = false, r2 = null;
  try { r2 = await persistSettings({ optTheme: "dracula" }); }
  catch (_) { threw = true; }
  check("E1 quota reject does NOT throw out of persistSettings", threw === false);
  check("E1 quota reject reported as not-ok", r2 && r2.ok === false && /quota/i.test(r2.error.message));

  // ---------- E2: savedThemes import quota classification ----------
  // importThemesResult(err|null) maps the syncSetLarge outcome to a status key.
  check("E2 no error → importedReload", importThemesResult(null) === "importedReload");
  check("E2 quota error → importPartial (not importInvalid)",
        importThemesResult(new Error("QUOTA_BYTES_PER_ITEM quota exceeded")) === "importPartial");
  check("E2 non-quota error rethrows (returns null sentinel)",
        importThemesResult(new SyntaxError("bad json")) === null);

  // ---------- E3: v1 themePresetKey routes through getSettingsStorage ----------
  // Stub both areas; record which one themePresetKey lands in.
  // (chrome is not defined in headless non-extension Chromium; we install a full stub)
  const synced = {}, localed = {};
  const prevChrome = globalThis.chrome;
  globalThis.chrome = {
    storage: {
      sync: { set: (d) => { Object.assign(synced, d); return Promise.resolve(); },
              get: () => Promise.resolve({}) },
      local: { get: () => Promise.resolve({ optSyncEnabled: false }),
               set: (d) => { Object.assign(localed, d); return Promise.resolve(); } },
      onChanged: { addListener() {} },
    },
  };
  // Clear the module-level cache so getSettingsStorage re-evaluates against the stub
  if (typeof _settingsStorageCache !== "undefined") _settingsStorageCache = null;
  const target = await getSettingsStorage();
  await target.set({ themePresetKey: "nord" });
  check("E3 themePresetKey lands in LOCAL when sync off", localed.themePresetKey === "nord");
  check("E3 themePresetKey NOT forced into sync", synced.themePresetKey === undefined);
  globalThis.chrome = prevChrome;

  // ---------- E4: syncApiKeys secret routing (pure helpers) ----------

  // -- pbpSecretRoutingActive --
  check("E4 routing active: sync on + keys off", pbpSecretRoutingActive(true, false) === true);
  check("E4 routing inactive: sync off + keys off", pbpSecretRoutingActive(false, false) === false);
  check("E4 routing inactive: sync on + keys on", pbpSecretRoutingActive(true, true) === false);
  check("E4 routing inactive: sync off + keys on", pbpSecretRoutingActive(false, true) === false);

  // -- pbpStripExportTargetTokens --
  const etsIn = {
    github: { enabled: true, token: "obf:ghtok", repo: "r" },
    webhook: { enabled: false, token: "obf:whtok", url: "https://x" },
    obsidian: { enabled: true, vault: "v", folder: "f" }, // no token field at all
  };
  const etsOut = pbpStripExportTargetTokens(etsIn);
  check("E4 strip: github token removed", !("token" in etsOut.github));
  check("E4 strip: webhook token removed", !("token" in etsOut.webhook));
  check("E4 strip: non-secret fields survive", etsOut.github.repo === "r" && etsOut.webhook.url === "https://x");
  check("E4 strip: obsidian (no token) untouched", etsOut.obsidian.vault === "v" && etsOut.obsidian.folder === "f");
  check("E4 strip: does not mutate input", etsIn.github.token === "obf:ghtok");
  check("E4 strip: null/undefined -> {}", Object.keys(pbpStripExportTargetTokens(null)).length === 0
    && Object.keys(pbpStripExportTargetTokens(undefined)).length === 0);

  // -- pbpSplitSecretBatch: every one of the 19 API_KEY_FIELDS routed --
  const fullBatch = {};
  API_KEY_FIELDS.forEach((k, i) => { fullBatch[k] = "obf:v" + i; });
  fullBatch.optTheme = "nord"; // non-secret, must stay in main
  fullBatch.exportTargets = { github: { enabled: true, token: "obf:ghtok", repo: "r" } };
  const { main: splitMain, secrets: splitSecrets } = pbpSplitSecretBatch(fullBatch);
  let allRouted = true;
  API_KEY_FIELDS.forEach((k, i) => {
    if (splitSecrets[k] !== "obf:v" + i) allRouted = false;
    if (k in splitMain) allRouted = false;
  });
  check("E4 split: every one of the 19 API_KEY_FIELDS routed to secrets, absent from main", allRouted);
  check("E4 split: non-secret key stays in main", splitMain.optTheme === "nord");
  check("E4 split: exportTargets in secrets is the FULL (with-token) object",
    splitSecrets.exportTargets.github.token === "obf:ghtok");
  check("E4 split: exportTargets in main is token-stripped",
    !("token" in splitMain.exportTargets.github) && splitMain.exportTargets.github.repo === "r");
  check("E4 split: does not mutate input batch", fullBatch.geminiApiKey === "obf:v" + API_KEY_FIELDS.indexOf("geminiApiKey"));

  // -- pbpSplitSecretBatch: no exportTargets in batch -> secrets has no exportTargets key --
  const { secrets: noEtsSecrets } = pbpSplitSecretBatch({ pinboardToken: "obf:pb", optTheme: "dark" });
  check("E4 split: no exportTargets in input -> none in secrets", !("exportTargets" in noEtsSecrets));
  check("E4 split: single-key batch still isolates just that key", noEtsSecrets.pinboardToken === "obf:pb");

  // -- pbpSplitSecretBatch: empty batch -> both empty, no throw --
  const { main: emptyMain, secrets: emptySecrets } = pbpSplitSecretBatch({});
  check("E4 split: empty batch -> empty main", Object.keys(emptyMain).length === 0);
  check("E4 split: empty batch -> empty secrets", Object.keys(emptySecrets).length === 0);

  // -- pbpOverlaySecrets: overlay applies every present key --
  const baseS = { pinboardToken: "", geminiApiKey: "", optTheme: "nord", exportTargets: { github: { enabled: true } } };
  const overlaid = pbpOverlaySecrets(baseS, { pinboardToken: "obf:realpb", geminiApiKey: "obf:realgem" });
  check("E4 overlay: pinboardToken replaced", overlaid.pinboardToken === "obf:realpb");
  check("E4 overlay: geminiApiKey replaced", overlaid.geminiApiKey === "obf:realgem");
  check("E4 overlay: non-secret untouched", overlaid.optTheme === "nord");
  check("E4 overlay: exportTargets untouched when absent from localVals", overlaid.exportTargets.github.enabled === true);

  // -- pbpOverlaySecrets: exportTargets REPLACED wholesale when present in localVals --
  const overlaidEts = pbpOverlaySecrets(baseS, { exportTargets: { webhook: { enabled: true, token: "obf:whtok" } } });
  check("E4 overlay: exportTargets replaced wholesale (old github key gone)", !("github" in overlaidEts.exportTargets));
  check("E4 overlay: exportTargets replaced wholesale (new webhook present)", overlaidEts.exportTargets.webhook.token === "obf:whtok");

  // -- pbpOverlaySecrets: EMPTY-VALUE semantics — local "" wins over a non-empty s[k] --
  const staleS = { geminiApiKey: "obf:stale-should-not-survive" };
  const clearedOverlay = pbpOverlaySecrets(staleS, { geminiApiKey: "" });
  check("E4 overlay empty-value: present-but-empty local value STILL overlays (wins over stale s[k])",
    clearedOverlay.geminiApiKey === "");

  // -- pbpOverlaySecrets: key absent from localVals -> s[k] untouched (not forced to "") --
  const untouchedOverlay = pbpOverlaySecrets({ geminiApiKey: "obf:keepme" }, { pinboardToken: "obf:x" });
  check("E4 overlay: key absent from localVals leaves s[k] alone", untouchedOverlay.geminiApiKey === "obf:keepme");

  // -- pbpOverlaySecrets: does not mutate s or localVals --
  const sBeforeMutCheck = JSON.stringify(baseS);
  pbpOverlaySecrets(baseS, { pinboardToken: "obf:x" });
  check("E4 overlay: does not mutate its s argument", JSON.stringify(baseS) === sBeforeMutCheck);

  // -- pbpOverlaySecrets: null/undefined localVals -> s unchanged, no throw --
  check("E4 overlay: null localVals returns s copy unchanged", pbpOverlaySecrets({ a: 1 }, null).a === 1);
  check("E4 overlay: undefined localVals returns s copy unchanged", pbpOverlaySecrets({ a: 1 }, undefined).a === 1);

  // -- pbpApplySecretOverlay: chrome undefined -> degrades to input, no throw.
  // MUST be awaited: without await, this IIFE's continuation (restoring
  // globalThis.chrome) fires mid-flight inside the next test's own two-step
  // chrome.storage.local.get() chain, resetting globalThis.chrome to undefined
  // between those two calls and spuriously failing that next test.
  await (async () => {
    const prevChromeE4 = globalThis.chrome;
    delete globalThis.chrome;
    const degraded = await pbpApplySecretOverlay({ geminiApiKey: "obf:untouched" });
    check("E4 pbpApplySecretOverlay: chrome undefined -> degrades to input, no throw", degraded.geminiApiKey === "obf:untouched");
    globalThis.chrome = prevChromeE4;
  })();

  // -- pbpApplySecretOverlay: routing active -> real overlay from a stubbed chrome.storage.local --
  await (async () => {
    const prevChromeE4b = globalThis.chrome;
    const localBacking = { optSyncEnabled: true, syncApiKeys: false, geminiApiKey: "obf:fromlocal" };
    globalThis.chrome = {
      storage: {
        local: { get: (keys) => {
          if (Array.isArray(keys)) {
            const out = {}; keys.forEach((k) => { if (k in localBacking) out[k] = localBacking[k]; }); return Promise.resolve(out);
          }
          const out = Object.assign({}, keys);
          Object.keys(keys).forEach((k) => { if (k in localBacking) out[k] = localBacking[k]; });
          return Promise.resolve(out);
        } },
      },
    };
    const active = await pbpApplySecretOverlay({ geminiApiKey: "obf:stale-sync-value", optTheme: "nord" });
    check("E4 pbpApplySecretOverlay: routing active -> geminiApiKey overlaid from local", active.geminiApiKey === "obf:fromlocal");
    check("E4 pbpApplySecretOverlay: routing active -> non-secret field untouched", active.optTheme === "nord");
    globalThis.chrome = prevChromeE4b;
  })();

  // -- pbpApplySecretOverlay: routing inactive (syncApiKeys:true) -> untouched --
  await (async () => {
    const prevChromeE4c = globalThis.chrome;
    globalThis.chrome = {
      storage: { local: { get: () => Promise.resolve({ optSyncEnabled: true, syncApiKeys: true }) } },
    };
    const untouched = await pbpApplySecretOverlay({ geminiApiKey: "obf:should-stay" });
    check("E4 pbpApplySecretOverlay: keys-on -> not overlaid (byte-identical passthrough)", untouched.geminiApiKey === "obf:should-stay");
    globalThis.chrome = prevChromeE4c;
  })();

  // ---------- E4 (cont'd): persistSettings() end-to-end routing ----------
  await (async () => {
    const prevChromeE4d = globalThis.chrome;
    const localWrites = [];
    globalThis.chrome = {
      storage: {
        local: {
          get: (keys) => {
            if (Array.isArray(keys) || typeof keys === "object") {
              return Promise.resolve({ optSyncEnabled: true, syncApiKeys: false });
            }
            return Promise.resolve({});
          },
          set: (d) => { localWrites.push(d); return Promise.resolve(); },
        },
      },
    };
    let syncSet = null;
    globalThis.__pbpTestStorage = { set: (d) => { syncSet = d; return Promise.resolve(); }, get: () => Promise.resolve({}) };
    globalThis.__pbpTestSyncSetLarge = () => Promise.resolve();
    const r = await persistSettings({
      optTheme: "nord",
      geminiApiKey: "obf:realgem",
      pinboardToken: "obf:realpb",
      exportTargets: { github: { enabled: true, token: "obf:ghtok", repo: "r" } },
    });
    check("E4 persistSettings: reports ok", r.ok === true);
    check("E4 persistSettings: geminiApiKey NOT in the main-area batch", syncSet && !("geminiApiKey" in syncSet));
    check("E4 persistSettings: pinboardToken NOT in the main-area batch", syncSet && !("pinboardToken" in syncSet));
    check("E4 persistSettings: exportTargets in main-area batch is token-stripped",
      syncSet && syncSet.exportTargets && !("token" in syncSet.exportTargets.github));
    check("E4 persistSettings: non-secret optTheme stays in main-area batch", syncSet && syncSet.optTheme === "nord");
    check("E4 persistSettings: secrets landed in local", localWrites.length === 1 &&
      localWrites[0].geminiApiKey === "obf:realgem" && localWrites[0].pinboardToken === "obf:realpb");
    check("E4 persistSettings: local exportTargets is the FULL (with-token) copy",
      localWrites[0].exportTargets.github.token === "obf:ghtok");
    globalThis.chrome = prevChromeE4d;
    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;
  })();

  // ---------- E4 (cont'd): routing-INACTIVE byte-scan — full batch reaches the
  // main area completely unfiltered, identical to pre-feature behavior ----------
  await (async () => {
    const prevChromeE4e = globalThis.chrome;
    globalThis.chrome = { storage: { local: { get: () => Promise.resolve({ optSyncEnabled: false, syncApiKeys: false }) } } };
    let syncSet2 = null;
    globalThis.__pbpTestStorage = { set: (d) => { syncSet2 = d; return Promise.resolve(); }, get: () => Promise.resolve({}) };
    globalThis.__pbpTestSyncSetLarge = () => Promise.resolve();
    const inputBatch = { optTheme: "dracula", geminiApiKey: "obf:x", exportTargets: { github: { token: "obf:y" } } };
    await persistSettings(inputBatch);
    check("E4 byte-scan: routing inactive -> batch written to main area is BYTE-IDENTICAL to input",
      JSON.stringify(syncSet2) === JSON.stringify(inputBatch));
    globalThis.chrome = prevChromeE4e;
    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;
  })();

  // ---------- E4 (cont'd): the THIRD state — sync on + syncApiKeys=true
  // (routing inactive via keys-on, not sync-off) — driven through
  // persistSettings() itself, same as the other two states. ----------
  await (async () => {
    const prevChromeE4f = globalThis.chrome;
    globalThis.chrome = { storage: { local: { get: () => Promise.resolve({ optSyncEnabled: true, syncApiKeys: true }) } } };
    let syncSet3 = null;
    globalThis.__pbpTestStorage = { set: (d) => { syncSet3 = d; return Promise.resolve(); }, get: () => Promise.resolve({}) };
    globalThis.__pbpTestSyncSetLarge = () => Promise.resolve();
    const inputBatch3 = { optTheme: "flexoki", geminiApiKey: "obf:z", exportTargets: { github: { token: "obf:w" } } };
    await persistSettings(inputBatch3);
    check("E4 keys-on state: routing inactive (syncApiKeys=true) -> batch reaches main area BYTE-IDENTICAL, secrets unsplit",
      JSON.stringify(syncSet3) === JSON.stringify(inputBatch3));
    globalThis.chrome = prevChromeE4f;
    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;
  })();

  // ---------- E5: three-state matrix + migration idempotency ----------
  await (async () => {
    const syncArea = {};
    const localArea = { optSyncEnabled: true, syncApiKeys: false };
    globalThis.chrome = {
      storage: {
        sync: {
          get: (keys) => {
            const out = {};
            (Array.isArray(keys) ? keys : Object.keys(keys || {})).forEach((k) => { if (k in syncArea) out[k] = syncArea[k]; });
            return Promise.resolve(out);
          },
          set: (d) => { Object.assign(syncArea, d); return Promise.resolve(); },
          remove: (keys) => { (Array.isArray(keys) ? keys : [keys]).forEach((k) => delete syncArea[k]); return Promise.resolve(); },
        },
        local: {
          get: (keys) => {
            if (Array.isArray(keys)) { const out = {}; keys.forEach((k) => { if (k in localArea) out[k] = localArea[k]; }); return Promise.resolve(out); }
            const out = Object.assign({}, keys); Object.keys(keys || {}).forEach((k) => { if (k in localArea) out[k] = localArea[k]; }); return Promise.resolve(out);
          },
          set: (d) => { Object.assign(localArea, d); return Promise.resolve(); },
        },
      },
    };
    globalThis.__pbpTestStorage = {
      set: (d) => { Object.assign(syncArea, d); return Promise.resolve(); },
      get: (keys) => Promise.resolve({}),
    };
    globalThis.__pbpTestSyncSetLarge = () => Promise.resolve();

    await persistSettings({ optTheme: "nord", geminiApiKey: "obf:g1", pinboardToken: "obf:p1", exportTargets: { github: { token: "obf:t1", enabled: true } } });
    check("E5 default-state: sync area has NO API_KEY_FIELDS after saveAll", API_KEY_FIELDS.every((k) => !(k in syncArea)));
    // Parenthesized member-access-then-fallback BEFORE the `in` check: `in`
    // binds tighter than `||`, so the naive `!("token" in (x||{}).y || {})`
    // form always evaluates false for BOTH leak and no-leak — never fails.
    check("E5 default-state: sync exportTargets has no token", !("token" in ((syncArea.exportTargets || {}).github || {})));
    check("E5 default-state: local has the real secrets", localArea.geminiApiKey === "obf:g1" && localArea.pinboardToken === "obf:p1");

    // Migration idempotency: seed sync with a stale leftover secret, run migration twice.
    syncArea.geminiApiKey = "obf:STALE";
    await pbpMigrateSecretsToLocal();
    check("E5 migration: stale sync secret moved to local", localArea.geminiApiKey === "obf:STALE");
    check("E5 migration: stale sync secret removed from sync", !("geminiApiKey" in syncArea) || syncArea.geminiApiKey === undefined);
    const localAreaSnapshot = JSON.stringify(localArea);
    await pbpMigrateSecretsToLocal(); // second run: must be a no-op (idempotent)
    check("E5 migration: second run is a no-op (idempotent)", JSON.stringify(localArea) === localAreaSnapshot);

    // pbpMigrateSecretsToLocal: must write the local secret payload BEFORE removing from sync.
    syncArea.geminiApiKey = "obf:STALE";
    const migrateOrder = [];
    const realLocalSetM = globalThis.chrome.storage.local.set;
    globalThis.chrome.storage.local.set = (d) => { if ("geminiApiKey" in d) migrateOrder.push("local"); return realLocalSetM(d); };
    const realSyncRemoveM = globalThis.chrome.storage.sync.remove;
    globalThis.chrome.storage.sync.remove = (keys) => { migrateOrder.push("remove"); return realSyncRemoveM(keys); };
    await pbpMigrateSecretsToLocal();
    check("E5 pbpMigrateSecretsToLocal: writes local payload BEFORE removing from sync",
      migrateOrder.indexOf("local") < migrateOrder.indexOf("remove"));
    globalThis.chrome.storage.local.set = realLocalSetM;
    globalThis.chrome.storage.sync.remove = realSyncRemoveM;

    // pbpEnableSyncApiKeys: must write sync BEFORE flipping the flag.
    const writeOrder = [];
    const realSyncSet = globalThis.chrome.storage.sync.set;
    globalThis.chrome.storage.sync.set = (d) => { writeOrder.push("sync"); return realSyncSet(d); };
    const realLocalSet = globalThis.chrome.storage.local.set;
    globalThis.chrome.storage.local.set = (d) => { if ("syncApiKeys" in d) writeOrder.push("flag"); return realLocalSet(d); };
    await pbpEnableSyncApiKeys();
    check("E5 pbpEnableSyncApiKeys: writes sync BEFORE flipping the flag (C4 ordering)",
      writeOrder.indexOf("sync") < writeOrder.indexOf("flag"));
    check("E5 pbpEnableSyncApiKeys: flag ends up true", localArea.syncApiKeys === true);
    check("E5 pbpEnableSyncApiKeys: secrets landed in sync", syncArea.geminiApiKey === "obf:STALE" && syncArea.pinboardToken === "obf:p1");
    globalThis.chrome.storage.sync.set = realSyncSet;
    globalThis.chrome.storage.local.set = realLocalSet;

    delete globalThis.__pbpTestStorage;
    delete globalThis.__pbpTestSyncSetLarge;
  })();

  const summary = document.createElement("h2");
  summary.textContent = `Results: ${pass} pass, ${fail} fail`;
  root.insertBefore(summary, root.firstChild);
}
run();
</script>
</body></html>
