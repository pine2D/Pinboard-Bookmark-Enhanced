<!doctype html>
<html><head><meta charset="utf-8"><title>i18n parity tests</title>
<style>.case{font-family:monospace;white-space:pre}.pass{color:#176}.fail{color:#b00}</style>
</head><body>
<div id="results"></div>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
// load via fetch (open this file over http://, e.g. `npx serve` or VS Code Live Server,
// because file:// blocks fetch of sibling JSON in Chrome)
async function loadLocale(loc) {
  const r = await fetch(`../_locales/${loc}/messages.json`);
  return r.json();
}
(async () => {
  const LOCALES = ["en","de","fr","pl","ru","zh_HK","zh_CN","zh_TW","ja"];
  const msgs = {};
  for (const l of LOCALES) msgs[l] = await loadLocale(l);

  // H1: AI/Jina cluster must be present and translated (≠ English) in these
  // locales — EXCEPT values that are legitimately identical to English in that
  // language (loanwords / brand tokens): "Local (Defuddle)" — "Local" is also a
  // French word + "Defuddle" is a brand; "API Key (optional)" — "API Key" is a
  // brand token and "optional" is the same word in German.
  const CLUSTER = ["secAiContentSource","aiContentSourceLocal","jinaConverting",
    "jinaCopied","jinaFailed","jinaApiKeyLabel","jinaApiKeyPlaceholder","jinaViewBtn",
    "jinaMarkdownTitle","jinaMarkdownTitleJina"];
  const SAME_AS_EN_OK = new Set(["fr.aiContentSourceLocal","de.jinaApiKeyLabel"]);
  for (const loc of ["de","fr","pl","ru","zh_HK"]) {
    for (const k of CLUSTER) {
      const en = msgs.en[k]?.message, tr = msgs[loc][k]?.message;
      check(`H1 ${loc}.${k} present`, !!tr, `${loc}.${k} missing`);
      if (!SAME_AS_EN_OK.has(`${loc}.${k}`))
        check(`H1 ${loc}.${k} translated`, tr !== en,
              `${loc}.${k} still == en: ${JSON.stringify(tr)}`);
    }
  }
  // H2: new keys exist in all locales
  for (const k of ["importSettingsTitle","jinaMdNonWebHint","popSortTitle"]) {
    for (const loc of LOCALES)
      check(`H2 ${loc}.${k} present`, !!msgs[loc][k]?.message, `${loc} missing ${k}`);
  }
  // H2: each hardcoded string is now WIRED to i18n. English literals may remain
  // as inline fallbacks (this codebase's convention: data-i18n-title fallback in
  // HTML, `t() ?? "literal"` in JS, chrome.i18n fallback in content scripts), so
  // assert the WIRING is present, not that the literal was deleted.
  const optHtml = await (await fetch("../options.html")).text();
  check('H2 options.html Import label wired to data-i18n-title',
        optHtml.includes('data-i18n-title="importSettingsTitle"'));
  const popupJs = await (await fetch("../popup.js")).text();
  check('H2 popup.js non-web hint wired to jinaMdNonWebHint key',
        popupJs.includes('jinaMdNonWebHint'));
  const sortJs = await (await fetch("../pinboard-sort.js")).text();
  check('H2 pinboard-sort.js title wired to chrome.i18n popSortTitle',
        sortJs.includes('popSortTitle'));
  const sharedJs = await (await fetch("../shared.js")).text();
  check('H2 shared.js Dismiss aria-label wired to aiErrorDismiss key',
        sharedJs.includes('aiErrorDismiss'));
  // H3: Wayback section title is its own key, distinct from the checkbox label
  for (const loc of LOCALES)
    check(`H3 ${loc}.secWayback present`, !!msgs[loc].secWayback?.message, `${loc} missing secWayback`);
  const optHtml3 = await (await fetch("../options.html")).text();
  // the section-title line must NOT still point at optWayback
  check('H3 options.html section-title uses secWayback',
        /class="section-title"[^>]*data-i18n="secWayback"/.test(optHtml3));
  check('H3 options.html no longer has section-title data-i18n="optWayback"',
        !/class="section-title"[^>]*data-i18n="optWayback"/.test(optHtml3));
  // H4: no literal U+2192 arrow in jinaAuthFailed (font-fallback risk)
  for (const loc of LOCALES)
    check(`H4 ${loc}.jinaAuthFailed has no U+2192`,
          !(msgs[loc].jinaAuthFailed?.message || "").includes("→"),
          `${loc}.jinaAuthFailed: ${JSON.stringify(msgs[loc].jinaAuthFailed?.message)}`);
  // H5: enumerate English-identical keys per locale, excluding brand/technical tokens
  const BRAND_OK = new Set([
    "extName","appName","labelUrl","labelApiKey","labelApiToken","labelBaseUrl",
    "langZh","langZhTW","langZhHK","langEn","langJa","langKo","langFr","langDe","langEs","langRu",
    "provGemini","provOpenai","provClaude","provDeepseek","provQwen","provMinimax",
    "provOpenrouter","provGroq","provMistral","provCohere","provSiliconflow","provZhipu",
    "provKimi","provOllama","provCustom","provHuggingface",
    "jinaMarkdownBtn","aiContentSourceJina","secJinaReader","mdStripObsidian","tabMarkdown",
    "hintClaudeModel","hintZhipuModel","hintKimiModel","labelAiTags","placeholderTags",
    "optUrlCleanCustomPlaceholder","optUrlCleanExcludePlaceholder","customCSSPlaceholder",
    "tagPresetsPlaceholder","translateGlossaryPlaceholder","aiCancel",
    // keyboard shortcuts — same in all locales (platform keys)
    "hintCtrlEnter","aiSummaryBtnTitle",
    // pure placeholder-format strings — no translatable text
    "batchProgress",
    // loanwords / same-word in target language
    "tabPopup","tabAI","tagGovKindAi","mdOptFrontmatter","secPrompts","labelTagPrompt",
    "tabGroupAI","tabGroupSystem", // sidebar group labels: "AI" is the universal term (matches tabAI); "System" is the same word in de/pl
    "aiErrorDetails","qlSets","labelTags","aiErrorOpTags","secTags","tabTags",
    "placeholderOptional","optPopupWidth550","jinaApiKeyLabel",
    "optWaybackS3Key","optWaybackS3Secret","trViewOriginal",
    "labelNotes","tagCount","tagCountPlural","qlNotes","sepUnderscore",
    "secNotifications","qlNotesTitle","mdOptImages","aiContentSourceLocal",
    "optPopupWidth450","trProgress","labelModel","tagGovKindSeparator",
    "dictLangAuto", // loanword: "Auto" is the same in all target languages
    "vocabSortAz","vocabSortZa" // locale-neutral sort notation where the script uses Latin terms
  ]);
  for (const loc of ["de","fr","pl","ru","zh_HK"]) {
    const offenders = Object.keys(msgs.en).filter(k =>
      !BRAND_OK.has(k) &&
      msgs[loc][k]?.message != null &&
      msgs[loc][k].message === msgs.en[k].message);
    // log the worklist so the implementer sees exactly what to translate
    console.log(`H5 ${loc} untranslated (${offenders.length}):`, offenders.join(", "));
    check(`H5 ${loc} has no non-brand English-identical keys`, offenders.length === 0,
          `${offenders.length} left: ${offenders.slice(0,12).join(", ")}…`);
  }
  // H6: SHAPE + full key-set parity. A prior bulk json.dump rewrite turned
  // {"message":...} into ["message",...] and STILL passed the presence-only
  // checks + node --check. Assert every value is a {message:string} OBJECT and
  // each locale's key SET matches en exactly (no missing, no extra).
  const enKeys = Object.keys(msgs.en);
  for (const loc of LOCALES) {
    const badShape = Object.keys(msgs[loc]).filter(k => {
      const v = msgs[loc][k];
      return !v || typeof v !== "object" || Array.isArray(v) || typeof v.message !== "string";
    });
    check(`H6 ${loc} every value is {message:string}`, badShape.length === 0,
          `bad shape: ${badShape.slice(0,12).join(", ")}`);
    const missing = enKeys.filter(k => !(k in msgs[loc]));
    const extra = Object.keys(msgs[loc]).filter(k => !(k in msgs.en));
    check(`H6 ${loc} has every en key`, missing.length === 0, `missing: ${missing.slice(0,12).join(", ")}`);
    check(`H6 ${loc} has no extra keys`, extra.length === 0, `extra: ${extra.slice(0,12).join(", ")}`);
  }
  // H7: the two shortcut-help surfaces must describe the same new behavior.
  check("H7 all locales expose translation/dictionary help and the three-state view",
    LOCALES.every((loc) => msgs[loc].kbdHelpTranslate?.message &&
      msgs[loc].kbdHelpDictionary?.message && msgs[loc].kbdHelpToggleView?.message),
    "one or more shortcut-help messages are missing");
  check("H7 selection-trigger labels name both e and d",
    LOCALES.every((loc) => ["selectionTriggerHotkey", "explainTriggerHotkey"].every((key) => {
      const message = msgs[loc][key]?.message || "";
      return /e/.test(message) && /d/.test(message);
    })), "one or more trigger labels still describe only e");
  check("H8 all locales expose explain pin, unpin, close and move help",
    LOCALES.every((loc) => ["explainPin", "explainUnpin", "explainClose", "explainMoveHint"]
      .every((key) => msgs[loc][key]?.message)),
    "one or more explain window-control messages are missing");
  const VOCAB_SCALE_KEYS = ["vocabSearchPlaceholder", "vocabGroupFilterAria", "vocabAllGroups",
    "vocabSortAria", "vocabSortLatest", "vocabSortOldest", "vocabSortAz", "vocabSortZa",
    "vocabSelectionActions", "vocabSelectAll", "vocabInvertSelection", "vocabBatchActions",
    "vocabGroupNamePlaceholder", "vocabAddToGroup", "vocabBatchDelete", "vocabNoResults",
    "vocabListAria", "vocabLoadMore", "vocabReadingSection", "vocabLearningSection",
    "vocabSelectWord", "vocabResultCount", "vocabSelectedCount", "vocabBatchDeleteConfirm",
    "vocabBatchFailed", "vocabSelectionChanged", "vocabRefreshFailed", "vocabBatchDeleted",
    "vocabBatchGrouped", "vocabGroupRequired", "vocabLoading", "dictVocabEmpty", "dictPackHint"];
  check("H9 all locales expose the scalable vocabulary controls and complete status messages",
    LOCALES.every((loc) => VOCAB_SCALE_KEYS.every((key) => msgs[loc][key]?.message)),
    "one or more scalable-vocabulary messages are missing");
  check("H9 vocabulary placeholders keep the same runtime contract in every locale",
    LOCALES.every((loc) => ["vocabLoadMore", "vocabSelectWord", "vocabResultCount", "dictVocabEmpty",
      "vocabSelectedCount", "vocabBatchDeleteConfirm", "vocabBatchDeleted", "vocabBatchGrouped"]
      .every((key) => JSON.stringify(Object.keys(msgs[loc][key]?.placeholders || {}).sort()) ===
        JSON.stringify(Object.keys(msgs.en[key]?.placeholders || {}).sort()))),
    "one or more vocabulary messages changed its placeholder set");
  const PACK_HINT_MARKERS = {
    en: ["Simplified", "Traditional", "English", "does not support"],
    zh_CN: ["简体", "繁体", "英文", "不支持"],
    zh_TW: ["簡體", "繁體", "英文", "不支援"],
    zh_HK: ["簡體", "繁體", "英文", "不支援"],
    ja: ["簡体字", "繁体字", "英語", "対応していません"],
    de: ["vereinfachten", "traditionellen", "englische", "nicht unterstützt"],
    fr: ["simplifiés", "traditionnels", "anglais", "pas prise en charge"],
    pl: ["uproszczonymi", "tradycyjnymi", "angielsku", "Nie obsługuje"],
    ru: ["упрощённом", "традиционном", "английском", "не поддерживается"]
  };
  check("H9 CC-CEDICT hint states both Chinese scripts, English definitions, and no English lookup",
    LOCALES.every((loc) => PACK_HINT_MARKERS[loc].every((marker) =>
      msgs[loc].dictPackHint.message.includes(marker))),
    "one or more dictPackHint messages changed the v2 capability boundary");
  const DICT_HONESTY_KEYS = ["explainTranslateSelection", "explainTranslateLoading", "dictLoading",
    "explainAiNotConfigured", "explainTranslateAiNotConfigured", "dictMatchedHeadword",
    "dictUpdateVocab", "dictTagPinyin", "dictTagSimplified", "dictTagTraditional",
    "dictConnectRetry", "dictPermissionDenied"];
  check("H10 all locales expose action-specific and honest dictionary messages",
    LOCALES.every((loc) => DICT_HONESTY_KEYS.every((key) => msgs[loc][key]?.message)),
    "one or more action or dictionary honesty messages are missing");
  check("H10 English permission copy names the intermediary and current-dictionary miss boundary",
    /freedictionaryapi\.com/i.test(msgs.en.dictConnectHint?.message || "") &&
      /Wiktionary/i.test(msgs.en.dictConnectHint?.message || "") &&
      !/connect to Wiktionary/i.test(msgs.en.dictConnect?.message || "") &&
      /connected dictionary/i.test(msgs.en.dictNoEntry?.message || ""),
    "English copy blurs freedictionaryapi with Wiktionary or claims a global miss");
  const DICT_SEMANTIC_BOUNDARIES = {
    de: {
      connect: [/Online-Wörterbuch/i, /Zugriff|Berechtigung|erlaub|zulass|freigeb/i],
      miss: [/Online-Wörterbuch/i, /kein|nicht|nichts|ohne/i, /Eintrag|Treffer|Ergebnis|gefunden/i],
      connectedCalque: /\bverbunden(?:e|en|er|es|em)?\b/i
    },
    fr: {
      connect: [/dictionnaire en ligne/i, /accès|autorisation|autoris|permettre/i],
      miss: [/dictionnaire en ligne/i, /aucun|aucune|pas|introuvable|sans résultat|ne .* trouv/i,
        /entrée|résultat|trouv/i],
      connectedCalque: /connect(?:é|ée|és|ées)/i
    },
    pl: {
      connect: [/słownik\w* online/i, /dostęp|zezwol|zezwól|pozwol|pozwól|uprawnien/i],
      miss: [/słownik\w* online/i, /nie|brak|bez|żadn/i, /hasł|wynik|rezultat|znalezion/i],
      connectedCalque: /\bpodłączon/i
    },
    ru: {
      connect: [/онлайн-словар/i, /доступ|разреш|позвол/i],
      miss: [/онлайн-словар/i, /не|ничего|нет/i, /найден|результат|стать|совпаден/i],
      connectedCalque: /подключ[её]нн/i
    },
    ja: {
      connect: [/オンライン辞書/, /アクセス|権限|許可|利用できる/],
      miss: [/オンライン辞書/, /見つかりません|見つから|該当.*(?:なし|ありません)|結果.*(?:なし|ありません)/],
      connectedCalque: /接続中/
    }
  };
  const dictBoundaryFailures = [];
  const dictCalqueFailures = [];
  for (const [loc, contract] of Object.entries(DICT_SEMANTIC_BOUNDARIES)) {
    const connect = msgs[loc].dictConnect?.message || "";
    const miss = msgs[loc].dictNoEntry?.message || "";
    if (!contract.connect.every((pattern) => pattern.test(connect))) dictBoundaryFailures.push(`${loc}.dictConnect`);
    if (!contract.miss.every((pattern) => pattern.test(miss))) dictBoundaryFailures.push(`${loc}.dictNoEntry`);
    if (contract.connectedCalque.test(miss)) dictCalqueFailures.push(`${loc}.dictNoEntry`);
  }
  check("H11 reviewed locales preserve online-dictionary permission and miss semantics",
    dictBoundaryFailures.length === 0, `semantic boundary failed: ${dictBoundaryFailures.join(", ")}`);
  check("H11 reviewed locales reject the known literal connected-dictionary calques",
    dictCalqueFailures.length === 0, `connected calque found: ${dictCalqueFailures.join(", ")}`);
  const OPTIONS_HONESTY_KEYS = ["vocabOwnerNoAccount", "vocabLoadFailed", "vocabExportFailed",
    "vocabAccountChanged", "vocabSettingsSaveFailed", "dictEudicSupportedHint",
    "dictAnkiHostPermissionDenied", "dictAnkiConnectPermissionFailed",
    "dictAnkiConnectPermissionDenied", "dictAnkiVersionUnsupported", "dictAnkiFieldCheckFailed",
    "dictAnkiFailed", "dictEudicHostPermissionDenied", "dictEudicRejected", "dictEudicFailed",
    "dictPackImportHint", "dictPackReadFailed", "dictPackDeleteFailed"];
  check("H12 all locales expose scoped export/integration and storage-stage messages",
    LOCALES.every((loc) => OPTIONS_HONESTY_KEYS.every((key) => msgs[loc][key]?.message)),
    "one or more Options scope/error messages are missing");
  check("H12 English Options copy states account scope, all-row actions, language support, and pack formats",
    /current Pinboard account/i.test(msgs.en.vocabResultCount?.message || "") &&
      /\$OWNER\$/.test(msgs.en.vocabResultCount?.message || "") &&
      /current Pinboard account/i.test(msgs.en.dictVocabEmpty?.message || "") &&
      /\.tsv/i.test(msgs.en.dictExportTsv?.message || "") &&
      /^Send all\b/i.test(msgs.en.dictAnkiSend?.message || "") &&
      /all supported words/i.test(msgs.en.dictEudicSend?.message || "") &&
      ["en", "fr", "de", "es"].every((code) => (msgs.en.dictEudicSupportedHint?.message || "").includes(code)) &&
      /Chinese/i.test(msgs.en.dictPackSection?.message || "") && /English/i.test(msgs.en.dictPackSection?.message || "") &&
      [".txt", ".txt.gz", ".zip"].every((ext) => (msgs.en.dictPackImportHint?.message || "").includes(ext)),
    "English copy obscures scope, support, direction, or accepted formats");
  check("H12 English failure copy does not invent a 403 wait window or a single import cause",
    /token/i.test(msgs.en.dictEudicRejected?.message || "") &&
      /retry|again|later/i.test(msgs.en.dictEudicRejected?.message || "") &&
      !/\b(?:1|24)\s*(?:h|hour)/i.test(msgs.en.dictEudicRejected?.message || "") &&
      /file|format/i.test(msgs.en.dictPackFailed?.message || "") &&
      /storage/i.test(msgs.en.dictPackFailed?.message || "") &&
      msgs.en.dictPackReadFailed?.message !== msgs.en.dictPackEmpty?.message,
    "English failure copy invents a cause/window or collapses read failure into empty state");
  const ACTIONABLE_HINTS = {
    en: [
      "At the top of this page, turn “Archive saved pages to the Wayback Machine” off and back on to request permission for web.archive.org again.",
      "Modify Custom CSS to enable saving it as a reusable theme."
    ],
    de: [
      "Deaktiviere oben auf dieser Seite „Gespeicherte Seiten im Wayback Machine archivieren“ und aktiviere die Option erneut, um die Berechtigung für web.archive.org neu anzufordern.",
      "Bearbeite zuerst die eigene CSS-Überlagerung. Danach kannst du sie als Theme speichern."
    ],
    fr: [
      "En haut de cette page, désactivez puis réactivez « Archiver les pages enregistrées sur Internet Archive » pour redemander l’autorisation d’accéder à web.archive.org.",
      "Modifiez d’abord la surcouche CSS personnalisée. Vous pourrez ensuite l’enregistrer comme thème réutilisable."
    ],
    pl: [
      "U góry tej strony wyłącz, a następnie ponownie włącz opcję „Archiwizuj zapisane strony w Internet Archive”, aby ponownie poprosić o uprawnienie do web.archive.org.",
      "Najpierw zmodyfikuj niestandardową nakładkę CSS. Potem możesz zapisać ją jako motyw."
    ],
    ru: [
      "В верхней части этой страницы выключите, а затем снова включите параметр «Архивировать сохранённые страницы в Wayback Machine», чтобы повторно запросить разрешение для web.archive.org.",
      "Сначала измените пользовательское наложение CSS. После этого его можно сохранить как тему."
    ],
    zh_HK: [
      "請在本頁頂部先關閉再重新開啟「儲存頁面到互聯網檔案館」，以重新申請 web.archive.org 權限。",
      "修改自訂 CSS 疊加後，便可將它儲存為可重用的主題。"
    ],
    zh_CN: [
      "请在本页顶部关闭后重新开启「保存页面到互联网档案馆」，以重新申请 web.archive.org 权限。",
      "修改自定义 CSS 覆盖后，即可将其保存为可复用主题。"
    ],
    zh_TW: [
      "請在本頁頂端先關閉再重新開啟「儲存頁面到網際網路檔案館」，以重新申請 web.archive.org 權限。",
      "修改自訂 CSS 疊加後，即可將其儲存為可重複使用的主題。"
    ],
    ja: [
      "このページ上部で「保存したページを Wayback Machine にアーカイブする」をいったんオフにしてから再度オンにし、web.archive.org の権限を再申請してください。",
      "カスタム CSS オーバーレイを編集すると、再利用可能なテーマとして保存できます。"
    ]
  };
  const actionableFailures = LOCALES.filter((loc) =>
    msgs[loc].waybackPermDenied?.message !== ACTIONABLE_HINTS[loc][0] ||
    msgs[loc].saveAsThemeHint?.message !== ACTIONABLE_HINTS[loc][1]);
  check("H13 permission and disabled-state hints expose the exact recovery action in every locale",
    actionableFailures.length === 0, `copy mismatch: ${actionableFailures.join(", ")}`);
  console.log(`PASS ${pass} | FAIL ${fail}`);
})();
</script></body></html>
