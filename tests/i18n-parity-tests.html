<!doctype html>
<html><head><meta charset="utf-8"><title>i18n parity tests</title>
<style>.case{font-family:monospace;white-space:pre}.pass{color:#176}.fail{color:#b00}</style>
</head><body>
<div id="results"></div>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "PASS" : "FAIL"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
// load via fetch (open this file over http://, e.g. `npx serve` or VS Code Live Server,
// because file:// blocks fetch of sibling JSON in Chrome)
async function loadLocale(loc) {
  const r = await fetch(`../_locales/${loc}/messages.json`);
  return r.json();
}
(async () => {
  const LOCALES = ["en","de","fr","pl","ru","zh_HK","zh_CN","zh_TW","ja"];
  const msgs = {};
  for (const l of LOCALES) msgs[l] = await loadLocale(l);

  // H1: AI/Jina cluster must be present and translated (≠ English) in these
  // locales — EXCEPT values that are legitimately identical to English in that
  // language (loanwords / brand tokens): "Local (Defuddle)" — "Local" is also a
  // French word + "Defuddle" is a brand; "API Key (optional)" — "API Key" is a
  // brand token and "optional" is the same word in German.
  const CLUSTER = ["secAiContentSource","aiContentSourceLocal","jinaConverting",
    "jinaCopied","jinaFailed","jinaApiKeyLabel","jinaApiKeyPlaceholder","jinaViewBtn",
    "jinaMarkdownTitle","jinaMarkdownTitleJina"];
  const SAME_AS_EN_OK = new Set(["fr.aiContentSourceLocal","de.jinaApiKeyLabel"]);
  for (const loc of ["de","fr","pl","ru","zh_HK"]) {
    for (const k of CLUSTER) {
      const en = msgs.en[k]?.message, tr = msgs[loc][k]?.message;
      check(`H1 ${loc}.${k} present`, !!tr, `${loc}.${k} missing`);
      if (!SAME_AS_EN_OK.has(`${loc}.${k}`))
        check(`H1 ${loc}.${k} translated`, tr !== en,
              `${loc}.${k} still == en: ${JSON.stringify(tr)}`);
    }
  }
  // H2: new keys exist in all locales
  for (const k of ["importSettingsTitle","jinaMdNonWebHint","popSortTitle"]) {
    for (const loc of LOCALES)
      check(`H2 ${loc}.${k} present`, !!msgs[loc][k]?.message, `${loc} missing ${k}`);
  }
  // H2: each hardcoded string is now WIRED to i18n. English literals may remain
  // as inline fallbacks (this codebase's convention: data-i18n-title fallback in
  // HTML, `t() ?? "literal"` in JS, chrome.i18n fallback in content scripts), so
  // assert the WIRING is present, not that the literal was deleted.
  const optHtml = await (await fetch("../options.html")).text();
  check('H2 options.html Import label wired to data-i18n-title',
        optHtml.includes('data-i18n-title="importSettingsTitle"'));
  const popupJs = await (await fetch("../popup.js")).text();
  check('H2 popup.js non-web hint wired to jinaMdNonWebHint key',
        popupJs.includes('jinaMdNonWebHint'));
  const sortJs = await (await fetch("../pinboard-sort.js")).text();
  check('H2 pinboard-sort.js title wired to chrome.i18n popSortTitle',
        sortJs.includes('popSortTitle'));
  const sharedJs = await (await fetch("../shared.js")).text();
  check('H2 shared.js Dismiss aria-label wired to aiErrorDismiss key',
        sharedJs.includes('aiErrorDismiss'));
  // H3: Wayback section title is its own key, distinct from the checkbox label
  for (const loc of LOCALES)
    check(`H3 ${loc}.secWayback present`, !!msgs[loc].secWayback?.message, `${loc} missing secWayback`);
  const optHtml3 = await (await fetch("../options.html")).text();
  // the section-title line must NOT still point at optWayback
  check('H3 options.html section-title uses secWayback',
        /class="section-title"[^>]*data-i18n="secWayback"/.test(optHtml3));
  check('H3 options.html no longer has section-title data-i18n="optWayback"',
        !/class="section-title"[^>]*data-i18n="optWayback"/.test(optHtml3));
  // H4: no literal U+2192 arrow in jinaAuthFailed (font-fallback risk)
  for (const loc of LOCALES)
    check(`H4 ${loc}.jinaAuthFailed has no U+2192`,
          !(msgs[loc].jinaAuthFailed?.message || "").includes("→"),
          `${loc}.jinaAuthFailed: ${JSON.stringify(msgs[loc].jinaAuthFailed?.message)}`);
  // H5: enumerate English-identical keys per locale, excluding brand/technical tokens
  const BRAND_OK = new Set([
    "extName","appName","labelUrl","labelApiKey","labelApiToken","labelBaseUrl",
    "langZh","langZhTW","langZhHK","langEn","langJa","langKo","langFr","langDe","langEs","langRu",
    "provGemini","provOpenai","provClaude","provDeepseek","provQwen","provMinimax",
    "provOpenrouter","provGroq","provMistral","provCohere","provSiliconflow","provZhipu",
    "provKimi","provOllama","provCustom","provHuggingface",
    "jinaMarkdownBtn","aiContentSourceJina","secJinaReader","mdStripObsidian","tabMarkdown",
    "hintClaudeModel","hintZhipuModel","hintKimiModel","labelAiTags","placeholderTags",
    "optUrlCleanCustomPlaceholder","optUrlCleanExcludePlaceholder","customCSSPlaceholder",
    "tagPresetsPlaceholder","translateGlossaryPlaceholder","aiCancel",
    // keyboard shortcuts — same in all locales (platform keys)
    "hintCtrlEnter","aiSummaryBtnTitle",
    // pure placeholder-format strings — no translatable text
    "batchProgress",
    // loanwords / same-word in target language
    "tabPopup","tabAI","tagGovKindAi","mdOptFrontmatter","secPrompts","labelTagPrompt",
    "tabGroupAI","tabGroupSystem", // sidebar group labels: "AI" is the universal term (matches tabAI); "System" is the same word in de/pl
    "aiErrorDetails","qlSets","labelTags","aiErrorOpTags","secTags","tabTags",
    "placeholderOptional","optPopupWidth550","jinaApiKeyLabel",
    "optWaybackS3Key","optWaybackS3Secret","trViewOriginal",
    "labelNotes","tagCount","tagCountPlural","qlNotes","sepUnderscore",
    "secNotifications","qlNotesTitle","mdOptImages","aiContentSourceLocal",
    "optPopupWidth450","trProgress","labelModel","tagGovKindSeparator",
    "dictLangAuto" // loanword: "Auto" is the same in all target languages
  ]);
  for (const loc of ["de","fr","pl","ru","zh_HK"]) {
    const offenders = Object.keys(msgs.en).filter(k =>
      !BRAND_OK.has(k) &&
      msgs[loc][k]?.message != null &&
      msgs[loc][k].message === msgs.en[k].message);
    // log the worklist so the implementer sees exactly what to translate
    console.log(`H5 ${loc} untranslated (${offenders.length}):`, offenders.join(", "));
    check(`H5 ${loc} has no non-brand English-identical keys`, offenders.length === 0,
          `${offenders.length} left: ${offenders.slice(0,12).join(", ")}…`);
  }
  // H6: SHAPE + full key-set parity. A prior bulk json.dump rewrite turned
  // {"message":...} into ["message",...] and STILL passed the presence-only
  // checks + node --check. Assert every value is a {message:string} OBJECT and
  // each locale's key SET matches en exactly (no missing, no extra).
  const enKeys = Object.keys(msgs.en);
  for (const loc of LOCALES) {
    const badShape = Object.keys(msgs[loc]).filter(k => {
      const v = msgs[loc][k];
      return !v || typeof v !== "object" || Array.isArray(v) || typeof v.message !== "string";
    });
    check(`H6 ${loc} every value is {message:string}`, badShape.length === 0,
          `bad shape: ${badShape.slice(0,12).join(", ")}`);
    const missing = enKeys.filter(k => !(k in msgs[loc]));
    const extra = Object.keys(msgs[loc]).filter(k => !(k in msgs.en));
    check(`H6 ${loc} has every en key`, missing.length === 0, `missing: ${missing.slice(0,12).join(", ")}`);
    check(`H6 ${loc} has no extra keys`, extra.length === 0, `extra: ${extra.slice(0,12).join(", ")}`);
  }
  console.log(`PASS ${pass} | FAIL ${fail}`);
})();
</script></body></html>
