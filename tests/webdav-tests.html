<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>webdav Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>webdav.js tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../shared.js"></script>
<script src="../webdav.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function section(name) { const h = document.createElement("h2"); h.textContent = name; root.appendChild(h); }
function assert(cond, detail) { check(detail || String(cond), cond, detail); }
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}

section("pbpWebdavFileUrl");
assertEq(pbpWebdavFileUrl("https://dav.example.com/backups"),
  "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json",
  "no trailing slash -> appends /filename");
assertEq(pbpWebdavFileUrl("https://dav.jianguoyun.com/dav/"),
  "https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-settings.json",
  "provider root URL stores under the extension data collection");
assertEq(pbpWebdavFileUrl("https://dav.example.com/backups/"),
  "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json",
  "trailing slash -> no double slash");
assertEq(pbpWebdavFileUrl(""), "", "empty baseUrl -> empty string (degrade, no throw)");
assertEq(pbpWebdavFileUrl("   "), "", "whitespace-only baseUrl -> empty string");
assertEq(pbpWebdavFileUrl("https://dav.example.com/remote.php/webdav"),
  "https://dav.example.com/remote.php/webdav/pinboard-bookmark-enhanced-settings.json",
  "multi-segment path, no trailing slash");
assertEq(pbpWebdavFileUrl("https://dav.example.com/dav?access_token=secret"),
  "https://dav.example.com/dav/pinboard-bookmark-enhanced-settings.json?access_token=secret",
  "query capability token stays on the request while filename joins the path");
assertEq(pbpWebdavFileUrl("https://dav.example.com/dav#fragment"), "",
  "fragment-bearing target is rejected because fragments never reach WebDAV");
assertEq(pbpWebdavFileUrl(null), "", "null -> empty string, no throw");

section("pbpWebdavAuthHeader");
assertEq(pbpWebdavAuthHeader("", ""), null, "empty user + empty pass -> null (no header)");
assertEq(pbpWebdavAuthHeader("bob", "secret"), "Basic " + btoa("bob:secret"), "user+pass -> Basic base64(user:pass)");
assertEq(pbpWebdavAuthHeader("bob", ""), "Basic " + btoa("bob:"), "user only -> still builds a header (empty pass is valid Basic auth)");
assertEq(pbpWebdavAuthHeader("", "secret"), "Basic " + btoa(":secret"), "pass only -> still builds a header");
assert(typeof pbpWebdavAuthHeader("büro", "pässwört") === "string" &&
  pbpWebdavAuthHeader("büro", "pässwört").startsWith("Basic "),
  "unicode user/pass does not throw, returns a Basic header");

section("pbpWebdavOrigin");
assertEq(pbpWebdavOrigin("https://dav.example.com/backups/"), "https://dav.example.com/*", "derives origin + /*");
assertEq(pbpWebdavOrigin("not a url"), null, "malformed URL -> null, no throw");
assertEq(pbpWebdavOrigin(""), null, "empty -> null");
assertEq(pbpWebdavOrigin("https://user:pass@dav.example.com/backups/"), null, "embedded credentials are rejected");
assertEq(pbpWebdavOrigin("http://localhost:8080/dav/"), "http://localhost:8080/*", "literal localhost HTTP is allowed");
assertEq(pbpWebdavOrigin("http://127.0.0.1:8080/dav/"), "http://127.0.0.1:8080/*", "literal IPv4 loopback HTTP is allowed");
assertEq(pbpWebdavOrigin("http://[::1]:8080/dav/"), "http://[::1]:8080/*", "literal IPv6 loopback HTTP is allowed");
assertEq(pbpWebdavOrigin("http://192.168.1.2/dav/"), null, "LAN HTTP is rejected");
assertEq(pbpWebdavOrigin("http://127.1/dav/"), null, "alternate loopback spelling is rejected");
assertEq(pbpWebdavOrigin("ftp://dav.example.com/"), null, "non-HTTP scheme is rejected");
assertEq(pbpWebdavOrigin("https://dav.example.com/dav#fragment"), null, "fragment-bearing endpoint is rejected before permission lookup");

section("pbpWebdavAutoPushPeriod");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavAutoPush: "hourly", webdavPass: "" }), 60,
  "anonymous WebDAV can schedule hourly pushes without a password");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavAutoPush: "daily" }), 1440,
  "daily mode maps to a 1440-minute alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavAutoPush: "off" }), 0,
  "off mode creates no alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "http://192.168.1.2/dav", webdavAutoPush: "hourly" }), 0,
  "blocked endpoint creates no automatic alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavAutoPush: "hourly", webdavUser: "bob", webdavPass: "" }), 0,
  "username without a password never schedules — every tick would 401 forever");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavAutoPush: "hourly", webdavUser: "", webdavPass: "secret" }), 0,
  "password without a username never schedules either (half-configured Basic auth)");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "obf:" + btoa("https://dav.example.com/dav"), webdavAutoPush: "hourly" }), 60,
  "transitional obf-wrapped URL is healed before the origin gate");

section("pbpWebdavBuildPayload — zero secrets (spec invariant #1)");
{
  const fullSettings = Object.assign({}, SETTINGS_DEFAULTS);
  API_KEY_FIELDS.forEach((k, i) => { fullSettings[k] = "obf:v" + i; });
  fullSettings.optTheme = "nord";
  fullSettings.exportTargets = { github: { enabled: true, token: "ghp_x", repo: "r" } };
  const meta = { pushedAt: "2026-07-08T00:00:00.000Z", appVersion: "2.88" };
  const payload = pbpWebdavBuildPayload(fullSettings, meta);

  assert(API_KEY_FIELDS.every((k) => !(k in payload)),
    "every one of the " + API_KEY_FIELDS.length + " API_KEY_FIELDS is absent from the payload");
  assert(!("webdavPass" in payload), "webdavPass absent from payload (not a settings field yet in this batch)");
  assertEq(payload.optTheme, "nord", "a non-secret setting rides the payload");
  assert(!("token" in payload.exportTargets.github), "exportTargets token stripped");
  assertEq(payload.exportTargets.github.repo, "r", "exportTargets non-secret fields survive");
  assertEq(payload._schemaVersion, 2, "envelope schema version is 2");
  assertEq(payload._webdav.pushedAt, "2026-07-08T00:00:00.000Z", "envelope pushedAt comes from meta, verbatim");
  assertEq(payload._webdav.appVersion, "2.88", "envelope appVersion comes from meta, verbatim");
  assertEq(fullSettings.optTheme, "nord", "input settings object is not mutated");
  assert("token" in fullSettings.exportTargets.github, "input exportTargets still has its token (proves no mutation)");
}
section("pbpWebdavBuildPayload — purity (no internal clock)");
{
  const s = Object.assign({}, SETTINGS_DEFAULTS);
  const p1 = pbpWebdavBuildPayload(s, { pushedAt: "A", appVersion: "1" });
  const p2 = pbpWebdavBuildPayload(s, { pushedAt: "B", appVersion: "1" });
  assert(p1._webdav.pushedAt === "A" && p2._webdav.pushedAt === "B",
    "pushedAt only ever reflects the meta argument -- function never calls Date.now itself");
}

section("pbpWebdavBuildPayload — optional highlights");
{
  const highlights = {
    pbp_hl_abc123ef: { v: 1, url: "https://x.test", title: "X", items: [] },
    pbp_hl_last_color: 4
  };
  const payloadWithHl = pbpWebdavBuildPayload(
    Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: true }),
    { pushedAt: "t", appVersion: "v" },
    { highlights }
  );
  assert(payloadWithHl._highlights && payloadWithHl._highlights.pbp_hl_abc123ef,
    "highlight backup included when enabled");

  const payloadWithoutHl = pbpWebdavBuildPayload(
    Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: false }),
    { pushedAt: "t", appVersion: "v" },
    { highlights }
  );
  assert(!payloadWithoutHl._highlights, "highlight backup omitted when disabled");
}

section("pbpWebdavBuildPayload — custom themes + savedThemes (BUG-1) & highlight owner (SEC-1)");
{
  const s = Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: true });
  const payload = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, {
    highlights: { pbp_hl_x: { v: 1, url: "https://x.test", title: "X", items: [] } },
    highlightsOwner: "alice",
    overlay: "body{color:red}",
    savedThemes: [{ name: "Mine", css: "x" }],
  });
  assertEq(payload.customOverlayCSS, "body{color:red}", "custom overlay CSS rides the WebDAV payload (BUG-1)");
  assert(Array.isArray(payload.savedThemes) && payload.savedThemes[0].name === "Mine", "savedThemes ride the WebDAV payload (BUG-1)");
  assertEq(payload._highlightsOwner, "alice", "highlight backup carries the non-secret owner account (SEC-1)");

  const noExtra = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" },
    { highlights: { pbp_hl_x: { v: 1, url: "https://x.test", title: "X", items: [] } } });
  assertEq(noExtra.customOverlayCSS, "", "missing overlay extra serializes as an explicit clear");
  assert(Array.isArray(noExtra.savedThemes) && noExtra.savedThemes.length === 0,
    "missing savedThemes extra serializes as an explicit clear");
  assert(!("_highlightsOwner" in noExtra), "no owner -> no _highlightsOwner key (legacy-compatible)");

  const emptyExtra = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { overlay: "", savedThemes: [] });
  assertEq(emptyExtra.customOverlayCSS, "", "empty overlay string is preserved so restore can clear stale CSS");
  assert(Array.isArray(emptyExtra.savedThemes) && emptyExtra.savedThemes.length === 0,
    "empty savedThemes array is preserved so restore can clear stale themes");

  let malformedThemeError = null;
  try {
    pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { savedThemes: [{ key: "legacy", css: "x" }] });
  } catch (error) { malformedThemeError = error; }
  assert(malformedThemeError instanceof TypeError,
    "malformed saved themes are rejected before creating an unrestorable WebDAV backup");
  const oversizeOverlay = "x".repeat(OVERLAY_BYTE_LIMIT + 1);
  const oversizePayload = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { overlay: oversizeOverlay });
  assertEq(oversizePayload.customOverlayCSS, oversizeOverlay,
    "over-limit legacy overlay rides the backup instead of silently killing every scheduled push");
}

section("pbpHighlightBackupOwnerAllowed (SEC-1 pure gate)");
{
  assert(pbpHighlightBackupOwnerAllowed("alice", "alice") === true, "same account -> allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "bob") === false, "different account -> blocked (cross-account leak prevented)");
  assert(pbpHighlightBackupOwnerAllowed("", "bob") === true, "no backup owner (legacy backup) -> allowed, backward compatible");
  assert(pbpHighlightBackupOwnerAllowed(undefined, "bob") === true, "undefined owner -> allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "") === false, "known owner + logged-out restore -> blocked until the matching account is available");
  // Fail-closed when the current account could not be resolved (storage/lock error).
  assert(pbpHighlightBackupOwnerAllowed("alice", "", false) === false, "unresolved account + known foreign owner -> blocked (fail closed)");
  assert(pbpHighlightBackupOwnerAllowed("", "", false) === true, "unresolved account + legacy/ownerless backup -> still allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "alice", false) === false, "unresolved account never trusts a passed-in account -> blocked");
}

section("pbpWebdavBuildRequest");
{
  const cfg = { baseUrl: "https://dav.example.com/backups", user: "bob", pass: "secret" };
  const push = pbpWebdavBuildRequest("push", cfg);
  assertEq(push.method, "PUT", "push -> PUT");
  assertEq(push.headers["Content-Type"], "application/json", "push sets JSON content-type");
  assertEq(push.url, pbpWebdavFileUrl(cfg.baseUrl), "push url built via pbpWebdavFileUrl");
  assert(!("If-None-Match" in push.headers),
    "unknown revision pushes unconditionally — create-only If-None-Match would 412 forever against a pre-existing remote backup");
  assert(!("If-Match" in push.headers), "unknown revision push does not send If-Match");
  const scheduledCreate = pbpWebdavBuildRequest("push", Object.assign({}, cfg, { createOnly: true }));
  assertEq(scheduledCreate.headers["If-None-Match"], "*",
    "createOnly (scheduled unknown-revision) push sends If-None-Match:* so automation cannot blind-overwrite");

  const updatePush = pbpWebdavBuildRequest("push", Object.assign({}, cfg, { etag: '"v1"' }));
  assertEq(updatePush.headers["If-Match"], '"v1"', "known remote revision is updated with If-Match");
  assert(!("If-None-Match" in updatePush.headers), "known remote revision never sends the create-only precondition");

  const coarseUpdate = pbpWebdavBuildRequest("push", Object.assign({}, cfg, { known: true, etag: "" }));
  assertEq(coarseUpdate.headers["If-Match"], "*", "known file without a strong ETag stays writable without reverting to create-only mode");
  assert(!("If-None-Match" in coarseUpdate.headers), "known file without a strong ETag never sends If-None-Match");
  assert(pbpWebdavValidEtag('"strong"') && !pbpWebdavValidEtag('W/"weak"') &&
    !pbpWebdavValidEtag("*") && !pbpWebdavValidEtag("unquoted"),
    "only syntactically valid strong ETags are eligible for exact If-Match CAS");

  assertEq(pbpWebdavNormalizeEtag('"abc-gzip"'), '"abc"',
    "Apache mod_deflate suffix stripped from GET etags (the pull->push 412 loop)");
  assertEq(pbpWebdavNormalizeEtag('"abc-br"'), '"abc"', "brotli suffix stripped too");
  assertEq(pbpWebdavNormalizeEtag('"plain"'), '"plain"', "clean etag passes through unchanged");
  assertEq(pbpWebdavNormalizeEtag('W/"weak-gzip"'), "", "weak/invalid input normalizes to empty, never a fabricated tag");

  const pull = pbpWebdavBuildRequest("pull", cfg);
  assertEq(pull.method, "GET", "pull -> GET");
  assert(!("Content-Type" in pull.headers), "pull has no content-type header");

  const testReq = pbpWebdavBuildRequest("test", cfg);
  assertEq(testReq.method, "GET", "test -> GET");

  const probe = pbpWebdavBuildRequest("probe", cfg);
  assertEq(probe.method, "PROPFIND", "probe -> PROPFIND");
  assertEq(probe.headers.Depth, "0", "probe checks only the configured collection");
  assertEq(probe.url, "https://dav.example.com/backups/", "probe url is the collection, not the backup file");

  const writeProbe = pbpWebdavBuildRequest("write-test", Object.assign({}, cfg, { probeName: "pbp-test.txt" }));
  assertEq(writeProbe.method, "PUT", "write-test -> PUT");
  assertEq(writeProbe.url, "https://dav.example.com/backups/pbp-test.txt", "write-test targets a temp file in the collection");
  assertEq(writeProbe.headers["If-None-Match"], "*", "write-test never overwrites an existing temp file");

  const generatedWriteProbe = pbpWebdavBuildRequest("write-test", Object.assign({}, cfg, { probeName: PBP_WEBDAV_WRITE_TEST_PREFIX + "abc.txt" }));
  assertEq(generatedWriteProbe.url, "https://dav.example.com/backups/pinboard-bookmark-enhanced-write-test-abc.txt",
    "generated write-test filename is a normal visible file, not a dotfile");

  const deleteProbe = pbpWebdavBuildRequest("write-test-delete", Object.assign({}, cfg, { probeName: "pbp-test.txt" }));
  assertEq(deleteProbe.method, "DELETE", "write-test-delete -> DELETE");
  assertEq(deleteProbe.url, writeProbe.url, "delete removes the same temp file");

  const mkdir = pbpWebdavBuildRequest("mkdir", cfg);
  assertEq(mkdir.method, "MKCOL", "mkdir -> MKCOL");
  assertEq(mkdir.url, "https://dav.example.com/backups/", "mkdir targets the collection");

  assertEq(push.headers.Authorization, "Basic " + btoa("bob:secret"), "Authorization present when user/pass set");
  const noAuth = pbpWebdavBuildRequest("push", { baseUrl: "https://dav.example.com/backups", user: "", pass: "" });
  assert(!("Authorization" in noAuth.headers), "Authorization omitted when user+pass both empty");
}

async function runChromeLayerTests() {
  section("background routing-change alarm refresh");
  const backgroundSource = await fetch("../background.js").then((response) => response.text());
  const storageListener = backgroundSource.slice(
    backgroundSource.indexOf("chrome.storage.onChanged.addListener((changes, area) => {"),
    backgroundSource.indexOf("// Initial check", backgroundSource.indexOf("chrome.storage.onChanged.addListener((changes, area) => {")),
  );
  check("ordinary/key sync route changes recompute scheduled WebDAV and tag alarms",
    storageListener.includes("changes.optSyncEnabled || changes.syncApiKeys") &&
    storageListener.includes("routingChanged || changes.tagSyncMode") &&
    storageListener.includes("routingChanged || changes.webdavAutoPush") &&
    backgroundSource.includes("queuePrewarmAlarmSync = pbpCreateRecoveringTail()") &&
    backgroundSource.includes("queueWebdavAlarmSync = pbpCreateRecoveringTail()"));

  section("_pbpWebdavCfg — credentials decoded for background alarm");
  const realCfgChrome = globalThis.chrome;
  const realCfgCache = _settingsStorageCache;
  const cfgLocal = {
    optSyncEnabled: false,
    webdavUrl: obfuscateKey("https://dav.example.com/capability?token=secret"),
    webdavUser: obfuscateKey("alice"),
    webdavPass: obfuscateKey("password"),
  };
  const cfgGet = async (keys) => {
    if (Array.isArray(keys)) {
      const out = {};
      keys.forEach((key) => { if (key in cfgLocal) out[key] = cfgLocal[key]; });
      return out;
    }
    if (typeof keys === "object" && keys !== null) {
      const out = Object.assign({}, keys);
      Object.keys(keys).forEach((key) => { if (key in cfgLocal) out[key] = cfgLocal[key]; });
      return out;
    }
    return keys in cfgLocal ? { [keys]: cfgLocal[keys] } : {};
  };
  try {
    _settingsStorageCache = null;
    globalThis.chrome = {
      storage: {
        local: { get: cfgGet },
        sync: { get: async () => ({}) },
        onChanged: { addListener() {} },
      },
    };
    const storedCfg = await _pbpWebdavCfg();
    check("background cfg decodes the WebDAV capability URL before endpoint validation",
      storedCfg.baseUrl === "https://dav.example.com/capability?token=secret" &&
      pbpWebdavOrigin(storedCfg.baseUrl) === "https://dav.example.com/*");
    check("background cfg decodes password while preserving username",
      storedCfg.user === "alice" && storedCfg.pass === "password");
  } finally {
    globalThis.chrome = realCfgChrome;
    _settingsStorageCache = realCfgCache;
  }

  section("WebDAV endpoint gate — zero fetch");
  const realFetch0 = globalThis.fetch;
  const realChrome0 = globalThis.chrome;
  let insecureFetches = 0, insecurePermissionChecks = 0;
  const persisted = { webdavUrl: "https://saved.example/dav/", webdavAutoPush: "daily" };
  globalThis.chrome = {
    permissions: { contains: async () => { insecurePermissionChecks++; return true; } },
    storage: { local: { set: async (data) => { Object.assign(persisted, data); } } },
  };
  globalThis.fetch = async () => { insecureFetches++; throw new Error("must not fetch"); };
  try {
    const cfg = { baseUrl: "http://192.168.1.2/dav/", user: "", pass: "" };
    const ensured = await pbpWebdavEnsureCollection(cfg);
    check("collection probe rejects insecure endpoint", !ensured.ok && ensured.error === "insecure");
    const writable = await pbpWebdavProbeWritable(cfg);
    check("write probe rejects insecure endpoint", !writable.ok && writable.error === "insecure");
    const pushed = await pbpWebdavPush(cfg);
    check("push rejects insecure endpoint", !pushed.ok && pushed.error === "insecure");
    check("insecure push persists its failure status", persisted.webdavLastPush?.error === "insecure" && persisted.webdavLastPush.ts === pushed.ts);
    check("insecure push preserves WebDAV configuration", persisted.webdavUrl === "https://saved.example/dav/" && persisted.webdavAutoPush === "daily");
    const pulled = await pbpWebdavPull(cfg);
    check("pull rejects insecure endpoint", !pulled.ok && pulled.error === "insecure");
    const tested = await pbpWebdavTest(cfg);
    check("test rejects insecure endpoint", !tested.ok && tested.kind === "insecure");
    check("insecure WebDAV paths make zero permission checks", insecurePermissionChecks === 0);
    globalThis.chrome = { permissions: { contains: async () => { throw new Error("API unavailable"); } } };
    const denied = await pbpWebdavPull({ baseUrl: "https://dav.example.com/dav/", user: "", pass: "" });
    check("permission-check failure blocks WebDAV before fetch", !denied.ok && denied.error === "perm");
    check("all insecure WebDAV paths make zero fetches", insecureFetches === 0, "fetches=" + insecureFetches);
  } finally {
    globalThis.fetch = realFetch0;
    globalThis.chrome = realChrome0;
  }

  section("pbpWebdavPush — live includeHighlights override");
  const prevChrome = globalThis.chrome;
  const prevFetch = globalThis.fetch;
  const prevCache = _settingsStorageCache;
  const localArea = Object.assign({}, SETTINGS_DEFAULTS, {
    optSyncEnabled: false,
    backupIncludeHighlights: true,
    webdavUrl: "https://dav.example.com/backups/",
    customOverlayCSS: "body{color:blue}",
    savedThemes: [{ name: "Theme 1", css: "x" }],
    pinboardToken: "alice:DEADBEEF00",
    pbp_hl_good: { v: 1, url: "https://x.test", title: "X", items: [{ id: "a", n: 1, quote: "q", color: 1 }] },
    pbp_hl_last_color: 4,
  });
  const puts = [];
  const pushMethods = [];
  const pushRedirects = [], pushCacheModes = [];
  function storageGet(keys) {
    if (keys === null) return Promise.resolve(Object.assign({}, localArea));
    if (Array.isArray(keys)) {
      const out = {};
      keys.forEach((k) => { if (k in localArea) out[k] = localArea[k]; });
      return Promise.resolve(out);
    }
    if (typeof keys === "object") {
      const out = Object.assign({}, keys);
      Object.keys(keys).forEach((k) => { if (k in localArea) out[k] = localArea[k]; });
      return Promise.resolve(out);
    }
    return Promise.resolve({ [keys]: localArea[keys] });
  }
  try {
    _settingsStorageCache = null;
    globalThis.chrome = {
      permissions: { contains: () => Promise.resolve(true) },
      runtime: { getManifest: () => ({ version: "test-version" }) },
      storage: {
        local: {
          get: storageGet,
          set: (d) => { Object.assign(localArea, d); return Promise.resolve(); },
          remove: () => Promise.resolve(),
        },
        sync: { get: storageGet, set: () => Promise.resolve(), remove: () => Promise.resolve() },
        onChanged: { addListener() {} },
      },
    };
    globalThis.fetch = (_url, opts) => {
      pushMethods.push(opts.method);
      pushRedirects.push(opts.redirect);
      pushCacheModes.push(opts.cache);
      if (opts.method === "PUT") puts.push(JSON.parse(opts.body));
      return Promise.resolve({ ok: true, status: opts.method === "PROPFIND" ? 207 : 200 });
    };
    const res = await pbpWebdavPush({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "", includeHighlights: false });
    check("push succeeds under stubbed chrome/fetch", res.ok === true);
    check("push verifies the collection before PUT", pushMethods[0] === "PROPFIND" && pushMethods[1] === "PUT");
    check("WebDAV fetches reject redirects and bypass HTTP response caches",
      pushRedirects.length === 2 && pushRedirects.every((mode) => mode === "error") &&
      pushCacheModes.length === 2 && pushCacheModes.every((mode) => mode === "no-store"));
    check("live includeHighlights=false omits _highlights despite stale stored true",
      puts[0] && !("_highlights" in puts[0]));
    check("live includeHighlights=false is serialized into pushed settings",
      puts[0] && puts[0].backupIncludeHighlights === false);
    check("push payload carries customOverlayCSS read from storage (BUG-1)",
      puts[0] && puts[0].customOverlayCSS === "body{color:blue}");
    check("push payload carries savedThemes read from storage (BUG-1)",
      puts[0] && Array.isArray(puts[0].savedThemes) && puts[0].savedThemes[0] && puts[0].savedThemes[0].name === "Theme 1");
    const withHlPush = await pbpWebdavPush({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "", includeHighlights: true });
    const hlPut = puts[puts.length - 1];
    check("push with highlights includes _highlights (BUG-1 regression guard)",
      withHlPush.ok && hlPut._highlights && hlPut._highlights.pbp_hl_good);
    check("push with highlights carries non-secret _highlightsOwner from token (SEC-1)",
      hlPut._highlightsOwner === "alice");
    check("push never leaks the pinboardToken into the payload (SEC-1 belt)",
      !("pinboardToken" in hlPut));
    // User-confirmed overwrite (conflict-choice UI): even with a stale
    // CAS baseline stored, force must send a PLAIN unconditional PUT.
    localArea[PBP_WEBDAV_ETAG_STATE_KEY] = {
      target: obfuscateKey(pbpWebdavFileUrl("https://dav.example.com/backups/")),
      user: obfuscateKey(""),
      etag: '"stale-rev"',
    };
    const forceHeaderLog = [];
    globalThis.fetch = (_url, opts) => {
      forceHeaderLog.push(opts.headers || {});
      return Promise.resolve({ ok: true, status: opts.method === "PROPFIND" ? 207 : 200 });
    };
    const forced = await pbpWebdavPush({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "", force: true });
    const forcePutHeaders = forceHeaderLog[1] || {};
    check("force push succeeds and ignores the stored stale baseline", forced.ok === true);
    check("force push sends NO preconditions (plain overwrite, recreates a deleted file too)",
      !("If-Match" in forcePutHeaders) && !("If-None-Match" in forcePutHeaders));
    delete localArea[PBP_WEBDAV_ETAG_STATE_KEY];
    globalThis.fetch = () => Promise.resolve({ ok: false, status: 404 });
    const missing = await pbpWebdavPush({ baseUrl: "https://dav.example.com/missing/", user: "", pass: "", includeHighlights: false });
    check("push 404 maps to not-found instead of raw http-404", missing.error === "not-found");
    const push404Requests = [];
    globalThis.fetch = (_url, opts) => {
      push404Requests.push(opts.method);
      if (push404Requests.length === 1 && opts.method === "PROPFIND") {
        return Promise.resolve({ ok: true, status: 207 });
      }
      if (opts.method === "PUT") return Promise.resolve({ ok: false, status: 404 });
      return Promise.resolve({ ok: true, status: 207 });
    };
    const notWritable = await pbpWebdavPush({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "", includeHighlights: false });
    check("push 404 + collection PROPFIND ok -> not-writable", notWritable.error === "not-writable");
    check("push preserves failed PUT status", notWritable.status === 404);
    check("push 404 path probes the collection", push404Requests.join(",") === "PROPFIND,PUT,PROPFIND");

    const createRequests = [];
    globalThis.fetch = (url, opts) => {
      createRequests.push({ url, method: opts.method });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const createdPush = await pbpWebdavPush({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "", includeHighlights: false });
    check("push creates the configured collection before PUT", createdPush.ok && createRequests.map((r) => r.method).join(",") === "PROPFIND,MKCOL,PUT");
    check("push probes and creates exactly the configured collection",
      createRequests[0] && createRequests[0].url === "https://dav.example.com/backups/" &&
      createRequests[1] && createRequests[1].url === "https://dav.example.com/backups/");
    check("push writes under the configured collection",
      createRequests[2] && createRequests[2].url === "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json");

    const rootRequests = [];
    globalThis.fetch = (url, opts) => {
      rootRequests.push({ url, method: opts.method });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const rootPush = await pbpWebdavPush({ baseUrl: "https://dav.jianguoyun.com/dav/", user: "", pass: "", includeHighlights: false });
    check("provider root push creates extension data collection before PUT",
      rootPush.ok && rootRequests.map((r) => r.method).join(",") === "PROPFIND,MKCOL,PUT");
    check("provider root push writes under the extension data collection",
      rootRequests.some((r) => r.method === "PUT" && r.url === "https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-settings.json"));
  } catch (e) {
    check("pbpWebdavPush live includeHighlights override did not throw", false, e.message);
  } finally {
    globalThis.chrome = prevChrome;
    globalThis.fetch = prevFetch;
    _settingsStorageCache = prevCache;
  }

  section("pbpWebdavPush/Pull — ETag compare-and-swap");
  const prevChromeCas = globalThis.chrome;
  const prevFetchCas = globalThis.fetch;
  const prevCacheCas = _settingsStorageCache;
  const casLocal = Object.assign({}, SETTINGS_DEFAULTS, { optSyncEnabled: false });
  const casRequests = [];
  const casGet = (keys) => {
    if (keys === null) return Promise.resolve(Object.assign({}, casLocal));
    if (typeof keys === "string") return Promise.resolve(keys in casLocal ? { [keys]: casLocal[keys] } : {});
    if (Array.isArray(keys)) {
      const out = {};
      keys.forEach((key) => { if (key in casLocal) out[key] = casLocal[key]; });
      return Promise.resolve(out);
    }
    const out = Object.assign({}, keys || {});
    Object.keys(keys || {}).forEach((key) => { if (key in casLocal) out[key] = casLocal[key]; });
    return Promise.resolve(out);
  };
  try {
    _settingsStorageCache = null;
    globalThis.chrome = {
      permissions: { contains: async () => true },
      runtime: { getManifest: () => ({ version: "test-version" }) },
      storage: {
        local: {
          get: casGet,
          set: async (data) => { Object.assign(casLocal, data); },
          remove: async (keys) => { (Array.isArray(keys) ? keys : [keys]).forEach((key) => delete casLocal[key]); },
        },
        sync: { get: casGet, set: async () => {}, remove: async () => {} },
        onChanged: { addListener() {} },
      },
    };
    let putNumber = 0;
    globalThis.fetch = (_url, opts) => {
      casRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: true, status: 207 });
      if (opts.method === "PUT") {
        putNumber++;
        if (putNumber === 3) return Promise.resolve({ ok: false, status: 412, headers: { get: () => '"remote-v3"' } });
        const etag = putNumber === 1 ? '"v1"' : '"v2"';
        return Promise.resolve({ ok: true, status: putNumber === 1 ? 201 : 200, headers: { get: () => etag } });
      }
      throw new Error("unexpected method " + opts.method);
    };
    const casCfg = { baseUrl: "https://dav.example.com/cas/", user: "", pass: "" };
    const created = await pbpWebdavPush(casCfg);
    const firstPut = casRequests.find((request) => request.method === "PUT");
    check("first CAS push is unconditional (upgrade parity: no 412 deadlock against an existing backup)",
      created.ok && !("If-None-Match" in firstPut.headers) && !("If-Match" in firstPut.headers));
    check("successful create remembers the server ETag",
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.etag === '"v1"');
    check("ETag state does not persist a plaintext capability URL",
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.target.startsWith("obf:") &&
      deobfuscateKey(casLocal[PBP_WEBDAV_ETAG_STATE_KEY].target) === pbpWebdavFileUrl(casCfg.baseUrl));
    const otherUserRevision = await pbpWebdavReadRevision(Object.assign({}, casCfg, { user: "other-account" }));
    check("ETag state is isolated by WebDAV username as well as URL",
      otherUserRevision.known === false && otherUserRevision.etag === "");

    casRequests.length = 0;
    const updated = await pbpWebdavPush(casCfg);
    const secondPut = casRequests.find((request) => request.method === "PUT");
    check("subsequent CAS push uses the last observed ETag",
      updated.ok && secondPut.headers["If-Match"] === '"v1"' && !("If-None-Match" in secondPut.headers));
    check("successful update advances the remembered ETag",
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.etag === '"v2"');

    casRequests.length = 0;
    const conflicted = await pbpWebdavPush(casCfg);
    const conflictPut = casRequests.find((request) => request.method === "PUT");
    check("stale ETag returns an explicit conflict without a force overwrite",
      !conflicted.ok && conflicted.error === "conflict" && conflicted.status === 412 &&
      conflictPut.headers["If-Match"] === '"v2"');
    check("conflict keeps the last locally observed ETag",
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.etag === '"v2"');

    globalThis.fetch = () => Promise.resolve({
      ok: true,
      status: 200,
      headers: { get: () => '"v3"' },
      json: async () => ({ _schemaVersion: 2, optTheme: "dark" }),
    });
    const pulled = await pbpWebdavPull(casCfg);
    check("pull returns the observed ETag but does not commit it before settings are applied",
      pulled.ok && pulled.etag === '"v3"' && casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.etag === '"v2"');
    await pbpWebdavRememberEtag(casCfg, pulled.etag);
    check("caller commits the pulled ETag only after a successful apply",
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY]?.etag === '"v3"');

    const noTagCfg = { baseUrl: "https://dav.example.com/no-etag/", user: "", pass: "" };
    const noTagPutHeaders = [];
    globalThis.fetch = (_url, opts) => {
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: true, status: 207 });
      if (opts.method === "PUT") {
        noTagPutHeaders.push(Object.assign({}, opts.headers));
        return Promise.resolve({ ok: true, status: 200, headers: { get: () => null } });
      }
      throw new Error("unexpected no-ETag request");
    };
    const noTagFirst = await pbpWebdavPush(noTagCfg);
    const noTagSecond = await pbpWebdavPush(noTagCfg);
    check("a WebDAV server that omits ETag remains writable after the first push",
      noTagFirst.ok && noTagSecond.ok && noTagPutHeaders.length === 2);
    check("missing ETag transitions from unconditional first write to known-exists conditional writes",
      !("If-None-Match" in noTagPutHeaders[0]) && !("If-Match" in noTagPutHeaders[0]) &&
      noTagPutHeaders[1]["If-Match"] === "*" && !("If-None-Match" in noTagPutHeaders[1]));

    const weakCfg = { baseUrl: "https://dav.example.com/weak-etag/", user: "", pass: "" };
    await pbpWebdavRememberEtag(weakCfg, 'W/"weak"');
    const weakRevision = await pbpWebdavReadRevision(weakCfg);
    const weakReq = pbpWebdavBuildRequest("push", Object.assign({}, weakCfg, weakRevision));
    check("weak ETag is never echoed into If-Match and degrades to known-exists mode",
      weakRevision.known && weakRevision.etag === "" && weakReq.headers["If-Match"] === "*");

    // Scheduled pushes (no cfgOverride: storage-sourced cfg) with an unknown
    // revision are create-only; automation must never blind-overwrite a remote
    // backup this device has never seen. A 412 seeds known-exists ONCE for an
    // upgrader that provably pushed before (webdavLastPush.ok), otherwise it
    // surfaces as a conflict for the user to resolve manually.
    Object.assign(casLocal, {
      webdavUrl: "https://dav.example.com/sched/",
      webdavUser: "",
      webdavPass: "",
      optSyncEnabled: false,
    });
    delete casLocal[PBP_WEBDAV_ETAG_STATE_KEY];
    delete casLocal.webdavLastPush;
    const schedRequests = [];
    globalThis.fetch = (_url, opts) => {
      schedRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: true, status: 207 });
      if (opts.method === "PUT") {
        if (opts.headers["If-None-Match"] === "*") {
          return Promise.resolve({ ok: false, status: 412, headers: { get: () => null } });
        }
        return Promise.resolve({ ok: true, status: 200, headers: { get: () => '"sched-v1"' } });
      }
      throw new Error("unexpected scheduled request " + opts.method);
    };
    const schedFresh = await pbpWebdavPush();
    const schedFreshPuts = schedRequests.filter((request) => request.method === "PUT");
    check("scheduled unknown-revision push is create-only and reports conflict instead of overwriting",
      !schedFresh.ok && schedFresh.error === "conflict" &&
      schedFreshPuts.length === 1 && schedFreshPuts[0].headers["If-None-Match"] === "*");

    schedRequests.length = 0;
    casLocal.webdavLastPush = { ts: 1, ok: true };
    const schedUpgrade = await pbpWebdavPush();
    const schedUpgradePuts = schedRequests.filter((request) => request.method === "PUT");
    check("scheduled 412 with a prior successful push (upgrader) retries once with If-Match:*",
      schedUpgrade.ok && schedUpgradePuts.length === 2 &&
      schedUpgradePuts[0].headers["If-None-Match"] === "*" &&
      schedUpgradePuts[1].headers["If-Match"] === "*" &&
      !("If-None-Match" in schedUpgradePuts[1].headers));
    check("upgrader retry remembers the server ETag for future CAS pushes",
      deobfuscateKey(casLocal[PBP_WEBDAV_ETAG_STATE_KEY].target) === pbpWebdavFileUrl("https://dav.example.com/sched/") &&
      casLocal[PBP_WEBDAV_ETAG_STATE_KEY].etag === '"sched-v1"');

    // Target switch: the remembered success is now BOUND to its target, so it
    // must not authorize an If-Match:* takeover at a different server/path.
    schedRequests.length = 0;
    casLocal.webdavUrl = "https://dav.example.com/sched-b/";
    const schedSwitched = await pbpWebdavPush();
    const schedSwitchedPuts = schedRequests.filter((request) => request.method === "PUT");
    check("scheduled 412 at a DIFFERENT target than the recorded success stays a conflict (no blind takeover)",
      !schedSwitched.ok && schedSwitched.error === "conflict" &&
      schedSwitchedPuts.length === 1 && schedSwitchedPuts[0].headers["If-None-Match"] === "*");

    globalThis.fetch = () => Promise.resolve({ ok: true, status: 200, headers: { get: () => '"x"' }, json: async () => ({ _schemaVersion: 3 }) });
    const futureSchema = await pbpWebdavPull(casCfg);
    check("pull rejects an unsupported future schema", !futureSchema.ok && futureSchema.error === "invalid");
    globalThis.fetch = () => Promise.resolve({ ok: true, status: 200, headers: { get: () => '"x"' }, json: async () => [] });
    const arrayRoot = await pbpWebdavPull(casCfg);
    check("pull rejects a non-object backup root", !arrayRoot.ok && arrayRoot.error === "invalid");
    globalThis.fetch = () => Promise.resolve({ ok: true, status: 200, headers: { get: () => '"legacy"' }, json: async () => ({ optTheme: "light" }) });
    const legacySchema = await pbpWebdavPull(casCfg);
    check("pull accepts an ownerless schema-v1 backup with no explicit version",
      legacySchema.ok && legacySchema.data.optTheme === "light" && legacySchema.etag === '"legacy"');
  } catch (error) {
    check("ETag compare-and-swap test did not throw", false, error.message);
  } finally {
    globalThis.chrome = prevChromeCas;
    globalThis.fetch = prevFetchCas;
    _settingsStorageCache = prevCacheCas;
  }

  section("pbpWebdavTest — distinguishes missing backup file from missing folder");
  const prevChrome2 = globalThis.chrome;
  const prevFetch2 = globalThis.fetch;
  try {
    globalThis.chrome = {
      permissions: { contains: () => Promise.resolve(true) },
      storage: { onChanged: { addListener() {} } },
    };
    const requests = [];
    globalThis.fetch = (url, opts) => {
      requests.push({ url, method: opts.method });
      if (requests.length === 1) return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: true, status: 207 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const empty = await pbpWebdavTest({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "" });
    check("file 404 + collection PROPFIND ok -> empty backup", empty.kind === "empty");
    check("file 404 path performs collection probe + write probe", requests.map((r) => r.method).join(",") === "GET,PROPFIND,PUT,DELETE");

    const missingFolderRequests = [];
    globalThis.fetch = (url, opts) => {
      missingFolderRequests.push({ url, method: opts.method });
      return Promise.resolve({ ok: false, status: 404 });
    };
    const missingFolder = await pbpWebdavTest({ baseUrl: "https://dav.example.com/missing/", user: "", pass: "" });
    check("file 404 + collection PROPFIND 404 + MKCOL 404 -> missing target collection", missingFolder.kind === "not-found");

    const createFolderRequests = [];
    globalThis.fetch = (url, opts) => {
      createFolderRequests.push({ url, method: opts.method });
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const createdFolder = await pbpWebdavTest({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "" });
    check("test creates the configured collection before write probe", createdFolder.kind === "empty" &&
      createFolderRequests.map((r) => r.method).join(",") === "GET,PROPFIND,MKCOL,PUT,DELETE");
    check("test-created collection uses exactly the configured collection",
      createFolderRequests[1] && createFolderRequests[1].url === "https://dav.example.com/backups/" &&
      createFolderRequests[2] && createFolderRequests[2].url === "https://dav.example.com/backups/" &&
      createFolderRequests[3] && createFolderRequests[3].url.startsWith("https://dav.example.com/backups/pinboard-bookmark-enhanced-write-test-"));

    const readOnlyRequests = [];
    globalThis.fetch = (url, opts) => {
      readOnlyRequests.push({ url, method: opts.method });
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: true, status: 207 });
      return Promise.resolve({ ok: false, status: 404 });
    };
    const readOnly = await pbpWebdavTest({ baseUrl: "https://dav.example.com/dav/", user: "", pass: "" });
    check("readable collection + failed temp PUT -> not-writable", readOnly.kind === "not-writable");
    check("failed temp PUT status is preserved", readOnly.status === 404);

    const rootRequests = [];
    globalThis.fetch = (url, opts) => {
      rootRequests.push({ url, method: opts.method });
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const rootEmpty = await pbpWebdavTest({ baseUrl: "https://dav.jianguoyun.com/dav/", user: "", pass: "" });
    check("provider root test creates extension data collection and verifies write", rootEmpty.kind === "empty");
    check("provider root test writes under the extension data collection",
      rootRequests.some((r) => r.method === "PUT" && r.url.startsWith("https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-write-test-")));
  } catch (e) {
    check("pbpWebdavTest missing-folder probe did not throw", false, e.message);
  } finally {
    globalThis.chrome = prevChrome2;
    globalThis.fetch = prevFetch2;
  }
}

(async function () {
  await runChromeLayerTests();
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
})();
</script>
</body></html>
