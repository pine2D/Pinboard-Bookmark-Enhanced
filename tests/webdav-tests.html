<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>webdav Tests</title>
<style>
body { font-family: monospace; padding: 16px; max-width: 1000px; }
.case { padding: 6px; border-bottom: 1px solid #eee; white-space: pre-wrap; }
.pass { color: #0a0; } .fail { color: #c00; font-weight: bold; }
h2 { margin-top: 24px; }
</style></head>
<body>
<h1>webdav.js tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../shared.js"></script>
<script src="../webdav.js"></script>
<script>
const root = document.getElementById("results");
let pass = 0, fail = 0;
function check(name, cond, detail) {
  const ok = !!cond; ok ? pass++ : fail++;
  const div = document.createElement("div");
  div.className = "case " + (ok ? "pass" : "fail");
  div.textContent = `${ok ? "✓" : "✗"}  ${name}${ok ? "" : "\n   " + (detail || "")}`;
  root.appendChild(div);
}
function section(name) { const h = document.createElement("h2"); h.textContent = name; root.appendChild(h); }
function assert(cond, detail) { check(detail || String(cond), cond, detail); }
function assertEq(a, e, label) {
  const ok = a === e;
  check(label || (String(e) + " === " + String(a)), ok, ok ? "" : "expected " + JSON.stringify(e) + " got " + JSON.stringify(a));
}
const COLLECTION_XML = `<?xml version="1.0"?>
<d:multistatus xmlns:d="DAV:"><d:response><d:propstat><d:prop>
<d:resourcetype><d:collection/></d:resourcetype>
</d:prop></d:propstat></d:response></d:multistatus>`;
const NON_COLLECTION_XML = `<?xml version="1.0"?>
<d:multistatus xmlns:d="DAV:"><d:response><d:propstat><d:prop>
<d:resourcetype/>
</d:prop></d:propstat></d:response></d:multistatus>`;

section("pbpWebdavFileUrl");
assertEq(pbpWebdavFileUrl("https://dav.example.com/backups"),
  "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json",
  "no trailing slash -> appends /filename");
assertEq(pbpWebdavFileUrl("https://dav.jianguoyun.com/dav/"),
  "https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced-settings.json",
  "configured collection is used exactly, without provider-specific rewriting");
assertEq(pbpWebdavFileUrl("https://dav.example.com/backups/"),
  "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json",
  "trailing slash -> no double slash");
assertEq(pbpWebdavFileUrl(""), "", "empty baseUrl -> empty string (degrade, no throw)");
assertEq(pbpWebdavFileUrl("   "), "", "whitespace-only baseUrl -> empty string");
assertEq(pbpWebdavFileUrl("https://dav.example.com/remote.php/webdav"),
  "https://dav.example.com/remote.php/webdav/pinboard-bookmark-enhanced-settings.json",
  "multi-segment path, no trailing slash");
assertEq(pbpWebdavFileUrl("https://dav.example.com/dav?access_token=secret"),
  "https://dav.example.com/dav/pinboard-bookmark-enhanced-settings.json?access_token=secret",
  "query capability token stays on the request while filename joins the path");
assertEq(pbpWebdavFileUrl("https://dav.example.com/dav#fragment"), "",
  "fragment-bearing target is rejected because fragments never reach WebDAV");
assertEq(pbpWebdavFileUrl(null), "", "null -> empty string, no throw");

section("WebDAV folder target resolution");
{
  const managed = pbpWebdavResolveTarget({
    baseUrl: "https://dav.example.com/dav/?token=x",
    folderMode: "managed",
    relativePath: "",
  });
  check("managed mode resolves the dedicated app collection",
    managed.ok &&
    managed.backupCollectionUrl === "https://dav.example.com/dav/pinboard-bookmark-enhanced/?token=x" &&
    managed.backupFileUrl === "https://dav.example.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-settings.json?token=x");

  const custom = pbpWebdavResolveTarget({
    baseUrl: "https://dav.example.com/dav/",
    folderMode: "custom",
    relativePath: "Backups/读书/",
  });
  check("custom mode encodes each path segment",
    custom.ok &&
    custom.relativePath === "Backups/读书/" &&
    custom.backupCollectionUrl === "https://dav.example.com/dav/Backups/%E8%AF%BB%E4%B9%A6/");

  check("a full URL is rejected",
    pbpWebdavNormalizeRelativePath("https://other.example/x").error === "absolute");
  check("a leading slash is rejected",
    pbpWebdavNormalizeRelativePath("/Backups/Pinboard").error === "absolute");
  check("raw traversal is rejected",
    pbpWebdavNormalizeRelativePath("Backups/../Pinboard").error === "segment");
  check("encoded traversal is rejected",
    pbpWebdavNormalizeRelativePath("Backups/%2e%2e/Pinboard").error === "segment");
  check("encoded slash or backslash is rejected",
    !pbpWebdavNormalizeRelativePath("Backups/a%2fb").ok &&
    !pbpWebdavNormalizeRelativePath("Backups/a%5cb").ok);
  check("the default custom path normalizes to managed mode",
    pbpWebdavResolveTarget({
      baseUrl: "https://dav.example.com/dav/",
      folderMode: "custom",
      relativePath: "pinboard-bookmark-enhanced",
    }).folderMode === "managed");
}

section("pbpWebdavAuthHeader");
assertEq(pbpWebdavAuthHeader("", ""), null, "empty user + empty pass -> null (no header)");
assertEq(pbpWebdavAuthHeader("bob", "secret"), "Basic " + btoa("bob:secret"), "user+pass -> Basic base64(user:pass)");
assertEq(pbpWebdavAuthHeader("bob", ""), "Basic " + btoa("bob:"), "user only -> still builds a header (empty pass is valid Basic auth)");
assertEq(pbpWebdavAuthHeader("", "secret"), "Basic " + btoa(":secret"), "pass only -> still builds a header");
assert(typeof pbpWebdavAuthHeader("büro", "pässwört") === "string" &&
  pbpWebdavAuthHeader("büro", "pässwört").startsWith("Basic "),
  "unicode user/pass does not throw, returns a Basic header");

section("pbpWebdavOrigin");
assertEq(pbpWebdavOrigin("https://dav.example.com/backups/"), "https://dav.example.com/*", "derives origin + /*");
assertEq(pbpWebdavOrigin("not a url"), null, "malformed URL -> null, no throw");
assertEq(pbpWebdavOrigin(""), null, "empty -> null");
assertEq(pbpWebdavOrigin("https://user:pass@dav.example.com/backups/"), null, "embedded credentials are rejected");
assertEq(pbpWebdavOrigin("http://localhost:8080/dav/"), "http://localhost:8080/*", "literal localhost HTTP is allowed");
assertEq(pbpWebdavOrigin("http://127.0.0.1:8080/dav/"), "http://127.0.0.1:8080/*", "literal IPv4 loopback HTTP is allowed");
assertEq(pbpWebdavOrigin("http://[::1]:8080/dav/"), "http://[::1]:8080/*", "literal IPv6 loopback HTTP is allowed");
assertEq(pbpWebdavOrigin("http://192.168.1.2/dav/"), null, "LAN HTTP is rejected");
assertEq(pbpWebdavOrigin("http://127.1/dav/"), null, "alternate loopback spelling is rejected");
assertEq(pbpWebdavOrigin("ftp://dav.example.com/"), null, "non-HTTP scheme is rejected");
assertEq(pbpWebdavOrigin("https://dav.example.com/dav#fragment"), null, "fragment-bearing endpoint is rejected before permission lookup");

section("pbpWebdavAutoPushPeriod");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavLayoutVersion: 2, webdavAutoPush: "hourly", webdavPass: "" }), 60,
  "anonymous WebDAV can schedule hourly pushes without a password");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavLayoutVersion: 2, webdavAutoPush: "daily" }), 1440,
  "daily mode maps to a 1440-minute alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavLayoutVersion: 2, webdavAutoPush: "off" }), 0,
  "off mode creates no alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "http://192.168.1.2/dav", webdavLayoutVersion: 2, webdavAutoPush: "hourly" }), 0,
  "blocked endpoint creates no automatic alarm");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavLayoutVersion: 2, webdavAutoPush: "hourly", webdavUser: "bob", webdavPass: "" }), 0,
  "username without a password never schedules — every tick would 401 forever");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "https://dav.example.com/dav", webdavLayoutVersion: 2, webdavAutoPush: "hourly", webdavUser: "", webdavPass: "secret" }), 0,
  "password without a username never schedules either (half-configured Basic auth)");
assertEq(pbpWebdavAutoPushPeriod({ webdavUrl: "obf:" + btoa("https://dav.example.com/dav"), webdavLayoutVersion: 2, webdavAutoPush: "hourly" }), 60,
  "transitional obf-wrapped URL is healed before the origin gate");
check("automatic push pauses until folder layout v2 is confirmed",
  pbpWebdavAutoPushPeriod({
    webdavUrl: "https://dav.example.com/dav/",
    webdavLayoutVersion: 0,
    webdavAutoPush: "hourly",
  }) === 0);
check("automatic push resumes for confirmed layout v2",
  pbpWebdavAutoPushPeriod({
    webdavUrl: "https://dav.example.com/dav/",
    webdavLayoutVersion: 2,
    webdavAutoPush: "hourly",
  }) === 60);

section("pbpWebdavBuildPayload — zero secrets (spec invariant #1)");
{
  const fullSettings = Object.assign({}, SETTINGS_DEFAULTS);
  API_KEY_FIELDS.forEach((k, i) => { fullSettings[k] = "obf:v" + i; });
  fullSettings.optTheme = "nord";
  fullSettings.webdavUrl = "https://dav.example.com/backups/";
  fullSettings.webdavUser = "alice";
  fullSettings.webdavPass = "obf:secret";
  fullSettings.webdavFolderMode = "custom";
  fullSettings.webdavRelativePath = "Backups/Read/";
  fullSettings.webdavLayoutVersion = 2;
  fullSettings.webdavAutoPush = "hourly";
  fullSettings.exportTargets = { github: { enabled: true, token: "ghp_x", repo: "r" } };
  const meta = { pushedAt: "2026-07-08T00:00:00.000Z", appVersion: "2.88" };
  const payload = pbpWebdavBuildPayload(fullSettings, meta);

  assert(API_KEY_FIELDS.every((k) => !(k in payload)),
    "every one of the " + API_KEY_FIELDS.length + " API_KEY_FIELDS is absent from the payload");
  assert(!("webdavPass" in payload), "webdavPass absent from payload (not a settings field yet in this batch)");
  assertEq(payload.optTheme, "nord", "a non-secret setting rides the payload");
  assert(!("token" in payload.exportTargets.github), "exportTargets token stripped");
  assert(!("webdavUrl" in payload) && !("webdavUser" in payload) &&
    !("webdavPass" in payload) && !("webdavAutoPush" in payload) &&
    !("webdavFolderMode" in payload) && !("webdavRelativePath" in payload) &&
    !("webdavLayoutVersion" in payload),
    "WebDAV backup excludes its transport configuration and device schedule");
  assertEq(payload.exportTargets.github.repo, "r", "exportTargets non-secret fields survive");
  assertEq(payload._schemaVersion, 2, "envelope schema version is 2");
  assertEq(payload._webdav.pushedAt, "2026-07-08T00:00:00.000Z", "envelope pushedAt comes from meta, verbatim");
  assertEq(payload._webdav.appVersion, "2.88", "envelope appVersion comes from meta, verbatim");
  assertEq(fullSettings.optTheme, "nord", "input settings object is not mutated");
  assert("token" in fullSettings.exportTargets.github, "input exportTargets still has its token (proves no mutation)");

  const manual = typeof pbpBuildBackupSnapshot === "function"
    ? pbpBuildBackupSnapshot(fullSettings, {}, { includeWebdavTransport: true })
    : {};
  assert(manual.webdavUrl === fullSettings.webdavUrl &&
    manual.webdavUser === fullSettings.webdavUser &&
    manual.webdavFolderMode === "custom" &&
    manual.webdavRelativePath === "Backups/Read/" &&
    manual.webdavLayoutVersion === 2,
    "manual backup keeps the portable WebDAV target and folder layout");
  assert(!("webdavPass" in manual) && !("webdavAutoPush" in manual),
    "manual backup excludes the WebDAV password and device schedule");
  assert(!Object.prototype.hasOwnProperty.call(SETTINGS_DEFAULTS, "webdavAutoPush"),
    "WebDAV auto-push is device-local, not a normal synced setting");
}
section("pbpWebdavBuildPayload — purity (no internal clock)");
{
  const s = Object.assign({}, SETTINGS_DEFAULTS);
  const p1 = pbpWebdavBuildPayload(s, { pushedAt: "A", appVersion: "1" });
  const p2 = pbpWebdavBuildPayload(s, { pushedAt: "B", appVersion: "1" });
  assert(p1._webdav.pushedAt === "A" && p2._webdav.pushedAt === "B",
    "pushedAt only ever reflects the meta argument -- function never calls Date.now itself");
}

section("pbpWebdavPreparePullPayload — transport stays local");
{
  const remote = {
    _schemaVersion: 2,
    optTheme: "dark",
    webdavUrl: "https://remote.example/dav/",
    webdavUser: "remote-user",
    webdavPass: "remote-pass",
    webdavFolderMode: "custom",
    webdavRelativePath: "Remote/Other/",
    webdavLayoutVersion: 2,
    webdavAutoPush: "daily",
  };
  const prepared = typeof pbpWebdavPreparePullPayload === "function"
    ? pbpWebdavPreparePullPayload(remote) : {};
  assert(!("webdavUrl" in prepared) && !("webdavUser" in prepared) &&
    !("webdavPass" in prepared) && !("webdavAutoPush" in prepared) &&
    !("webdavFolderMode" in prepared) && !("webdavRelativePath" in prepared) &&
    !("webdavLayoutVersion" in prepared),
    "WebDAV pull drops transport and device schedule fields from legacy remote files");
  assert(remote.webdavUrl === "https://remote.example/dav/" && remote.webdavAutoPush === "daily",
    "preparing a WebDAV pull does not mutate the downloaded object");
}

section("WebDAV content identity — exact bytes vs semantic settings");
{
  const a = {
    z: 1,
    nested: { b: 2, a: 1 },
    list: [{ y: 2, x: 1 }, "a"],
    _schemaVersion: 2,
    _webdav: { pushedAt: "A", appVersion: "1" },
  };
  const b = {
    _webdav: { appVersion: "2", pushedAt: "B" },
    _schemaVersion: 2,
    list: [{ x: 1, y: 2 }, "a"],
    nested: { a: 1, b: 2 },
    z: 1,
  };
  const stableA = typeof pbpWebdavStableStringify === "function"
    ? pbpWebdavStableStringify(a) : "";
  const stableB = typeof pbpWebdavStableStringify === "function"
    ? pbpWebdavStableStringify(b) : "missing";
  check("stable stringify ignores object insertion order",
    stableA !== "" && stableA !== stableB && stableA.indexOf('"nested":{"a":1,"b":2}') >= 0);

  const semanticA = typeof pbpWebdavSemanticValue === "function"
    ? pbpWebdavSemanticValue(a) : null;
  const semanticB = typeof pbpWebdavSemanticValue === "function"
    ? pbpWebdavSemanticValue(b) : null;
  const semanticTextA = semanticA && typeof pbpWebdavStableStringify === "function"
    ? pbpWebdavStableStringify(semanticA) : "";
  const semanticTextB = semanticB && typeof pbpWebdavStableStringify === "function"
    ? pbpWebdavStableStringify(semanticB) : "missing";
  check("semantic identity ignores volatile _webdav metadata",
    semanticTextA !== "" && semanticTextA === semanticTextB);
  check("semantic identity retains schema and setting content",
    semanticA && semanticA._schemaVersion === 2 && semanticA.nested.a === 1 && !("_webdav" in semanticA));
  check("semantic normalization does not mutate the backup payload",
    semanticA && semanticB && a._webdav.pushedAt === "A" && b._webdav.appVersion === "2");
  check("stable stringify preserves array order",
    typeof pbpWebdavStableStringify === "function" &&
    pbpWebdavStableStringify(["b", "a"]) !== pbpWebdavStableStringify(["a", "b"]));
}

section("pbpWebdavDecide — three-way semantic comparison");
{
  const decide = (input) => typeof pbpWebdavDecide === "function"
    ? pbpWebdavDecide(input) : "missing";
  assertEq(decide({ hasBaseline: true, baselineHash: "B", localHash: "L", remoteHash: "L", remoteExists: true }),
    "same", "local and remote semantic content already converged -> no upload");
  assertEq(decide({ hasBaseline: true, baselineHash: "B", localHash: "L", remoteHash: "B", remoteExists: true }),
    "push", "only local content changed -> safe push");
  assertEq(decide({ hasBaseline: true, baselineHash: "B", localHash: "B", remoteHash: "R", remoteExists: true }),
    "remote-changed", "only remote content changed -> stop for pull or explicit overwrite");
  assertEq(decide({ hasBaseline: true, baselineHash: "B", localHash: "L", remoteHash: "R", remoteExists: true }),
    "diverged", "local and remote both changed differently -> divergence");
  assertEq(decide({ hasBaseline: false, baselineHash: "", localHash: "L", remoteHash: "R", remoteExists: true }),
    "unpaired", "existing remote without a local baseline -> no blind takeover");
  assertEq(decide({ hasBaseline: false, baselineHash: "", localHash: "L", remoteHash: "L", remoteExists: true }),
    "same", "matching local and remote content can establish a missing baseline without uploading");
  assertEq(decide({ hasBaseline: false, baselineHash: "", localHash: "L", remoteHash: "", remoteExists: false }),
    "create", "missing remote without a baseline -> create-only upload");
}

section("pbpWebdavBuildPayload — optional highlights");
{
  const highlights = {
    pbp_hl_abc123ef: { v: 1, url: "https://x.test", title: "X", items: [] },
    pbp_hl_last_color: 4
  };
  const payloadWithHl = pbpWebdavBuildPayload(
    Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: true }),
    { pushedAt: "t", appVersion: "v" },
    { highlights }
  );
  assert(payloadWithHl._highlights && payloadWithHl._highlights.pbp_hl_abc123ef,
    "highlight backup included when enabled");

  const payloadWithoutHl = pbpWebdavBuildPayload(
    Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: false }),
    { pushedAt: "t", appVersion: "v" },
    { highlights }
  );
  assert(!payloadWithoutHl._highlights, "highlight backup omitted when disabled");
}

section("pbpWebdavBuildPayload — custom themes + savedThemes (BUG-1) & highlight owner (SEC-1)");
{
  const s = Object.assign({}, SETTINGS_DEFAULTS, { backupIncludeHighlights: true });
  const payload = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, {
    highlights: { pbp_hl_x: { v: 1, url: "https://x.test", title: "X", items: [] } },
    highlightsOwner: "alice",
    overlay: "body{color:red}",
    savedThemes: [{ name: "Mine", css: "x" }],
  });
  assertEq(payload.customOverlayCSS, "body{color:red}", "custom overlay CSS rides the WebDAV payload (BUG-1)");
  assert(Array.isArray(payload.savedThemes) && payload.savedThemes[0].name === "Mine", "savedThemes ride the WebDAV payload (BUG-1)");
  assertEq(payload._highlightsOwner, "alice", "highlight backup carries the non-secret owner account (SEC-1)");

  const noExtra = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" },
    { highlights: { pbp_hl_x: { v: 1, url: "https://x.test", title: "X", items: [] } } });
  assertEq(noExtra.customOverlayCSS, "", "missing overlay extra serializes as an explicit clear");
  assert(Array.isArray(noExtra.savedThemes) && noExtra.savedThemes.length === 0,
    "missing savedThemes extra serializes as an explicit clear");
  assert(!("_highlightsOwner" in noExtra), "no owner -> no _highlightsOwner key (legacy-compatible)");

  const emptyExtra = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { overlay: "", savedThemes: [] });
  assertEq(emptyExtra.customOverlayCSS, "", "empty overlay string is preserved so restore can clear stale CSS");
  assert(Array.isArray(emptyExtra.savedThemes) && emptyExtra.savedThemes.length === 0,
    "empty savedThemes array is preserved so restore can clear stale themes");

  let malformedThemeError = null;
  try {
    pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { savedThemes: [{ key: "legacy", css: "x" }] });
  } catch (error) { malformedThemeError = error; }
  assert(malformedThemeError instanceof TypeError,
    "malformed saved themes are rejected before creating an unrestorable WebDAV backup");
  const oversizeOverlay = "x".repeat(OVERLAY_BYTE_LIMIT + 1);
  const oversizePayload = pbpWebdavBuildPayload(s, { pushedAt: "t", appVersion: "v" }, { overlay: oversizeOverlay });
  assertEq(oversizePayload.customOverlayCSS, oversizeOverlay,
    "over-limit legacy overlay rides the backup instead of silently killing every scheduled push");
}

section("pbpHighlightBackupOwnerAllowed (SEC-1 pure gate)");
{
  assert(pbpHighlightBackupOwnerAllowed("alice", "alice") === true, "same account -> allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "bob") === false, "different account -> blocked (cross-account leak prevented)");
  assert(pbpHighlightBackupOwnerAllowed("", "bob") === true, "no backup owner (legacy backup) -> allowed, backward compatible");
  assert(pbpHighlightBackupOwnerAllowed(undefined, "bob") === true, "undefined owner -> allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "") === false, "known owner + logged-out restore -> blocked until the matching account is available");
  // Fail-closed when the current account could not be resolved (storage/lock error).
  assert(pbpHighlightBackupOwnerAllowed("alice", "", false) === false, "unresolved account + known foreign owner -> blocked (fail closed)");
  assert(pbpHighlightBackupOwnerAllowed("", "", false) === true, "unresolved account + legacy/ownerless backup -> still allowed");
  assert(pbpHighlightBackupOwnerAllowed("alice", "alice", false) === false, "unresolved account never trusts a passed-in account -> blocked");
}

section("pbpWebdavBuildRequest");
{
  const cfg = { baseUrl: "https://dav.example.com/backups", user: "bob", pass: "secret" };
  const fileUrl = "https://dav.example.com/backups/pinboard-bookmark-enhanced-settings.json";
  const collectionUrl = "https://dav.example.com/backups/";
  const push = pbpWebdavBuildRequest("push", cfg, fileUrl);
  assertEq(push.method, "PUT", "push -> PUT");
  assertEq(push.headers["Content-Type"], "application/json", "push sets JSON content-type");
  assertEq(push.url, fileUrl, "push uses its explicit URL");
  assert(!("If-None-Match" in push.headers),
    "unknown revision pushes unconditionally — create-only If-None-Match would 412 forever against a pre-existing remote backup");
  assert(!("If-Match" in push.headers), "unknown revision push does not send If-Match");
  const scheduledCreate = pbpWebdavBuildRequest("push", Object.assign({}, cfg, { createOnly: true }), fileUrl);
  assertEq(scheduledCreate.headers["If-None-Match"], "*",
    "createOnly (scheduled unknown-revision) push sends If-None-Match:* so automation cannot blind-overwrite");

  const updatePush = pbpWebdavBuildRequest("push", Object.assign({}, cfg, { etag: '"v1"' }), fileUrl);
  assertEq(updatePush.headers["If-Match"], '"v1"', "known remote revision is updated with If-Match");
  assert(!("If-None-Match" in updatePush.headers), "known remote revision never sends the create-only precondition");

  assert(pbpWebdavValidEtag('"strong"') && !pbpWebdavValidEtag('W/"weak"') &&
    !pbpWebdavValidEtag("*") && !pbpWebdavValidEtag("unquoted"),
    "only syntactically valid strong ETags are eligible for exact If-Match CAS");

  const pull = pbpWebdavBuildRequest("pull", cfg, fileUrl);
  assertEq(pull.method, "GET", "pull -> GET");
  assert(!("Content-Type" in pull.headers), "pull has no content-type header");

  const testReq = pbpWebdavBuildRequest("test", cfg, fileUrl);
  assertEq(testReq.method, "GET", "test -> GET");

  const probe = pbpWebdavBuildRequest("probe", cfg, collectionUrl);
  assertEq(probe.method, "PROPFIND", "probe -> PROPFIND");
  assertEq(probe.headers.Depth, "0", "probe checks only the configured collection");
  assertEq(probe.url, collectionUrl, "probe uses its explicit collection URL");

  const writeProbe = pbpWebdavBuildRequest("write-test", cfg, "https://dav.example.com/backups/pbp-test.txt");
  assertEq(writeProbe.method, "PUT", "write-test -> PUT");
  assertEq(writeProbe.url, "https://dav.example.com/backups/pbp-test.txt", "write-test targets a temp file in the collection");
  assertEq(writeProbe.headers["If-None-Match"], "*", "write-test never overwrites an existing temp file");

  const generatedWriteProbe = pbpWebdavBuildRequest("write-test", cfg,
    "https://dav.example.com/backups/" + PBP_WEBDAV_WRITE_TEST_PREFIX + "abc.txt");
  assertEq(generatedWriteProbe.url, "https://dav.example.com/backups/pinboard-bookmark-enhanced-write-test-abc.txt",
    "generated write-test filename is a normal visible file, not a dotfile");

  const deleteProbe = pbpWebdavBuildRequest("write-test-delete", cfg, writeProbe.url);
  assertEq(deleteProbe.method, "DELETE", "write-test-delete -> DELETE");
  assertEq(deleteProbe.url, writeProbe.url, "delete removes the same temp file");

  const mkdir = pbpWebdavBuildRequest("mkdir", cfg, collectionUrl);
  assertEq(mkdir.method, "MKCOL", "mkdir -> MKCOL");
  assertEq(mkdir.url, "https://dav.example.com/backups/", "mkdir targets the collection");

  assertEq(push.headers.Authorization, "Basic " + btoa("bob:secret"), "Authorization present when user/pass set");
  const noAuth = pbpWebdavBuildRequest("push", { baseUrl: "https://dav.example.com/backups", user: "", pass: "" }, fileUrl);
  assert(!("Authorization" in noAuth.headers), "Authorization omitted when user+pass both empty");
}

async function runChromeLayerTests() {
  section("pbpWebdavSha256 — exact UTF-8 content identity");
  const abcHash = typeof pbpWebdavSha256 === "function" ? await pbpWebdavSha256("abc") : "";
  const abdHash = typeof pbpWebdavSha256 === "function" ? await pbpWebdavSha256("abd") : "";
  assertEq(abcHash, "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad",
    "SHA-256 uses the exact UTF-8 bytes");
  check("different remote bytes produce a different full-content hash",
    abcHash !== "" && abdHash !== "" && abcHash !== abdHash);

  section("WebDAV locator — schema and conditional writes");
  const locatorCfg = {
    baseUrl: "https://dav.example.com/dav/",
    folderMode: "custom",
    relativePath: "Backups/读书/",
    user: "alice",
    pass: "secret",
  };
  const locatorTarget = await pbpWebdavFreezeTarget(locatorCfg);
  const locatorText = JSON.stringify({ schemaVersion: 1, relativePath: "Backups/%E8%AF%BB%E4%B9%A6" });
  const locatorResponse = (status, text = "", etag = "") => ({
    ok: status >= 200 && status < 300,
    status,
    headers: { get: (name) => /etag/i.test(name) ? etag || null : null },
    text: async () => text || (status === 207 ? COLLECTION_XML : ""),
  });
  const realLocatorFetch = globalThis.fetch;
  try {
    globalThis.fetch = async () => locatorResponse(200, locatorText, '"locator-v1"');
    const locator = typeof pbpWebdavReadLocator === "function"
      ? await pbpWebdavReadLocator(locatorCfg, locatorTarget) : null;
    check("valid locator returns normalized relative path, strong ETag and exact hash",
      locator?.ok && locator.exists && locator.relativePath === "Backups/读书/" &&
      locator.etag === '"locator-v1"' &&
      locator.hash === await pbpWebdavSha256(locatorText));

    const invalidSchema = typeof pbpWebdavParseLocator === "function"
      ? pbpWebdavParseLocator(JSON.stringify({ schemaVersion: 2, relativePath: "Backups/Read/" })) : null;
    const invalidPath = typeof pbpWebdavParseLocator === "function"
      ? pbpWebdavParseLocator(JSON.stringify({ schemaVersion: 1, relativePath: "../escape" })) : null;
    check("unknown locator schema and invalid path expose one invalid-locator error",
      invalidSchema?.error === "invalid-locator" && invalidPath?.error === "invalid-locator");

    const conflictRequests = [];
    const conflictResponses = [
      locatorResponse(207), locatorResponse(207),
      locatorResponse(200, JSON.stringify({ schemaVersion: 1, relativePath: "Remote/Other/" }), '"remote-locator"'),
    ];
    globalThis.fetch = async (url, opts) => {
      conflictRequests.push({ url, method: opts.method, headers: Object.assign({}, opts.headers) });
      return conflictResponses.shift();
    };
    const conflict = typeof pbpWebdavWriteLocator === "function"
      ? await pbpWebdavWriteLocator(
        locatorCfg, locatorTarget, locatorTarget.relativePath, locatorTarget.relativePath)
      : null;
    check("locator conditional write conflict never blindly overwrites another path",
      conflict?.error === "locator-conflict" &&
      conflictRequests.map((request) => request.method).join(",") === "PROPFIND,PROPFIND,GET" &&
      !conflictRequests.some((request) => request.method === "PUT"));
  } finally {
    globalThis.fetch = realLocatorFetch;
  }

  section("WebDAV operations — one frozen target");
  const frozenCfg = {
    baseUrl: "https://dav.example.com/dav/",
    folderMode: "custom",
    relativePath: "Backups/Read/",
    user: "alice",
    pass: "secret",
  };
  const realFrozenChrome = globalThis.chrome;
  const realFrozenFetch = globalThis.fetch;
  const frozenStore = {};
  const frozenRequests = [];
  try {
    globalThis.chrome = {
      permissions: { contains: async () => true },
      storage: {
        local: {
          get: async (key) => key in frozenStore ? { [key]: frozenStore[key] } : {},
          set: async (data) => Object.assign(frozenStore, data),
        },
      },
    };
    const prepared = typeof pbpWebdavPrepareOperation === "function"
      ? await pbpWebdavPrepareOperation(frozenCfg) : null;
    frozenCfg.baseUrl = "https://changed.example.com/";
    frozenCfg.user = "mallory";
    const body = JSON.stringify({ _schemaVersion: 2, optTheme: "dark" });
    globalThis.fetch = async (url, opts) => {
      frozenRequests.push({ url, method: opts.method, auth: opts.headers.Authorization || "" });
      return locatorResponse(200, body, '"backup-v1"');
    };
    const remote = prepared?.ok
      ? await pbpWebdavReadRemote(prepared.cfg, prepared.target) : null;
    if (prepared?.ok) {
      await pbpWebdavRememberState(prepared.target, {
        mode: "etag",
        etag: remote?.etag || "",
        remoteHash: remote?.remoteHash || "",
        settingsHash: remote?.settingsHash || "",
        lastSuccessAt: 1,
      });
      await pbpWebdavPersistPushResult(prepared.cfg, prepared.target, { ok: true, ts: 1 });
    }
    const state = prepared?.ok ? await pbpWebdavReadState(prepared.target) : null;
    const operation = frozenStore.webdavLastPush;
    check("push/pull/state/operation record share the frozen backup URL and user",
      prepared?.ok && remote?.ok && state?.known &&
      frozenRequests.length === 1 && frozenRequests[0].url === prepared.target.backupFileUrl &&
      frozenRequests[0].auth === "Basic " + btoa("alice:secret") &&
      operation?.targetId === prepared.target.targetId &&
      operation?.target !== prepared.target.backupFileUrl &&
      deobfuscateKey(operation?.target || "") === prepared.target.backupFileUrl &&
      deobfuscateKey(operation?.user || "") === "alice" &&
      !("targetBinding" in operation));
  } finally {
    globalThis.chrome = realFrozenChrome;
    globalThis.fetch = realFrozenFetch;
  }

  section("WebDAV sync state — hashed target binding");
  const stateCfg = { baseUrl: "https://dav.example.com/backups/", user: "alice", pass: "secret" };
  const stateTarget = await pbpWebdavFreezeTarget(stateCfg);
  const sameStateTarget = await pbpWebdavFreezeTarget(Object.assign({}, stateCfg));
  const otherUserTarget = await pbpWebdavFreezeTarget(Object.assign({}, stateCfg, { user: "bob" }));
  const otherUrlTarget = await pbpWebdavFreezeTarget(
    Object.assign({}, stateCfg, { baseUrl: "https://dav.example.com/other/" }));
  const targetId = stateTarget.targetId;
  const sameTargetId = sameStateTarget.targetId;
  const otherUserId = otherUserTarget.targetId;
  const otherUrlId = otherUrlTarget.targetId;
  check("target id is deterministic SHA-256 and stores no plaintext URL",
    /^[a-f0-9]{64}$/.test(targetId) && targetId === sameTargetId && !targetId.includes("dav.example.com"));
  check("WebDAV username is part of the remote resource identity",
    targetId !== "" && otherUserId !== "" && otherUserId !== targetId);
  check("WebDAV file URL is part of the remote resource identity",
    targetId !== "" && otherUrlId !== "" && otherUrlId !== targetId);

  const stateStore = {};
  const realStateChrome = globalThis.chrome;
  try {
    globalThis.chrome = {
      storage: {
        local: {
          get: async (key) => key in stateStore ? { [key]: stateStore[key] } : {},
          set: async (data) => Object.assign(stateStore, data),
        },
      },
    };
    if (typeof pbpWebdavRememberState === "function") {
      await pbpWebdavRememberState(stateTarget, {
        mode: "etag",
        etag: '"v1"',
        remoteHash: "wire",
        settingsHash: "semantic",
        lastSuccessAt: 1,
      });
    }
    const storedState = typeof PBP_WEBDAV_SYNC_STATE_KEY === "string"
      ? stateStore[PBP_WEBDAV_SYNC_STATE_KEY] : null;
    check("persisted sync state stores targetId instead of plaintext target and username",
      storedState && storedState.targetId === targetId && !("target" in storedState) && !("user" in storedState));
    const readState = typeof pbpWebdavReadState === "function"
      ? await pbpWebdavReadState(stateTarget) : null;
    check("matching target reads the last confirmed semantic and transport baseline",
      readState && readState.known === true && readState.mode === "etag" &&
      readState.etag === '"v1"' && readState.remoteHash === "wire" && readState.settingsHash === "semantic");
    const otherState = typeof pbpWebdavReadState === "function"
      ? await pbpWebdavReadState(otherUserTarget) : null;
    check("a different target cannot inherit another target's baseline or capability",
      otherState && otherState.known === false && otherState.mode === "unknown" &&
      otherState.etag === "" && otherState.settingsHash === "");
  } finally {
    globalThis.chrome = realStateChrome;
  }

  section("WebDAV auto-push — device-local migration");
  const realAutoPushChrome = globalThis.chrome;
  const realAutoPushCache = _settingsStorageCache;
  const autoLocal = {};
  const autoSync = {};
  const getFrom = (store) => async (query) => {
    if (query === null) return Object.assign({}, store);
    if (typeof query === "string") return query in store ? { [query]: store[query] } : {};
    if (Array.isArray(query)) {
      const out = {};
      query.forEach((key) => { if (key in store) out[key] = store[key]; });
      return out;
    }
    const out = Object.assign({}, query || {});
    Object.keys(query || {}).forEach((key) => { if (key in store) out[key] = store[key]; });
    return out;
  };
  const resetAutoPushStores = () => {
    Object.keys(autoLocal).forEach((key) => delete autoLocal[key]);
    Object.keys(autoSync).forEach((key) => delete autoSync[key]);
    autoLocal.optSyncEnabled = true;
    autoSync.webdavAutoPush = "daily";
    _settingsStorageCache = null;
  };
  try {
    globalThis.chrome = {
      storage: {
        local: {
          get: getFrom(autoLocal),
          set: async (data) => Object.assign(autoLocal, data),
        },
        sync: {
          get: getFrom(autoSync),
          set: async (data) => Object.assign(autoSync, data),
        },
      },
    };
    const autoCfg = { baseUrl: "https://dav.example.com/backups/", user: "alice" };

    resetAutoPushStores();
    autoLocal.webdavAutoPush = "hourly";
    const existingLocal = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    check("an existing device-local schedule wins over the legacy synced value",
      existingLocal === "hourly" && autoLocal._webdavAutoPushLocalV1 === true);

    resetAutoPushStores();
    const unmatched = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    resetAutoPushStores();
    autoLocal[PBP_WEBDAV_SYNC_STATE_KEY] = {
      targetId: "",
      settingsHash: "legacy-settings",
    };
    const invalidTarget = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush({ baseUrl: "", user: "alice" }) : "missing";
    check("legacy sync schedule defaults off without proof this device used the current target",
      unmatched === "off" && invalidTarget === "off" && autoLocal.webdavAutoPush === "off" &&
      autoLocal._webdavAutoPushLocalV1 === true);

    resetAutoPushStores();
    autoLocal.webdavLastPush = {
      ok: true,
      target: obfuscateKey(pbpWebdavFileUrl(autoCfg.baseUrl)),
      user: obfuscateKey(autoCfg.user),
    };
    const migrated = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    check("a matching successful local record migrates the legacy synced schedule once",
      migrated === "daily" && autoLocal.webdavAutoPush === "daily");

    resetAutoPushStores();
    autoLocal._webdavEtagState = {
      target: obfuscateKey(pbpWebdavFileUrl(autoCfg.baseUrl)),
      user: obfuscateKey(autoCfg.user),
      etag: '"legacy-pull"',
    };
    const migratedFromPull = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    check("a matching legacy pull baseline safely migrates the device schedule",
      migratedFromPull === "daily" && autoLocal.webdavAutoPush === "daily");

    const legacyTargetId = await pbpWebdavSha256(
      pbpWebdavFileUrl(autoCfg.baseUrl) + "\n" + autoCfg.user);
    const migratedSchedules = [];
    for (const schedule of ["hourly", "daily"]) {
      resetAutoPushStores();
      autoSync.webdavAutoPush = schedule;
      autoLocal[PBP_WEBDAV_SYNC_STATE_KEY] = {
        targetId: legacyTargetId,
        settingsHash: "legacy-settings",
      };
      migratedSchedules.push(await pbpWebdavReadAutoPush(autoCfg));
    }
    check("legacy root-file sync state preserves the old hourly or daily schedule",
      migratedSchedules.join(",") === "hourly,daily" &&
      autoLocal.webdavAutoPush === "daily" &&
      autoLocal._webdavAutoPushLocalV1 === true);

    resetAutoPushStores();
    autoLocal.webdavLastPush = {
      ok: true,
      target: obfuscateKey(pbpWebdavFileUrl("https://dav.example.com/other/")),
      user: obfuscateKey(autoCfg.user),
    };
    const switchedTarget = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    check("a successful record for another target cannot enable this device's schedule",
      switchedTarget === "off" && autoLocal.webdavAutoPush === "off");

    const normalized = typeof pbpWebdavWriteAutoPush === "function"
      ? await pbpWebdavWriteAutoPush("invalid") : "missing";
    check("device-local writes normalize invalid schedules to off and retain the migration marker",
      normalized === "off" && autoLocal.webdavAutoPush === "off" &&
      autoLocal._webdavAutoPushLocalV1 === true);

    globalThis.chrome.storage.local.get = async () => { throw new Error("storage unavailable"); };
    const unavailable = typeof pbpWebdavReadAutoPush === "function"
      ? await pbpWebdavReadAutoPush(autoCfg) : "missing";
    check("an unavailable local storage area degrades scheduling to off without breaking settings load",
      unavailable === "off");
  } finally {
    globalThis.chrome = realAutoPushChrome;
    _settingsStorageCache = realAutoPushCache;
  }

  section("pbpWebdavReadRemote — validated body and dual hashes");
  const realRemoteFetch = globalThis.fetch;
  try {
    const remoteA = JSON.stringify({ _schemaVersion: 2, optTheme: "dark", _webdav: { pushedAt: "A" } });
    const remoteB = JSON.stringify({ optTheme: "dark", _webdav: { pushedAt: "B" }, _schemaVersion: 2 });
    let remoteBody = remoteA;
    globalThis.fetch = async () => ({
      ok: true,
      status: 200,
      headers: { get: (name) => /etag/i.test(name) ? '"remote-v1"' : null },
      text: async () => remoteBody,
    });
    const readA = typeof pbpWebdavReadRemote === "function"
      ? await pbpWebdavReadRemote(stateCfg, stateTarget) : null;
    remoteBody = remoteB;
    const readB = typeof pbpWebdavReadRemote === "function"
      ? await pbpWebdavReadRemote(stateCfg, stateTarget) : null;
    check("remote read returns parsed data, strong ETag and both content identities",
      readA && readA.ok && readA.exists && readA.data.optTheme === "dark" &&
      readA.etag === '"remote-v1"' && /^[a-f0-9]{64}$/.test(readA.remoteHash) &&
      /^[a-f0-9]{64}$/.test(readA.settingsHash));
    check("volatile metadata changes exact bytes but not semantic settings identity",
      readA && readB && readA.remoteHash !== readB.remoteHash && readA.settingsHash === readB.settingsHash);

    globalThis.fetch = async () => ({ ok: false, status: 404, headers: { get: () => null }, text: async () => "" });
    const missingRemote = typeof pbpWebdavReadRemote === "function"
      ? await pbpWebdavReadRemote(stateCfg, stateTarget) : null;
    check("remote 404 is a valid missing-resource result, not a network failure",
      missingRemote && missingRemote.ok && missingRemote.exists === false);

    globalThis.fetch = async () => ({ ok: true, status: 200, headers: { get: () => '"bad"' }, text: async () => "<html>" });
    const invalidRemote = typeof pbpWebdavReadRemote === "function"
      ? await pbpWebdavReadRemote(stateCfg, stateTarget) : null;
    check("invalid remote JSON is rejected before it can become a sync baseline",
      invalidRemote && !invalidRemote.ok && invalidRemote.error === "invalid");
  } finally {
    globalThis.fetch = realRemoteFetch;
  }

  section("pbpWebdavUploadText — ETag CAS with hash-verified fallback");
  const realUploadChrome = globalThis.chrome;
  const realUploadFetch = globalThis.fetch;
  const uploadStore = {};
  const uploadCfg = { baseUrl: "https://dav.example.com/protocol/", user: "alice", pass: "secret" };
  const uploadTarget = await pbpWebdavFreezeTarget(uploadCfg);
  const localText = JSON.stringify({ _schemaVersion: 2, optTheme: "dark", _webdav: { pushedAt: "local" } });
  const baseText = JSON.stringify({ _schemaVersion: 2, optTheme: "light", _webdav: { pushedAt: "base" } });
  const otherText = JSON.stringify({ _schemaVersion: 2, optTheme: "auto", _webdav: { pushedAt: "remote" } });
  const response = (status, text = "", etag = "") => ({
    ok: status >= 200 && status < 300,
    status,
    headers: { get: (name) => /etag/i.test(name) ? etag || null : null },
    text: async () => text || (status === 207 ? COLLECTION_XML : ""),
  });
  const resetUploadStore = () => {
    Object.keys(uploadStore).forEach((key) => delete uploadStore[key]);
  };
  const seedUploadState = async (text, etag = '"base"', mode = "etag") => {
    await pbpWebdavRememberState(uploadTarget, {
      mode,
      etag,
      remoteHash: await pbpWebdavSha256(text),
      settingsHash: await pbpWebdavSha256(
        pbpWebdavStableStringify(pbpWebdavSemanticValue(JSON.parse(text)))),
      lastSuccessAt: 1,
    });
  };
  const upload = async (options) => typeof pbpWebdavUploadText === "function"
    ? pbpWebdavUploadText(uploadCfg, uploadTarget, localText, options) : null;
  try {
    globalThis.chrome = {
      storage: {
        local: {
          get: async (key) => key in uploadStore ? { [key]: uploadStore[key] } : {},
          set: async (data) => Object.assign(uploadStore, data),
        },
      },
    };

    const sameRequests = [];
    globalThis.fetch = async (_url, opts) => {
      sameRequests.push(opts.method);
      return response(200, localText, '"same"');
    };
    const same = await upload();
    check("matching unpaired remote adopts a baseline without another PUT",
      same && same.ok && same.noop === true && sameRequests.join(",") === "GET");
    const pairedState = typeof pbpWebdavReadState === "function" ? await pbpWebdavReadState(uploadTarget) : null;
    check("no-op convergence records the verified remote ETag and semantic baseline",
      pairedState && pairedState.known && pairedState.etag === '"same"' && pairedState.mode === "etag");

    resetUploadStore();
    const unpairedRequests = [];
    globalThis.fetch = async (_url, opts) => {
      unpairedRequests.push(opts.method);
      return response(200, otherText, '"other"');
    };
    const unpaired = await upload();
    const unpairedState = typeof pbpWebdavReadState === "function"
      ? await pbpWebdavReadState(uploadTarget) : null;
    check("different existing remote without a baseline is not overwritten",
      unpaired && !unpaired.ok && unpaired.error === "unpaired" &&
      unpairedRequests.join(",") === "GET" &&
      unpairedState?.unresolvedConflict?.kind === "unpaired" &&
      unpairedState.unresolvedConflict.remoteHash === await pbpWebdavSha256(otherText));

    resetUploadStore();
    await seedUploadState(baseText, '"old"');
    const refreshRequests = [];
    let refreshGet = 0;
    globalThis.fetch = async (_url, opts) => {
      refreshRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "GET") {
        refreshGet++;
        return refreshGet < 3 ? response(200, baseText, refreshGet === 1 ? '"old"' : '"fresh"')
          : response(200, localText, '"written"');
      }
      if (opts.headers["If-Match"] === '"old"') return response(412);
      return response(200);
    };
    const refreshed = await upload();
    const refreshPuts = refreshRequests.filter((request) => request.method === "PUT");
    check("412 re-reads unchanged content and retries once with the fresh strong ETag",
      refreshed && refreshed.ok && refreshPuts.length === 2 &&
      refreshPuts[0].headers["If-Match"] === '"old"' &&
      refreshPuts[1].headers["If-Match"] === '"fresh"');
    const refreshedState = await pbpWebdavReadState(uploadTarget);
    check("verified ETag retry commits the post-write revision",
      refreshedState.mode === "etag" && refreshedState.etag === '"written"' &&
      refreshedState.settingsHash === refreshed.settingsHash);

    resetUploadStore();
    await seedUploadState(baseText, '"old"');
    const vanishedEtagRequests = [];
    let vanishedEtagGet = 0;
    globalThis.fetch = async (_url, opts) => {
      vanishedEtagRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "GET") {
        vanishedEtagGet++;
        if (vanishedEtagGet === 1) return response(200, baseText, '"old"');
        if (vanishedEtagGet === 2) return response(200, baseText);
        return response(200, localText);
      }
      if (opts.headers["If-Match"]) return response(412);
      return response(200);
    };
    const vanishedEtag = await upload();
    const vanishedEtagPuts = vanishedEtagRequests.filter((request) => request.method === "PUT");
    check("a strong ETag that disappears after 412 downgrades to verified hash mode",
      vanishedEtag?.ok && vanishedEtag.mode === "hash" && vanishedEtagPuts.length === 2 &&
      vanishedEtagPuts[0].headers["If-Match"] === '"old"' &&
      !("If-Match" in vanishedEtagPuts[1].headers));

    resetUploadStore();
    await seedUploadState(baseText, '"old"');
    const fallbackRequests = [];
    let fallbackGet = 0;
    globalThis.fetch = async (_url, opts) => {
      fallbackRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "GET") {
        fallbackGet++;
        return fallbackGet < 4 ? response(200, baseText, '"fresh"') : response(200, localText);
      }
      if (opts.headers["If-Match"]) return response(412);
      return response(200);
    };
    const fallback = await upload();
    const fallbackPuts = fallbackRequests.filter((request) => request.method === "PUT");
    check("repeated false 412 falls back to one unconditional PUT only after the remote still matches the baseline",
      fallback && fallback.ok && fallbackPuts.length === 3 &&
      fallbackPuts[0].headers["If-Match"] === '"fresh"' &&
      fallbackPuts[1].headers["If-Match"] === '"fresh"' &&
      !("If-Match" in fallbackPuts[2].headers) && !("If-None-Match" in fallbackPuts[2].headers));
    check("a proven incompatible conditional path is remembered as target-bound hash mode",
      (await pbpWebdavReadState(uploadTarget)).mode === "hash");

    resetUploadStore();
    await seedUploadState(baseText, "", "hash");
    const hashRequests = [];
    let hashGet = 0;
    globalThis.fetch = async (_url, opts) => {
      hashRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "GET") return ++hashGet === 1 ? response(200, baseText) : response(200, localText);
      return response(200);
    };
    const hashMode = await upload();
    const hashPut = hashRequests.find((request) => request.method === "PUT");
    check("missing/unreliable ETag uses preflight GET, unconditional PUT and postflight GET",
      hashMode && hashMode.ok && hashRequests.map((request) => request.method).join(",") === "GET,PUT,GET" &&
      !("If-Match" in hashPut.headers) && !("If-None-Match" in hashPut.headers));
    check("successful compatibility upload keeps hash mode",
      hashMode && hashMode.ok && (await pbpWebdavReadState(uploadTarget)).mode === "hash");

    resetUploadStore();
    await seedUploadState(baseText, "", "hash");
    globalThis.fetch = async (_url, opts) =>
      opts.method === "GET" ? response(200, baseText) : response(200);
    const notVerified = await upload();
    check("post-write content mismatch returns verify-failed instead of claiming success",
      notVerified && !notVerified.ok && notVerified.error === "verify-failed");
    check("failed post-write verification keeps the last successful baseline",
      notVerified && !notVerified.ok && (await pbpWebdavReadState(uploadTarget)).settingsHash ===
      await pbpWebdavSha256(pbpWebdavStableStringify(pbpWebdavSemanticValue(JSON.parse(baseText)))));

    resetUploadStore();
    const createRequests = [];
    globalThis.fetch = async (_url, opts) => {
      createRequests.push({ method: opts.method, headers: Object.assign({}, opts.headers) });
      if (opts.method === "GET" && createRequests.length === 1) return response(404);
      if (opts.method === "GET") return response(200, localText, '"created"');
      return response(201);
    };
    const created = await upload();
    const createPut = createRequests.find((request) => request.method === "PUT");
    check("missing remote is created with If-None-Match:* and verified by GET",
      created && created.ok && createPut.headers["If-None-Match"] === "*" &&
      createRequests.map((request) => request.method).join(",") === "GET,PUT,GET");
  } finally {
    globalThis.chrome = realUploadChrome;
    globalThis.fetch = realUploadFetch;
  }

  section("pbpWebdavPush — integrates snapshot capture with verified upload");
  const realIntegratedChrome = globalThis.chrome;
  const realIntegratedFetch = globalThis.fetch;
  const realIntegratedCache = _settingsStorageCache;
  const integratedStore = Object.assign({}, SETTINGS_DEFAULTS, {
    optSyncEnabled: false,
    webdavUrl: "https://dav.example.com/integrated/",
    optTheme: "light",

        "PROPFIND,PROPFIND,MKCOL,PROPFIND,GET,PUT,GET,PROPFIND,PROPFIND,GET,PUT,GET");
    check("push probes and creates exactly the resolved app collection",
      createRequests[0]?.url === "https://dav.example.com/new-backups/" &&
      createRequests[1]?.url === "https://dav.example.com/new-backups/pinboard-bookmark-enhanced/" &&
      createRequests[2]?.url === "https://dav.example.com/new-backups/pinboard-bookmark-enhanced/");
    check("push writes under the resolved app collection",
      createRequests.some((request) =>
        request.method === "PUT" &&
        request.url === "https://dav.example.com/new-backups/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-settings.json"));

    const rootRequests = [];
    let rootBody = "";
    let rootLocator = "";
    let rootProbes = 0;
    globalThis.fetch = (url, opts) => {
      rootRequests.push({ url, method: opts.method });
      if (opts.method === "PROPFIND") {
        rootProbes++;
        return Promise.resolve(response(rootProbes === 2 ? 404 : 207));
      }
      if (opts.method === "MKCOL") return Promise.resolve(response(201));
      if (url.includes("/location.json")) {
        if (opts.method === "GET") {
          return Promise.resolve(rootLocator
            ? response(200, rootLocator, '"locator"')
            : response(404));
        }
        if (opts.method === "PUT") {
          rootLocator = String(opts.body);
          return Promise.resolve(response(201));
        }
      }
      if (opts.method === "GET") return Promise.resolve(rootBody
        ? response(200, rootBody, '"root"') : response(404));
      if (opts.method === "PUT") {
        rootBody = String(opts.body);
        return Promise.resolve(response(201));
      }
      return Promise.resolve(response(405));
    };
    const rootPush = await pbpWebdavPush({ baseUrl: "https://dav.jianguoyun.com/dav/", user: "", pass: "", includeHighlights: false });
    check("provider root push probes the configured collection before verified PUT",
      rootPush.ok && rootRequests.map((r) => r.method).join(",") ===
        "PROPFIND,PROPFIND,MKCOL,PROPFIND,GET,PUT,GET,PROPFIND,PROPFIND,GET,PUT,GET");
    check("provider root push writes under the resolved app collection",
      rootRequests.some((r) => r.method === "PUT" &&
        r.url === "https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-settings.json"));
  } catch (e) {
    check("pbpWebdavPush live includeHighlights override did not throw", false, e.message);
  } finally {
    globalThis.chrome = prevChrome;
    globalThis.fetch = prevFetch;
    _settingsStorageCache = prevCache;
  }

  section("pbpWebdavPush/Pull — ETag compare-and-swap");
  const prevChromeCas = globalThis.chrome;
  const prevFetchCas = globalThis.fetch;
  const prevCacheCas = _settingsStorageCache;
  const casLocal = Object.assign({}, SETTINGS_DEFAULTS, { optSyncEnabled: false });
  const casRequests = [];
  const casGet = (keys) => {
    if (keys === null) return Promise.resolve(Object.assign({}, casLocal));
    if (typeof keys === "string") return Promise.resolve(keys in casLocal ? { [keys]: casLocal[keys] } : {});
    if (Array.isArray(keys)) {
      const out = {};
      keys.forEach((key) => { if (key in casLocal) out[key] = casLocal[key]; });
      return Promise.resolve(out);
    }
    const out = Object.assign({}, keys || {});
    Object.keys(keys || {}).forEach((key) => { if (key in casLocal) out[key] = casLocal[key]; });
    return Promise.resolve(out);
  };
  try {
    _settingsStorageCache = null;
    globalThis.chrome = {
      permissions: { contains: async () => true },
      runtime: { getManifest: () => ({ version: "test-version" }) },
      storage: {
        local: {
          get: casGet,
          set: async (data) => { Object.assign(casLocal, data); },
          remove: async (keys) => { (Array.isArray(keys) ? keys : [keys]).forEach((key) => delete casLocal[key]); },
        },
        sync: { get: casGet, set: async () => {}, remove: async () => {} },
        onChanged: { addListener() {} },
      },
    };
    const casCfg = { baseUrl: "https://dav.example.com/cas/", user: "", pass: "" };
    const pulledText = JSON.stringify({ _schemaVersion: 2, optTheme: "dark", _webdav: { pushedAt: "remote" } });
    globalThis.fetch = () => Promise.resolve(response(200, pulledText, '"v3"'));
    const pulled = await pbpWebdavPull(casCfg);
    check("pull returns the observed ETag and both hashes without committing a baseline",
      pulled.ok && pulled.etag === '"v3"' && /^[a-f0-9]{64}$/.test(pulled.remoteHash) &&
      /^[a-f0-9]{64}$/.test(pulled.settingsHash) &&
      !(PBP_WEBDAV_SYNC_STATE_KEY in casLocal));

    globalThis.fetch = () => Promise.resolve(response(200, JSON.stringify({ _schemaVersion: 3 }), '"x"'));
    const futureSchema = await pbpWebdavPull(casCfg);
    check("pull rejects an unsupported future schema", !futureSchema.ok && futureSchema.error === "invalid");
    globalThis.fetch = () => Promise.resolve(response(200, JSON.stringify([]), '"x"'));
    const arrayRoot = await pbpWebdavPull(casCfg);
    check("pull rejects a non-object backup root", !arrayRoot.ok && arrayRoot.error === "invalid");
    globalThis.fetch = () => Promise.resolve(response(200, JSON.stringify({ optTheme: "light" }), '"legacy"'));
    const legacySchema = await pbpWebdavPull(casCfg);
    check("pull accepts an ownerless schema-v1 backup with no explicit version",
      legacySchema.ok && legacySchema.data.optTheme === "light" && legacySchema.etag === '"legacy"');
  } catch (error) {
    check("ETag compare-and-swap test did not throw", false, error.message);
  } finally {
    globalThis.chrome = prevChromeCas;
    globalThis.fetch = prevFetchCas;
    _settingsStorageCache = prevCacheCas;
  }

  section("pbpWebdavTest — distinguishes missing backup file from missing folder");
  const prevChrome2 = globalThis.chrome;
  const prevFetch2 = globalThis.fetch;
  try {
    globalThis.chrome = {
      permissions: { contains: () => Promise.resolve(true) },
      storage: { onChanged: { addListener() {} } },
    };
    const requests = [];
    let testLocator = "";
    globalThis.fetch = (url, opts) => {
      requests.push({ url, method: opts.method });
      if (requests.length === 1) return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve(response(207));
      if (url.includes("/location.json")) {
        if (opts.method === "GET") {
          return Promise.resolve(testLocator
            ? response(200, testLocator, '"locator"')
            : response(404));
        }
        if (opts.method === "PUT") {
          testLocator = String(opts.body);
          return Promise.resolve(response(201));
        }
      }
      return Promise.resolve({ ok: true, status: 200 });
    };
    const empty = await pbpWebdavTest({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "" });
    check("file 404 + collection PROPFIND ok -> empty backup", empty.kind === "empty");
    check("file 404 path performs collection probe + write probe",
      requests.map((r) => r.method).join(",") ===
        "GET,PROPFIND,PROPFIND,PUT,DELETE,PROPFIND,PROPFIND,GET,PUT,GET");

    const missingFolderRequests = [];
    globalThis.fetch = (url, opts) => {
      missingFolderRequests.push({ url, method: opts.method });
      return Promise.resolve({ ok: false, status: 404 });
    };
    const missingFolder = await pbpWebdavTest({ baseUrl: "https://dav.example.com/missing/", user: "", pass: "" });
    check("file 404 + collection PROPFIND 404 + MKCOL 404 -> missing target collection", missingFolder.kind === "not-found");

    const createFolderRequests = [];
    let createFolderProbes = 0;
    let createTestLocator = "";
    globalThis.fetch = (url, opts) => {
      createFolderRequests.push({ url, method: opts.method });
      if (opts.method === "PROPFIND") {
        createFolderProbes++;
        return Promise.resolve(response(createFolderProbes === 2 ? 404 : 207));
      }
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      if (url.includes("/location.json")) {
        if (opts.method === "GET") {
          return Promise.resolve(createTestLocator
            ? response(200, createTestLocator, '"locator"')
            : response(404));
        }
        if (opts.method === "PUT") {
          createTestLocator = String(opts.body);
          return Promise.resolve(response(201));
        }
      }
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const createdFolder = await pbpWebdavTest({ baseUrl: "https://dav.example.com/backups/", user: "", pass: "" });
    check("test creates the configured collection before write probe", createdFolder.kind === "empty" &&
      createFolderRequests.map((r) => r.method).join(",") ===
        "GET,PROPFIND,PROPFIND,MKCOL,PROPFIND,PUT,DELETE,PROPFIND,PROPFIND,GET,PUT,GET");
    check("test-created collection uses exactly the resolved app collection",
      createFolderRequests[1]?.url === "https://dav.example.com/backups/" &&
      createFolderRequests[2]?.url === "https://dav.example.com/backups/pinboard-bookmark-enhanced/" &&
      createFolderRequests[3]?.url === "https://dav.example.com/backups/pinboard-bookmark-enhanced/" &&
      createFolderRequests[5]?.url.startsWith(
        "https://dav.example.com/backups/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-write-test-"));

    const readOnlyRequests = [];
    globalThis.fetch = (url, opts) => {
      readOnlyRequests.push({ url, method: opts.method });
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      if (opts.method === "PROPFIND") return Promise.resolve(response(207));
      return Promise.resolve({ ok: false, status: 404 });
    };
    const readOnly = await pbpWebdavTest({ baseUrl: "https://dav.example.com/dav/", user: "", pass: "" });
    check("readable collection + failed temp PUT -> not-writable", readOnly.kind === "not-writable");
    check("failed temp PUT status is preserved", readOnly.status === 404);

    const rootRequests = [];
    let rootProbes = 0;
    let rootTestLocator = "";
    globalThis.fetch = (url, opts) => {
      rootRequests.push({ url, method: opts.method });
      if (opts.method === "PROPFIND") {
        rootProbes++;
        return Promise.resolve(response(rootProbes === 2 ? 404 : 207));
      }
      if (opts.method === "MKCOL") return Promise.resolve({ ok: true, status: 201 });
      if (url.includes("/location.json")) {
        if (opts.method === "GET") {
          return Promise.resolve(rootTestLocator
            ? response(200, rootTestLocator, '"locator"')
            : response(404));
        }
        if (opts.method === "PUT") {
          rootTestLocator = String(opts.body);
          return Promise.resolve(response(201));
        }
      }
      if (opts.method === "GET") return Promise.resolve({ ok: false, status: 404 });
      return Promise.resolve({ ok: true, status: 200 });
    };
    const rootEmpty = await pbpWebdavTest({ baseUrl: "https://dav.jianguoyun.com/dav/", user: "", pass: "" });
    check("provider root test verifies the configured collection", rootEmpty.kind === "empty");
    check("provider root test writes under the resolved app collection",
      rootRequests.some((r) => r.method === "PUT" &&
        r.url.startsWith("https://dav.jianguoyun.com/dav/pinboard-bookmark-enhanced/pinboard-bookmark-enhanced-write-test-")));
  } catch (e) {
    check("pbpWebdavTest missing-folder probe did not throw", false, e.message);
  } finally {
    globalThis.chrome = prevChrome2;
    globalThis.fetch = prevFetch2;
  }
}

(async function () {
  await runChromeLayerTests();
  document.getElementById("summary").textContent = `${pass} passed, ${fail} failed`;
})();
</script>
