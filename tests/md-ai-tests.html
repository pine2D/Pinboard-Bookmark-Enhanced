<script>
// ============ md-preview.js: pbpRailCollapsible (install + storage, async) ============
// NOTE: this suite is a hand-rolled async IIFE, NOT suiteIf()/test() -- this
// file's test() helper is fully synchronous (calls fn() and records PASS
// with no await), so an async test body's assertions would run AFTER test()
// already recorded PASS, surfacing only as an unhandled rejection, never a
// FAIL. Worse, since these cases share-and-restore the global `window.chrome`
// at start/end, unawaited concurrent bodies would race and clobber each
// other's mock mid-flight. Mirrors this file's own established pattern for
// async suites (see pbpAiCacheAppend/_pbpExplainPersistTrigger/_pbpStreamRead/
// pbpTrRunQueue below) so every case fully resolves before the next starts.
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "pbpRailCollapsible (install + storage)";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  if (typeof pbpRailCollapsible !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP pbpRailCollapsible (not loaded)";
    host.appendChild(div); SKIP++; return;
  }

  function mockLocal(initial) {
    const store = { ...initial };
    return {
      _store: store,
      get: (arg) => Promise.resolve(
        arg == null ? { ...store }
        : typeof arg === "string" ? (arg in store ? { [arg]: store[arg] } : {})
        : {}
      ),
      set: (obj) => { Object.assign(store, obj); return Promise.resolve(); },
    };
  }
  const realChrome = window.chrome;

  await atest("normal mode: replaces a plain label div with a button.rail-sec-head, wires aria", async () => {
    window.chrome = { storage: { local: mockLocal({}) } };
    const sec = document.createElement("div");
    sec.className = "rail-section";
    const label = document.createElement("div");
    label.className = "rail-label";
    label.textContent = "Export";
    sec.appendChild(label);
    const extra = document.createElement("div");
    extra.textContent = "content";
    sec.appendChild(extra);
    pbpRailCollapsible(sec, "export", { label, defaultCollapsed: true });
    await Promise.resolve().then(() => {}).then(() => {}); // flush the storage.get microtask chain
    const head = sec.querySelector(".rail-sec-head");
    assert(!!head, "header button installed");
    assertEq(head.tagName, "BUTTON", "header is a real button");
    assertEq(sec.contains(label), false, "original label node removed");
    assertEq(sec.classList.contains("rail-collapsed"), true, "defaultCollapsed:true applied (no stored value)");
    window.chrome = realChrome;
  });

  await atest("headless mode: sectionEl whose ONLY child is opts.label is left untouched (ask degenerate case)", async () => {
    window.chrome = { storage: { local: mockLocal({}) } };
    const sec = document.createElement("div");
    const btn = document.createElement("button");
    btn.id = "ask-open";
    btn.setAttribute("aria-expanded", "false");
    btn.setAttribute("aria-controls", "ask-panel");
    sec.appendChild(btn);
    const h = pbpRailCollapsible(sec, "ask", { label: btn, defaultCollapsed: true });
    await Promise.resolve().then(() => {}).then(() => {});
    assertEq(sec.querySelector(".rail-sec-head"), null, "no header installed in headless mode");
    assertEq(btn.getAttribute("aria-expanded"), "false", "pre-existing aria-expanded left untouched");
    assertEq(btn.className, "", "no rail-sec-head class added to the reused button");
    h.expand(true); // must not throw, must not touch DOM
    assertEq(sec.children.length, 1, "still exactly one child");
    window.chrome = realChrome;
  });

  await atest("click on header persists to storage.local under the section's own key, preserving sibling keys", async () => {
    const local = mockLocal({ pbp_rail_collapse: { toc: false } });
    window.chrome = { storage: { local } };
    const sec = document.createElement("div");
    const label = document.createElement("div");
    label.textContent = "Translate";
    sec.appendChild(label);
    const extra = document.createElement("div"); // 2nd child so normal mode (not headless) installs
    sec.appendChild(extra);
    pbpRailCollapsible(sec, "tr", { label, defaultCollapsed: true });
    await Promise.resolve().then(() => {}).then(() => {});
    sec.querySelector(".rail-sec-head").click();
    await Promise.resolve().then(() => {}).then(() => {});
    assertEq(local._store.pbp_rail_collapse.tr, false, "tr toggled to expanded and persisted");
    assertEq(local._store.pbp_rail_collapse.toc, false, "sibling key toc untouched by tr's write");
    window.chrome = realChrome;
  });

  await atest("expand(temp=true) does not persist (session-only auto-expand)", async () => {
    const local = mockLocal({});
    window.chrome = { storage: { local } };
    const sec = document.createElement("div");
    const label = document.createElement("div");
    label.textContent = "Translate";
    sec.appendChild(label);
    const extra = document.createElement("div"); // 2nd child so normal mode (not headless) installs
    sec.appendChild(extra);
    const h = pbpRailCollapsible(sec, "tr", { label, defaultCollapsed: true });
    await Promise.resolve().then(() => {}).then(() => {});
    h.expand(true);
    await Promise.resolve().then(() => {}).then(() => {});
    assertEq(local._store.pbp_rail_collapse, undefined, "temp expand must not write storage");
    assertEq(sec.classList.contains("rail-collapsed"), false, "temp expand still visually expands");
    window.chrome = realChrome;
  });

  await atest("expand(true) fired before the async storage catch-up resolves is not reverted", async () => {
    // Deferred get(): resolves only when resolveGet() is called below, so we can fire
    // expand() into the window between install (which starts the read) and its resolution
    // -- the exact race a header click or Task 2's cache-restore auto-expand can hit.
    let resolveGet;
    const local = {
      _store: {},
      get: () => new Promise((resolve) => { resolveGet = resolve; }),
      set: (obj) => { Object.assign(local._store, obj); return Promise.resolve(); },
    };
    window.chrome = { storage: { local } };
    const sec = document.createElement("div");
    const label = document.createElement("div");
    label.textContent = "Translate";
    sec.appendChild(label);
    const extra = document.createElement("div"); // 2nd child so normal mode (not headless) installs
    sec.appendChild(extra);
    const h = pbpRailCollapsible(sec, "tr", { label, defaultCollapsed: true });
    h.expand(true); // races ahead of the still-pending storage.get() below
    assertEq(sec.classList.contains("rail-collapsed"), false, "expand applied immediately");
    resolveGet({ pbp_rail_collapse: { tr: true } }); // stored says collapsed -- would revert if not guarded
    await Promise.resolve().then(() => {}).then(() => {}).then(() => {});
    assertEq(sec.classList.contains("rail-collapsed"), false, "explicit expand() wins over the late catch-up");
    window.chrome = realChrome;
  });
})();
</script>

// ============ Anchoring round: pbpHlRestore drift lifecycle (DOM) ============
// Simulates a structurally drifted page: legacy items (no fp) whose stored n
// now points at unrelated content. Drives the REAL pbpHlRestore /
// _pbpHlReanchorBlock against a live indexed view -- the integration seam the
// pure pbpHlGlobalLocate suites above cannot reach (Codex acceptance).
suiteIf("pbpHlRestore drift lifecycle", "pbpHlRestore", () => {
  function hlDriftSetup() {
    const root = document.createElement("div");
    root.innerHTML = "<p>intro paragraph with plain stable text here</p>"
      + "<p>NEWLY INSERTED AD PARAGRAPH totally new</p>"
      + "<p>the migrating target sentence lives here now</p>";
    document.body.appendChild(root);
    pbpAiIndexBlocks(root);
    const ns = pbpAiBlocks().map((b) => b.n);
    _pbpHlState = {
      url: "t", title: "t",
      items: [
        // clean legacy: quote still lives in its stored block
        { id: "t_ok", n: ns[0], quote: "plain stable text", prefix: "paragraph with ", suffix: " here", color: 1, note: "", ts: 1 },
        // drifted legacy: stored n is now the ad; the text moved one block down
        { id: "t_move", n: ns[1], quote: "migrating target sentence", prefix: "the ", suffix: " lives", color: 2, note: "", ts: 2 },
        // gone: quote nowhere on the page
        { id: "t_gone", n: ns[1], quote: "vanished forever phrase", prefix: "xx ", suffix: " yy", color: 3, note: "", ts: 3 },
      ],
      ranges: Object.create(null), degraded: Object.create(null),
      resolvedN: Object.create(null), orphans: Object.create(null),
    };
    return { root, ns };
  }
  function hlDriftTeardown(root) {
    if (typeof CSS !== "undefined" && CSS.highlights) {
      for (const c of [1, 2, 3, 4, 5]) CSS.highlights.delete("pbp-hl-" + c);
    }
    _pbpHlState = null;
    root.remove();
  }
  test("restore relocates a drifted legacy item and orphans the unlocatable one; storage untouched", () => {
    if (typeof Highlight !== "function") return; // runner is Chromium; guard mirrors pbpHlRestore's own
    const { root, ns } = hlDriftSetup();
    try {
      pbpHlRestore();
      assert(_pbpHlState.ranges.t_ok, "clean item painted");
      assert(_pbpHlState.ranges.t_move, "drifted item painted");
      assertEq(_pbpHlState.resolvedN.t_move, ns[2], "relocated to the block that actually holds the quote");
      assert(!_pbpHlState.ranges.t_gone, "gone item not painted");
      assert(_pbpHlState.orphans.t_gone, "gone item flagged orphan");
      assertEq(Object.keys(_pbpHlState.degraded).length, 0, "no wrong-block whole-paragraph degrades");
      assertEq(_pbpHlState.items.length, 3, "storage-side items untouched");
      assertEq(_pbpHlState.items[1].n, ns[1], "relocation never written back to the item");
    } finally { hlDriftTeardown(root); }
  });
  test("relocated Range's actual text is the quote (offset mapping end-to-end)", () => {
    if (typeof Highlight !== "function") return;
    const { root } = hlDriftSetup();
    try {
      pbpHlRestore();
      assertEq(_pbpHlState.ranges.t_move.range.toString(), "migrating target sentence", "range text = quote");
    } finally { hlDriftTeardown(root); }
  });
  test("block re-anchor pass never revives an orphan into a whole-block paint (HIGH-1)", () => {
    if (typeof Highlight !== "function") return;
    const { root, ns } = hlDriftSetup();
    try {
      pbpHlRestore();
      _pbpHlReanchorBlock(ns[1]); // the orphan's stale n -- the exact revival path
      assert(!_pbpHlState.ranges.t_gone, "orphan still unpainted after re-anchor");
      assert(_pbpHlState.orphans.t_gone, "orphan verdict preserved");
      assert(_pbpHlState.ranges.t_move, "relocated neighbor unaffected");
    } finally { hlDriftTeardown(root); }
  });
});

(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "md-highlight dirty note save race";
  host.appendChild(h);

  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  if (typeof pbpHlAttachNote !== "function" || typeof _pbpHlCommitNote !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP md-highlight dirty note save race (DOM layer not loaded)";
    host.appendChild(div); SKIP++; return;
  }
  await atest("dirty card commit preserves answer appended while the card was dirty", async () => {
    const prevSave = _pbpHlSave;
    const prevRender = _pbpHlNotebookRender;
    const prevState = _pbpHlState;
    const prevCard = _pbpHlCard;
    const prevCardItemId = _pbpHlCardItemId;
    const prevCardBaseNote = _pbpHlCardBaseNote;
    const prevDirty = _pbpHlNoteDirty;
    const prevQueue = _pbpHlWriteQueue;
    const card = document.createElement("div");
    try {
      _pbpHlSave = async () => true;
      _pbpHlNotebookRender = () => {};
      _pbpHlWriteQueue = Promise.resolve();
      const item = { id: "h1", n: 1, quote: "quote", note: "stored", color: 1, ts: 1 };
      _pbpHlState = { url: "https://example.com/a", title: "A", items: [item], ranges: {}, degraded: {} };
      const note = document.createElement("textarea");
      note.className = "hl-card-note";

      _pbpHlNoteDirty = true;

      const ok = await pbpHlAttachNote({ itemId: "h1" }, "answer from ask");
      assertEq(ok, true, "attach reports success");
      _pbpHlCommitNote();
      await _pbpHlWriteQueue;
      assertEq(item.note, "draft edit\n\nanswer from ask", "dirty draft and appended answer both survive");

      _pbpHlCard = prevCard;

      _pbpHlNoteDirty = prevDirty;
      _pbpHlWriteQueue = prevQueue;
      card.remove();

})();

    a.setEnd(text, 5); // "alpha"

    b.setStart(text, 6);
    b.setEnd(text, 10); // "beta"
    assert(!_pbpSearchRangesOverlap(a, b), "no overlap");
    root.remove();
  });
  test("ranges that only touch at a boundary (share zero characters) do not overlap", () => {
    const root = fixture('<p id="b1">alphabeta</p>');
    const text = root.querySelector("#b1").firstChild;
    const a = document.createRange();
    a.setStart(text, 0);
    a.setEnd(text, 5); // "alpha"
    const b = document.createRange();
    b.setStart(text, 5);
    b.setEnd(text, 9); // "beta", starts exactly where a ends
    assert(!_pbpSearchRangesOverlap(a, b), "touching boundary is not an overlap");
    root.remove();
  });
});

  test("CITES block format matches ask's rule 4 verbatim", () => {

  test("prompt embeds the article context under ARTICLE:; pure and null-safe", () => {
    const r = pbpSkimBuildPrompt("[P1] hello\n[P2] world", "Write in English.");
    assert(r.prompt.indexOf("ARTICLE:\n[P1] hello\n[P2] world") !== -1, "context embedded");

  });
  test("article variant: scan-first, filler ban, caveat rule, honest count, hook line", () => {
    const r = pbpSkimBuildPrompt("[P1] alpha", "Write in English.");

    assert(r.system.indexOf("caveat, counter-argument or limitation") !== -1, "caveat rule");
    assert(r.system.indexOf("never pad") !== -1, "honest point count");

  test("title enters the user prompt; reminder trails the long context", () => {

    assert(r.prompt.indexOf("TITLE: My Title\nARTICLE:") === 0, "title first, whitespace collapsed");
    assert(r.prompt.indexOf("Now output exactly as instructed") > r.prompt.indexOf("[P1] alpha"), "instructions after document");
  });
  test("forum variant: thread framing, attribution, no manufactured consensus, shared wire format", () => {
    const r = pbpSkimBuildPrompt("[P1] op\n[P2] reply", "Write in English.", { forum: true });
    assert(r.system.indexOf("discussion thread") !== -1, "thread framing");
    assert(r.system.indexOf("Do NOT manufacture consensus") !== -1, "consensus guard");
    assert(r.system.indexOf("several replies argue") !== -1, "viewpoint attribution wording");
    assert(r.prompt.indexOf("THREAD:\n[P1] op") !== -1, "THREAD label");
    assert(r.system.indexOf("paragraph number from the thread") !== -1 && r.system.indexOf("from the article") === -1, "no article wording inside the thread variant");
    assert(r.system.indexOf("NEVER group citations inside one pair of brackets or parentheses such as (P3, P5)") !== -1, "citation rule verbatim");
    assert(r.system.indexOf("15 words or fewer") !== -1, "CITES quote cap verbatim");
  });

suiteIf("skim cache key normalization", "_pbpSkimCacheKey", () => {

suiteIf("skim cache metadata", "_pbpSkimCacheMeta", () => {
  test("cache meta includes resolved language instruction and model key", () => {
    const meta = _pbpSkimCacheMeta({

  test("configured provider model (no override) enters the cache identity", () => {
    const a = _pbpSkimCacheMeta({ s: { aiProvider: "openai", openaiModel: "m-A", aiSummaryLang: "en" } });
    const b = _pbpSkimCacheMeta({ s: { aiProvider: "openai", openaiModel: "m-B", aiSummaryLang: "en" } });
    assertEq(a.modelKey, "openai:m-A", "configured model in identity");
    assert(a.modelKey !== b.modelKey, "configured-model switch changes identity");
    const g = _pbpSkimCacheMeta({ s: { aiProvider: "gemini", aiSummaryLang: "en" } });
    assertEq(g.modelKey, "gemini:gemini-2.5-flash-lite", "provider default resolved, not 'default'");
  });

  test("cache entry with same blocks/lang/model matches", () => {
    const st = { s: { aiProvider: "gemini", aiSummaryLang: "en" } };
    const meta = _pbpSkimCacheMeta(st);
    assert(_pbpSkimCacheMatches(Object.assign({ blocksHash: "b1" }, meta), st, "b1"), "same meta matches");
  });

  test("cache entry with old language or model is a miss even if blocks match", () => {
    const st = { s: { aiProvider: "gemini", previewAiModel: "new-model", aiSummaryLang: "zh-CN" } };
    const meta = _pbpSkimCacheMeta(st);
    assert(!_pbpSkimCacheMatches(Object.assign({}, meta, { blocksHash: "b1", langKey: "old-lang" }), st, "b1"), "old language misses");
    assert(!_pbpSkimCacheMatches(Object.assign({}, meta, { blocksHash: "b1", modelKey: "old-model" }), st, "b1"), "old model misses");
  });

  test("cache entry with same model but different provider is a miss", () => {
    const st = { s: { aiProvider: "openrouter", previewAiModel: "gpt-test", aiSummaryLang: "en" } };
    const oldMeta = _pbpSkimCacheMeta({ s: { aiProvider: "openai", previewAiModel: "gpt-test", aiSummaryLang: "en" } });
    assert(!_pbpSkimCacheMatches(Object.assign({ blocksHash: "b1" }, oldMeta), st, "b1"), "provider drift misses");
  });

  test("cache entry missing blocksHash: stale (not fresh) when current fp known", () => {
    const st = { s: { aiProvider: "gemini", aiSummaryLang: "en" } };
    const meta = _pbpSkimCacheMeta(st);
    assert(!_pbpSkimCacheMatches(Object.assign({ md: "- x" }, meta), st, "b1"), "no blocksHash + known fp -> not fresh");
    assert(_pbpSkimCacheMatches(Object.assign({ md: "- x" }, meta), st, ""), "unknown current fp keeps tolerance");
  });

  test("legacy cache entry without lang/model metadata is a miss", () => {
    const st = { s: { aiProvider: "gemini", aiSummaryLang: "en" } };
    assert(!_pbpSkimCacheMatches({ md: "- cached", blocksHash: "b1" }, st, "b1"), "legacy cache misses");
  });
});

<script>
// ============ Batch 3: permission recovery gate (async) ============
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "AI permission retry gate";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  const realRequest = window.requestAIHostPermissions;
  const permissionError = new Error("permission needed");
  permissionError.code = "host_permission";
  try {
    await atest("permission request is first and retry waits for grant", async () => {
      const events = [];
      let resolveGrant;
      window.requestAIHostPermissions = () => {
        events.push("request");
        return new Promise((resolve) => { resolveGrant = resolve; });
      };
      const pending = pbpAiRetryWithPermission(permissionError, { aiProvider: "gemini" }, async () => {
        events.push("retry");
      });
      await Promise.resolve();
      if (events.join(",") !== "request") throw new Error("retry ran before grant: " + events.join(","));
      resolveGrant(true);
      if (!await pending) throw new Error("granted retry reported false");
      if (events.join(",") !== "request,retry") throw new Error("wrong order: " + events.join(","));
    });

    await atest("permission denial performs no retry work", async () => {
      let retries = 0;
      window.requestAIHostPermissions = async () => false;
      const ok = await pbpAiRetryWithPermission(permissionError, {}, () => { retries++; });
      if (ok || retries) throw new Error("denial reached retry callback");
    });

    await atest("permission request throw performs no retry work", async () => {
      let retries = 0;
      window.requestAIHostPermissions = () => { throw new Error("permissions unavailable"); };
      const ok = await pbpAiRetryWithPermission(permissionError, {}, () => { retries++; });
      if (ok || retries) throw new Error("throw reached retry callback");
    });

    await atest("ordinary errors retry without requesting permission", async () => {
      let requests = 0, retries = 0;
      window.requestAIHostPermissions = async () => { requests++; return true; };
      const ok = await pbpAiRetryWithPermission(new Error("network"), {}, () => { retries++; });
      if (!ok || requests !== 0 || retries !== 1) throw new Error("ordinary retry was permission-gated");
    });

    function retryAllFixture() {
      const wrap = document.createElement("div");
      wrap.innerHTML = '<button id="tr-retry-all"><span>retry all</span></button>' +
        '<button class="pb-tr-err" data-pb-tr-err="1"><span>retry</span></button>' +
        '<button class="pb-tr-err" data-pb-tr-err="2"><span>retry</span></button>';
      document.body.appendChild(wrap);
      return wrap;
    }
    function retryAllState(error) {
      return {
        s: { aiProvider: "gemini", geminiApiKey: "k", translateGlossary: "" },
        target: { name: "Simplified Chinese", code: "zh-CN" },
        title: "T", url: "https://a.test/x", modelKey: "m", trMd: {},
        work: [1, 2].map((n) => ({ n, hash: "h" + n, shielded: { text: "hello world" } })),
        permissionError: error
      };
    }

    await atest("retry-all denial requests once and skips every failed block", async () => {
      const realStream = window.callAIStream;
      const wrap = retryAllFixture();
      let requests = 0, calls = 0;
      window.requestAIHostPermissions = async () => { requests++; return false; };
      window.callAIStream = async () => { calls++; throw new Error("must not run"); };
      try {
        await _pbpTrRetryAllFailed(retryAllState(permissionError));
        if (requests !== 1 || calls !== 0) throw new Error("requests=" + requests + ", calls=" + calls);
        if (wrap.querySelectorAll(".pb-tr-err").length !== 2) throw new Error("denial consumed a retry pill");
      } finally {
        window.callAIStream = realStream;
        wrap.remove();
      }
    });

    await atest("retry-all grants once then stops at the first renewed permission error", async () => {
      const realStream = window.callAIStream;
      const wrap = retryAllFixture();
      const renewed = new Error("permission revoked");
      renewed.code = "host_permission";
      let requests = 0, calls = 0;
      window.requestAIHostPermissions = async () => { requests++; return true; };
      window.callAIStream = async () => { calls++; throw renewed; };
      const st = retryAllState(permissionError);
      try {
        await _pbpTrRetryAllFailed(st);
        if (requests !== 1 || calls !== 1) throw new Error("requests=" + requests + ", calls=" + calls);
        if (st.permissionError !== renewed) throw new Error("renewed permission error not retained");
        if (wrap.querySelectorAll(".pb-tr-err").length !== 2) throw new Error("later pills were consumed");
      } finally {
        window.callAIStream = realStream;
        wrap.remove();
      }
    });
  } finally {
    window.requestAIHostPermissions = realRequest;
  }
})();
</script>
