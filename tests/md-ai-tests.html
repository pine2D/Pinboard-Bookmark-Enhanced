<script>
let PASS = 0, FAIL = 0, SKIP = 0;

function test(name, fn) {
  const div = document.createElement("div");
  try {
    fn();
    PASS++;
    div.className = "case pass";
    div.textContent = "PASS " + name;
  } catch (e) {
    FAIL++;
    div.className = "case fail";
    div.textContent = "FAIL " + name + "\n  " + e.message;
  }
  document.getElementById("results").appendChild(div);
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

function assertEq(actual, expected, label) {
  if (actual !== expected) {
    throw new Error((label || "assertEq") + ": expected " +
      JSON.stringify(expected) + " got " + JSON.stringify(actual));
  }
}

function suite(name, fn) {
  const div = document.createElement("div");
  div.className = "suite";
  const h = document.createElement("h2");
  h.textContent = name;
  div.appendChild(h);
  const results = document.getElementById("results");
  const savedAppend = results.appendChild;
  results.appendChild = function(el) {
    if (el.className?.includes("case")) div.appendChild(el);
    else savedAppend.call(results, el);
  };
  fn();
  results.appendChild = savedAppend;
  results.appendChild(div);
}

// Skip (not fail) a whole suite while its file/global does not exist yet.
// Later plan tasks register md-ai-core / md-translate / md-ask suites via
// this guard so the page only reports REAL pass/fail.
function suiteIf(name, globalName, fn) {
  if (typeof window[globalName] !== "function") {
    SKIP++;
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP suite " + name + " (" + globalName + " not loaded)";
    document.getElementById("results").appendChild(div);
    return;
  }
  suite(name, fn);
}

window.addEventListener("load", () => {
  const el = document.getElementById("summary");
  el.textContent = "SUMMARY: " + PASS + " passed, " + FAIL + " failed, " + SKIP + " suites skipped";
  el.style.color = FAIL ? "#c00" : "#0a0";
  document.title = (FAIL ? "FAIL " : "PASS ") + document.title;
});
</script>

<script>
// ============ ai.js: _pbpSseChunks ============
suite("_pbpSseChunks", () => {
  test("empty buffer -> no events, empty rest", () => {
    const r = _pbpSseChunks("");
    assertEq(r.events.length, 0, "events");
    assertEq(r.rest, "", "rest");
  });

  test("single complete event", () => {
    const r = _pbpSseChunks('data: {"a":1}\n\n');
    assertEq(r.events.length, 1, "one event");
    assertEq(r.events[0], '{"a":1}', "payload");
    assertEq(r.rest, "", "rest empty");
  });

  test("data without space after colon", () => {
    const r = _pbpSseChunks('data:{"a":1}\n\n');
    assertEq(r.events[0], '{"a":1}', "payload");
  });

  test("incomplete trailing event stays in rest", () => {
    const r = _pbpSseChunks('data: {"a":1}\n\ndata: {"b"');
    assertEq(r.events.length, 1, "one complete");
    assertEq(r.rest, 'data: {"b"', "partial kept");
  });

  test("rest + next chunk completes the event", () => {
    const first = _pbpSseChunks('data: {"a":1}\n\ndata: {"b"');
    const second = _pbpSseChunks(first.rest + ':2}\n\n');
    assertEq(second.events[0], '{"b":2}', "joined across reads");
  });

  test("multiple events in one buffer", () => {
    const r = _pbpSseChunks("data: one\n\ndata: two\n\ndata: three\n\n");
    assertEq(r.events.join("|"), "one|two|three", "all three");
  });

  test("CRLF separators", () => {
    const r = _pbpSseChunks("data: x\r\n\r\ndata: y\r\n\r\n");
    assertEq(r.events.join("|"), "x|y", "both events");
    assertEq(r.rest, "", "rest empty");
  });

  test("[DONE] terminator passes through as event", () => {
    const r = _pbpSseChunks("data: [DONE]\n\n");
    assertEq(r.events[0], "[DONE]", "passthrough");
  });

  test("multi data lines join with newline (SSE spec)", () => {
    const r = _pbpSseChunks("data: line1\ndata: line2\n\n");
    assertEq(r.events[0], "line1\nline2", "joined");
  });

  test("event:/id: lines ignored, data extracted (Claude shape)", () => {
    const r = _pbpSseChunks('event: content_block_delta\ndata: {"t":1}\n\n');
    assertEq(r.events.length, 1, "one event");
    assertEq(r.events[0], '{"t":1}', "data only");
  });

  test("keep-alive comment block yields no event", () => {
    const r = _pbpSseChunks(": keep-alive\n\n");
    assertEq(r.events.length, 0, "ignored");
  });

  test("data: field with no value yields no event", () => {
    const r = _pbpSseChunks("data:\n\n");
    assertEq(r.events.length, 0, "empty data field skipped");
  });
});

suite("_pbpUsageSink + _pbpSseConsumer onRaw", () => {
  test("sink merges input+output across two Claude events, flush fires once", () => {
    const seen = [];
    const sink = _pbpUsageSink(_pbpClaudeUsage, { onUsage: (u) => seen.push(u) });
    sink.onRaw({ type: "message_start", message: { usage: { input_tokens: 10, output_tokens: 1 } } });
    sink.onRaw({ type: "content_block_delta", delta: { type: "text_delta", text: "x" } });
    sink.onRaw({ type: "message_delta", usage: { output_tokens: 42 } });
    assertEq(seen.length, 0, "no call before flush");
    sink.flush();
    assertEq(seen.length, 1, "flush fires exactly once");
    assertEq(JSON.stringify(seen[0]), JSON.stringify({ inTok: 10, outTok: 42 }), "merged in/out");
  });
  test("last non-null wins per field (Gemini cumulative repeats)", () => {
    const seen = [];
    const sink = _pbpUsageSink(_pbpGeminiUsage, { onUsage: (u) => seen.push(u) });
    sink.onRaw({ usageMetadata: { promptTokenCount: 50, candidatesTokenCount: 5 } });
    sink.onRaw({ usageMetadata: { promptTokenCount: 50, candidatesTokenCount: 30 } });
    sink.flush();
    assertEq(JSON.stringify(seen[0]), JSON.stringify({ inTok: 50, outTok: 30 }), "last cumulative wins");
  });
  test("no usage seen -> flush does not call onUsage", () => {
    let called = 0;
    const sink = _pbpUsageSink(_pbpOpenAIUsage, { onUsage: () => { called++; } });
    sink.onRaw({ choices: [{ delta: { content: "hi" } }] });
    sink.flush();
    assertEq(called, 0, "no usage -> no call");
  });
  test("missing opts.onUsage tolerated (no throw)", () => {
    const sink = _pbpUsageSink(_pbpOpenAIUsage, {});
    sink.onRaw({ usage: { prompt_tokens: 1, completion_tokens: 2 } });
    sink.flush();
    assert(true, "no throw when onUsage absent");
  });
  test("_pbpSseConsumer calls onRaw once per parsed JSON chunk, skips [DONE]", () => {
    const raw = [];
    const consume = _pbpSseConsumer(_pbpOpenAIDelta, () => {}, (obj) => raw.push(obj));
    consume('data: {"choices":[{"delta":{"content":"a"}}]}\n\n' +
            'data: {"choices":[],"usage":{"prompt_tokens":3,"completion_tokens":4}}\n\n' +
            'data: [DONE]\n\n', true);
    assertEq(raw.length, 2, "two JSON chunks seen, [DONE] skipped");
    assertEq(raw[1].usage.completion_tokens, 4, "second chunk is the usage chunk");
  });
  test("extractor exception inside sink.onRaw is swallowed (degrade, no throw)", () => {
    const sink = _pbpUsageSink(() => { throw new Error("boom"); }, { onUsage: () => {} });
    sink.onRaw({ any: 1 });
    sink.flush();
    assert(true, "extractor throw degraded");
  });
  test("throwing onUsage consumer does not escape flush() (side channel must not break the stream)", () => {
    const sink = _pbpUsageSink(_pbpOpenAIUsage, { onUsage: () => { throw new Error("boom"); } });
    sink.onRaw({ usage: { prompt_tokens: 1, completion_tokens: 2 } });
    let threw = false;
    try { sink.flush(); } catch (_) { threw = true; }
    assertEq(threw, false, "flush() must swallow a throwing onUsage callback");
  });
});
</script>

<script>
// ============ ai.js: _pbpChainAbort ============
suite("_pbpChainAbort", () => {
  test("no parent -> fresh non-aborted controller", () => {
    const c = _pbpChainAbort(undefined);
    assert(c instanceof AbortController, "is AbortController");
    assertEq(c.signal.aborted, false, "not aborted");
  });
  test("pre-aborted parent -> chained aborted immediately", () => {
    const parent = new AbortController();
    parent.abort();
    const c = _pbpChainAbort(parent.signal);
    assertEq(c.signal.aborted, true, "aborted at creation");
  });
  test("parent abort propagates to chained", () => {
    const parent = new AbortController();
    const c = _pbpChainAbort(parent.signal);
    assertEq(c.signal.aborted, false, "starts live");
    parent.abort();
    assertEq(c.signal.aborted, true, "propagated");
  });
  test("chained abort does NOT abort parent (idle timeout must not cancel caller signal)", () => {
    const parent = new AbortController();
    const c = _pbpChainAbort(parent.signal);
    c.abort();
    assertEq(parent.signal.aborted, false, "parent untouched");
  });
});
</script>

<script>
// ============ Task 3: pbpAiHash (FNV-1a 32-bit hex) ============
suite("pbpAiHash", () => {
  test("empty string is FNV offset basis", () => {
    assert(pbpAiHash("") === "811c9dc5", "got " + pbpAiHash(""));
  });
  test("known vector 'a'", () => {
    assert(pbpAiHash("a") === "e40c292c", "got " + pbpAiHash("a"));
  });
  test("known vector 'foobar'", () => {
    assert(pbpAiHash("foobar") === "bf9cf968", "got " + pbpAiHash("foobar"));
  });
  test("always 8 lowercase hex chars", () => {
    assert(/^[0-9a-f]{8}$/.test(pbpAiHash("x")), "shape");
    assert(/^[0-9a-f]{8}$/.test(pbpAiHash("longer input string here")), "shape long");
  });
  test("CJK input deterministic and distinct", () => {
    assert(pbpAiHash("你好") === pbpAiHash("你好"), "deterministic");
    assert(pbpAiHash("你好") !== pbpAiHash("你坏"), "distinct");
  });

// ============ Task 3: block indexer + textOf/mdOf ============
suite("pbpAiIndexBlocks family", () => {
  function makeRoot(html) {
    const d = document.createElement("div");
    d.innerHTML = html;
    return d;
  }
  test("indexes only block tags, 1-based, sets data-pb", () => {
    const root = makeRoot("<h2>T</h2><p>one</p><div>skip</div><ul><li>a</li></ul><pre><code>x</code></pre>");
    const blocks = pbpAiIndexBlocks(root);
    assert(blocks.length === 4, "4 blocks, got " + blocks.length);
    assert(blocks[0].n === 1 && blocks[0].tag === "h2", "first is h2 n=1");
    assert(blocks[1].el.dataset.pb === "2", "data-pb assigned");
    assert(blocks[3].tag === "pre", "pre indexed");
    assert(root.querySelector("div").dataset.pb === undefined, "div skipped");
  });
  test("pbpAiBlocks returns stored index; pbpAiBlockEl resolves", () => {
    const root = makeRoot("<p>a</p><p>b</p>");
    pbpAiIndexBlocks(root);
    assert(pbpAiBlocks().length === 2, "2 blocks");
    assert(pbpAiBlockEl(2).textContent === "b", "blockEl(2)");
    assert(pbpAiBlockEl(99) === null, "out of range null");
    assert(pbpAiBlockEl(0) === null, "0 null");
  });
  test("pbpAiTextOf returns textContent and caches", () => {
    const root = makeRoot("<p>hello <strong>world</strong></p>");
    pbpAiIndexBlocks(root);
    assert(pbpAiTextOf(1) === "hello world", "textContent");
    root.querySelector("p").textContent = "changed";
    assert(pbpAiTextOf(1) === "hello world", "cached after DOM change");
  });
  test("pbpAiMdOf converts block markdown and caches", () => {
    const root = makeRoot('<p>see <strong>bold</strong> and <a href="https://x.test/">link</a></p>');
    pbpAiIndexBlocks(root);
    const md = pbpAiMdOf(1);
    assert(md.indexOf("**bold**") !== -1, "bold survives: " + md);
    assert(md.indexOf("](https://x.test/)") !== -1, "link survives: " + md);
    root.querySelector("p").textContent = "changed";
    assert(pbpAiMdOf(1) === md, "cached");
  });
  test("pbpAiMdOf KaTeX pre-pass: inline .katex becomes $tex$", () => {
    const root = makeRoot('<p>mass <span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">E=mc^2</annotation></semantics></math></span><span class="katex-html" aria-hidden="true">Emc2glyphs</span></span> end</p>');
    pbpAiIndexBlocks(root);
    const md = pbpAiMdOf(1);
    assert(md.indexOf("$E=mc^2$") !== -1, "tex source restored: " + md);
    assert(md.indexOf("Emc2glyphs") === -1, "rendered glyphs dropped: " + md);
  });
  test("pbpAiMdOf KaTeX pre-pass: .katex-display becomes $$tex$$", () => {
    const root = makeRoot('<p><span class="katex-display"><span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">x+y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true">xyglyphs</span></span></span></p>');
    pbpAiIndexBlocks(root);
    const md = pbpAiMdOf(1);
    assert(md.indexOf("$$x+y$$") !== -1, "display tex wrapped: " + md);
    assert(md.indexOf("xyglyphs") === -1, "glyphs dropped: " + md);
  });
  test("re-index resets caches", () => {
    pbpAiIndexBlocks(makeRoot("<p>first</p>"));
    assert(pbpAiTextOf(1) === "first", "first root");
    pbpAiIndexBlocks(makeRoot("<p>second</p>"));
    assert(pbpAiTextOf(1) === "second", "cache reset");
  });
  test("pbpAiTextOfKatex (D10-1): plain blocks match pbpAiTextOf", () => {
    const root = makeRoot("<p>hello <strong>world</strong></p>");
    pbpAiIndexBlocks(root);
    assert(pbpAiTextOfKatex(1) === "hello world", "plain block unaffected: " + pbpAiTextOfKatex(1));
  });
  test("pbpAiTextOfKatex (D10-1): rendered KaTeX block yields $tex$, not the expanded glyph+MathML string", () => {
    const root = makeRoot('<p>mass <span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">E=mc^2</annotation></semantics></math></span><span class="katex-html" aria-hidden="true">Emc2glyphs</span></span> end</p>');
    pbpAiIndexBlocks(root);
    const text = pbpAiTextOfKatex(1);
    assert(text.indexOf("$E=mc^2$") !== -1, "tex source present: " + text);
    assert(text.indexOf("Emc2glyphs") === -1, "rendered glyphs dropped: " + text);
    // Independent cache: the plain (non-KaTeX-aware) variant still sees the raw expansion.
    assert(pbpAiTextOf(1).indexOf("Emc2glyphs") !== -1, "pbpAiTextOf unaffected: " + pbpAiTextOf(1));
  });
  test("pbpAiTextOfKatex (D10-1): caches and re-index resets its cache separately from pbpAiTextOf's", () => {
    const root = makeRoot('<p><span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">x+y</annotation></semantics></math></span><span class="katex-html">xyglyphs</span></span></p>');
    pbpAiIndexBlocks(root);
    const first = pbpAiTextOfKatex(1);

    assert(pbpAiTextOfKatex(1) === first, "cached across DOM mutation");

  });
  test("pbpAiTextOfKatex (D10-1): degrades to pbpAiTextOf if the KaTeX prepass throws", () => {
    const root = makeRoot('<p>x <span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">a</annotation></semantics></math></span><span class="katex-html">glyphs</span></span></p>');
    pbpAiIndexBlocks(root);
    const orig = _pbpAiKatexPrepass;
    _pbpAiKatexPrepass = () => { throw new Error("boom"); };
    try {
      const text = pbpAiTextOfKatex(1);
      assert(text.indexOf("glyphs") !== -1, "degrade falls back to plain textContent, no throw: " + text);
    } finally {
      _pbpAiKatexPrepass = orig;
    }
  });
  test("pbpAiBlocksFingerprint: stable for the same block text, changes when it differs", () => {
    pbpAiIndexBlocks(makeRoot("<p>one</p><p>two</p>"));

    pbpAiIndexBlocks(makeRoot("<p>one</p><p>two</p>"));
    assert(pbpAiBlocksFingerprint() === fp1, "same text -> same fingerprint");
    pbpAiIndexBlocks(makeRoot("<p>one</p><p>three</p>"));
    assert(pbpAiBlocksFingerprint() !== fp1, "different text -> different fingerprint");
    pbpAiIndexBlocks(makeRoot("<p>one</p>"));
    assert(pbpAiBlocksFingerprint() !== fp1, "different block count -> different fingerprint");
  });
  test("H1/H5/H6 are indexed as block tags", () => {

  });
  test("top-level DIV wrapping the whole article: descends one level into its block children", () => {
    const root = makeRoot('<div id="wrap"><h2>Title</h2><p>one</p><p>two</p></div>');
    const blocks = pbpAiIndexBlocks(root);
    assertEq(blocks.length, 3, "3 blocks recovered from inside the wrapper");
    assertEq(blocks.map((b) => b.tag).join(","), "h2,p,p", "tags in document order");
    assertEq(root.querySelector("#wrap").dataset.pb, undefined, "wrapper itself is not a block");
  });
  test("container descent interleaves with top-level blocks in document order", () => {
    const root = makeRoot("<p>lead</p><section><h3>inside</h3><p>inner</p></section><p>trail</p>");
    const blocks = pbpAiIndexBlocks(root);

      "lead,inside,inner,trail", "document order preserved across the container boundary");

  test("container-of-containers: descent is exactly one level, nested wrapper yields nothing", () => {
    const root = makeRoot("<div><div><p>buried two levels deep</p></div></div>");

  });

    const blocks = pbpAiIndexBlocks(root);
    assertEq(blocks.length, 1, "one block recovered from the article wrapper");
    assertEq(blocks[0].tag, "p", "p indexed");
  });
});

suiteIf("pbpForumMarkComments", "pbpForumMarkComments", () => {
  function root(html) { const d = document.createElement("div"); d.innerHTML = html; return d; }
  // A comment's own text = the .pb-comment-body directly inside a blockquote,
  // EXCLUDING nested reply blockquotes (which sit as siblings of the wrapper).
  const bodyText = (bq) => {
    const b = Array.from(bq.children).find((c) => c.className === "pb-comment-body");
    return b ? b.textContent.trim() : null;
  };

  test("non-nested blockquote -> one comment body, content preserved, no extra nesting", () => {
    const r = root("<blockquote><p><strong>#1 · alice</strong></p><p>body one</p></blockquote>");
    pbpForumMarkComments(r);
    const bq = r.querySelector(":scope > blockquote");
    assertEq(r.querySelectorAll(".pb-comment-body").length, 1, "one comment body");
    assert(/#1 · alice/.test(bodyText(bq)) && /body one/.test(bodyText(bq)), "own content in wrapper");
    assert(!bq.querySelector("blockquote"), "no residual nesting");
  });

  test("2-level nest -> nesting preserved, 2 comment bodies, pre-order [A,B]", () => {
    const r = root("<blockquote><p>A</p><blockquote><p>B</p></blockquote></blockquote>");
    pbpForumMarkComments(r);
    assertEq(r.querySelectorAll(".pb-comment-body").length, 2, "two bodies");
    // nesting kept: inner blockquote still inside the outer one
    assert(r.querySelector(":scope > blockquote > blockquote"), "still nested");
    const bodies = Array.from(r.querySelectorAll(".pb-comment-body")).map((b) => b.textContent.trim());
    assertEq(bodies.join(","), "A,B", "document (pre) order");
    // wrapper precedes the reply blockquote inside the outer comment
    const outer = r.querySelector(":scope > blockquote");
    assertEq(outer.children[0].className, "pb-comment-body", "wrapper is first child");
    assertEq(outer.children[1].tagName, "BLOCKQUOTE", "reply blockquote follows wrapper");
  });

  test("3-level with sibling -> pre-order n1,n2,n4,n3; depth preserved", () => {
    const r = root(
      "<blockquote><p>n1</p>" +
        "<blockquote><p>n2</p><blockquote><p>n4</p></blockquote></blockquote>" +
        "<blockquote><p>n3</p></blockquote>" +
      "</blockquote>");
    pbpForumMarkComments(r);
    const bodies = Array.from(r.querySelectorAll(".pb-comment-body")).map((b) => b.textContent.trim());
    assertEq(bodies.join(","), "n1,n2,n4,n3", "pre-order");
    assert(r.querySelector(":scope > blockquote > blockquote > blockquote"), "3 levels deep kept");
  });

  test("empty shell (only child blockquotes) gets no wrapper; child still marked", () => {
    const r = root("<blockquote><blockquote><p>only child</p></blockquote></blockquote>");
    pbpForumMarkComments(r);
    assertEq(r.querySelectorAll(".pb-comment-body").length, 1, "one body (shell skipped)");
    assertEq(r.querySelector(".pb-comment-body").textContent.trim(), "only child", "child content");
    // outer shell has no own body wrapper
    const outer = r.querySelector(":scope > blockquote");
    assert(!Array.from(outer.children).some((c) => c.className === "pb-comment-body"), "shell unwrapped");
  });

  test("non-blockquote top-level elements untouched, order preserved", () => {
    const r = root("<h2>Replies</h2><blockquote><p>c1</p><blockquote><p>c2</p></blockquote></blockquote><p>after</p>");
    pbpForumMarkComments(r);
    const kids = Array.from(r.children).map((e) => e.tagName);
    assertEq(kids.join(","), "H2,BLOCKQUOTE,P", "top-level order + tags intact");
    assertEq(r.querySelector("h2").textContent, "Replies", "h2 intact");
    assertEq(r.querySelector(":scope > p").textContent, "after", "trailing p intact");
    assertEq(r.querySelectorAll(".pb-comment-body").length, 2, "two comment bodies inside the thread");
  });

  test("trailing non-blockquote after a reply stays in place (A,B,C order kept)", () => {
    const r = root("<blockquote><p>A</p><blockquote><p>B</p></blockquote><p>C</p></blockquote>");
    pbpForumMarkComments(r);
    // document order must remain A, B, C — the trailing <p>C</p> must NOT hoist above the reply
    assertEq(r.textContent.replace(/\s+/g, ""), "ABC", "order preserved");
    const outer = r.querySelector(":scope > blockquote");
    assertEq(outer.children[0].className, "pb-comment-body", "leading A wrapped");
    assertEq(outer.children[0].textContent.trim(), "A", "only leading A in the wrapper");
    assertEq(outer.children[1].tagName, "BLOCKQUOTE", "reply blockquote second");
    assertEq(outer.children[2].tagName, "P", "trailing C stays as a bare sibling");
    assertEq(outer.children[2].textContent.trim(), "C", "C in place");
  });

  test("null root is a no-op (no throw)", () => {
    pbpForumMarkComments(null);
    assert(true, "no throw");
  });
});

  });
  test("link URL shielded but link text stays translatable", () => {
    const r = pbpAiShield("see [Example Site](https://e.test/a?b=1) here");
    assert(r.text === "see [Example Site](⟦L1⟧) here", "got: " + r.text);

  });
  test("image shielded whole", () => {
    const r = pbpAiShield("pic ![alt text](https://i.test/p.png) end");

  });
  test("bare URL shielded", () => {

  });
  test("display and inline math shielded as M", () => {
    const r = pbpAiShield("eq $$x+y$$ and $E=mc^2$ done");
    assert(r.text === "eq ⟦M1⟧ and ⟦M2⟧ done", "got: " + r.text);
    assert(r.slots[0].orig === "$$x+y$$" && r.slots[1].orig === "$E=mc^2$", "math origs");
  });
  test("currency-like dollars left alone", () => {
    const r = pbpAiShield("it costs $5 and later $6 total");
    assert(r.text === "it costs $5 and later $6 total", "got: " + r.text);
    assert(r.slots.length === 0, "no slots");
  });
  test("math with TeX chars and spaces still shielded", () => {
    const r = pbpAiShield("so $a = b$ holds");
    assert(r.text === "so ⟦M1⟧ holds", "= marks TeX: " + r.text);
  });
  test("dollar inside inline code stays C, not M", () => {
    const r = pbpAiShield("price `$5` here");
    assert(r.slots.length === 1 && r.slots[0].ph === "⟦C1⟧", "code wins");
  });
  test("numbering increases per kind independently", () => {
    const r = pbpAiShield("`a` then `b` and https://u1.test/ plus https://u2.test/");
    const phs = r.slots.map((s) => s.ph).join(",");
    assert(phs === "⟦C1⟧,⟦C2⟧,⟦L1⟧,⟦L2⟧", "got: " + phs);
  });
  test("empty input", () => {
    const r = pbpAiShield("");
    assert(r.text === "" && r.slots.length === 0, "empty ok");
  });
  test("pre-existing placeholder-shaped literal text is absorbed into its own slot", () => {
    const r = pbpAiShield("literal ⟦C1⟧ then `real code`");
    assertEq(r.slots.length, 2, "two slots, got " + r.slots.length);
    assertEq(r.slots[0].orig, "⟦C1⟧", "absorbed literal orig");
    assertEq(r.slots[1].orig, "`real code`", "real code orig");
    assert(r.slots[0].ph !== r.slots[1].ph, "distinct placeholders: " + r.slots[0].ph + " vs " + r.slots[1].ph);
  });
  test("round trip preserves literal placeholder text without corrupting real code", () => {
    const md = "literal ⟦C1⟧ then `real code`";
    const r = pbpAiShield(md);
    assertEq(pbpAiRestore(r.text, r.slots), md, "round trip");
  });
});

suite("pbpAiRestore", () => {
  test("round trip is identity on composite markdown", () => {
    const md = "Intro `code $x$` with [link](https://e.test/p) and ![img](https://i.test/i.png), math $$x+y$$ plus $E=mc^2$ and bare https://b.test/ end";
    const r = pbpAiShield(md);
    assert(r.slots.length === 6, "6 slots, got " + r.slots.length);
    assert(pbpAiRestore(r.text, r.slots) === md, "round trip");
  });
  test("duplicated placeholder restored at every occurrence", () => {
    const slots = [{ ph: "⟦C1⟧", orig: "`x`" }];
    assert(pbpAiRestore("⟦C1⟧ and ⟦C1⟧", slots) === "`x` and `x`", "both replaced");
  });
  test("missing placeholder tolerated (no throw, text unchanged)", () => {
    const slots = [{ ph: "⟦C1⟧", orig: "`x`" }];
    assert(pbpAiRestore("no placeholders here", slots) === "no placeholders here", "unchanged");
  });
  test("null slots tolerated", () => {
    assert(pbpAiRestore("abc", null) === "abc", "null slots");
  });
  test("restore is non-cascading when a slot original contains a placeholder-like sequence", () => {
    const md = "`⟦C2⟧ literal` and `second`";
    const sh = pbpAiShield(md);
    assertEq(pbpAiRestore(sh.text, sh.slots), md, "no cascade");
  });
  test("KNOWN BOUNDARY: descending bare absorbed-literal placeholders swap on restore", () => {
    // Outside the reverse-order guarantee documented at md-ai-core.js pbpAiRestore:
    // that guarantee unwinds NESTING (a later slot's orig only ever embeds an
    // earlier-minted ph). Here both ⟦C2⟧ and ⟦C1⟧ are bare pre-existing literals
    // absorbed by the first shield pass, so their origs ARE placeholder strings,
    // not markdown containing one -- absorption order (left-to-right in source)
    // mints ⟦C1⟧ for the ⟦C2⟧ literal and ⟦C2⟧ for the ⟦C1⟧ literal, so restore
    // walks newest-first into an unintended swap instead of a clean round trip.
    // Pinned as documented/accepted (real content doesn't emit this shape); if a
    // future fix changes this output, update this pin consciously.
    const md = "⟦C2⟧ and ⟦C1⟧";
    const sh = pbpAiShield(md);
    assertEq(pbpAiRestore(sh.text, sh.slots), "⟦C2⟧ and ⟦C2⟧", "documented swap boundary, not a faithful round trip");
  });
  test("nested placeholder: image alt containing inline code restores both levels", () => {
    // I-pass runs after C-pass, so the image's whole-match swallows the already-
    // shielded code placeholder into I1.orig (see md-ai-core.js:181 pbpAiShield doc).
    const md = "See ![see `config.yaml`](d.png) flow.";
    const r = pbpAiShield(md);
    assertEq(r.text, "See ⟦I1⟧ flow.", "shielded to single top-level placeholder");
    assertEq(r.slots.length, 2, "2 slots: C1 (code) + I1 (image, orig embeds ⟦C1⟧)");
    assert(r.slots[1].orig.indexOf("⟦C1⟧") !== -1, "I1.orig embeds C1's placeholder: " + r.slots[1].orig);
    assertEq(pbpAiRestore(r.text, r.slots), md, "both levels restored, no literal ⟦C1⟧ left over");
  });
  test("nested placeholder: display math containing inline code restores both levels", () => {
    const md = "eq $$x_i = `f(x)`$$ done";
    const r = pbpAiShield(md);
    assertEq(pbpAiRestore(r.text, r.slots), md, "math+code nesting restored");
  });
});

suite("pbpAiMakeStreamJsonParser", () => {
  test("no item fired on incomplete object; fires once when closed", () => {
    const got = [];
    const p = pbpAiMakeStreamJsonParser((it) => got.push(it));
    p.push('{"translations":[{"id":1,"text":"hel');
    assert(got.length === 0, "incomplete: none fired");
    p.push('{"translations":[{"id":1,"text":"hello"}');
    assert(got.length === 1 && got[0].id === 1 && got[0].text === "hello", "fired on close");
    p.push('{"translations":[{"id":1,"text":"hello"},');
    assert(got.length === 1, "same id never re-fired");
  });
  test("multiple items across accumulated pushes, in order", () => {
    const got = [];
    const p = pbpAiMakeStreamJsonParser((it) => got.push(it.id));
    const full = '{"translations":[{"id":3,"text":"a"},{"id":7,"text":"b"}]}';
    p.push(full.slice(0, 30));
    p.push(full);
    assert(got.join(",") === "3,7", "got: " + got.join(","));
  });
  test("escaped quotes and braces inside text decoded", () => {
    const got = [];
    const p = pbpAiMakeStreamJsonParser((it) => got.push(it));
    p.push('{"translations":[{"id":2,"text":"say \\"hi\\" {ok}"}]}');
    assert(got[0].text === 'say "hi" {ok}', "got: " + got[0].text);
  });
  test("finish tolerant sweep catches text-first key order", () => {
    const got = [];
    const p = pbpAiMakeStreamJsonParser((it) => got.push(it.id));
    const full = '{"translations":[{"text":"x","id":4},{"id":5,"text":"y"}]}';
    p.push(full);
    assert(got.indexOf(5) !== -1 && got.indexOf(4) === -1, "incremental got id-first only");
    const fin = p.finish(full);
    assert(got.indexOf(4) !== -1, "finish swept text-first item");
    assert(fin.seenIds instanceof Set && fin.seenIds.has(4) && fin.seenIds.has(5), "seenIds");
  });
  test("finish strips markdown fences", () => {
    const got = [];
    const p = pbpAiMakeStreamJsonParser((it) => got.push(it.id));
    const fin = p.finish('```json\n{"translations":[{"id":9,"text":"z"}]}\n```');
    assert(got.join(",") === "9" && fin.seenIds.has(9), "fenced JSON parsed");
  });
  test("finish on garbage returns empty seenIds without throwing", () => {
    const p = pbpAiMakeStreamJsonParser(() => {});
    const fin = p.finish("sorry, I cannot do that");
    assert(fin.seenIds instanceof Set && fin.seenIds.size === 0, "empty set");
  });
});

  test("streaming truncation mid-block does not throw", () => {

    assert(r.cites.length === 2, "2 cites, got " + r.cites.length);

  });
  test("full-width colon marker + CJK corner quotes are tolerated", () => {

    assert(r.body.indexOf("这一行是正文说明") !== -1 && r.body.indexOf("后文") !== -1, "prose CITES line kept in body");

<script>
// ============ D2-2: pbpAiCacheAppend / pbpAskHistAppend (async, real IDB) ============
// Real IndexedDB (this page loads over file://, which Chromium supports) -
// these exercise the actual atomic get-then-put transaction, not a mock.
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "pbpAiCacheAppend / pbpAskHistAppend (async, D2-2)";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  if (typeof pbpAiCacheAppend !== "function" || typeof pbpAskHistAppend !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP pbpAiCacheAppend/pbpAskHistAppend (not loaded)";
    host.appendChild(div); SKIP++; return;
  }
  await atest("first append on a missing key seeds from undefined", async () => {
    const key = "test_append_seed_" + Date.now() + "_" + Math.random();
    await pbpAiCacheAppend(key, (prev) => (Array.isArray(prev) ? prev : []).concat(["a"]));
    const entry = await pbpAiCacheGet(key);
    assert(entry && Array.isArray(entry.result) && entry.result.join(",") === "a", "seeded: " + JSON.stringify(entry));
  });
  await atest("sequential appends accumulate in order", async () => {
    const key = "test_append_seq_" + Date.now() + "_" + Math.random();
    await pbpAiCacheAppend(key, (prev) => (Array.isArray(prev) ? prev : []).concat(["a"]));
    await pbpAiCacheAppend(key, (prev) => (Array.isArray(prev) ? prev : []).concat(["b"]));
    const entry = await pbpAiCacheGet(key);
    assertEq(entry.result.join(","), "a,b", "both entries present in order");
  });
  await atest("concurrent appends never lose an update (D2-2 race closed)", async () => {
    // The bug this closes: pbpAskHistGet()+push+pbpAskHistSet() is TWO
    // separate IDB transactions, so two callers racing a get-then-put on
    // the same key can silently drop one caller's entry (last-writer-wins).
    // pbpAiCacheAppend does it in ONE transaction; fire two concurrently
    // against the same key and assert neither push is lost.
    const key = "test_append_race_" + Date.now() + "_" + Math.random();
    await Promise.all([
      pbpAiCacheAppend(key, (prev) => (Array.isArray(prev) ? prev : []).concat(["x"])),
      pbpAiCacheAppend(key, (prev) => (Array.isArray(prev) ? prev : []).concat(["y"]))
    ]);
    const entry = await pbpAiCacheGet(key);
    assertEq(entry.result.length, 2, "both concurrent pushes survived: " + JSON.stringify(entry && entry.result));
  });
  await atest("pbpAskHistAppend appends a round and trims to 20 (PBP_ASK_HIST_MAX)", async () => {
    const url = "https://append-test.example/" + Date.now() + "_" + Math.random();
    for (let i = 1; i <= 22; i++) await pbpAskHistAppend(url, { q: "q" + i });
    const hist = await pbpAskHistGet(url);
    assertEq(hist.length, 20, "capped at 20, got " + hist.length);
    assertEq(hist[0].q, "q3", "oldest 2 dropped");
    assertEq(hist[19].q, "q22", "newest kept");
  });
  await atest("pbpAskHistReplaceLast replaces only the matching last question", async () => {
    const url = "https://replace-last.example/" + Date.now() + "_" + Math.random();
    await pbpAskHistAppend(url, { q: "q1", a: "a1" });
    await pbpAskHistAppend(url, { q: "q2", a: "old" });
    await pbpAskHistReplaceLast(url, { q: "q2", a: "new" });
    let hist = await pbpAskHistGet(url);
    assertEq(hist.length, 2, "replace keeps length");
    assertEq(hist[1].a, "new", "last matching round replaced");
    await pbpAskHistReplaceLast(url, { q: "q3", a: "third" });
    hist = await pbpAskHistGet(url);
    assertEq(hist.length, 3, "mismatched last appends instead");
    assertEq(hist[2].q, "q3", "new round appended");
  });
  await atest("translation, glossary, and view caches isolate A, B, ownerless, and legacy namespaces", async () => {
    const url = "https://translate-scope.example/" + Date.now() + "_" + Math.random();
    const lang = "zh-CN", model = "gemini:test", hash = pbpAiHash(url);
    await pbpAiCacheSet("tr_" + lang + "_" + model + "_" + hash, { blocks: { legacy: "old" } }, Date.now());
    await pbpAiCacheSet("gloss_" + lang + "_" + model + "_" + hash, { terms: { legacy: "old" } }, Date.now());
    await pbpAiCacheSet("trview_" + hash, { mode: "translated", lang }, Date.now());
    assertEq(await pbpTrCacheGet(url, lang, model, ""), null, "ownerless must miss legacy translation");
    assertEq(await pbpTrGlossaryCacheGet(url, lang, model, ""), null, "ownerless must miss legacy glossary");
    assertEq(await pbpTrViewGet(url, ""), null, "ownerless must miss legacy view");

    await pbpTrCacheSet(url, lang, model, { a: "Alice" }, "alice");
    assertEq(await pbpTrCacheGet(url, lang, model, "bob"), null, "Bob translation miss");
    assertEq((await pbpTrCacheGet(url, lang, model, "alice")).blocks.a, "Alice", "Alice translation hit");
    await pbpTrCacheSet(url, lang, model, { o: "Ownerless" }, "");
    assertEq((await pbpTrCacheGet(url, lang, model, "")).blocks.o, "Ownerless", "ownerless new namespace hit");

    await pbpTrGlossaryCacheSet(url, lang, model, { term: "Alice" }, "alice");
    assertEq(await pbpTrGlossaryCacheGet(url, lang, model, "bob"), null, "Bob glossary miss");
    assertEq((await pbpTrGlossaryCacheGet(url, lang, model, "alice")).term, "Alice", "Alice glossary hit");
    await pbpTrGlossaryCacheSet(url, lang, model, { term: "Ownerless" }, "");
    assertEq((await pbpTrGlossaryCacheGet(url, lang, model, "")).term, "Ownerless", "ownerless new glossary hit");

    await pbpTrViewSet(url, { mode: "bilingual", lang }, "alice");
    assertEq(await pbpTrViewGet(url, "bob"), null, "Bob view miss");
    assertEq((await pbpTrViewGet(url, "alice")).mode, "bilingual", "Alice view hit");
    await pbpTrViewSet(url, { mode: "translated", lang }, "");
    assertEq((await pbpTrViewGet(url, "")).mode, "translated", "ownerless new view hit");
  });
})();
</script>

suiteIf("pbpTrPackBatches", "pbpTrPackBatches", () => {
  function segs(n, len) {
    const out = [];
    for (let i = 1; i <= n; i++) out.push({ id: i, text: "x".repeat(len) });
    return out;
  }
  test("empty input -> no batches", () => {
    assertEq(pbpTrPackBatches([]).length, 0, "empty");
    assertEq(pbpTrPackBatches(null).length, 0, "null tolerated");
  });
  test("small blocks pack into one batch, order kept", () => {
    const b = pbpTrPackBatches([{ id: 1, text: "a" }, { id: 2, text: "b" }, { id: 5, text: "c" }]);
    assertEq(b.length, 1, "one batch");
    assertEq(b[0].map((s) => s.id).join(","), "1,2,5", "doc order");
    assertEq(b[0][2].text, "c", "text carried");
  });
  test("default maxBlocks=15: 16 tiny blocks -> [15,1]", () => {
    const b = pbpTrPackBatches(segs(16, 2));
    assertEq(b.length, 2, "two batches");
    assertEq(b[0].length, 15, "first 15");
    assertEq(b[1].length, 1, "last 1");
    assertEq(b[1][0].id, 16, "id 16 in second");
  });
  test("default maxChars=8000: 3000-char blocks pack two per batch", () => {
    const b = pbpTrPackBatches(segs(5, 3000));
    assertEq(b.map((x) => x.length).join(","), "2,2,1", "char-bounded");
  });
  test("single oversize block still gets its own batch (never dropped)", () => {
    const b = pbpTrPackBatches([{ id: 1, text: "x".repeat(9000) }, { id: 2, text: "y" }]);
    assertEq(b.length, 2, "split");
    assertEq(b[0][0].id, 1, "oversize alone");
    assertEq(b[1][0].id, 2, "next starts fresh");
  });
  test("custom limits honored", () => {
    const b = pbpTrPackBatches(segs(5, 10), 2, 1000);
    assertEq(b.map((x) => x.length).join(","), "2,2,1", "maxBlocks=2");
    const c = pbpTrPackBatches(segs(4, 60), 15, 100);
    assertEq(c.map((x) => x.length).join(","), "1,1,1,1", "maxChars=100");
  });
  test("oversize block in middle flushes preceding batch first", () => {
    const b = pbpTrPackBatches([
      { id: 1, text: "x".repeat(100) },
      { id: 2, text: "x".repeat(9000) },

suiteIf("_pbpTrSplitText", "_pbpTrSplitText", () => {

// ============ D4-2: _pbpStreamRead offline classification (async) ============
// Ask/Translate both funnel every provider's streaming call through this one
// catch block. Verifies the new network-disconnect branch fires only for a
// genuine offline signal, and leaves handleAIError / AbortError untouched.
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "_pbpStreamRead offline classification (D4-2, async)";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  function ok(cond, msg) { if (!cond) throw new Error(msg || "assert"); }
  if (typeof _pbpStreamRead !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP _pbpStreamRead suite (not loaded)";
    host.appendChild(div);
    return;
  }
  const noopConsume = () => "";
  const realFetch = window.fetch;
  const realChrome = window.chrome;
  const onlineDesc = Object.getOwnPropertyDescriptor(navigator, "onLine");
  // This file:// harness has no extension context, so t()'s chrome.i18n.getMessage
  // call would throw — which the implementation must (and does) survive via its own
  // internal try/catch, degrading to the raw error (see the dedicated degrade-path
  // test below). To exercise the HAPPY path too, stub chrome.i18n like the existing
  // K2 signal suite does (search "Stub chrome.i18n" above).
  const STUB_OFFLINE_MSG = "STUB: network error, check connection";
  window.chrome = { i18n: { getMessage: (key) => key === "pinboardErrorOffline" ? STUB_OFFLINE_MSG : "" } };
  try {
    await atest("offline TypeError('Failed to fetch') -> localized network error, code='network'", async () => {
      window.fetch = async () => { throw new TypeError("Failed to fetch"); };
      let caught = null;
      try { await _pbpStreamRead("https://example.test/x", {}, {}, "API", noopConsume); }
      catch (e) { caught = e; }
      ok(caught, "expected a rejection");
      ok(caught.code === "network", "code should be network, got " + caught.code);
      ok(caught.message === STUB_OFFLINE_MSG, "message should reuse pinboardErrorOffline via t(), got: " + caught.message);
    });

    await atest("navigator.onLine===false with a non-TypeError fetch failure is still classified as network", async () => {
      Object.defineProperty(navigator, "onLine", { value: false, configurable: true });
      window.fetch = async () => { throw new Error("network unreachable"); };
      let caught = null;
      try { await _pbpStreamRead("https://example.test/x", {}, {}, "API", noopConsume); }
      catch (e) { caught = e; }
      if (onlineDesc) Object.defineProperty(navigator, "onLine", onlineDesc); else delete navigator.onLine;
      ok(caught && caught.code === "network", "onLine=false should still classify as network");
    });

    await atest("regression guard: handleAIError HTTP errors are NOT reclassified as network", async () => {
      window.fetch = async () => ({
        ok: false, status: 500,
        json: async () => ({ error: { message: "boom" } })
      });
      let caught = null;
      try { await _pbpStreamRead("https://example.test/x", {}, {}, "API", noopConsume); }
      catch (e) { caught = e; }
      ok(caught, "expected a rejection");
      ok(caught.code !== "network", "provider HTTP error must not be reclassified as network");
      ok(/boom/.test(caught.message), "original handleAIError message must survive, got: " + caught.message);
    });

    await atest("regression guard: caller AbortError is NOT reclassified as network", async () => {
      const ctrl = new AbortController();
      ctrl.abort();
      window.fetch = async (url, init) => {
        if (init && init.signal && init.signal.aborted) {
          throw new DOMException("The operation was aborted.", "AbortError");
        }
        throw new Error("test setup error: signal not chained");
      };
      let caught = null;
      try { await _pbpStreamRead("https://example.test/x", {}, { signal: ctrl.signal }, "API", noopConsume); }
      catch (e) { caught = e; }
      ok(caught && caught.name === "AbortError", "expected AbortError, got " + (caught && caught.name));
      ok(caught && caught.code !== "network", "AbortError must not be reclassified as network");
    });

    await atest("degrade path: if t()/chrome.i18n is unavailable, the original error is rethrown untouched", async () => {
      window.chrome = undefined; // simulate t() throwing (no extension context)
      window.fetch = async () => { throw new TypeError("Failed to fetch"); };
      let caught = null;
      try { await _pbpStreamRead("https://example.test/x", {}, {}, "API", noopConsume); }
      catch (e) { caught = e; }
      window.chrome = { i18n: { getMessage: (key) => key === "pinboardErrorOffline" ? STUB_OFFLINE_MSG : "" } };
      ok(caught instanceof TypeError, "must degrade to the original TypeError, got " + (caught && caught.constructor.name));
      ok(caught.message === "Failed to fetch", "original message preserved: " + caught.message);
      ok(caught.code === undefined, "no .code stamped when classification itself can't run");
    });
  } finally {
    window.fetch = realFetch;
    window.chrome = realChrome;
    if (onlineDesc) Object.defineProperty(navigator, "onLine", onlineDesc); else delete navigator.onLine;
  }

  const sum = document.createElement("div");
  sum.className = "case pass";
  sum.textContent = "STREAMREAD-OFFLINE SUMMARY done";
  host.appendChild(sum);
})();

<script>
// ============ Task 10: pbpTrRunQueue (async, self-reporting) ============
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "pbpTrRunQueue (async)";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  let qpass = 0, qfail = 0;
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { qpass++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { qfail++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) {
    try { await fn(); report(name); } catch (e) { report(name, e); }
  }
  function ok(cond, msg) { if (!cond) throw new Error(msg || "assert"); }
  if (typeof pbpTrRunQueue !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP pbpTrRunQueue suite (not loaded)";
    host.appendChild(div);
    return;
  }
  // Streams every requested segment back reversed (valid ratio), tracks concurrency.
  function goodBatchFn(state) {
    return async (segments, onItem) => {
      state.inflight++;
      state.maxInflight = Math.max(state.maxInflight, state.inflight);
      await new Promise((r) => setTimeout(r, 5));
      const seen = new Set();
      for (const s of segments) { onItem({ id: s.id, text: "T:" + s.text }); seen.add(s.id); }
      state.inflight--;
      return { seenIds: seen };
    };
  }
  const segs = (ids) => ids.map((id) => ({ id, text: "source text for block " + id }));

  await atest("happy path: all blocks filled, progress monotonic, none failed", async () => {
    const state = { inflight: 0, maxInflight: 0 };
    const fills = [], progress = [];
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2]), segs([3]), segs([4, 5])],
      requestBatch: goodBatchFn(state),
      requestSingle: async () => { throw new Error("must not downgrade"); },
      onFill: (id, t) => fills.push(id), onBlockFail: () => { throw new Error("no fails expected"); },
      onProgress: (d, t) => progress.push(d + "/" + t)
    });
    ok(r.done === 5 && r.total === 5 && r.failed.length === 0 && !r.stopped, "result: " + JSON.stringify(r));
    ok(fills.slice().sort((a, b) => a - b).join(",") === "1,2,3,4,5", "all filled");
    ok(progress[progress.length - 1] === "5/5", "final progress");
    ok(state.maxInflight <= 2, "concurrency capped at 2, saw " + state.maxInflight);
  });

  await atest("missing id from stream -> single downgrade fills it", async () => {
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2, 3])],
      requestBatch: async (segments, onItem) => {
        for (const s of segments) if (s.id !== 2) onItem({ id: s.id, text: "T:" + s.text });
        return { seenIds: new Set([1, 3]) };
      },
      requestSingle: async (seg) => "single:" + seg.text,
      onFill: () => {}, onBlockFail: () => { throw new Error("no fail"); }, onProgress: () => {}
    });
    ok(r.done === 3 && r.failed.length === 0, "downgrade filled: " + JSON.stringify(r));
  });

  await atest("ratio-failed item goes to downgrade; failed single -> onBlockFail", async () => {
    const failedIds = [];
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2])],
      requestBatch: async (segments, onItem) => {
        onItem({ id: 1, text: "T:" + segments[0].text });
        onItem({ id: 2, text: "x".repeat(160) }); // runaway expansion (t > o*4+20) -> rejected fill
        return { seenIds: new Set([1, 2]) };
      },
      requestSingle: async () => null, // downgrade also unusable
      onFill: () => {}, onBlockFail: (id) => failedIds.push(id), onProgress: () => {}
    });
    ok(r.done === 1 && r.failed.length === 1 && failedIds.join(",") === "2", JSON.stringify(r));
  });

  await atest("429 backs off then succeeds; pool drains to 1 worker", async () => {
    const state = { inflight: 0, maxInflight: 0 };
    let rejections = 0, slept = [];
    const good = goodBatchFn(state);
    const r = await pbpTrRunQueue({
      batches: [segs([1]), segs([2]), segs([3])],
      backoffMs: [1, 1, 1],
      sleep: async (ms) => { slept.push(ms); },
      requestBatch: async (segments, onItem) => {
        if (rejections < 2) { rejections++; throw new Error("API failed (HTTP 429)"); }
        return good(segments, onItem);
      },
      requestSingle: async () => { throw new Error("no downgrade"); },
      onFill: () => {}, onBlockFail: () => { throw new Error("no fail"); }, onProgress: () => {}
    });
    ok(r.done === 3 && r.failed.length === 0, "all eventually filled: " + JSON.stringify(r));
    ok(slept.length === 2, "two backoffs, got " + slept.length);
  });

  await atest("non-429 batch error fails all unfilled blocks of that batch", async () => {
    const failedIds = [];
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2]), segs([3])],
      requestBatch: async (segments, onItem) => {
        if (segments[0].id === 1) throw new Error("API failed (HTTP 500)");
        for (const s of segments) onItem({ id: s.id, text: "T:" + s.text });
        return { seenIds: new Set(segments.map((s) => s.id)) };
      },
      requestSingle: async () => { throw new Error("no downgrade"); },
      onFill: () => {}, onBlockFail: (id) => failedIds.push(id), onProgress: () => {}
    });
    ok(r.done === 1 && r.failed.length === 2, JSON.stringify(r));
    ok(failedIds.slice().sort().join(",") === "1,2", "batch-1 blocks failed");
  });

  await atest("D4-1: every block fails -> onProgress still fires (progress line must not freeze on stale text)", async () => {
    const progress = [];
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2]), segs([3])],
      requestBatch: async () => { throw new Error("network error"); }, // offline: every batch hard-fails
      requestSingle: async () => { throw new Error("no downgrade"); },
      onFill: () => { throw new Error("no fill expected"); },
      onBlockFail: () => {},
      onProgress: (d, total) => progress.push(d + "/" + total)
    });
    ok(r.done === 0 && r.failed.length === 3 && r.total === 3, "all 3 failed: " + JSON.stringify(r));
    ok(progress.length === 3, "onProgress called once per failed block, got " + progress.length);
    ok(progress.every((p) => p === "0/3"), "each repaint reflects 0 done: " + JSON.stringify(progress));
  });

  await atest("abort stops claiming work and resolves stopped:true", async () => {
    const ctrl = new AbortController();
    let calls = 0;
    const r = await pbpTrRunQueue({
      batches: [segs([1]), segs([2]), segs([3]), segs([4])],
      concurrency: 1,
      signal: ctrl.signal,
      requestBatch: async (segments, onItem) => {
        calls++;
        if (calls === 1) ctrl.abort(); // Stop pressed mid-first-batch
        for (const s of segments) onItem({ id: s.id, text: "T:" + s.text });
        return { seenIds: new Set(segments.map((s) => s.id)) };
      },
      requestSingle: async () => { throw new Error("no downgrade"); },
      onFill: () => {}, onBlockFail: () => { throw new Error("no fail"); }, onProgress: () => {}
    });
    ok(r.stopped === true, "stopped flag");
    ok(calls === 1, "no further batches claimed, calls=" + calls);
    ok(r.done === 1 && r.total === 4, "partial: " + JSON.stringify(r));
  });

  await atest("host permission pauses the whole queue without per-block failures", async () => {
    const err = new Error("permission needed");
    err.code = "host_permission";
    let failed = 0, singles = 0;
    const r = await pbpTrRunQueue({
      batches: [segs([1, 2, 3])],
      requestBatch: async () => { throw err; },
      requestSingle: async () => { singles++; return null; },
      onFill: () => { throw new Error("no fill expected"); },
      onBlockFail: () => { failed++; }, onProgress: () => {}
    });
    ok(r.permissionError === err, "permission error not preserved");
    ok(r.done === 0 && r.failed.length === 0 && failed === 0 && singles === 0,
      "permission failure fragmented into block retries: " + JSON.stringify(r));
  });

  const sum = document.createElement("div");
  sum.id = "tr-queue-summary";
  sum.className = "case " + (qfail ? "fail" : "pass");
  sum.textContent = "TR-QUEUE SUMMARY: " + qpass + " passed, " + qfail + " failed";
  host.appendChild(sum);
})();
</script>

    };
    // _pbpTrRetryBlock success path calls _pbpTrShowViewToggle → t() → chrome.i18n.getMessage.
    // Stub chrome.i18n so the test harness (no extension context) doesn't throw.
    window.chrome = { i18n: { getMessage: () => "" } };
    const st = makeSt();
    st.ctrl = new AbortController();
    st.ctrl.abort();                       // simulate a finished/stopped main run
    const btn = document.createElement("button");
    try {
      await _pbpTrRetryBlock(st, w, btn);
      if (seenSignal === "ABSENT") throw new Error("retry passed no signal");
      if (seenSignal === st.ctrl.signal) throw new Error("retry reused the aborted st.ctrl");
      if (abortedAtCall !== false) throw new Error("retry's signal was already aborted at call time");
    } finally {
      window.callAIStream = realStream;
      window.chrome = prevChrome;
    }
  });
})();

<script>
// ============ Task 13: pbpAskBuildContext ============
suiteIf("pbpAskBuildContext", "pbpAskBuildContext", () => {
  function ctxBlocks(html) {
    const root = document.createElement("div");
    root.innerHTML = html;
    return pbpAiIndexBlocks(root);
  }
  test("small set fits whole: every [Pn] line, order kept, default budget", () => {
    const r = pbpAskBuildContext(ctxBlocks("<p>one</p><p>two</p><p>three</p><p>four</p>"));
    assertEq(r.totalBlocks, 4, "total");
    assertEq(r.sentBlocks, 4, "all sent");
    assertEq(r.text, "[P1] one\n[P2] two\n[P3] three\n[P4] four", "exact lines");
  });
  test("block text is whitespace-collapsed in its line", () => {
    const r = pbpAskBuildContext(ctxBlocks("<p>a   b\n c</p>"), 1000);
    assertEq(r.text, "[P1] a b c", "collapsed");
  });
  test("D10-1: a rendered KaTeX block contributes $tex$ to the model context, not the expanded glyph+MathML string", () => {
    const html = '<p>see <span class="katex"><span class="katex-mathml"><math><semantics><mrow></mrow><annotation encoding="application/x-tex">E=mc^2</annotation></semantics></math></span><span class="katex-html" aria-hidden="true">Emc2glyphs</span></span> here</p>';
    const r = pbpAskBuildContext(ctxBlocks(html), 1000);
    assert(r.text.indexOf("$E=mc^2$") !== -1, "clean tex source reached the context: " + r.text);
    assert(r.text.indexOf("Emc2glyphs") === -1, "expanded KaTeX glyphs did not leak into the context: " + r.text);
  });
  test("headings always kept even when middles are dropped", () => {
    // P1-P3 first three, P5 heading, P7/P8 last two = mandatory (6 blocks).
    // P4/P6 are 200-char middles; budget 30 tokens fits neither.
    const html = "<p>a</p><p>b</p><p>c</p>"
      + "<p>" + "x".repeat(200) + "</p>"
      + "<h2>Head</h2>"
      + "<p>" + "y".repeat(200) + "</p>"
      + "<p>d</p><p>e</p>";
    const r = pbpAskBuildContext(ctxBlocks(html), 30);
    assertEq(r.totalBlocks, 8, "total");
    assertEq(r.sentBlocks, 6, "mandatory only");
    assertEq(r.text, "[P1] a\n[P2] b\n[P3] c\n[P5] Head\n[P7] d\n[P8] e", "heading kept, middles cut");
  });
  test("remaining budget filled by uniform sampling of middle blocks", () => {
    // 15 blocks: P1-P3 "aa".."cc", P4-P13 middles of 94 chars, P14/P15 "yy"/"zz".
    // base chars 42; middle lines cost 100 (P4-P9) / 101 (P10-P13) chars.
    // Budget 140 tokens = 560 chars: k=6 -> 644 chars (over), k=5 -> 544 (fits).
    // Sampled middle indexes floor(j*10/5) = 0,2,4,6,8 -> P4,P6,P8,P10,P12.
    let html = "<p>aa</p><p>bb</p><p>cc</p>";
    for (let i = 0; i < 10; i++) html += "<p>" + "m".repeat(94) + "</p>";
    html += "<p>yy</p><p>zz</p>";
    const r = pbpAskBuildContext(ctxBlocks(html), 140);
    assertEq(r.totalBlocks, 15, "total");
    assertEq(r.sentBlocks, 10, "5 mandatory + 5 sampled");
    ["[P4]", "[P6]", "[P8]", "[P10]", "[P12]"].forEach((tok) => {
      assert(r.text.indexOf(tok) !== -1, tok + " sampled in");
    });
    ["[P5]", "[P7]", "[P9]", "[P11]", "[P13]"].forEach((tok) => {
      assert(r.text.indexOf(tok) === -1, tok + " sampled out");
    });
    assertEq(r.text.split("\n").length, r.sentBlocks, "one line per sent block");
  });
  test("empty/non-array input tolerated", () => {
    const r = pbpAskBuildContext([], 100);
    assertEq(r.text, "", "empty text");
    assertEq(r.sentBlocks, 0, "0 sent");
    assertEq(r.totalBlocks, 0, "0 total");
    assertEq(pbpAskBuildContext(null, 100).totalBlocks, 0, "null tolerated");
  });
  test("a single oversized block is capped before entering the budget calc", () => {
    // Mirrors PBP_EXPLAIN_BLOCK_CAP's pattern: one huge <pre>/log block must
    // not alone blow the whole budget. Budget here is large enough that
    // only the per-block cap (not the token budget) limits the line.
    const big = "x".repeat(20000);
    const r = pbpAskBuildContext(ctxBlocks("<p>" + big + "</p>"), 100000);
    assertEq(r.totalBlocks, 1, "total");
    assertEq(r.sentBlocks, 1, "sent");
    assertEq(r.text.length, "[P1] ".length + 8000, "line capped at the 8000-char block cap");
  });
  test("mandatory set downgrades via evenly-spaced sampling when it alone overflows the budget", () => {
    // 5 blocks: first-3 + last-2 covers every block (totalBlocks<=5), so
    // ALL 5 are mandatory and middle is empty. Each line is 15 chars
    // ("[Pn] " + a 10-digit body); mandLens (line + 1) = 16/block.
    // budget 15 tokens = 60 chars: full mandatory is 80 chars/20 tokens,
    // over budget, so it degrades the same way middle degrades below: k=4
    // (64 chars/16 tok) still over, k=3 (floor(j*5/3) = 0,1,3 -> 48
    // chars/12 tok) fits -> P1, P2, P4 kept; P3 and the "always kept" last
    // block P5 are dropped.
    const html = "<p>0123456789</p>".repeat(5);
    const r = pbpAskBuildContext(ctxBlocks(html), 15);
    assertEq(r.totalBlocks, 5, "total");
    assertEq(r.sentBlocks, 3, "mandatory downgraded to a 3-block sample");
    assertEq(r.text, "[P1] 0123456789\n[P2] 0123456789\n[P4] 0123456789", "evenly-spaced mandatory sample; P3/P5 dropped despite being 'always kept'");
  });
});

    const hist = [];
    for (let i = 1; i <= 4; i++) hist.push({ q: "q" + i, a: "x".repeat(6000) });

// ============ _pbpTrMapLimit (async, self-reporting) ============
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2"); h.textContent = "_pbpTrMapLimit (async)"; host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  if (typeof _pbpTrMapLimit !== "function") {
    const div = document.createElement("div"); div.className = "case skip";
    div.textContent = "SKIP _pbpTrMapLimit (not loaded)"; host.appendChild(div); SKIP++; return;
  }
  await atest("preserves input order and returns all results", async () => {
    const out = await _pbpTrMapLimit([1, 2, 3, 4], 2, async (x) => x * 10);
    assertEq(out.join(","), "10,20,30,40", "order preserved");
  });
  await atest("never exceeds the concurrency limit", async () => {
    let inFlight = 0, peak = 0;
    await _pbpTrMapLimit([1, 2, 3, 4, 5, 6], 2, async () => {
      inFlight++; peak = Math.max(peak, inFlight);
      await new Promise((r) => setTimeout(r, 3));      // real delay so overlap is observable
      inFlight--;
    });
    assert(peak <= 2, "peak concurrency " + peak + " must be <= 2");
  });
})();
</script>

// ============ Task 6 (#8): glossary extraction null-vs-{} semantics (async) ============
(async function () {
  const host = document.createElement("div");
  host.className = "suite";
  const h = document.createElement("h2");
  h.textContent = "_pbpTrExtractGlossary null-vs-{} (async)";
  host.appendChild(h);
  document.getElementById("results").appendChild(host);
  function report(name, err) {
    const div = document.createElement("div");
    if (!err) { PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    else { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + err.message; }
    host.appendChild(div);
  }
  async function atest(name, fn) { try { await fn(); report(name); } catch (e) { report(name, e); } }
  if (typeof _pbpTrExtractGlossary !== "function") {
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP _pbpTrExtractGlossary suite (not loaded)";
    host.appendChild(div); SKIP++; return;
  }
  function makeSt() {
    return {
      s: { aiProvider: "gemini", geminiApiKey: "k" },
      target: { name: "Simplified Chinese", code: "zh-CN" },
      work: [{ shielded: { text: "The Transformer architecture uses attention." } }]
    };
  }

  await atest("success with terms -> object (not null)", async () => {
    const real = window.callAIStream;
    window.callAIStream = async () => '{"terms":[{"term":"Transformer","translation":"变换器"}]}';
    try {
      const r = await _pbpTrExtractGlossary(makeSt());
      if (r === null) throw new Error("should not be null on success");
      assertEq(r.Transformer, "变换器", "term parsed");
    } finally { window.callAIStream = real; }
  });

  await atest("success with empty term list -> {} (real vacuum table, NOT null)", async () => {
    const real = window.callAIStream;
    window.callAIStream = async () => '{"terms":[]}';
    try {
      const r = await _pbpTrExtractGlossary(makeSt());
      if (r === null) throw new Error("empty extraction must be {} not null");
      assertEq(Object.keys(r).length, 0, "no terms");
    } finally { window.callAIStream = real; }
  });

  await atest("network failure -> null (failure, not vacuum table)", async () => {
    const real = window.callAIStream;
    window.callAIStream = async () => { throw new Error("boom"); };
    try {
      const r = await _pbpTrExtractGlossary(makeSt());
      if (r !== null) throw new Error("all-chunk failure must return null, got " + JSON.stringify(r));
    } finally { window.callAIStream = real; }
  });

  await atest("aborted before call -> null (no request, not vacuum table)", async () => {
    const real = window.callAIStream;
    let called = false;
    window.callAIStream = async () => { called = true; return '{"terms":[]}'; };
    try {
      const st = makeSt();
      st.ctrl = new AbortController();
      st.ctrl.abort();
      const r = await _pbpTrExtractGlossary(st);
      if (r !== null) throw new Error("aborted extraction must return null");
      if (called) throw new Error("callAIStream must not run when already aborted");
    } finally { window.callAIStream = real; }
  });
})();

<script>
// C2-6: storage.local reclaim safety (pbpMeasureLocalStorage / pbpReclaimLocalStorage).
// Adversarial: never-clear keys (pending data, credentials, settings, in-progress
// handoffs) must survive reclaim(ALL categories); only allowlist keys are removed.
(async function () {
  if (typeof pbpReclaimLocalStorage !== "function" || typeof pbpMeasureLocalStorage !== "function") {
    SKIP++;
    const div = document.createElement("div");
    div.className = "case skip";
    div.textContent = "SKIP suite C2-6 storage reclaim (functions not loaded)";
    document.getElementById("results").appendChild(div);
    return;
  }
  // async mirror of test(): await fn, append pass/fail div, bump counters.
  async function atest(name, fn) {
    const div = document.createElement("div");
    try { await fn(); PASS++; div.className = "case pass"; div.textContent = "PASS " + name; }
    catch (e) { FAIL++; div.className = "case fail"; div.textContent = "FAIL " + name + "\n  " + e.message; }
    document.getElementById("results").appendChild(div);
  }
  // In-memory chrome.storage.local mock (get(null)/get(str)/get(arr)/get(obj), remove).
  function mockLocal(initial) {
    const store = { ...initial };
    return {
      _store: store,
      get: (arg) => Promise.resolve(
        arg == null ? { ...store }
        : typeof arg === "string" ? (arg in store ? { [arg]: store[arg] } : {})
        : Array.isArray(arg) ? arg.reduce((o, k) => { if (k in store) o[k] = store[k]; return o; }, {})
        : Object.keys(arg).reduce((o, k) => { o[k] = (k in store) ? store[k] : arg[k]; return o; }, {})
      ),
      remove: (keys) => { (Array.isArray(keys) ? keys : [keys]).forEach((k) => delete store[k]); return Promise.resolve(); },
    };
  }
  const NEVER = [
    "offlineQueue", "batch_progress", "pinboardToken", "openaiApiKey", "jinaApiKey",
    "md_preview_data", "md_preview_data_abc123", "_tagGovIgnored", "_tagGovLastRun",
    "_tagGovAiGroups", "lastUsedTags", "optSyncEnabled", "customOverlayCSS_localFallback",
    "aiContentSource", "customBaseUrl",
  ];
  const RECLAIMABLE = [
    "jina_md_https://ex.com/a", "jina_md_https://ex.com/b", "cached_existing_urls",
    "cached_user_tags", "cached_suggest_https://ex.com/a", "_waybackLog",
    "_waybackAttempts", "pbp_ai_usage", "pbpThinkReject",
  ];
  function freshStore() {
    const s = {};
    NEVER.forEach((k) => { s[k] = { secret: "DO_NOT_DELETE_" + k, blob: "x".repeat(50) }; });
    RECLAIMABLE.forEach((k) => { s[k] = { cache: "y".repeat(200), timestamp: 1 }; });
    return s;
  }
  const realChrome = window.chrome;

  await atest("C2-6 reclaim(all cats): never-clear survive, allowlist removed, freed>0", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    const freed = await pbpReclaimLocalStorage(["jina", "urls", "tags", "misc"]);
    NEVER.forEach((k) => assert(k in local._store, "must SURVIVE reclaim: " + k));
    RECLAIMABLE.forEach((k) => assert(!(k in local._store), "must be CLEARED: " + k));
    assert(freed > 0, "freed bytes must be > 0, got " + freed);
  });

  await atest("C2-6 reclaim([]): empty categories deletes nothing", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    const before = Object.keys(local._store).length;
    const freed = await pbpReclaimLocalStorage([]);
    assertEq(Object.keys(local._store).length, before, "no keys removed on empty selection");
    assertEq(freed, 0, "zero freed on empty selection");
  });

  await atest("C2-6 reclaim(garbage/unknown categories): zero deletions", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    const before = Object.keys(local._store).length;
    const freed = await pbpReclaimLocalStorage(["everything", "__proto__", "settings", null, 42]);
    assertEq(Object.keys(local._store).length, before, "garbage category names delete nothing");
    assertEq(freed, 0, "zero freed for garbage categories");
  });

  await atest("C2-6 reclaim(non-array input): treated as empty, no deletions", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    const before = Object.keys(local._store).length;
    await pbpReclaimLocalStorage("jina");        // string, not array
    await pbpReclaimLocalStorage(undefined);
    assertEq(Object.keys(local._store).length, before, "non-array categories delete nothing");
  });

  await atest("C2-6 reclaim(tags only): removes tag caches, leaves jina/urls/misc + never-clear", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    await pbpReclaimLocalStorage(["tags"]);
    assert(!("cached_user_tags" in local._store), "cached_user_tags cleared");
    assert(!("cached_suggest_https://ex.com/a" in local._store), "cached_suggest_ cleared");
    assert("jina_md_https://ex.com/a" in local._store, "jina cache untouched");
    assert("cached_existing_urls" in local._store, "url cache untouched");
    assert("pbp_ai_usage" in local._store, "misc untouched");
    NEVER.forEach((k) => assert(k in local._store, "never-clear untouched: " + k));
  });

  await atest("C2-6 measure: groups keys by category with byte totals, ignores never-clear", async () => {
    const local = mockLocal(freshStore());
    window.chrome = { storage: { local } };
    const m = await pbpMeasureLocalStorage();
    assertEq(m.jina.keys.length, 2, "two jina keys");
    assertEq(m.urls.keys.length, 1, "one url key");
    assertEq(m.tags.keys.length, 2, "cached_user_tags + one suggest");
    assertEq(m.misc.keys.length, 4, "wayback log+attempts + ai usage + think reject");
    ["jina", "urls", "tags", "misc"].forEach((c) => assert(m[c].bytes > 0, c + " bytes > 0"));
    // never-clear keys never appear in any category
    const allMeasured = [].concat(m.jina.keys, m.urls.keys, m.tags.keys, m.misc.keys);
    NEVER.forEach((k) => assert(!allMeasured.includes(k), "never-clear absent from measure: " + k));
  });

  await atest("C2-6 measure/reclaim degrade (storage.get throws) without throwing", async () => {
    window.chrome = { storage: { local: { get: () => Promise.reject(new Error("boom")), remove: () => Promise.resolve() } } };
    const m = await pbpMeasureLocalStorage();
    assertEq(m.jina.keys.length, 0, "empty measure on storage failure");
    const freed = await pbpReclaimLocalStorage(["jina", "urls", "tags", "misc"]);
    assertEq(freed, 0, "zero freed on storage failure");
  });

  window.chrome = realChrome;
})();
</script>

  test("quote at the very start of the block clamps prefix to empty", () => {
    const block = "QUOTE" + "C".repeat(50);
    const sel = pbpHlSelectorOf(block, 0, 5);
    assertEq(sel.quote, "QUOTE", "quote");

    const block = "D".repeat(50) + "QUOTE";

// ============ md-highlight.js: Range <-> block-text-offset seam ============
suiteIf("_pbpHlOffsetsFromRange / _pbpHlClipRangeToBlock / _pbpHlSelectionSegments", "_pbpHlOffsetsFromRange", () => {
  function fixture(html) {
    const d = document.createElement("div");
    d.innerHTML = html;
    document.body.appendChild(d);
    return d;
  }

  test("plain text-node range round-trips through ask's offsets->Range", () => {
    const root = fixture('<p id="b1">hello world</p>');
    const p = root.querySelector("#b1");
    const textNode = p.firstChild;
    const range = document.createRange();
    range.setStart(textNode, 6);
    range.setEnd(textNode, 11); // "world"
    const off = _pbpHlOffsetsFromRange(p, range);
    assert(off, "offsets found");
    assertEq(off.start, 6, "start");
    assertEq(off.end, 11, "end");
    const rebuilt = _pbpAskRangeFromOffsets(p, off.start, off.end);
    assertEq(rebuilt.toString(), "world", "round-trip via ask's _pbpAskRangeFromOffsets");
    root.remove();
  });

  test("element-container boundaries normalize to text-node offsets (selectNodeContents)", () => {
    const root = fixture('<p id="b1">foo <b>bar</b> baz</p>');
    const p = root.querySelector("#b1");
    const range = document.createRange();
    range.selectNodeContents(p); // startContainer/endContainer = p itself, not a text node
    const off = _pbpHlOffsetsFromRange(p, range);
    assert(off, "offsets found for whole-element selection");
    assertEq(off.start, 0, "start at block start");
    assertEq(off.end, p.textContent.length, "end at block end");
    root.remove();
  });

  test("_pbpHlClipRangeToBlock: cross-block selection clips to each block's own text", () => {
    const root = fixture('<p>alpha beta</p><p>gamma delta</p>');
    pbpAiIndexBlocks(root);
    const blocks = pbpAiBlocks();
    assertEq(blocks.length, 2, "two indexed blocks");
    const range = document.createRange();
    range.setStart(blocks[0].el.firstChild, 6); // "beta"
    range.setEnd(blocks[1].el.firstChild, 5);   // "gamma"
    assert(range.intersectsNode(blocks[0].el), "intersects block 1");
    assert(range.intersectsNode(blocks[1].el), "intersects block 2");
    assertEq(_pbpHlClipRangeToBlock(range, blocks[0].el).toString(), "beta", "segment 1 clipped to block 1");
    assertEq(_pbpHlClipRangeToBlock(range, blocks[1].el).toString(), "gamma", "segment 2 clipped to block 2");
    root.remove();
  });

  test("_pbpHlSelectionSegments: a .pb-tr sibling inserted AFTER indexing (real translate timing) is never indexed, so a selection inside it yields zero segments", () => {
    const root = fixture('<p>alpha</p>');
    pbpAiIndexBlocks(root); // index BEFORE translation would insert .pb-tr (D10: never re-index afterward)
    const tr = document.createElement("div");
    tr.className = "pb-tr";
    tr.innerHTML = "<p>translated text</p>";
    root.appendChild(tr);
    const trP = tr.querySelector("p");
    const range = document.createRange();
    range.selectNodeContents(trP);
    const segs = _pbpHlSelectionSegments(range);
    assertEq(segs.length, 0, "nothing intersects a data-pb block");
    root.remove();
  });

  test("_pbpHlSelectionSegments: selection spanning two indexed blocks yields two segments in document order", () => {
    const root = fixture('<p>one two</p><p>three four</p>');
    pbpAiIndexBlocks(root);
    const blocks = pbpAiBlocks();
    const range = document.createRange();
    range.setStart(blocks[0].el.firstChild, 4); // "two"
    range.setEnd(blocks[1].el.firstChild, 5);   // "three"

    assertEq(segs.length, 2, "two segments");
    assertEq(segs[0].n, blocks[0].n, "segment 1 -> block 1");
    assertEq(segs[1].n, blocks[1].n, "segment 2 -> block 2");
    root.remove();
  });
